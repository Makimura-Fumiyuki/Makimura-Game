  .sns-btn:hover{ transform:translateY(-2px); }
  .sns-btn svg{ width:19px; height:19px; flex:none; }

  .copy{ margin-top:14px; color:rgba(255,255,255,.55); font-size:12px; letter-spacing:.12em; font-family:"DotGothic16",sans-serif; }
