<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dox</title>
<meta name="apple-mobile-web-app-title" content="dox">
<meta name="application-name" content="dox">
<meta name="description" content="いちばん近い数字にドッキング！十字に並んだ数字を瞬時に見比べて、中央のboxを正しい方向へ">
<!-- リンクを人に送った時のカード(OGP)。文言はハブのゲームカードと同じ -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="牧村が作ったゲーム集">
<meta property="og:title" content="dox">
<meta property="og:description" content="いちばん近い数字にドッキング！十字に並んだ数字を瞬時に見比べて、中央のboxを正しい方向へ">
<meta name="twitter:card" content="summary">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');  /* dot/pixel JP font */
  :root{
    --black:#1E1E1E;
    --white:#f4f4f1;
    --orange:#ff6a00;
    --accent:#ff6a00;   /* main accent — changes per mode (set in JS) */
    /* glossy gradient derived from the current accent (re-resolves when --accent changes) */
    --accent-grad: linear-gradient(140deg,
      color-mix(in srgb, var(--accent) 58%, #ffffff) 0%,    /* brighter highlight */
      var(--accent) 52%,
      color-mix(in srgb, var(--accent) 90%, #000000) 100%); /* only a hint of shadow (no dark corner) */
    --grid:rgba(30,30,30,.05);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--black);
    color:var(--black);
    font-family:"Helvetica Neue",Arial,sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100%;
    -webkit-user-select:none; user-select:none;
    overflow:hidden;
  }

  /* fixed design canvas (16:9); JS scales the whole thing to fit any screen */
  .screen{
    position:relative;
    width:1920px; height:1080px;
    transform-origin:center center;
    background-color:var(--white);
    overflow:hidden;
    flex:0 0 auto;
  }
  #bg{ position:absolute; inset:0; z-index:0; pointer-events:none; }
  /* mouse-hover menu-name tooltip (upper-right of the cursor) */
  .hover-tip{ position:fixed; z-index:9999; display:none; padding:.05em .7em .25em .4em; background:#ff6a00; color:#fff;
    font:800 13px "DotGothic16","Hiragino Sans","Yu Gothic",sans-serif; letter-spacing:0; white-space:nowrap;
    transform:translateY(-100%); pointer-events:none; }
  .hover-tip.show{ display:block; }
  /* title-screen trivia, bottom-right (PC only) */
  .tip-corner{ position:absolute; right:30px; bottom:26px; z-index:7; color:rgba(30,30,30,.5);
    font:800 24px "DotGothic16","Hiragino Sans","Yu Gothic",sans-serif; letter-spacing:1px; }
  .tip-corner .tip-slide{ position:absolute; right:0; bottom:0; white-space:nowrap; pointer-events:none;
    opacity:0; transform:translateX(calc(100% + 50px));
    transition:transform .42s cubic-bezier(.2,.85,.25,1), opacity .35s linear; }   /* slides in/out from the right edge; two layers cross over */
  .tip-corner .tip-slide.show{ opacity:1; transform:translateX(0); }
  .tip-corner .key{ border:2px solid currentColor; border-radius:5px; padding:1px 9px; margin:0 3px; }
  .tip-corner .key-arrows{ display:inline-block; vertical-align:middle; position:relative; top:-4px; width:57px; height:37px; margin:0 5px; }
  .tip-corner .key-wasd{ display:inline-flex; vertical-align:middle; gap:2px; margin:0 4px; }
  .tip-corner .key-wasd span{ display:inline-block; width:15px; height:15px; border:1.6px solid currentColor; border-radius:3px; text-align:center; font-size:10px; line-height:15px; }

  /* board */
  .stage{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:806.4px; height:709.632px;
    z-index:2;
    transition:transform .28s cubic-bezier(.2,.8,.25,1),
               opacity .28s linear, filter .28s linear;
  }
  /* each game box sways on its own (different phase per box), not as one board */
  .stage .box{ animation:idleBreath 4.2s ease-in-out infinite, idleSway 5.4s ease-in-out infinite; }
  .stage .pos-up    { animation-delay:-0.7s, -1.8s; }
  .stage .pos-down  { animation-delay:-2.3s, -0.6s; }
  .stage .pos-left  { animation-delay:-1.4s, -3.2s; }
  .stage .pos-right { animation-delay:-3.0s, -2.1s; }
  .stage .pos-center{ animation-delay:-0.2s, -4.0s; }
  .stage.ended .box{ animation:none; }   /* RGbox stays still */
  .stage.ended .box.correct{ animation:correctpulse .55s ease-out infinite; }   /* ...but the "answer" pulse stays */
  /* quick board "thunk" when a dock locks */
  @keyframes boardimpact{
    0%{ transform:translate(-50%,-50%) scale(1); }
    35%{ transform:translate(-50%,-50%) scale(1.04); }
    100%{ transform:translate(-50%,-50%) scale(1); }
  }
  .stage.impact{ animation:boardimpact .2s ease-out; }

  /* whole board shakes on game over: "ああ、失敗しちゃった！" */
  @keyframes boardshake{
    0%,100%{ transform:translate(-50%,-50%) rotate(0); }
    12%{ transform:translate(calc(-50% - 13.44px),-50%) rotate(-2.5deg); }
    28%{ transform:translate(calc(-50% + 13.44px),-50%) rotate(2.5deg); }
    44%{ transform:translate(calc(-50% - 9.6px),-50%) rotate(-1.8deg); }
    60%{ transform:translate(calc(-50% + 7.68px),-50%) rotate(1.4deg); }
    78%{ transform:translate(calc(-50% - 3.84px),-50%) rotate(-0.7deg); }
  }
  .stage.shake{ animation:boardshake .3s ease-in-out; }

  .stage.ended{ opacity:.5; filter:grayscale(.7); animation:none; }   /* RGbox: no sway */
  .stage.ended .box{ border-width:2px; }
  /* compact, even spacing when the board retreats to the corner */
  .stage.ended .pos-up{ top:80.64px; }
  .stage.ended .pos-down{ top:456.96px; }
  .stage.ended .pos-left{ left:129.024px; }
  .stage.ended .pos-right{ left:505.344px; }

  .timer{
    position:absolute; left:50%; top:50%;
    width:2200px; height:2200px;
    background:radial-gradient(circle at 50% 50%, rgba(30,30,30,.13), rgba(30,30,30,.05));
    clip-path:polygon(50% 0%,69.13% 3.81%,85.36% 14.64%,96.19% 30.87%,100% 50%,96.19% 69.13%,85.36% 85.36%,69.13% 96.19%,50% 100%,30.87% 96.19%,14.64% 85.36%,3.81% 69.13%,0% 50%,3.81% 30.87%,14.64% 14.64%,30.87% 3.81%);
    transform:translate(-50%,-50%) scale(1);
    transform-origin:center; z-index:0; pointer-events:none;
    transition:opacity .25s linear;
  }
  /* score-mode floating points text, just above the centre box */
  /* sits BEHIND every box (z-index:1, boxes are 2/5): it rises out from behind the
     centre box, settles in the gap just above it, holds, then fades in place */
  .scorefx{
    position:absolute; left:403.2px; top:195px;   /* resting line: mid-gap above the centre box */
    transform:translate(-50%,0);
    font:800 72px "Helvetica Neue",Arial,sans-serif;
    line-height:1; z-index:1; pointer-events:none; opacity:0; white-space:nowrap;
    will-change:transform, opacity;
  }
  /* smooth (not pixel-snapped) rendering while it moves — kills the jitter */
  .scorefx svg{ shape-rendering:geometricPrecision; }
  /* emerges from BEHIND the centre box, then — without stopping — scatters off and fades */
  @keyframes scorefxrise{
    0%  { transform:translate(-50%,95px) scale(.7) rotate(0deg); opacity:0; }   /* hidden behind the centre box */
    35% { opacity:1; }                                                          /* fades in as it clears the box */
    100%{ transform:translate(calc(-50% + var(--dx,0px)), -5px) scale(1) rotate(var(--rot,0deg)); opacity:0; }  /* rises into the gap & fades (one continuous move) */
  }
  .scorefx.go{ animation:scorefxrise .9s cubic-bezier(.25,.6,.4,1) forwards; }

  /* full-width rows of "QUICK" at the top & bottom: rush in, hold ~0.3s, then blast back out */
  .quickband{
    position:absolute; left:0; display:inline-flex; gap:40px; align-items:center;
    z-index:9; pointer-events:none; white-space:nowrap; color:color-mix(in srgb, var(--accent) 55%, transparent);
  }
  .quickband.top{ top:0; }        /* flush to the top edge */
  .quickband.bottom{ bottom:0; }  /* flush to the bottom edge */
  @keyframes qbandFromLeft{
    0%  { transform:translateX(-115%); animation-timing-function:cubic-bezier(.1,.7,.3,1); }   /* ease-out IN from left */
    28% { transform:translateX(-0.4%); animation-timing-function:linear; }                      /* settles (overflows left) */
    78% { transform:translateX(0);     animation-timing-function:cubic-bezier(.7,0,.95,.25); }  /* barely creeps, then blasts OUT */
    100%{ transform:translateX(115%); }   /* ...passing through to the right */
  }
  @keyframes qbandFromRight{
    0%  { transform:translateX(115%);  animation-timing-function:cubic-bezier(.1,.7,.3,1); }   /* ease-out IN from right */
    28% { transform:translateX(0);     animation-timing-function:linear; }                     /* settles flush-left */
    78% { transform:translateX(-0.4%); animation-timing-function:cubic-bezier(.7,0,.95,.25); } /* barely creeps, then blasts OUT */
    100%{ transform:translateX(-115%); }  /* ...passing through to the left */
  }
  .quickband.bottom.go{ animation:qbandFromLeft .62s forwards; }   /* bottom: in from LEFT, out to the RIGHT */
  .quickband.top.go{    animation:qbandFromRight .62s forwards; }  /* top: in from RIGHT, out to the LEFT */
  /* DEBUG title review: a still, clear QUICK + a small hint */
  .quickstatic{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:8; pointer-events:none; white-space:nowrap; color:var(--orange);
  }
  .quickhint{
    position:absolute; left:50%; bottom:26px; transform:translate(-50%,0);
    font:600 22px "Helvetica Neue",Arial,sans-serif; letter-spacing:2px;
    color:rgba(30,30,30,.45); z-index:8; pointer-events:none;
  }

  .box{
    position:absolute;
    width:172.032px; height:172.032px;
    border:5.76px solid var(--black);
    background:var(--white);
    display:flex; align-items:center; justify-content:center;
    z-index:2; color:var(--black);
    transition:left .28s cubic-bezier(.2,.8,.25,1), top .28s cubic-bezier(.2,.8,.25,1);
  }
  .pos-up   {left:317.184px; top:0;}
  .pos-down {left:317.184px; top:537.6px;}
  .pos-left {left:0;     top:268.8px;}
  .pos-right{left:634.368px; top:268.8px;}
  .pos-center{left:317.184px; top:268.8px;}

  .center-box{
    background:var(--accent-grad); border-color:var(--black); color:var(--white);
    z-index:5; transition:transform .18s cubic-bezier(.4,0,.2,1);
  }

  @keyframes pop{ 0%{transform:scale(0); opacity:.2;} 50%{transform:scale(1.32); opacity:1;} 74%{transform:scale(.9);} 100%{transform:scale(1);} }
  .center-box.pop{ animation:pop .34s cubic-bezier(.3,1.4,.5,1); }

  /* fresh boxes scale in on a new game */
  @keyframes spawnpop{ 0%{transform:scale(0);} 70%{transform:scale(1.12);} 100%{transform:scale(1);} }
  .box.spawn{ animation:spawnpop .26s cubic-bezier(.3,1.3,.5,1) backwards; }

  /* score: giant, centered, BEHIND the boxes (above the grid) in-game,
     then recolored/raised for the result */
  /* one element, reused for HUD and result — it just scales & moves between states */
  .score-pos{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%) scale(1);
    transform-origin:center; color:#cdcac2;
    z-index:1; pointer-events:none;
    transition:transform .3s cubic-bezier(.2,.8,.25,1),
               top .3s cubic-bezier(.2,.8,.25,1),
               color .3s linear;
  }
  .score-pos .digit{ height:760px; width:auto; }       /* base = HUD size (all digit counts use this) */
  .score-pos .num{ gap:60px !important; }              /* space multi-digit scores apart */
  /* result: same element scaled down + raised + recolored (no re-creation) */
  .score-pos.result{ top:35%; transform:translate(-50%,-50%) scale(0.50); color:var(--accent); }
  .score{ display:block; transform-origin:center; }
  .score-pos:not(.result) .score{ opacity:.45; }   /* in-game HUD score: more transparent (result stays full) */
  /* score sways like the dox logo (HUD + result): scale on one wrapper, rotate on the other.
     these wrappers persist across score re-renders (renderScore only rewrites #score) */
  .score-wrap{ display:block; transform-origin:center; animation:scoreBreathe 3.4s ease-in-out infinite; }
  .score-core{ display:block; transform-origin:center; animation:scoreSwing 4.6s ease-in-out infinite; }
  /* dock feedback = a sharp "gaku!" jerk (tilt + drop, NO zoom). --jdir flips it left/right at random */
  @keyframes scorebump{
    0%{transform:translateY(12px) rotate(calc(-4deg * var(--jdir,1)));}
    45%{transform:translateY(-3px) rotate(calc(2.4deg * var(--jdir,1)));}
    78%{transform:translateY(1px) rotate(calc(-1deg * var(--jdir,1)));}
    100%{transform:translateY(0) rotate(0deg);}
  }
  .score.bump{ animation:scorebump .34s cubic-bezier(.2,.9,.3,1); }
  /* score scale + fade in (title -> game) */
  @keyframes scorespawn{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.3); }
    60%{ opacity:1; transform:translate(-50%,-50%) scale(1.08); }
    100%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  }
  .score-pos.spawnin{ animation:scorespawn .36s cubic-bezier(.3,1.3,.5,1); }

  .ghost{
    position:absolute; width:172.032px; height:172.032px;
    border:5.76px solid var(--black); background:var(--accent-grad); color:var(--white);
    display:flex; align-items:center; justify-content:center;
    z-index:7; left:317.184px; top:268.8px;
    transition:transform .19s cubic-bezier(.34,.8,.3,1), opacity .19s ease-out;
    pointer-events:none;
  }

  @keyframes dockshake{
    0%{ transform:translate(0,0) scale(1);}
    18%{ transform:translate(0,0) scale(1.16);}
    40%{ transform:translate(-7.68px,5.76px) scale(1.06) rotate(-3deg);}
    60%{ transform:translate(7.68px,-3.84px) scale(1.06) rotate(3deg);}
    80%{ transform:translate(-3.84px,1.92px) scale(1.02) rotate(-1deg);}
    100%{ transform:translate(0,0) scale(1);}
  }
  .box.dock{ animation:dockshake .34s ease-out; }

  @keyframes correctpulse{
    0%{ box-shadow:0 0 0 0 color-mix(in srgb, var(--accent) 55%, transparent);}
    100%{ box-shadow:0 0 0 30.72px transparent;}
  }
  .box.correct{ border-color:var(--accent); color:var(--accent); z-index:6;
    animation:correctpulse .55s ease-out infinite; transform:scale(1.08); }

  /* はじめてモードの「こっちだよ」ガイド: 正解boxと中央boxの間の三角形（半透明で点滅） */
  .guide-tris{ position:absolute; inset:0; pointer-events:none; z-index:6; }
  .guide-tri{ position:absolute; width:0; height:0; transform:translate(-50%,-50%); animation:guideBlink 1.4s ease-in-out infinite; }
  .guide-tri.up   { border-left:19px solid transparent; border-right:19px solid transparent; border-bottom:26px solid var(--accent); }
  .guide-tri.down { border-left:19px solid transparent; border-right:19px solid transparent; border-top:26px solid var(--accent); }
  .guide-tri.left { border-top:19px solid transparent; border-bottom:19px solid transparent; border-right:26px solid var(--accent); }
  .guide-tri.right{ border-top:19px solid transparent; border-bottom:19px solid transparent; border-left:26px solid var(--accent); }
  @keyframes guideBlink{ 0%,100%{ opacity:.1; } 50%{ opacity:.7; } }   /* フェードで暗↔明を往復する点滅（周期1.4s・boxの光と同位相） */
  /* 正解boxは外側を光らせる（エンドレスで間違えた時=.box.correct と同じ correctpulse を流用／三角形と同じ 1.4s・同位相） */
  .stage .box.guide-target{ animation:idleBreath 4.2s ease-in-out infinite, idleSway 5.4s ease-in-out infinite, correctpulse 1.4s ease-out infinite; }

  /* dot-font digits (single SVG path = one solid object) */
  .num{ display:inline-flex; align-items:flex-start; }
  .digit{ display:block; }

  /* retry menu: slides up from the bottom */
  /* title screen logo — "dox" built from squares (the "o" is a square), all orange */
  /* outer = positioning + show/slide (transform); it never breathes */
  .title-logo{
    position:absolute; left:50%; top:34%;
    transform:translate(-50%,-50%) scale(.5);   /* grows small -> big on show */
    display:flex; z-index:6; pointer-events:none;
    opacity:0; transition:opacity .3s linear, transform .3s cubic-bezier(.2,.8,.25,1);
  }
  .title-logo.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  .title-logo .glyph{ display:block; }
  /* inner = the actual "dox"; it breathes about its own true centre (perfectly symmetric) */
  /* inner = breathing (scale), core = sway (rotate): separate elements, different periods,
     each a simple ease-in-out 0->peak->0 so every turnaround is a smooth, natural reversal */
  .logo-inner{ display:inline-block; transform-origin:50% 50%; animation:logoscale 3.6s ease-in-out infinite; }
  .logo-core{
    display:inline-flex; align-items:flex-end; gap:0.9em;
    font-size:49.92px; color:var(--orange);
    transform-origin:50% 50%; animation:logosway 4.8s ease-in-out infinite;
  }
  @keyframes logoscale{
    0%,100%{ transform:scale(1);    filter:saturate(1)    brightness(1); }
    50%    { transform:scale(1.06); filter:saturate(1.16) brightness(1.07); }
  }
  @keyframes logosway{
    0%,100%{ transform:rotate(-2deg); }
    50%    { transform:rotate(2deg); }
  }
  /* mode info shown on the title while a mode is selected (dox scatters away to reveal it) */
  .mode-panel{
    position:absolute; left:50%; top:32%; transform:translate(-50%,-50%);
    z-index:6; pointer-events:none; opacity:0;
    font-family:"DotGothic16","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",YuGothic,Meiryo,sans-serif;
  }
  .mode-inner{ transform-origin:50% 50%; animation:modeWobble 4s ease-in-out infinite; }
  .mode-row{ display:flex; align-items:center; justify-content:center; gap:20px; }   /* icon + name on one line */
  .mode-icon{ color:var(--accent); line-height:0; transform:translateY(12px); }   /* default: nudge down to sit level with the name */
  .mode-icon[data-mode="score"]{ transform:translateY(-16px); }    /* はじめて: quite a bit higher */
  .mode-icon[data-mode="speed"]{ transform:translateY(8px); }      /* スピード */
  .mode-icon[data-mode="endless"]{ transform:translateY(8px); }    /* エンドレス */
  .mode-icon svg{ width:195px; height:195px; }
  .mode-name{ font-weight:800; font-size:104px; letter-spacing:3px; color:var(--accent); white-space:nowrap; }
  .mode-desc{ font-weight:700; font-size:50px; letter-spacing:2px; color:var(--accent); opacity:.55; margin-top:14px; text-align:center; white-space:nowrap; }
  /* result variant of the panel: centre-upper (the score flies away) + smaller text for the longer phrases */
  .mode-panel.rp{ top:40%; }
  /* while a description shows, the result score flies up off the top of the screen */
  .score-pos.result.up-away{ transform:translate(-50%, calc(-50% - 1150px)) scale(0.50); }
  .mode-panel.rp .mode-name{ font-size:58px; letter-spacing:2px; }
  .mode-panel.rp .mode-desc{ font-size:58px; letter-spacing:2px; color:var(--accent); opacity:1; margin-top:10px; }   /* 2nd line: same style, tight line spacing */
  .mode-panel.rp .mode-icon{ transform:translateY(6px); }
  .mode-panel.rp .mode-icon svg{ width:92px; height:92px; }
  /* game-start hint above the centre box; shrinks & fades on the first successful dock */
  /* outer = grow/shrink + fade (via transition); inner = the box-style sway */
  .howto{
    position:absolute; left:50%; top:39%;
    transform:translate(-50%,-50%) scale(.55); opacity:0;
    z-index:7; pointer-events:none; white-space:nowrap;
    transition:opacity .42s ease, transform .42s cubic-bezier(.2,.8,.25,1);
  }
  .howto.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  .howto-sway{
    display:inline-block;
    font-family:"DotGothic16","Hiragino Sans","Yu Gothic",sans-serif; font-weight:700;
    font-size:34px; letter-spacing:1px; color:var(--accent);
    animation:idleBreath 4.2s ease-in-out infinite, idleSway 5.4s ease-in-out infinite;
  }
  /* result: orange crown that sits on top of the score on a NEW BEST, bouncing to the beat */
  /* crown & stars live INSIDE the score-core, so they sway/scale exactly with the score */
  .score-core{ position:relative; }
  .score-crown{
    position:absolute; left:50%; bottom:100%; transform:translate(-50%,-22px);
    width:400px; z-index:2; pointer-events:none; opacity:0;
  }
  .score-crown.show{ animation:crownDrop .95s cubic-bezier(.2,.62,.3,1) both; }   /* lands right as the new-best jingle finishes */
  @keyframes crownDrop{
    0%{ transform:translate(-50%,-300px); opacity:0; }
    35%{ opacity:1; }
    100%{ transform:translate(-50%,-22px); opacity:1; }
  }
  .score-crown svg{ display:block; width:100%; height:auto;
    filter:drop-shadow(0 8px 12px rgba(255,106,0,.35)); }
  /* "× thousands" shown as orange stars, centered & overlapping the lower part of the number */
  .score-stars{
    position:absolute; top:100%; left:50%; transform:translate(-50%,-66px);
    display:flex; align-items:center; justify-content:center; gap:12px; z-index:3; pointer-events:none; opacity:0;
  }
  .score-pos.result .score-stars{ transform:translate(-50%,26px); }   /* result: just below the score */
  .score-stars.show{ opacity:.62; }                            /* result: a touch faded */
  .score-pos:not(.result) .score-stars.show{ opacity:.26; }    /* in-game: fainter than the score (.45) */
  /* L1 wrap = hop + scale (screen-space, NOT rotated → always springs straight up) */
  .score-stars .star-wrap{ display:inline-block; animation:starHop 3s ease-out infinite; }
  @keyframes starHop{
    0%{   transform:translateY(0)     scale(1); }
    4%{   transform:translateY(-36px) scale(1.42); }   /* spring up */
    9%{   transform:translateY(-12px) scale(1.18); }
    12%{  transform:translateY(9px)   scale(0.9); }     /* inertia: dips down + squashes */
    15%{  transform:translateY(-4px)  scale(1.05); }    /* rebound */
    18%{  transform:translateY(0)     scale(1); }

  let actx=null, master=null, lp=null, noiseBuf=null;
  let wafu=false, hop=false, zh=false, ko=false;   // language-specific musical colour
  const WAFU_PCS=[2,4,5,9,10];   // 季語: Hirajoshi (koto): D E F A A#
  const HOP_PCS=[0,3,5,7,10];    // English: minor pentatonic (bluesy/hip-hop)

  let volLevel=(()=>{ const v=+localStorage.getItem("dox.vol"); return (v>=1&&v<=5)?v:3; })();   // persisted volume (default 3)
  function setVolume(level){ volLevel=Math.max(1,Math.min(5,level)); try{ localStorage.setItem("dox.vol", volLevel); }catch(e){} if(master&&actx) master.gain.setTargetAtTime(VOL_GAINS[volLevel], actx.currentTime, 0.04); }

  /* ---------- numbers ---------- */
  function uniqueDigits(n, exclude){
    const pool=[];
    for(let d=0; d<=9; d++){ if(!exclude || !exclude.includes(d)) pool.push(d); }
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
    return pool.slice(0,n);
  }

  function starSVG(){
    return '<svg class="star-svg" viewBox="0 0 24 24"><path fill="#fff" '
      + 'd="M12 1.6 L15 8.5 L22.4 9.2 L16.8 14.1 L18.5 21.4 L12 17.5 L5.5 21.4 L7.2 14.1 L1.6 9.2 L9 8.5 Z"/></svg>';
  }
  // each star = wrap (hop) > spin (periodic 360 flourish) > svg (continuous super-slow rotation)
  function oneStar(d){
    const dl = d ? ' style="animation-delay:'+d+'s"' : '';
    return '<span class="star-wrap"'+dl+'><span class="star-spin"'+dl+'>'+starSVG()+'</span></span>';
  }
  // up to 10 stars are drawn; from the 11th it collapses to "★ × N"
  function starsHTML(n){
    if(n<=0) return '';
    if(n>10)  return oneStar('')+'<span class="star-x">×'+n+'</span>';
    let s='';
    for(let i=0;i<n;i++) s += oneStar(((n-1-i)*0.12).toFixed(2));   // rightmost (last) hops first
    return s;
  }
  function renderScore(){
    // 0-9999 shows the real number; at every 10000 the number wraps back to 0 and one orange star is added
    const stars = Math.floor(score/10000);
    const shown = score - 10000*stars;        // e.g. 10000 -> 0 + ★1,  35000 -> 5000 + ★3
    scoreEl.innerHTML = (shown===0)
      ? '<span class="num">'+squareZeroSVG("url(#accentGrad)")+'</span>'   // glossy gradient score
      : numberHTML(shown, 16.128, 16.128, "url(#accentGrad)");
    scoreStars.innerHTML = starsHTML(stars);
    scoreStars.classList.toggle("show", stars>0);
  }
  function popCenter(){ centerEl.classList.remove("pop"); void centerEl.offsetWidth; centerEl.classList.add("pop"); setTimeout(()=>centerEl.classList.remove("pop"), 360); }
  function bumpScore(){ scoreEl.style.setProperty("--jdir", Math.random()<0.5?1:-1); scoreEl.classList.remove("bump"); void scoreEl.offsetWidth; scoreEl.classList.add("bump"); }
  // floating penalty text — always red, getting darker/red-black as the penalty grows
  const PEN_REDS = ["#ff3030", "#ff3030", "#c01818", "#6e0808"];  // index by penalty: 1=bright red, 2=darker, 3+=dark red-black
  function floatScoreText(txt, lvl){
    const el=document.createElement("div");
    el.className="scorefx";
    el.innerHTML=numberHTML(txt, 8, 4);   // built from the same square digit/sign glyphs
    el.style.color = PEN_REDS[Math.min(lvl||1, 3)];

    el.style.setProperty("--rot",(Math.random()*20-10).toFixed(0)+"deg");   // slight random tilt
    stage.appendChild(el);
    void el.offsetWidth;          // commit the start state so the rise animates
    el.classList.add("go");
    setTimeout(()=> el.remove(), 980);

  // quick dock: full-width rows of "QUICK" at top & bottom rush in, hold, then blast back out
  function qbandWords(){ let out=""; for(let i=0;i<16;i++) out+=quickWordHTML(11, 3); return out; }
  function showQuickText(){
    ["bottom","top"].forEach(pos=>{
      const el=document.createElement("div");
      el.className="quickband "+pos;
      el.innerHTML=qbandWords();
      screenEl.appendChild(el);
      void el.offsetWidth;
      el.classList.add("go");

  // quick dock (+2) shows TWO "+1"s scattering in random (roughly opposite) directions
  function floatScoreScatter(){
    [-1, 1].forEach(side=>{
      const el=document.createElement("div");

  function clearSlotFx(){

  // pop the 5 boxes in with a scale-in

      el.classList.remove("spawn"); void el.offsetWidth;

  function spawnNewGame(){
    score=0; failStreak=0; dockCount=0; graceMissUsed=false; mode="play"; scene="play"; menuLock=false; menuSel=null; updateDecideHint(); updateNameHud(); hideCornerTip(); clearGuide();
    setBGM("game");   // switch to the building-up in-game track
    bestPos.classList.remove("show"); scoreCrown.classList.remove("show");   // hide the result's BEST 3 list + crown
    howto.classList.remove("show"); void howto.offsetWidth; howto.classList.add("show");   // grow-fade in the start hint
    const mi = MODE_INFO[gameMode];                                                          // current mode (top-left): icon + name
    hudMode.innerHTML = mi ? ('<span class="hud-mode-icon">'+iconSVG(mi.icon)+'</span><span>'+mi.name+'</span>') : "";
    hudMode.classList.add("show");

    activeMs = gameMode==="speed" ? SPEED_MS

      fadeScoreIn=false;
    }
    // timer is frozen & hidden until the first dock (the full-time octagon is screen-sized,
    // so showing it frozen would blanket the whole playfield — reveal it on the first dock instead)
    clearTimeout(homeParkTimer);                                   // cancel any pending "park board hidden" from returnToTitle
    if(timerEl.parentNode!==stage) stage.appendChild(timerEl);     // returnToTitle may have moved the timer out — put it back
    timerOn=false; timerPaused=false;
    timerEl.style.transition="opacity .25s linear";
    timerEl.style.opacity = "0";

    timerEl.style.background="radial-gradient(circle at 50% 50%, rgba(30,30,30,0.13), rgba(30,30,30,0.05))"; timerBgQ=-1;
    // brand-new board, centered, opaque; the score shrink + box spawn happen together
    stage.style.transition="none";
    stage.style.opacity="1";
    stage.style.transform="translate(-50%,-50%) scale(1)";
    void stage.offsetWidth;
    stage.style.transition="transform .28s cubic-bezier(.2,.8,.25,1)";
    const SPAWN_MS=230;
    spawnBoxes();
    // the game starts the instant the boxes finish appearing
    setTimeout(()=>{ roundStart=performance.now(); lastDock=performance.now(); running=true; requestAnimationFrame(tick); }, SPAWN_MS);
  }

  function init(){
    if(stage.classList.contains("ended")){
      // the retreated board is snapshotted and slides off-screen right on its own,
      // so the fresh board can spawn at the SAME instant (zero wait)
      const clone=stage.cloneNode(true);
      clone.id=""; clone.classList.remove("shake","impact");
      clone.style.transition="none";
      clone.style.transform=`translate(calc(-50% + ${cornerDX}px), calc(-50% + ${cornerDY}px)) scale(0.38)`;
      clone.style.opacity="0.5";
      screenEl.appendChild(clone);
      void clone.offsetWidth;
      clone.style.transition="transform .3s cubic-bezier(.4,0,.2,1), opacity .3s linear";
      clone.style.transform=`translate(calc(-50% + ${cornerDX + DESIGN_W}px), calc(-50% + ${cornerDY}px)) scale(0.38)`;
      clone.style.opacity="0";
      setTimeout(()=> clone.remove(), 320);
    }
    spawnNewGame();   // everything moves at once
  }

  function closestDirs(){
    let best=Infinity;
    dirs.forEach(d => best=Math.min(best, Math.abs(center-slots[d])));
    return dirs.filter(d => Math.abs(center-slots[d])===best);
  }
  // はじめてモードのガイド三角形: 中央boxと正解boxの隙間の中点に配置（向きは正解box側）
  const guideTris = document.getElementById("guideTris");
  const GUIDE_POS = { up:{x:403.2,y:220.416}, down:{x:403.2,y:489.216}, left:{x:244.608,y:354.816}, right:{x:561.792,y:354.816} };
  function showGuide(ds){
    clearGuide();
    (ds||[]).forEach(d=>{ if(!GUIDE_POS[d]) return;
      const t=document.createElement("div"); t.className="guide-tri "+d;
      t.style.left=GUIDE_POS[d].x+"px"; t.style.top=GUIDE_POS[d].y+"px";
      guideTris.appendChild(t);
      if(slotEl[d]) slotEl[d].classList.add("guide-target");   // 正解boxもゆっくり点滅
    });
  }
  function clearGuide(){
    if(guideTris) guideTris.innerHTML="";
    dirs.forEach(d=> slotEl[d] && slotEl[d].classList.remove("guide-target"));
  }
  // the center box flies straight into the (empty) slot, then is "absorbed"
  // (shrinks + fades) as the docked number appears
  function flyGhost(dir, value, onLand){
    const ghost=document.createElement("div");
    ghost.className="ghost"; ghost.innerHTML=numberHTML(value,16.128,16.128); stage.appendChild(ghost);
    const o=offset[dir], horiz=o.x!==0;
    const stretch = horiz ? "scale(1.22,0.82)" : "scale(0.82,1.22)";  // thin along travel
    ghost.style.transition="none";
    ghost.style.transform=stretch;                       // starts stretched at the center
    void ghost.offsetWidth;
    ghost.style.transition="transform .19s cubic-bezier(.34,.8,.3,1)";
    requestAnimationFrame(()=>{ ghost.style.transform=`translate(${o.x}px,${o.y}px) scale(1)`; }); // arrives a perfect square
    setTimeout(()=>{
      if(onLand) onLand();                 // number appears; box is square == slot, no overflow
      ghost.style.transition="transform .15s ease-in, opacity .15s ease-in";
      ghost.style.transform=`translate(${o.x}px,${o.y}px) scale(.45)`;  // absorb (shrink + fade)
      ghost.style.opacity="0";
      setTimeout(()=> ghost.remove(), 150);
    }, 190);
  }
  function shakeSlot(dir){ const el=slotEl[dir]; el.classList.remove("dock"); void el.offsetWidth; el.classList.add("dock"); setTimeout(()=>el.classList.remove("dock"), 380); }
  // docked box dents in from the impact side: it compresses along the dock axis
  // with the OUTER edge anchored (e.g. left dock -> caves in from the right toward the left)
  function impactSlot(dir){
    const el=slotEl[dir];
    let squash, origin;
    if(dir==="left"){       squash="scaleX(0.68)"; origin="left center"; }
    else if(dir==="right"){ squash="scaleX(0.68)"; origin="right center"; }
    else if(dir==="up"){    squash="scaleY(0.68)"; origin="center top"; }
    else {                  squash="scaleY(0.68)"; origin="center bottom"; }
    el.style.transformOrigin=origin;
    el.style.transition="none";
    el.style.transform=squash;
    void el.offsetWidth;   // commit the squashed state so the spring-back always plays
    el.style.transition="transform .34s cubic-bezier(.16,.95,.3,1)";
    el.style.transform="scale(1)";
  }
  function joltOthers(dir){
    const o=offset[dir];
    const nx=Math.sign(o.x)*7, ny=Math.sign(o.y)*7;
    dirs.forEach(d=>{
      if(d===dir) return;
      const el=slotEl[d];
      el.style.transition="none";
      el.style.transform=`translate(${nx}px,${ny}px)`;
      requestAnimationFrame(()=>{
        el.style.transition="transform .3s cubic-bezier(.2,.85,.3,1)";
        el.style.transform="translate(0,0)";
      });
    });
  }

  function attempt(dir){
    if(!running) return;
    if(!closestDirs().includes(dir)){
      if(gameMode==="speed" || gameMode==="score"){
        // speed/score: a wrong pick never ends the run — just a quick "nope" nudge,
        // the board & timer stay so the player can immediately try the right direction
        const o=offset[dir], horiz=o.x!==0;
        if(timerOn){   // only after the first successful dock: real escalating penalty + red text
          failStreak++;
          const pen=Math.min(failStreak, 3);   // consecutive misses: 1→-1, 2→-2, 3rd+→-3
          score=Math.max(0, score-pen); renderScore(); bumpScore(); floatScoreText("-"+pen, pen);
          playFail(failStreak);
        } else {
          playFail(1);   // first-dock failure: no penalty text, gentle -1 sound (don't punish before the first dock)
          showGuide(closestDirs());   // はじめて/スピード猶予中: 間違えたら正解の向きに三角形で「こっちだよ」
        }
        centerEl.style.transform=`translate(${o.x*0.16}px,${o.y*0.16}px) ${horiz?"scale(1.06,0.95)":"scale(0.95,1.06)"}`;
        setTimeout(()=>{ centerEl.style.transform="translate(0,0)"; }, 130);
        return;
      }
      if(gameMode==="endless" && !timerOn && !graceMissUsed){   // エンドレス: タイマーが動く前の「最初の1回」は間違えても終わらない
        graceMissUsed=true;
        const o=offset[dir], horiz=o.x!==0;
        playFail(1);
        showGuide(closestDirs());   // 正解の向きに三角形＋正解boxを光らせて誘導
        centerEl.style.transform=`translate(${o.x*0.16}px,${o.y*0.16}px) ${horiz?"scale(1.06,0.95)":"scale(0.95,1.06)"}`;
        setTimeout(()=>{ centerEl.style.transform="translate(0,0)"; }, 130);
        return;
      }
      running=false;
      const o=offset[dir], horiz=o.x!==0;
      centerEl.style.transform=`translate(${o.x}px,${o.y}px) ${horiz?"scale(1.12,0.9)":"scale(0.9,1.12)"}`;
      closestDirs().forEach(d => slotEl[d].classList.add("correct"));
      playFail();
      // failure fires the instant the box docks into the (wrong) white box
      setTimeout(()=>{ centerEl.style.transform=`translate(${o.x}px,${o.y}px) scale(1)`; toResult(); }, 170);
      return;
    }
    failStreak=0; dockCount++; clearGuide();   // a correct dock resets the streak; count docks (はじめてモードの3回猶予) + clear the "こっちだよ" guide
    const dockedValue=center;
    slots[dir]=dockedValue;
    // QUICK dock = docked within 1/10 of this round's limit (per-round modes only).
    // It's worth +2 and gets the special, brighter sound (the climb jumps two steps).
    const quick = ((performance.now()-lastDock) < 680);  // quick (ALL modes): docked within 0.68s of the last dock
    score += quick ? 2 : 1;
    lastDock = performance.now();
    const others=dirs.map(d=>slots[d]);
    center=uniqueDigits(1,others)[0];
    renderBoard(); renderScore();
    slotEl[dir].innerHTML="";                 // keep docked slot empty while the box flies in
    if(!timerOn && (gameMode!=="score" || dockCount>=3)){ timerOn=true; roundStart=performance.now(); timerEl.style.opacity="1"; howto.classList.remove("show"); }  // timer starts on the first dock — but はじめてモード waits until 3 successful docks (tutorial stays until then)
    if(gameMode==="score") activeMs = scoreModeMs();        // the next round is a touch faster as score climbs
    if(gameMode!=="speed") roundStart=performance.now();   // speed: the 30s clock keeps running across docks
    // everything reacts at the INSTANT of docking: centre pops, score jerks, docked box shakes
    popCenter(); bumpScore(); shakeSlot(dir); (quick ? playDockQuick() : playDock());
    if(quick){ showQuickText(); floatScoreScatter(); }   // quick only (all modes): QUICK bands + the "+1 +1" points text
    flyGhost(dir, dockedValue, ()=>{ slotEl[dir].innerHTML=numberHTML(dockedValue,16.128,16.128); });   // number just flies in
  }

  function tick(now){
    if(!running) return;
    if(!timerOn){ requestAnimationFrame(tick); return; }   // timer frozen until the first dock
    if(timerPaused){ roundStart = now - frozenElapsed; requestAnimationFrame(tick); return; }   // DEBUG: frozen by T key
    const k = (activeMs - (now-roundStart)) / activeMs;
    if(k<=0){ running=false; playFail(); toResult(); return; }
    const rot=(1-k)*75;
    timerEl.style.transform=`translate(-50%,-50%) rotate(${rot}deg) scale(${k})`;
    // stay dark until time is low, then gradually shift toward red
    const mf = k<0.48 ? Math.pow((0.48-k)/0.48, 1.2) : 0;   // start reddening a bit later
    const mq = Math.round(mf*16);   // quantize: repaint the huge timer element only when the colour actually steps (not every frame → big mobile win)
    if(mq!==timerBgQ){ timerBgQ=mq;
      const rr=Math.round(30+(224-30)*mf), gg=Math.round(30+(38-30)*mf), bb=Math.round(30+(22-30)*mf);
      const a1=(0.13+(0.40-0.13)*mf).toFixed(3), a2=(0.05+(0.18-0.05)*mf).toFixed(3);
      timerEl.style.background=`radial-gradient(circle at 50% 50%, rgba(${rr},${gg},${bb},${a1}), rgba(${rr},${gg},${bb},${a2}))`;
    }
    requestAnimationFrame(tick);
  }

  // seamless transition into the result scene (no cut-in)
  function toResult(){
    mode="over"; scene="over"; menuLock=true; menuSel=null; resultPanelDir=null; updateDecideHint(); clearGuide();   // lock input until the menu actually appears
    setBGM("title");   // result uses the mellow title track
    howto.classList.remove("show","hide");   // clear the start hint
    hudEsc.classList.remove("show");   // hide the in-game Esc hint
    // mode label exits and the player-name hint enters, in sync with the scene transition
    hudMode.classList.remove("show"); updateNameHud();

    // clear any in-flight orange box; the docked box stays where it was wrongly placed
    stage.querySelectorAll(".ghost").forEach(g=>g.remove());
    centerEl.classList.remove("pop");

    // timer swells outward (slowly) and fades away
    timerEl.style.transition="transform .6s ease-out, opacity .6s ease-out";
    timerEl.style.transform="translate(-50%,-50%) scale(2.6)";
    timerEl.style.opacity="0";
    stage.querySelectorAll(".scorefx").forEach(el=>el.remove());   // drop any lingering points text

    // all the boxes shake — "ああ、失敗しちゃった！"
    stage.classList.remove("impact","shake"); void stage.offsetWidth; stage.classList.add("shake");

    // after the shake, the board slides to the corner (animated) and the result appears
    setTimeout(()=>{
      const newBest = score>0 && score > (loadBest(gameMode)[0]||0);   // strictly beats the previous #1 record
      if(newBest) playNewBest();                                       // special jingle (instead of the usual one)
      else (score===0 ? playAww() : playFanfare());   // 0 = gentle "aww", otherwise celebrate
      const s=0.38, mx=11.52, my=24.96;
      const hw=806.4*s/2, hh=709.632*s/2;
      const dx=(DESIGN_W - mx - hw) - DESIGN_W/2;
      const dy=(DESIGN_H - my - hh) - DESIGN_H/2;
      cornerDX=dx; cornerDY=dy;
      stage.classList.remove("shake");
      // commit the centered state first, then transition to the corner so it visibly slides
      stage.style.transition="none";
      stage.style.transform="translate(-50%,-50%) scale(1)";
      void stage.offsetWidth;
      stage.classList.add("ended");
      requestAnimationFrame(()=>{
        stage.style.transition="transform .34s cubic-bezier(.4,0,.2,1), opacity .34s linear, filter .34s linear";
        stage.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(${s})`;
        // the docked box slides back to the center as the board retreats
        centerEl.style.transition="transform .34s cubic-bezier(.4,0,.2,1)";
        centerEl.style.transform="translate(0,0) scale(1)";
      });
      scorePos.classList.add("result");          // HUD score grows into the result score
      const prevBest = loadBest(gameMode)[0] || 0;   // capture BEFORE recordScore
      recordScore(gameMode, score); renderBest(gameMode); bestPos.classList.add("show");   // save + show BEST 3
      // online ranking: submit ONLY a new personal best (so each player contributes just their best, per mode)
      if(score>0 && score>prevBest){ const gm=gameMode, gs=score; if(playerName()) sbSubmit(gm, gs); else openNameModal({ required:true, onDone:()=>sbSubmit(gm, gs) }); }   // ranking-in with no name → name is required
      if(newBest) scoreCrown.classList.add("show"); else scoreCrown.classList.remove("show");   // crown only on a record
      if(newBest && miconEl.down) miconEl.down.classList.add("hilite");   // draw attention to その他 (ranking) after a new best — cleared when その他 opens
      if(newBest && menuDownHint){ menuDownHint.classList.remove("dark"); menuDownHint.classList.add("show"); }   // ▼ on the centre box (white — result cursor starts centred): recommend pressing ↓
      setMenuIcons(RESULT_ICONS);
      menuCenter.style.transition="none"; menuCenter.style.transform="translate(0,0)"; resetIcons();
      void menuCenter.offsetWidth; menuCenter.style.transition="";
      requestAnimationFrame(()=> menuPos.classList.add("show"));
      menuLock=false;   // menu is now on screen — accept input
    }, 300);
  }

  // menu blip — same family as the docking bass: a soft, low, pure sine
  function blip(freq){
    if(!actx) return; const t=actx.currentTime;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type="sine"; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.13, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.18);
    o.connect(g).connect(master); o.start(t); o.stop(t+0.21);
  }
  // gentle, distinct menu-confirm (no keen highs)
  function playConfirm(){
    if(!actx) return; const t=actx.currentTime;
    note(294, t,        0.16, 0.26, "sine");
    note(392, t+0.07,   0.20, 0.26, "sine");
    note(523, t+0.14,   0.28, 0.20, "sine");
  }
  const decideEls = Array.from(document.querySelectorAll(".mdecide"));
  function updateDecideHint(){   // show 「決定」 beyond the selected option (up/left/right); hidden once locked/confirming or nothing selected
    const active = !menuLock && (scene==="title"||scene==="over") && (menuSel==="up"||menuSel==="left"||menuSel==="right");
    const label = (I18N[uiLang] && I18N[uiLang].decide) || "決定";
    decideEls.forEach(el=>{
      const on = active && el.dataset.mdir===menuSel;
      if(on){ el.firstChild ? (el.firstChild.nodeValue=label) : (el.textContent=label);   // translate (keep the ::after triangle untouched)
              el.style.color = (scene==="over") ? (MODE_ACCENT[gameMode]||"#ff6a00") : (TITLE_DIR_ACCENT[menuSel]||"#ff6a00"); }   // title: that option's mode colour / result: the mode being played
      el.classList.toggle("show", on);
    });
  }

  }
  function doDeleteAndHome(){   // 6th ↑: wipe all records, close the overlay, and return to the title
    const wasResult = (scene==="over");
    closeOthers();   // CLOSE FIRST (also resets the delete state + clears the vignette + restores BGM, all guarded)
    try{ resetBest(); lastDataMode=null; }catch(e){}   // actually delete the records now
    if(wasResult) setTimeout(()=>{ if(scene==="over"){ try{ goHome(); }catch(e){} } }, 80);   // opened from the result screen → continue on to the title
    try{ playMenuMove(); }catch(e){}
  }
  function othersMove(dir, repeat){
    if(othersSel===1 && inModeSelect){   // inside the data view's mode-select
      if(dir==="left"){ dataMode=cycleDataMode(-1); updateDataMode(-1); playMenuMove(); }     // header: new slides in from the right
      else if(dir==="right"){ dataMode=cycleDataMode(1); updateDataMode(1); playMenuMove(); }   // header: new slides in from the left
      else if(dir==="down"){   // warp back to the others row: mode cursor shrinks away, row cursor grows up from below
        inModeSelect=false;
        updateDataMode();   // dm-cursor shrinks to scale 0 (vanishes downward)
        syncCursorVis();    // ob-cursor grows back from below (scale 0 → 1)
        playMenuMove();
      }
      return;
    }
    if(othersSel===2 && inRankList){   // ranking list focused: ←/→ flip the page (5 scores per page)
      if(dir==="left"){ flipPage(-1, repeat); }
      else if(dir==="right"){ flipPage(1, repeat); }
      else if(dir==="down"){ inRankList=false; inRankSelect=true; updateRankListSel(); updateRankSel(); syncCursorVis(); playMenuMove(); }   // back to the mode-select
      return;
    }
    if(othersSel===2 && inRankSelect){   // ranking mode-select (same mechanism as the data view)
      if(dir==="left"){ rankSwitch(-1); }
      else if(dir==="right"){ rankSwitch(1); }
      else if(dir==="up"){ inRankSelect=false; inRankList=true; updateRankSel(); updateRankListSel(); renderRankPage(); syncCursorVis(); playMenuMove(); }   // ↑ = select the list
      else if(dir==="down"){ inRankSelect=false; updateRankSel(); syncCursorVis(); playMenuMove(); }   // back to the others row
      return;
    }
    if(othersSel===3 && inVolSelect){   // inside the volume menu
      if(dir==="left"){ setVolume(volLevel-1); updateVol(-1); playMenuMove(); }    // label slides (new from the right); menu-select sound also previews the new volume
      else if(dir==="right"){ setVolume(volLevel+1); updateVol(1); playMenuMove(); }   // label slides (new from the left)
      else if(dir==="down"){ inVolSelect=false; updateVol(); syncCursorVis(); playMenuMove(); }   // back to the others row
      return;
    }
    if(othersSel===4 && inLangSelect){   // inside the language menu
      if(dir==="left"){ langSel=(langSel+4)%5; if(langSel>0){try{localStorage.setItem("dox.lang3",langSel);}catch(e){}} applyLang(LANG_CODES[langSel]); updateLang(); playMenuMove(); }     // wraps: 季語 ← 韓国語
      else if(dir==="right"){ langSel=(langSel+1)%5; if(langSel>0){try{localStorage.setItem("dox.lang3",langSel);}catch(e){}} applyLang(LANG_CODES[langSel]); updateLang(); playMenuMove(); }   // wraps: 韓国語 → 季語
      else if(dir==="down"){ inLangSelect=false; updateLang(); syncCursorVis(); playMenuMove(); }   // back to the others row
      return;
    }
    if(othersSel===0 && (dir==="up"||dir==="down")){   // data-delete gauge: preview → arm (↑) → grow (↑) → delete (↑ at 5)
      if(dir==="up"){
        if(!inDeleteSelect){ inDeleteSelect=true; delSel=0; updateDelete(); syncCursorVis(); playFail(1); }   // 1st ↑ = select/arm box #1 (hide the row cursor)
        else if(delSel<4){ delSel++; updateDelete(); playFail(Math.min(delSel+1,3)); }         // add a box (→5)
        else { doDeleteAndHome(); }   // 5 boxes + ↑ = wipe all records, close the overlay, back to the title
      } else {   // down
        if(inDeleteSelect && delSel>0){ delSel--; updateDelete(); playFail(Math.min(delSel+1,3)); }   // remove a box
        else if(inDeleteSelect){ inDeleteSelect=false; updateDelete(); syncCursorVis(); playMenuMove(); }   // armed at box #1 → back to preview (show the row cursor again)
        else { closeOthers(); }                                                                // preview + ↓ = leave the overlay
      }
      return;
    }
    if(dir==="down"){ closeOthers(); return; }
    if(dir==="up"){ othersEnter(); return; }
    if(dir==="left"){ othersSel=(othersSel+4)%5; updateOthersSel(-1); playMenuMove(); }        // wraps (5 options); body slides
    else if(dir==="right"){ othersSel=(othersSel+1)%5; updateOthersSel(1); playMenuMove(); }   // wraps (5 options)
  }

  function scatterLogo(){
    const g = (titleLogo.querySelector(".logo-core")||titleLogo).children;   // [d, o, x]
    if(g.length<3) return;

  // each mode's panel enters from a different edge; leaving reverses (or, when switching
  // straight to another mode, exits the side opposite the new one)
  const PANEL_SIDE = { score:"bottom", speed:"right", endless:"left" };
  const SIDE_OPPO  = { bottom:"top", top:"bottom", left:"right", right:"left" };
  function sideXform(side){
    if(side==="bottom") return "translate(-50%, calc(-50% + 900px))";
    if(side==="top")    return "translate(-50%, calc(-50% - 900px))";
    if(side==="right")  return "translate(calc(-50% + 1500px), -50%)";
    if(side==="left")   return "translate(calc(-50% - 1500px), -50%)";
    return "translate(-50%,-50%)";
  }
  function fillModePanel(el, m){
    const info=MODE_INFO[m];
    const ic=el.querySelector(".mode-icon"); ic.innerHTML=iconSVG(info.icon); ic.setAttribute("data-mode", m);
    el.querySelector(".mode-name").textContent=info.name;
    el.querySelector(".mode-desc").textContent=info.desc;
  }
  let panelMode=null;
  function setModePanel(newMode){
    if(newMode===panelMode) return;
    const old=panelMode; panelMode=newMode;
    if(!newMode){
      // back to centre: slide the panel out the way it came in
      if(old){
        modePanel.style.transition="transform .32s cubic-bezier(.4,0,.2,1), opacity .32s linear";
        modePanel.style.transform=sideXform(PANEL_SIDE[old]); modePanel.style.opacity="0";
        setTimeout(()=>{ if(panelMode===null) modePanel.removeAttribute("style"); }, 340);
      }
      return;
    }
    // switching straight from another mode: clone the old panel & shove it out the opposite side
    if(old){
      const clone=modePanel.cloneNode(true); clone.id="";
      clone.style.setProperty("--accent", MODE_ACCENT[old]);   // keep old colour as it leaves
      clone.style.transition="none"; clone.style.transform="translate(-50%,-50%)"; clone.style.opacity="1";
      screenEl.appendChild(clone); void clone.offsetWidth;
      clone.style.transition="transform .32s cubic-bezier(.4,0,.2,1), opacity .32s linear";
      clone.style.transform=sideXform(SIDE_OPPO[PANEL_SIDE[newMode]]); clone.style.opacity="0";
      setTimeout(()=> clone.remove(), 340);
    }
    // the real panel becomes the new mode and slides in from its own side
    fillModePanel(modePanel, newMode);
    modePanel.style.transition="none";
    modePanel.style.transform=sideXform(PANEL_SIDE[newMode]); modePanel.style.opacity="0";
    void modePanel.offsetWidth;
    modePanel.style.transition="transform .32s cubic-bezier(.2,.8,.25,1), opacity .32s linear";
    modePanel.style.transform="translate(-50%,-50%)"; modePanel.style.opacity="1";

  /* ---------- input ---------- */
  // the "Esc -> title" hint appears only after ~2s of no input (and hides the moment you act)
  let escTimer=null;
  function bumpIdle(){
    hudEsc.classList.remove("show");
    const ch=document.getElementById("cornerHome"); if(ch) ch.classList.remove("live");   // hide the hit zone the moment you act
    clearTimeout(escTimer);

  }
  ["keydown","pointerdown","touchstart"].forEach(ev=> document.addEventListener(ev, bumpIdle, {passive:true}));
  function keyToDir(e){
    const k=e.key.length===1 ? e.key.toLowerCase() : e.key;
    if(e.key==="ArrowUp"    || k==="w") return "up";
    if(e.key==="ArrowDown"  || k==="s") return "down";
    if(e.key==="ArrowLeft"  || k==="a") return "left";
    if(e.key==="ArrowRight" || k==="d") return "right";
    return null;
  }
  // ----- delete-records confirmation (opened from the データ削除 option in the others menu) -----
  let confirmOpen=false, confirmSel=0;   // 0 = やっぱなし (left), 1 = 本当に消す (right)
  const confirmModal=document.getElementById("confirmModal"), confirmYes=document.getElementById("confirmYes"), confirmNo=document.getElementById("confirmNo");
  function updateConfirm(){ confirmNo.classList.toggle("sel", confirmSel===0); confirmYes.classList.toggle("sel", confirmSel===1); }
  function openConfirm(){ confirmOpen=true; confirmSel=0; updateConfirm(); confirmModal.classList.add("show"); }
  function closeConfirm(){ confirmOpen=false; confirmModal.classList.remove("show"); }
  function doDeleteRecords(){ resetBest(); lastDataMode=null; if(othersOpen) updateDataMode(); closeConfirm(); }
  confirmYes.addEventListener("click", ()=>{ if(actx) playConfirm(); doDeleteRecords(); });
  confirmNo.addEventListener("click", ()=>{ if(actx) playMenuMove(); closeConfirm(); });
  document.addEventListener("keydown",(e)=>{
    if(nameModalOpen){ if((e.key==="Escape"||e.key==="Enter") && !e.repeat){ e.preventDefault(); confirmName(); } return; }   // Esc/Enter decide; ignore key-repeat so holding the key doesn't instantly close
    if(confirmOpen){   // modal captures input: ←/→ choose, Enter confirm, Esc cancel
      e.preventDefault();
      const k=e.key, kl=k.length===1?k.toLowerCase():k;
      if(k==="ArrowLeft"||kl==="a"){ if(confirmSel!==0){ confirmSel=0; updateConfirm(); playMenuMove(); } }
      else if(k==="ArrowRight"||kl==="d"){ if(confirmSel!==1){ confirmSel=1; updateConfirm(); playMenuMove(); } }
      else if(k==="Enter"||k===" "||k==="Spacebar"){ if(confirmSel===1){ if(actx) playConfirm(); doDeleteRecords(); } else { if(actx) playMenuMove(); closeConfirm(); } }
      else if(k==="Escape"){ closeConfirm(); }
      return;
    }
    if(e.key==="m" || e.key==="M"){ ensureAudio(); if(!e.repeat) toggleBGM(); return; }   // mute/unmute BGM
    if(othersOpen){   // overlay captures all navigation; Esc or Down closes it
      if(e.key==="Escape"){ e.preventDefault(); if(!e.repeat){ ensureAudio(); closeOthers(); } return; }
      if(e.key==="Enter"){ e.preventDefault(); if(!e.repeat){ ensureAudio(); othersMove("up"); } return; }   // Enter = activate/confirm (enters a menu; climbs/deletes in the gauge)
      const od=keyToDir(e);
      if(od){ e.preventDefault(); if(!e.repeat || (inRankList && (od==="left"||od==="right"))){ ensureAudio(); othersMove(od, e.repeat); } }   // allow long-press page-flip in the ranking list (repeat=stop at the ends)
      return;
    }
    if(e.key==="Enter"){   // Enter now CONFIRMS the selected menu option (no longer bails to the title)
      e.preventDefault();
      if(!e.repeat){ ensureAudio(); if(mode==="over" && menuSel!==null) confirmMenu(menuSel); }
      return;
    }
    if(e.key==="Escape"){   // Esc: during play → back to title; on title/result → open the name dialog
      e.preventDefault();
      if(!e.repeat){ ensureAudio();
        if(scene==="play") returnToTitle();
        else if(playerName()) openNameModal({ title:"なまえを変更", cancelable:true });   // name is set only after a first score; here you can only change it
      }
      return;
    }
    if(e.code==="Space" || e.key===" "){   // Space returns to title ONLY during play
      e.preventDefault();
      if(!e.repeat){ ensureAudio(); if(scene==="play") returnToTitle(); }
      return;
    }
    const dir=keyToDir(e);
    if(!dir) return;
    e.preventDefault();
    if(e.repeat) return;
    ensureAudio();
    if(mode==="play") attempt(dir); else menuMove(dir);
  });

  let tsx=0, tsy=0;
  function bindSwipe(el, handler){
    el.addEventListener("touchstart",(e)=>{ const t=e.changedTouches[0]; tsx=t.clientX; tsy=t.clientY; ensureAudio(); },{passive:true});
    el.addEventListener("touchend",(e)=>{
      const t=e.changedTouches[0]; const dx=t.clientX-tsx, dy=t.clientY-tsy;
      if(Math.abs(dx)<20 && Math.abs(dy)<20) return;
      let dir; if(Math.abs(dx)>Math.abs(dy)) dir=dx>0?"right":"left"; else dir=dy>0?"down":"up";
      handler(dir);
    },{passive:true});
  }
  bindSwipe(screenEl,(dir)=>{ if(mode==="play") attempt(dir); });
  bindSwipe(menuStage,(dir)=>{ if(mode==="over") menuMove(dir); });

  // mouse: drag to swipe (same as touch), plus click a surrounding box to dock that way
  function bindMouseSwipe(el, handler){
    let mx=0,my=0,down=false;
    el.addEventListener("mousedown",(e)=>{ down=true; mx=e.clientX; my=e.clientY; ensureAudio(); });
    window.addEventListener("mouseup",(e)=>{
      if(!down) return; down=false;
      const dx=e.clientX-mx, dy=e.clientY-my;
      if(Math.abs(dx)<20 && Math.abs(dy)<20) return;   // a plain click is handled elsewhere
      let dir; if(Math.abs(dx)>Math.abs(dy)) dir=dx>0?"right":"left"; else dir=dy>0?"down":"up";
      handler(dir);
    });
  }
  bindMouseSwipe(screenEl,(dir)=>{ if(mode==="play") attempt(dir); });
  bindMouseSwipe(menuStage,(dir)=>{ if(mode==="over") menuMove(dir); });
  // click a surrounding box to dock toward it
  dirs.forEach(d=>{
    slotEl[d].style.cursor="pointer";
    slotEl[d].addEventListener("click",()=>{ ensureAudio(); if(mode==="play") attempt(d); });
  });
  // hover tooltip: show the option name (localized), semi-transparent, at the cursor's upper-right
  const hoverTip=document.getElementById("hoverTip");
  function optName(dir){
    if(dir==="down") return (I18N[uiLang].others)||"その他";
    if(scene==="title"){ const m=DIR_MODE[dir]; return (MODE_INFO[m]&&MODE_INFO[m].name)||""; }
    if(scene==="over"){ return (RESULT_INFO[dir]&&RESULT_INFO[dir].name)||""; }
    return "";
  }
  function optAccent(dir){ return scene==="over" ? (MODE_ACCENT[gameMode]||"#ff6a00") : (TITLE_DIR_ACCENT[dir]||"#ff6a00"); }
  function showTip(name, color, x, y){
    if(!hoverTip || COARSE) return;   // no hover tooltip on touch devices (taps fire synthetic mouseenter)
    if(!name){ hoverTip.classList.remove("show"); return; }
    hoverTip.textContent=name;
    hoverTip.style.fontSize=(24*uiScale).toFixed(2)+"px";   // scale with the game so it looks the same on any window size
    hoverTip.style.background="color-mix(in srgb, "+(color||"#ff6a00")+" 75%, transparent)";   // semi-transparent mode colour
    hoverTip.style.left=(x+10)+"px"; hoverTip.style.top=(y-5)+"px";
    hoverTip.classList.add("show");
  }
  function hideTip(){ if(hoverTip) hoverTip.classList.remove("show"); }
  function tipHover(el, nameFn, colorFn){ if(!el) return; const upd=(e)=> showTip(nameFn(), colorFn?colorFn():"#ff6a00", e.clientX, e.clientY); el.addEventListener("mouseenter", upd); el.addEventListener("mousemove", upd); el.addEventListener("mouseleave", hideTip); }
  document.querySelectorAll(".micon").forEach(el=>{
    el.addEventListener("click",()=>{ ensureAudio(); if(mode==="over") menuSelectDirect(el.dataset.mdir); });
    tipHover(el, ()=> othersOpen?"":optName(el.dataset.mdir), ()=> optAccent(el.dataset.mdir));
  });
  // window-inner mode-selects (data & ranking): mode name + mode colour — attach to the boxes (the .dmi icons are pointer-events:none)
  dmbBoxes.forEach((el,i)=> tipHover(el, ()=> (MODE_INFO[DATA_MODES[i]]&&MODE_INFO[DATA_MODES[i]].name)||"", ()=> MODE_ACCENT[DATA_MODES[i]]||"#ff6a00"));
  rmbBoxes.forEach((el,i)=> tipHover(el, ()=> (MODE_INFO[DATA_MODES[i]]&&MODE_INFO[DATA_MODES[i]].name)||"", ()=> MODE_ACCENT[DATA_MODES[i]]||"#ff6a00"));
  // tap/click 「決定」 to confirm the option it belongs to
  decideEls.forEach(el=>{
    el.addEventListener("click",()=>{ ensureAudio(); if(mode==="over" && !menuLock && menuSel===el.dataset.mdir) confirmMenu(menuSel); });
  });
  // tap/click the on-screen "Esc → タイトルに戻る" hint to leave during play
  function leaveViaHud(e){
    if(e) e.preventDefault();
    try{ ensureAudio(); }catch(_){}
    if(scene==="play") returnToTitle();
    else if(scene==="over"){ if(!menuLock){ menuLock=true; playConfirm(); goHome(); } }
  }
  if(hudEsc){ hudEsc.style.cursor="pointer";
    hudEsc.addEventListener("click", leaveViaHud);
    hudEsc.addEventListener("pointerup", leaveViaHud);   // belt-and-braces for touch/pen as well as mouse
  }
  // bottom-right corner zone: click/tap anywhere there during play → back to title
  const cornerHome = document.getElementById("cornerHome");
  // pointerdown (not click): the target's pointerdown fires BEFORE the document-level bumpIdle that hides the zone
  function cornerToTitle(e){ if(scene!=="play") return; if(e) e.preventDefault(); try{ ensureAudio(); }catch(_){} returnToTitle(); }
  if(cornerHome){ cornerHome.addEventListener("pointerdown", cornerToTitle); }
  // clicking the centre returns the cursor to the middle (deselect).
  // the cursor box AND the static centre box (revealed once the cursor moves away) both work.
  function menuToCenter(){
    ensureAudio();
    if(mode==="over" && menuSel!==null){ const ax=menuSel; selectIcon(menuSel,false); menuSel=null; setMenuCenter(null); menuSquash(ax); playMenuMove(); }
  }
  menuCenter.addEventListener("click", menuToCenter);
  const menuHome = menuStage.querySelector(".mbox.pos-center");
  if(menuHome) menuHome.addEventListener("click", menuToCenter);
  // middle mouse button (wheel click) bails out to the title
  document.addEventListener("mousedown",(e)=>{ if(e.button===1){ e.preventDefault(); ensureAudio(); if(scene==="over"){ if(!menuLock){ menuLock=true; playConfirm(); goHome(); } } else returnToTitle(); } });

  // ===== mouse / tap support for the その他 overlay (keyboard-only before; this is why delete couldn't be done by tap) =====
  (function(){
    const obEls = Array.from(document.querySelectorAll("#othersMenu .ob"));
    const delEls = Array.from(document.querySelectorAll("#delmode .delbox"));
    const othersBlur = document.getElementById("othersBlur");
    // row box: tap to move there; tap the already-selected box to enter it (= ↑)
    function tapRow(i){
      if(!othersOpen) return; ensureAudio();
      if(othersSel!==i){
        if(inModeSelect||inVolSelect||inLangSelect) exitSubmenu();   // leave a submenu first (データ削除 is reset by updateOthersSel)
        const d=i>othersSel?1:-1; othersSel=i; updateOthersSel(d); playMenuMove();
      } else if(i===0){ inDeleteSelect=false; delSel=0; updateDelete(); playMenuMove(); }   // re-tap データ削除 row button: reset its gauge to preview
      else if((i===1&&inModeSelect)||(i===3&&inVolSelect)||(i===4&&inLangSelect)){ exitSubmenu(); playMenuMove(); }   // re-tap the open option's button = close its window (back to row)
      else othersEnter();                                          // re-tap a closed option: enter its submenu
    }
    obEls.forEach((el,i)=> el.addEventListener("click",()=>tapRow(i)) );
    const OPT_NAMES=()=> [I18N[uiLang].optDelete, I18N[uiLang].optData, I18N[uiLang].optRank, I18N[uiLang].optVol, I18N[uiLang].optLang];
    obEls.forEach((el,i)=> tipHover(el, ()=> othersOpen?(OPT_NAMES()[i]||""):"", ()=> scene==="over" ? (MODE_ACCENT[gameMode]||"#ff6a00") : "#ff6a00"));   // その他 row: mode colour on result, orange on title
    // volume squares: tap to set that level (enter the menu if needed)
    vbEls.forEach((el,i)=> el.addEventListener("click",()=>{ if(!othersOpen||othersSel!==3) return; ensureAudio();
      if(!inVolSelect){ inVolSelect=true; syncCursorVis(); }
      const lvl=i+1, d=lvl>volLevel?1:(lvl<volLevel?-1:0); setVolume(lvl); updateVol(d); playMenuMove(); }) );
    // language squares
    lmbEls.forEach((el,i)=> el.addEventListener("click",()=>{ if(!othersOpen||othersSel!==4) return; ensureAudio();
      if(!inLangSelect){ inLangSelect=true; syncCursorVis(); }
      langSel=i; if(langSel>0){ try{ localStorage.setItem("dox.lang3",langSel); }catch(e){} } applyLang(LANG_CODES[langSel]); updateLang(); playMenuMove(); }) );
    // data-view mode squares
    dmbBoxes.forEach((el,i)=> el.addEventListener("click",()=>{ if(!othersOpen||othersSel!==1) return; ensureAudio();
      if(!inModeSelect){ inModeSelect=true; syncCursorVis(); }
      const cur=DATA_MODES.indexOf(dataMode), d=i>cur?1:(i<cur?-1:0); dataMode=DATA_MODES[i]; updateDataMode(d); playMenuMove(); }) );
    // ranking mode-select squares (same as data view)
    rmbBoxes.forEach((el,i)=> el.addEventListener("click",()=>{ if(!othersOpen||othersSel!==2) return; ensureAudio();
      if(!inRankSelect){ inRankSelect=true; syncCursorVis(); }
      const cur=DATA_MODES.indexOf(rankMode); if(cur!==i){ const old=rankMode, d=i>cur?1:-1; rankMode=DATA_MODES[i]; loadRanking(rankMode, d, old); } updateRankSel(); playMenuMove(); }) );
    // delete gauge: tap the preview box to arm; tap the topmost box to add the next; tap the 5th again to delete; tap a lower box to retreat
    delEls.forEach((el,i)=> el.addEventListener("click",()=>{ if(!othersOpen||othersSel!==0) return; ensureAudio();
      if(!inDeleteSelect){ if(i===0){ inDeleteSelect=true; delSel=0; updateDelete(); syncCursorVis(); playFail(1); } return; }   // tap the preview box = select/arm it
      if(i>delSel) return;   // hidden box (not yet revealed)
      if(i===delSel){
        if(delSel>=4){ doDeleteAndHome(); return; }   // 5 boxes + tap on the top = wipe all records, close, back to title
        delSel++; updateDelete(); playFail(Math.min(delSel+1,3));   // add the next box
      } else { delSel=i; updateDelete(); playFail(Math.min(delSel+1,3)); }   // tap a lower box = retreat to it
    }) );
    // ↓ back hints exit the current submenu; the row's ↵ arrow (or the dark surround) closes the overlay
    function hintExit(){ if(!othersOpen) return; ensureAudio(); exitSubmenu(); playMenuMove(); }
    [vmDown,lmDown,dmDown,rmDown].forEach(el=> el && el.addEventListener("click",hintExit) );
    if(delDown) delDown.addEventListener("click",()=>{ if(!othersOpen) return; ensureAudio(); closeOthers(); });   // ↓ on the 1-box gauge closes the overlay
    obArrow.addEventListener("click",()=>{ if(!othersOpen) return; ensureAudio(); closeOthers(); });
    // tapping the dark surround (background layers, not the menu/window) closes the overlay
    othersEl.addEventListener("click",(e)=>{ if(!othersOpen) return; const t=e.target;
      if(t===othersEl || t===othersBlur || t.classList.contains("others-box") || t.classList.contains("others-box-in")){ ensureAudio(); closeOthers(); } });
  })();

  /* ---------- animated wave grid background ---------- */
  let bgResize=null;   // exposed so fitScreen can re-size the canvas when the design canvas swaps orientation
  (function(){
    const cv=document.getElementById("bg"), ctx=cv.getContext("2d");
    const dpr=1;   // faint line wave — dpr 1 keeps mobile GPU/memory low (was up to 2 = 4x the pixels)
    let W=0,H=0;
    function resize(){
      // canvas lives INSIDE the scaled .screen, so it uses the fixed design size (not the scaled rect)
      W=DESIGN_W; H=Math.round(DESIGN_H);
      cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+"px"; cv.style.height=H+"px";
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    resize();
    bgResize=resize;

    // straight lines; opacity "stadium wave" flowing right->left AND vertically
    const SP=69.12, K=0.008333, SEG=26.88, BASE=0.10, AMP=0.06, MIN=0.05;
    let phaseX=0, phaseY=0;
    function aAt(x,y){
      const a = BASE + AMP*0.5*(Math.sin(x*K + phaseX) + Math.sin(y*K + phaseY));
      return a<MIN ? MIN : a;
    }
    // batch segments into a few alpha bands (a handful of stroke() calls per frame instead of ~2000+), redraw at ~30fps — much lighter on mobile
    const NB=8, bands=[]; for(let i=0;i<NB;i++) bands.push([]);
    const SPAN=(BASE+AMP-MIN)||1;
    let frameSkip=0;
    function loop(){
      requestAnimationFrame(loop);
      if(typeof running!=="undefined" && running) return;   // freeze the background during active play (the heaviest moment) — big mobile savings, and it's barely visible behind the board
      frameSkip=(frameSkip+1)%(COARSE?3:2); if(frameSkip) return;   // ~30fps on PC, ~20fps on touch devices (draw 1 in 3)
      if(COARSE){ phaseX += 0.090; phaseY += 0.066; } else { phaseX += 0.060; phaseY += 0.044; }   // wave speed matched to each frame rate
      ctx.clearRect(0,0,W,H);
      ctx.lineWidth=1;
      for(let i=0;i<NB;i++) bands[i].length=0;
      const cx=W/2, cy=H/2;
      const x0=cx-Math.ceil(cx/SP)*SP, y0=cy-Math.ceil(cy/SP)*SP;
      for(let x=x0; x<=W; x+=SP){ for(let y=0; y<H; y+=SEG){ let b=((aAt(x,y+SEG/2)-MIN)/SPAN*(NB-1))|0; if(b<0)b=0; else if(b>NB-1)b=NB-1; bands[b].push(x+0.5,y, x+0.5,Math.min(y+SEG,H)); } }
      for(let y=y0; y<=H; y+=SP){ for(let x=0; x<W; x+=SEG){ let b=((aAt(x+SEG/2,y)-MIN)/SPAN*(NB-1))|0; if(b<0)b=0; else if(b>NB-1)b=NB-1; bands[b].push(x,y+0.5, Math.min(x+SEG,W),y+0.5); } }
      for(let i=0;i<NB;i++){ const a=bands[i]; if(!a.length) continue; ctx.strokeStyle="rgba(30,30,30,"+(MIN+SPAN*(i/(NB-1))).toFixed(3)+")"; ctx.beginPath(); for(let k=0;k<a.length;k+=4){ ctx.moveTo(a[k],a[k+1]); ctx.lineTo(a[k+2],a[k+3]); } ctx.stroke(); }
    }
    requestAnimationFrame(loop);
  })();

  /* ---------- scale the whole design canvas to fit any screen ---------- */
  /* landscape = 1920x1080 (as designed). portrait (phones held upright) = 1080x1920:
     everything is centred/edge-anchored, so the layout re-flows and the board fills the width */
  let uiScale=1;
  function fitScreen(){
    const portrait = window.innerHeight > window.innerWidth;
    const dw = portrait ? 1080 : 1920, dh = portrait ? 1920 : 1080;
    if(dw !== DESIGN_W){
      DESIGN_W=dw; DESIGN_H=dh;
      screenEl.style.width=dw+"px"; screenEl.style.height=dh+"px";
      screenEl.classList.toggle("portrait", portrait);
      if(bgResize) bgResize();   // re-size the wave-grid canvas to the new design size
    }
    const s=Math.min(window.innerWidth/DESIGN_W, window.innerHeight/DESIGN_H);
    screenEl.style.transform="scale("+s+")";
    uiScale=s;   // keep the hover tooltip proportional to the (scaled) game
  }
  window.addEventListener("resize", fitScreen);
  window.addEventListener("orientationchange", ()=> setTimeout(fitScreen, 60));
  fitScreen();


  // unlock audio (and start the title BGM) on the very first interaction, wherever it happens
  ["pointerdown","keydown","touchstart"].forEach(ev=> window.addEventListener(ev, ensureAudio, {passive:true}));

  applyLang(LANG_CODES[langSel]);   // apply the saved language before the title appears
  showTitle();   // start on the title screen
})();
</script>
<script>document.addEventListener("focusin",function(e){var t=e.target;if(t&&t.tagName==="INPUT"&&t.value){setTimeout(function(){try{t.select();}catch(_){}},0);}});(function(){var tap=(window.matchMedia&&matchMedia("(pointer:coarse)").matches)?"タップ":"クリック";window.__TAPW=tap;function run(){var w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);var n;while(n=w.nextNode()){var v=n.nodeValue;if(v&&(v.indexOf("タップ")>=0||v.indexOf("タッチ")>=0))n.nodeValue=v.split("タッチ").join(tap).split("タップ").join(tap);}}if(document.readyState!=="loading")run();else document.addEventListener("DOMContentLoaded",run);})();</script>
