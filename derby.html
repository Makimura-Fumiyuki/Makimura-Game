<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俺たちダービー</title>
<meta name="apple-mobile-web-app-title" content="俺たちダービー">
<meta name="application-name" content="俺たちダービー">
<meta name="description" content="「コースを走るのは馬じゃない。俺たちだ」お題に数字で答え、誰が一番大きい数字を回答したか予想して、チップを賭けよう">
<meta property="og:type" content="website">
<meta property="og:title" content="俺たちダービー">
<meta property="og:description" content="「コースを走るのは馬じゃない。俺たちだ」お題に数字で答え、誰が一番大きい数字を回答したか予想して、チップを賭けよう">
<meta property="og:url" content="https://makimura-gamehub.com/derby.html">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
  :root{
    --bg:#f4f1e9;
    --ink:#22241f;
    --turf:#1f9bdc;
    --turf-dark:#127bb4;
    --rail:#f5f2ea;
    --gold:#f2b035;
    --gold-dark:#d0900f;
    --red:#e3452f;
    --fnum:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;   /* 数字・値も源ノ角ゴシック(Noto Sans JP)で統一。太字で見やすく */
  }
  /* フォントは源ノ角ゴシック(Noto Sans JP)に絶対統一。全要素に強制指定してフォールバック取りこぼしを防ぐ */
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif; }
  /* 数字・値はサブフォント(丸ゴシック・太め) */
  .code-show .cs-code, .wait-prog, .num-input, .bet-amount .ba-val, .my-chips b,
  .rounds-row .rv, .timer, .rb-delta, .rr2-num, .pool-col .pc-amt, .chk-row .chk-amt,
  .bet-live .bl-amt, .rank-row .rk, .rank-row .rr-chips, .runner .r-num, .lr-ro{ font-family:var(--fnum) !important; font-weight:900; }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, rgba(255,255,255,.7), transparent 55%),
      radial-gradient(ellipse 100% 60% at 50% 115%, rgba(31,155,220,.12), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;
    position:relative; height:100svh; overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }

  /* ===== 画面切り替え ===== */
  .scene{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    opacity:0; pointer-events:none; transform:translateY(16px);
    transition:opacity .3s linear, transform .3s cubic-bezier(.2,.8,.3,1);
    overflow-y:auto; scrollbar-width:none;
  }
  .scene::-webkit-scrollbar{ display:none; }
  .scene.on{ opacity:1; pointer-events:auto; transform:translateY(0); }

  /* ===== タイトル ===== */
  #titleScene{ padding:13vh 20px 150px; gap:38px; }
  .derby-logo{ display:flex; flex-direction:column; align-items:center; }
  .t-main{ display:flex; flex-direction:column; align-items:center; line-height:1; white-space:nowrap; }
  /* 「俺たち」を主役に=大きく赤、斜体＋左へ流れるモーションブラーで疾走感。実際に走るように上下+前後に揺らす */
  .tm-run{ display:inline-block; font-size:clamp(48px,13.5vw,94px); font-weight:900; letter-spacing:.01em; color:var(--red);
    transform:skewX(-9deg);
    text-shadow:-5px 0 0 rgba(227,69,47,.32), -11px 0 0 rgba(227,69,47,.2), -18px 0 0 rgba(227,69,47,.1), -26px 0 0 rgba(227,69,47,.05), 0 3px 0 rgba(255,255,255,.6);
    animation:tmRun .6s ease-in-out infinite; }
  @keyframes tmRun{
    0%{   transform:skewX(-9deg) translate(0,0); }
    20%{  transform:skewX(-14deg) translate(13px,-3px); }   /* 右へ強く踏み込む */
    45%{  transform:skewX(-6deg) translate(-4px,0); }       /* 少し左へ */
    70%{  transform:skewX(-13deg) translate(11px,-2px); }   /* また右へ */
    100%{ transform:skewX(-9deg) translate(0,0); }
  }
  @media (prefers-reduced-motion:reduce){ .tm-run{ animation:none; } }
  /* 「ダービー」は控えめ=小さめ青 */
  .tm-sub{ font-size:clamp(21px,5.6vw,40px); font-weight:900; letter-spacing:.14em; text-indent:.14em; color:var(--turf-dark);
    margin-top:6px; text-shadow:0 2px 0 rgba(255,255,255,.6); }
  .t-sub{ font-size:clamp(13px,3.6vw,17px); opacity:.72; letter-spacing:.1em; font-weight:700; text-align:center; margin-top:14px; }
  .sec-label{ font-size:14px; letter-spacing:.4em; text-indent:.4em; opacity:.6; text-align:center; margin-bottom:12px; font-weight:900; }

  .card-box{
    background:#fff; border-radius:16px; box-shadow:0 4px 16px rgba(34,36,31,.1);
    padding:22px 20px 20px; width:min(94vw, 440px);
  }
  .players-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  .p-row{ display:flex; align-items:center; gap:10px; }
  .p-dot{ width:26px; height:26px; border-radius:50%; flex:none; box-shadow:inset 0 2px 3px rgba(255,255,255,.4), 0 1px 3px rgba(0,0,0,.25); }
  .p-input{
    flex:1 1 0; min-width:0; font-family:inherit; font-size:17px; font-weight:700; color:var(--ink);
    padding:10px 12px; border:1.8px solid rgba(34,36,31,.25); border-radius:10px; background:#fff; outline:none;
  }
  .p-input:focus{ border-color:var(--turf); }
  .p-del{ flex:none; width:34px; height:34px; border:none; border-radius:9px; cursor:pointer;
    background:rgba(34,36,31,.08); color:rgba(34,36,31,.5); font-size:20px; font-weight:900; line-height:1; }
  .p-del:active{ transform:translateY(1px); }
  .p-add{
    width:100%; padding:11px; border:1.8px dashed rgba(31,155,220,.5); border-radius:10px; cursor:pointer;
    background:rgba(31,155,220,.06); color:var(--turf-dark); font-family:inherit; font-size:15px; font-weight:700;
  }
  .p-add:disabled{ opacity:.4; cursor:default; }

  /* モード選択 */
  .mode-row{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; width:min(94vw,440px); }
  .mode-btn{
    flex:1 1 0; min-width:150px; padding:18px 10px 15px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-weight:900; font-size:17px; letter-spacing:.06em; color:#fff; text-align:center;
    background:linear-gradient(160deg,#5cc0f0,var(--turf) 55%,var(--turf-dark)); border:none; border-radius:14px;
    box-shadow:0 4px 0 #0f6396, 0 7px 14px rgba(18,123,180,.34);
    transition:transform .14s cubic-bezier(.3,1.4,.5,1);
  }
  .mode-btn small{ display:block; margin-top:5px; font-size:11.5px; font-weight:700; opacity:.85; }
  .mode-btn:active{ transform:translateY(2px); box-shadow:0 2px 0 #0f6396; }
  .mode-btn.sel{ outline:4px solid var(--gold); outline-offset:2px; }
  .mode-btn.sm{ font-size:16px; padding:14px 8px 12px; }
  .setup-block{ display:none; flex-direction:column; align-items:center; gap:22px; }
  .setup-block.on{ display:flex; animation:panelIn .3s cubic-bezier(.2,.9,.3,1); }
  .room-btns{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .room-area{ display:flex; flex-direction:column; align-items:center; gap:12px; min-height:36px; text-align:center; }
  .code-show{ display:inline-flex; align-items:center; gap:12px; background:#fff; border:2.5px solid var(--turf); border-radius:12px; padding:8px 20px 10px 16px; cursor:pointer; }
  .code-show .cs-copy{ width:24px; height:24px; flex:none; fill:none; stroke:var(--turf); stroke-width:2; }
  .code-show .cs-code{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:900; font-size:40px; letter-spacing:.28em; text-indent:.28em; color:var(--turf-dark); }
  .code-row{ display:flex; align-items:center; gap:6px; }
  .paste-btn{ flex:none; display:flex; align-items:center; justify-content:center; cursor:pointer; padding:4px; background:none; border:none; color:var(--turf); }
  .paste-btn svg{ width:26px; height:26px; }
  .paste-btn:active{ transform:translateY(1px); }
  .code-input{ width:220px; padding:10px 6px; text-align:center; font-family:inherit; font-weight:900; font-size:26px; letter-spacing:.24em; text-indent:.24em; text-transform:uppercase; color:var(--ink); background:#fff; border:2px solid rgba(34,36,31,.4); border-radius:8px; outline:none; caret-color:var(--ink); }
  .room-note{ font-size:13.5px; font-weight:700; opacity:.75; letter-spacing:.06em; }
  .room-note.err{ color:var(--red); opacity:1; }
  @keyframes waitDots{ 0%,100%{ opacity:.4; } 50%{ opacity:1; } }
  .room-wait{ animation:waitDots 1.5s ease-in-out infinite; }

  /* ロビー / 待機 */
  .lobby-code{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .lobby-code:empty{ display:none; }
  #lobbyBack{ margin-top:2px; opacity:.72; }
  .lobby-list{ display:flex; flex-direction:column; gap:9px; width:min(94vw,400px); }
  .lobby-row{ display:flex; align-items:center; gap:10px; background:#fff; border-radius:10px; padding:9px 14px; }
  .lobby-row .p-dot{ width:24px; height:24px; }
  .lobby-row .lr-nm{ flex:1 1 0; font-weight:900; text-align:left; }
  #lobbyStart:disabled{ opacity:.4; cursor:default; }
  .lobby-row .lr-host{ font-size:11px; font-weight:700; color:var(--gold-dark); background:rgba(242,176,53,.16); border-radius:999px; padding:2px 9px 3px; }
  .lr-you{ flex:none; font-size:11px; font-weight:900; color:#fff; background:#8a6a3f; border-radius:999px; padding:2px 10px 3px; margin-left:6px; }
  .wait-prog{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:900; font-size:20px; color:var(--turf-dark); }
  .wait-who{ display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
  .wait-chip{ display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:700; background:#fff; border-radius:999px; padding:4px 11px 5px; opacity:.5; }
  .wait-chip.done{ opacity:1; background:rgba(31,155,220,.14); color:var(--turf-dark); }
  .enter-done{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .enter-done:empty{ display:none; }
  .enter-done .dr-chips{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .back-btn{ opacity:.75; }
  /* 全員のかけ確認(1台) */
  .chk-list{ display:flex; flex-direction:column; gap:8px; width:100%; }
  .chk-row{ display:flex; align-items:center; gap:8px; background:#fff; border-radius:11px; padding:10px 13px; font-size:15px; font-weight:700; cursor:pointer; }
  .chk-row:active{ transform:scale(.99); }
  .chk-row .p-dot{ width:20px; height:20px; }
  .chk-row .chk-nm{ font-weight:900; }
  .chk-row .chk-arrow{ opacity:.45; font-weight:900; }
  .chk-row .chk-amt{ margin-left:auto; color:var(--gold-dark); font-weight:900; display:flex; align-items:center; gap:4px; white-space:nowrap; }
  .chk-row .chk-none{ margin-left:auto; color:var(--red); font-weight:900; }
  .wait-chip .p-dot{ width:14px; height:14px; }
  /* 賭け中のオッズ表示 */
  .cand .c-odds{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:13px; color:var(--gold-dark); margin-left:auto; }

  /* 大きめボタン(シリーズ共通のノリ) */
  .btn-main{
    padding:15px 44px 17px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-size:22px; font-weight:900; letter-spacing:.16em; text-indent:.16em; color:#fff;
    background:linear-gradient(150deg, #ff6a4d, var(--red) 60%, #c5361f);
    border:none; border-radius:14px; box-shadow:0 5px 0 #a82c17, 0 9px 18px rgba(227,69,47,.35);
  }
  .btn-main:active{ transform:translateY(3px); box-shadow:0 2px 0 #a82c17; }
  .btn-main:disabled{ filter:grayscale(.6) brightness(.9); box-shadow:0 5px 0 #7a7a72; cursor:default; }
  .btn-gold{
    padding:15px 44px 17px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-size:22px; font-weight:900; letter-spacing:.16em; text-indent:.16em; color:#3a2c05;
    background:linear-gradient(150deg, #ffd166, var(--gold) 60%, #dc9c14);
    border:none; border-radius:14px; box-shadow:0 5px 0 var(--gold-dark), 0 9px 18px rgba(210,144,20,.35);
  }
  .btn-gold:active{ transform:translateY(3px); box-shadow:0 2px 0 var(--gold-dark); }
  .btn-gold:disabled{ filter:grayscale(.55) brightness(.95); box-shadow:0 5px 0 #9a9a90; cursor:default; }
  .txt-btn{
    padding:9px 22px; cursor:pointer; font-family:inherit; font-size:15px; font-weight:700; letter-spacing:.1em;
    color:var(--ink); background:rgba(255,255,255,.8); white-space:nowrap;
    border:1.6px solid rgba(34,36,31,.3); border-radius:9px;
  }
  .txt-btn:active{ transform:translateY(1px); }

  /* ===== 進行画面(ラウンド) ===== */
  #gameScene{ padding:clamp(168px,23vh,232px) 16px 90px; gap:0; justify-content:flex-start; }
  .panel{ display:none; flex-direction:column; align-items:center; gap:20px; width:min(96vw, 480px); }
  .panel.on{ display:flex; animation:panelIn .32s cubic-bezier(.2,.9,.3,1); }
  @keyframes panelIn{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:translateY(0); } }

  .top-bar{
    position:fixed; top:clamp(88px,12vh,110px); left:50%; transform:translateX(-50%); z-index:20;   /* 効果音/チップ状況ボタン(右上)と重ならない高さ */
    display:none; flex-direction:column; align-items:center; gap:6px; max-width:96vw;
  }
  #gameScene.on ~ .top-bar{ display:flex; }
  /* 上部の情報: ①レース数＋お題(横並び1枠) ②勝利条件(別枠・下)。本作の明るい配色で操作ボタンと差別化 */
  .info-box{ display:inline-flex; align-items:stretch; max-width:96vw; border-radius:12px; overflow:hidden;
    background:rgba(255,255,255,.92); border:2px solid rgba(31,155,220,.45); box-shadow:0 3px 10px rgba(31,155,220,.22); }
  .ib-seg{ display:inline-flex; align-items:center; gap:5px; padding:5px 13px 6px; white-space:nowrap;
    font-size:13px; font-weight:800; letter-spacing:.04em; color:var(--turf-dark); min-width:0; }
  .ib-seg + .ib-seg{ border-left:1.5px solid rgba(31,155,220,.28); }
  .round-pill{ font-weight:900; letter-spacing:.08em; color:var(--turf-dark); }
  .theme-badge{ color:var(--ink); white-space:normal; word-break:break-all; line-height:1.4; text-align:left; }   /* 長いお題は折り返して全文見せる */
  .theme-badge .em{ color:var(--red); font-weight:900; }
  /* 勝利条件は別枠(色付きで目立たせる) */
  .dir-box{ border:none; }
  .dir-badge{ font-weight:900; color:#fff; padding:5px 15px 6px; }
  .dir-badge svg{ width:14px; height:14px; flex:none; }
  .dir-box.hi{ background:linear-gradient(150deg,#ff7a5f,var(--red)); }
  .dir-box.lo{ background:linear-gradient(150deg,#41b4ec,var(--turf-dark)); }
  .timer{ position:fixed; top:calc(clamp(12px,4.5vh,40px) + 42px); left:50%; transform:translateX(-50%); z-index:19;
    display:inline-flex; align-items:center; gap:6px; font-size:15px; font-weight:800; letter-spacing:.02em; color:#3a2c05;
    background:linear-gradient(150deg,#ffe08a,var(--gold) 70%,#e6a51c); border:none; border-radius:999px; padding:5px 15px 6px; white-space:nowrap;
    box-shadow:0 2px 7px rgba(210,144,20,.45); }
  .timer svg{ width:15px; height:15px; flex:none; }
  .timer.urgent{ color:#fff; background:var(--red); box-shadow:0 2px 9px rgba(227,69,47,.55); animation:tPulse .5s ease-in-out infinite; }
  @keyframes tPulse{ 0%,100%{ transform:translateX(-50%) scale(1); } 50%{ transform:translateX(-50%) scale(1.12); } }
  .big-q{ font-size:clamp(20px,5.4vw,26px); font-weight:900; text-align:center; letter-spacing:.04em; line-height:1.45; }
  .big-q .em{ color:var(--red); }
  .hint{ font-size:13px; opacity:.62; font-weight:700; letter-spacing:.06em; text-align:center; }

  /* お題入力(テキスト欄。ボタンと区別できる見た目) */
  .field-wrap{ position:relative; width:100%; }
  .field-tag{ position:absolute; left:14px; top:-10px; z-index:1; background:var(--turf); color:#fff;
    font-size:11px; font-weight:900; letter-spacing:.1em; padding:2px 11px 3px; border-radius:999px; }
  .theme-row{ display:flex; align-items:stretch; gap:8px; width:100%; }
  .omakase-btn{ flex:none; padding:0 14px; border:none; border-radius:12px; cursor:pointer; font-family:inherit; font-weight:900; font-size:14px; letter-spacing:.04em; white-space:nowrap;
    color:#fff; background:linear-gradient(150deg,#5cc0f0,var(--turf) 60%,var(--turf-dark)); box-shadow:0 3px 0 #0f6396; touch-action:manipulation; }
  .omakase-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0f6396; }
  .theme-input{
    flex:1 1 0; min-width:0; font-family:inherit; font-size:20px; font-weight:700; text-align:center; color:var(--ink);
    padding:16px 12px 14px; border:2px dashed rgba(34,36,31,.3); border-radius:12px; background:#fbfaf6; outline:none;
    box-shadow:inset 0 2px 5px rgba(34,36,31,.09);
  }
  .theme-input:focus{ border-style:solid; border-color:var(--turf); background:#fff; }
  /* 勝敗の決め方(トグルボタン。押せるとわかる立体感) */
  .dir-row{ display:flex; gap:12px; width:100%; }
  .dir-btn{
    flex:1 1 0; padding:13px 8px 14px; cursor:pointer; border-radius:12px; font-family:inherit; font-weight:900; font-size:16px;
    color:var(--ink); background:linear-gradient(#ffffff,#efece3); border:2px solid rgba(34,36,31,.16);
    box-shadow:0 3px 0 rgba(34,36,31,.18); text-align:center; line-height:1.3; transition:transform .1s, box-shadow .1s;
  }
  .dir-btn .dir-ic{ width:17px; height:17px; vertical-align:-3px; margin-right:5px; }
  .dir-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(34,36,31,.18); }
  .dir-btn.sel{ color:#fff; }   /* 選択時は大小それぞれの色(ゲーム中の大小バッジと同じ) */
  .dir-btn[data-dir="hi"].sel{ background:linear-gradient(150deg,#ff7a5f,var(--red)); border-color:#c5361f; box-shadow:0 3px 0 #a82c17; }
  .dir-btn[data-dir="lo"].sel{ background:linear-gradient(150deg,#5cc0f0,var(--turf) 60%,var(--turf-dark)); border-color:var(--turf-dark); box-shadow:0 3px 0 #0f6396; }

  /* 秘密の数字入力 */
  .num-input{
    width:min(80vw,320px); font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:900; font-size:44px; text-align:center; color:var(--turf-dark);
    padding:12px; border:2.5px solid var(--turf); border-radius:14px; background:#fff; outline:none; letter-spacing:.06em;
    -moz-appearance:textfield; appearance:textfield;
  }
  .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .secret-note{ font-size:12.5px; color:var(--red); font-weight:900; letter-spacing:.06em; }

  /* 賭け: 候補リスト */
  .cand-list{ display:flex; flex-direction:column; gap:9px; width:100%; }
  .cand{
    display:flex; align-items:center; gap:11px; cursor:pointer;
    padding:11px 14px; border-radius:12px; background:#fff; border:2px solid rgba(34,36,31,.15);
  }
  .cand.sel{ border-color:var(--gold); background:rgba(242,176,53,.12); }
  .cand.dim{ opacity:.4; pointer-events:none; }
  /* 出題者タグ(賭け画面で右側)。「じぶん」と同じ形・不透明度・太さで、色だけ黄色ベース */
  .cand .setter-tag{ flex:none; font-size:11px; font-weight:700; color:var(--gold-dark); background:rgba(242,176,53,.18);
    border-radius:999px; padding:2px 9px 3px; white-space:nowrap; }
  .cand .p-dot{ width:24px; height:24px; }
  .cand .c-nm{ flex:1 1 0; font-weight:900; font-size:17px; }
  .cand.out{ opacity:.45; }
  .cand.out .c-nm{ color:#8a8a8a; }
  .out-tag{ font-size:11px; font-weight:800; color:#777; background:rgba(0,0,0,.08); border-radius:999px; padding:2px 9px 3px; flex:none; }
  .cand .c-me{ flex:none; font-size:11px; font-weight:700; color:var(--turf-dark); background:rgba(31,155,220,.14); border-radius:999px; padding:2px 9px 3px; }
  .cand .cand-chips{ flex:none; font-family:var(--fnum); font-weight:900; font-size:13px; color:var(--gold-dark); }
  .bet-amount{ display:flex; align-items:center; gap:5px; justify-content:center; flex-wrap:nowrap; max-width:100%; }
  .bet-amount .ba-btn{ min-width:38px; height:46px; padding:0 4px; border:none; border-radius:11px; cursor:pointer; font-size:17px; font-weight:900; color:#fff;
    background:linear-gradient(150deg,#ffd166,var(--gold) 60%,#dc9c14); box-shadow:0 3px 0 var(--gold-dark); line-height:1;
    font-family:inherit; white-space:nowrap; touch-action:manipulation; -webkit-user-select:none; user-select:none; }
  .bet-amount .ba-btn.ba-wide{ min-width:44px; }
  /* MIN/MAX は ±10 より横幅を大きく、色も変えて目立たせる。MAX=赤 / MIN=青 */
  .bet-amount .ba-btn.ba-mm{ min-width:54px; font-size:15px; letter-spacing:.06em; }
  .bet-amount .ba-max{ background:linear-gradient(150deg,#ff8b60,var(--red) 62%,#c5361f); box-shadow:0 3px 0 #a82c17; }
  .bet-amount .ba-min{ background:linear-gradient(150deg,#5cc0f0,var(--turf) 62%,var(--turf-dark)); box-shadow:0 3px 0 #0f6396; }
  .bet-amount .ba-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--gold-dark); }
  .bet-amount .ba-max:active{ box-shadow:0 1px 0 #a82c17; }
  .bet-amount .ba-min:active{ box-shadow:0 1px 0 #0f6396; }
  .bet-amount .ba-btn.dim{ opacity:.3; pointer-events:none; box-shadow:0 3px 0 #9a9a90 !important; }
  .bet-amount .ba-val{ min-width:50px; margin:0 9px; text-align:center; font-family:var(--fnum); font-weight:900; font-size:28px; color:var(--gold-dark); }
  /* 持ちチップ／賭けチップの2枚並び(メンバーリストの下)。上に小さめラベル、下に100枚ごとに積んだチップの絵。枠なし */
  .chips-two{ display:flex; align-items:flex-start; justify-content:center; gap:26px; }   /* ラベルは上でそろえて固定 */
  .chip-box{ display:inline-flex; flex-direction:column; align-items:center; gap:24px; }   /* ラベル〜10段時の一番上のチップが見た目約16px(margin-top:-8pxぶんでgapは+8の24) */
  .chip-box .cb-txt{ font-family:var(--fnum); font-size:11.5px; font-weight:800; color:var(--ink); white-space:nowrap; }
  .chip-box .cb-txt b{ font-weight:900; font-size:13px; color:var(--gold-dark); }
  /* 山は下揃え=箱は10段ぶんの固定高(flexの主軸サイズは重なりで40px)。段が少なくてもラベルは動かず固定(10段時の高さがベスト) */
  .chip-box .cb-stack{ display:flex; flex-direction:row; align-items:flex-end; gap:7px; height:40px; }
  .chip-box .cb-stack .chip-pile{ display:flex; flex-direction:column-reverse; align-items:center; justify-content:flex-end; }
  .chip-box .cb-stack .pool-chip{ width:40px; height:12px; margin-top:-8px; }   /* 下から積み上げ=後の(上の)チップが前面に来る本物の積み重ね */
  .chip-ico.big{ width:24px; height:24px; }
  .my-chips{ font-family:var(--fnum); font-size:16px; font-weight:800; color:var(--ink); }
  .my-chips b{ font-weight:900; color:var(--gold-dark); font-size:20px; }
  .my-chips-row{ display:flex; align-items:flex-end; justify-content:center; gap:14px; min-height:30px; }
  .my-chip-stack{ display:flex; flex-direction:row; align-items:flex-end; gap:8px; }
  .my-chip-stack .chip-pile{ display:flex; flex-direction:column-reverse; align-items:center; }
  .my-chip-stack .pool-chip{ width:30px; height:9px; margin-top:-6px; }
  .chk-hint{ margin-bottom:-12px; opacity:.6; }
  /* 編集中の目印: 名前行にインラインの金色ピル(点滅)。お題表示はそのまま=レイアウト不変 */
  .edit-pill{ display:inline-flex; align-items:center; gap:5px; vertical-align:3px; margin-left:8px;
    font-size:14px; font-weight:900; letter-spacing:.08em; color:#3a2c05;
    background:linear-gradient(150deg,#ffdd82,var(--gold) 70%,#e6a51c); border-radius:999px; padding:2px 12px 3px;
    box-shadow:0 2px 7px rgba(210,144,20,.4); animation:editPulse 1.1s ease-in-out infinite; }
  .edit-pill svg{ width:14px; height:14px; }
  @keyframes editPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.08); } }

  /* ===== レース ===== */
  .track{
    position:relative; width:min(96vw,480px); background:linear-gradient(180deg,#43a866,#3a9e5c 60%,#2c7d47);
    border-radius:12px; border:5px solid #fff; box-shadow:0 8px 22px rgba(34,36,31,.28), inset 0 0 24px rgba(0,0,0,.14);
    overflow:visible; margin-top:10px;   /* 一番上のレーンの数字が見切れないように */
  }
  .track.goalhit{ animation:goalHit .62s cubic-bezier(.2,.8,.3,1) both; transform-origin:50% 50%; }
  @keyframes goalHit{
    0%{ transform:rotate(0deg) scale(1); }
    16%{ transform:rotate(-2.4deg) scale(1.045); box-shadow:0 8px 22px rgba(34,36,31,.28), inset 0 0 24px rgba(0,0,0,.14), 0 0 0 4px var(--gold); }
    40%{ transform:rotate(1.5deg) scale(1.02); }
    64%{ transform:rotate(-.7deg) scale(1.006); }
    100%{ transform:rotate(0deg) scale(1); }
  }
  .lane{ position:relative; height:46px; border-bottom:1px dashed rgba(255,255,255,.35); }
  .track.compact .r-dot{ width:22px; height:22px; font-size:11px; }
  .track.compact .runner .r-num{ font-size:12px; bottom:22px; }
  .track.tiny .r-dot{ width:15px; height:15px; font-size:8px; }
  .track.tiny .runner .r-num{ font-size:10px; bottom:15px; padding:0 5px 1px; }
  .runner.cheer .r-dot{ box-shadow:0 0 0 3px var(--gold), 0 0 10px rgba(242,176,53,.8), inset 0 2px 4px rgba(255,255,255,.45), 0 2px 5px rgba(0,0,0,.3); }
  /* 応援ボタンで対象アイコンがプルッと震える(結果には影響しない) */
  .runner.cheershake .r-dot{ animation:runnerShake .5s cubic-bezier(.36,.07,.19,.97); }
  @keyframes runnerShake{ 0%,100%{ transform:translateX(0) rotate(0); } 15%{ transform:translateX(-2.5px) rotate(-7deg); } 30%{ transform:translateX(2.5px) rotate(7deg); } 45%{ transform:translateX(-2px) rotate(-5deg); } 60%{ transform:translateX(2px) rotate(5deg); } 75%{ transform:translateX(-1px) rotate(-2deg); } }
  .cheer-btn{ margin-top:14px; width:88px; height:88px; padding:0; border-radius:50%; cursor:pointer; align-self:center;
    display:inline-flex; align-items:center; justify-content:center;
    font-family:inherit; font-size:21px; font-weight:900; letter-spacing:.06em; color:#7a3a12;
    background:linear-gradient(150deg,#ffe08a,var(--gold) 65%,#e6a51c); border:none;
    box-shadow:0 5px 0 var(--gold-dark), 0 7px 15px rgba(230,165,28,.42); touch-action:manipulation; }
  .cheer-btn:active{ transform:translateY(3px); box-shadow:0 2px 0 var(--gold-dark), 0 3px 8px rgba(230,165,28,.4); }
  /* 応援時: 対象アイコンの進行方向の逆側に、ふわっとハート */
  .cheer-heart{ position:absolute; left:16px; top:50%; width:15px; height:15px; z-index:4; pointer-events:none; animation:heartPop .78s ease-out forwards; }
  .cheer-heart svg{ width:100%; height:100%; display:block; filter:drop-shadow(0 1px 2px rgba(0,0,0,.25)); }
  @keyframes heartPop{
    0%{ transform:translate(calc(-50% + var(--hx,0px)), calc(-50% + var(--hy,0px))) scale(.3); opacity:0; }
    35%{ transform:translate(calc(-50% + var(--hx,0px)), calc(-50% + var(--hy,0px) - 4px)) scale(1.2); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--hx,0px)), calc(-50% + var(--hy,0px) - 16px)) scale(.9); opacity:0; }
  }
  .lane:last-child{ border-bottom:none; }
  .goal{ position:absolute; top:0; bottom:0; right:22px; width:6px; z-index:1;
    background:repeating-linear-gradient(45deg,#fff 0 6px,#111 6px 12px); opacity:.85; }
  .track.rtl .goal{ right:auto; left:22px; }   /* 小さいほど勝ち=ゴールは左 */
  .runner{
    position:absolute; left:4px; top:50%; transform:translate(0,-50%);
    display:flex; align-items:center; gap:6px; z-index:3; will-change:left;
  }
  .runner .r-dot{
    width:32px; height:32px; border-radius:50%; flex:none; position:relative;
    box-shadow:inset 0 2px 4px rgba(255,255,255,.45), 0 2px 4px rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:14px;
  }
  .runner .r-num{
    position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
    font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:14px; color:#fff;
    background:rgba(20,28,22,.72); border-radius:999px; padding:1px 9px 2px;   /* 濃い座布団で数字を読みやすく */
    white-space:nowrap; opacity:0; transition:opacity .2s linear;
  }
  .runner .r-num.show{ opacity:1; }
  /* 加速中: みなぎる金オーラ + 後方に流れるアニメ調の集中線(進行方向の逆へビュンと) */
  .runner.surge .r-dot{ box-shadow:0 0 0 2px rgba(255,214,102,.95), 0 0 16px rgba(255,196,60,.95), inset 0 2px 4px rgba(255,255,255,.5), 0 2px 5px rgba(0,0,0,.3); }
  .runner.surge .r-dot::after{ content:""; position:absolute; right:100%; top:50%; transform:translateY(-50%); margin-right:3px;
    width:34px; height:26px; opacity:.9;
    background:
      linear-gradient(to left, rgba(255,236,150,.95), transparent) no-repeat 0 3px / 34px 3px,
      linear-gradient(to left, rgba(255,255,255,.95), transparent) no-repeat 0 11px / 28px 3px,
      linear-gradient(to left, rgba(255,236,150,.95), transparent) no-repeat 0 19px / 34px 3px;
    animation:dashStreak .22s linear infinite; }
  @keyframes dashStreak{ 0%{ opacity:.35; transform:translateY(-50%) scaleX(.7); } 50%{ opacity:1; transform:translateY(-50%) scaleX(1.15); } 100%{ opacity:.35; transform:translateY(-50%) scaleX(.7); } }
  .track.rtl .runner.surge .r-dot::after{ right:auto; left:100%; margin-right:0; margin-left:3px; transform:translateY(-50%) scaleX(-1); }   /* 左向き走行は右へ流線 */
  /* 減速中: アニメ調の青い汗が後ろへポーンと飛ぶ */
  .sweat{ position:fixed; z-index:61; pointer-events:none; width:14px; height:19px;
    border-radius:50% 50% 50% 50% / 58% 58% 42% 42%; transform-origin:center;
    background:radial-gradient(circle at 32% 26%, #eaf7ff 0 12%, #4db4f0 45%, #1785d8 78%, #0a63b0 100%);
    box-shadow:0 1px 3px rgba(10,60,110,.35), inset -1px -1px 2px rgba(0,50,100,.4), inset 2px 2px 3px rgba(255,255,255,.6);
    animation:sweatFly .55s cubic-bezier(.3,.6,.5,1) forwards; }
  @keyframes sweatFly{ 0%{ transform:translate(0,0) scale(.5) rotate(0); opacity:0; } 20%{ opacity:1; } 100%{ transform:translate(var(--sx,-16px),var(--sy,-16px)) scale(1) rotate(var(--sr,-40deg)); opacity:0; } }
  .runner.win .r-dot{ animation:winBob .5s ease-in-out infinite; box-shadow:0 0 0 3px var(--gold), inset 0 2px 4px rgba(255,255,255,.45), 0 3px 6px rgba(0,0,0,.3); }
  @keyframes winBob{ 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-3px) scale(1.08); } }

  .burst{ position:fixed; border-radius:2px; z-index:60; pointer-events:none;
    animation:burstFly 1.6s cubic-bezier(.2,.7,.4,1) forwards; }
  @keyframes burstFly{ 0%{ transform:translate(0,0) rotate(0); opacity:1; } 100%{ transform:translate(var(--bx,0),var(--by,-260px)) rotate(540deg); opacity:0; } }
  .confetti{ position:fixed; top:-14px; z-index:62; pointer-events:none; border-radius:2px; animation:confFall linear forwards; }
  @keyframes confFall{ 0%{ transform:translateY(0) rotate(0); opacity:1; } 100%{ transform:translateY(112vh) rotate(var(--rot,540deg)); opacity:.15; } }
  /* 大当たりの金チップ噴き上げ */
  .chiprain{ position:fixed; top:-40px; z-index:90; pointer-events:none; border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#ffe9a8,var(--gold) 66%,#dc9c14);
    box-shadow:0 1px 3px rgba(0,0,0,.35), inset 0 0 0 3px rgba(255,255,255,.55);
    animation:chipFall linear forwards; }
  @keyframes chipFall{ 0%{ transform:translate(0,0) rotate(0); opacity:0; } 8%{ opacity:1; } 100%{ transform:translate(var(--cx,0),115vh) rotate(var(--cr,540deg)); opacity:.9; } }
  /* 交渉成立の演出: A(あげる側/左)とB(もらう側/右)を並べ、コインが左→右へ流れる。コインはアイコン/名前より後ろ */
  .deal-badge{ position:fixed; left:50%; top:36vh; transform:translate(-50%,-50%); z-index:95; pointer-events:none; text-align:center;
    background:linear-gradient(150deg,#ffffff,#f4f1e9); border:2px solid var(--gold); padding:15px 24px 17px; border-radius:18px; min-width:270px;
    box-shadow:0 10px 28px rgba(210,144,20,.45); animation:dealPop 2s cubic-bezier(.2,1.4,.4,1) forwards; }
  .deal-badge .dd-title{ font-size:22px; font-weight:900; letter-spacing:.06em; color:var(--gold-dark); }
  .deal-badge .dd-amtline{ margin-top:6px; font-size:19px; font-weight:900; color:var(--red); }
  .deal-badge .dd-amtline.minus{ color:var(--turf-dark); }
  .deal-badge .dd-flow{ display:flex; align-items:flex-start; justify-content:space-around; gap:36px; margin-top:12px; position:relative; }
  .deal-badge .dd-av{ position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:4px; width:66px; flex:none; }
  .deal-badge .dd-dot{ width:36px; height:36px; border-radius:50%; box-shadow:inset 0 2px 4px rgba(255,255,255,.45), 0 2px 4px rgba(0,0,0,.25); }
  .deal-badge .dd-nm{ font-size:12px; font-weight:900; color:var(--ink); max-width:66px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .deal-badge .dd-coin{ position:absolute; top:10px; z-index:0; width:16px; height:16px; border-radius:50%; opacity:0;   /* アイコン(径36)の中央=上端から18・コイン半分8 → top10 */
    background:radial-gradient(circle at 38% 32%,#ffe9a8,var(--gold) 66%,#dc9c14);
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.5), 0 1px 2px rgba(0,0,0,.3); animation:ddFly 1s ease-in-out infinite; }
  @keyframes dealPop{ 0%{ transform:translate(-50%,-50%) scale(.5); opacity:0; } 12%{ transform:translate(-50%,-50%) scale(1.06); opacity:1; } 84%{ opacity:1; } 100%{ transform:translate(-50%,-50%) scale(1); opacity:0; } }
  @keyframes ddFly{ 0%{ left:12%; opacity:0; transform:translateY(0); } 15%{ opacity:1; } 85%{ opacity:1; } 100%{ left:82%; opacity:0; transform:translateY(-3px); } }

  /* ===== オーバーレイ(交代/結果/確認/あそびかた) ===== */
  #handoffOverlay, #resultOverlay, #confirmOverlay, #helpOverlay, #champOverlay, #chipsOverlay, #begOverlay{
    position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center;
    background:rgba(24,26,22,.5); opacity:0; pointer-events:none; transition:opacity .3s linear;
  }
  #chipsOverlay{ z-index:82; }   /* チップボタン(z81)から開くので少し上に */
  /* 破産ダイアログ(オンライン。部屋主の「次へ」で進行) */
  #bankruptOverlay{ position:fixed; inset:0; z-index:79; display:flex; align-items:center; justify-content:center;
    background:rgba(24,26,22,.55); opacity:0; pointer-events:none; transition:opacity .3s linear; }
  #bankruptOverlay.on{ opacity:1; pointer-events:auto; }
  #bankruptOverlay .r-card{ transform:scale(.92); opacity:0; transition:transform .25s cubic-bezier(.2,.9,.3,1), opacity .25s; }
  #bankruptOverlay.on .r-card{ transform:scale(1); opacity:1; }
  .bk-name{ font-size:26px; font-weight:900; color:var(--ink); text-align:center; max-width:76vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bk-title{ font-size:42px; font-weight:900; color:var(--red); letter-spacing:.22em; text-indent:.22em; text-align:center; margin-top:4px; }
  .rank-row .bk-tag{ font-size:11px; font-weight:900; color:#fff; background:var(--red); border-radius:999px; padding:2px 9px 3px; flex:none; margin-right:6px; }
  .chips-pool{ font-size:13.5px; font-weight:900; color:var(--gold-dark); text-align:center; padding:0 0 8px; }
  #declineBtn{ position:fixed; left:50%; bottom:14px; transform:translateX(-50%); z-index:79; display:none;
    padding:11px 22px; border:2px solid rgba(31,155,220,.5); border-radius:999px; cursor:pointer;
    background:#fff; color:var(--turf-dark); font-weight:900; font-size:14px; letter-spacing:.04em; white-space:nowrap;
    box-shadow:0 3px 9px rgba(31,155,220,.22); }
  #declineBtn.declined{ background:linear-gradient(160deg,#f0603f,var(--red) 55%,#b93117); color:#fff; border-color:#8f2510; }
  #declineBtn:active{ transform:translateX(-50%) translateY(2px); }
  #begOverlay{ z-index:78; }
  #handoffOverlay.on, #resultOverlay.on, #confirmOverlay.on, #helpOverlay.on, #champOverlay.on, #chipsOverlay.on, #begOverlay.on{ opacity:1; pointer-events:auto; }
  .nego-retire{ color:var(--red); }
  #chipsOverlay.on .r-card{ transform:scale(1); opacity:1; }
  /* 結果ダイアログは上に見切れないよう、下寄せ＋スクロール */
  #resultOverlay{ align-items:flex-start; overflow-y:auto; padding:6vh 0 32px; scrollbar-width:none; }
  #resultOverlay::-webkit-scrollbar{ display:none; }
  /* 枠外タップでダイアログと暗幕をいったん消す(後ろのレースを見られる)。もう一度タップで復帰 */
  #resultOverlay.on.peek{ background:rgba(24,26,22,0); }
  #resultOverlay.on.peek .res-wrap{ opacity:0; pointer-events:none; transition:opacity .2s linear; }
  .r-card{
    display:flex; flex-direction:column; align-items:center; gap:18px;
    background:var(--bg); border-radius:18px; border-top:10px solid var(--turf);
    box-shadow:0 18px 44px rgba(20,22,18,.4);
    padding:28px 24px 24px; width:min(90vw, 440px); text-align:center;
    transform:scale(.6); opacity:0; transition:transform .3s cubic-bezier(.3,1.4,.5,1), opacity .25s linear;
  }
  #handoffOverlay.on .r-card, #resultOverlay.on .r-card, #confirmOverlay.on .r-card, #helpOverlay.on .r-card, #champOverlay.on .r-card, #begOverlay.on .r-card{ transform:scale(1); opacity:1; }
  .r-title{ font-size:clamp(22px,6vw,32px); font-weight:900; letter-spacing:.08em; }
  .r-title.win{ color:var(--red); }
  .r-title.res-hit{ color:var(--gold-dark); }
  .r-title.res-miss{ color:rgba(34,36,31,.5); }
  .ho-name{ font-size:clamp(28px,8vw,44px); font-weight:900; color:var(--turf-dark); }
  .ho-dot{ width:40px; height:40px; border-radius:50%; box-shadow:inset 0 2px 4px rgba(255,255,255,.4), 0 2px 5px rgba(0,0,0,.25); }
  .r-card .sub-btns{ display:flex; gap:14px; width:100%; }
  .r-card .txt-btn, .r-card .btn-main, .r-card .btn-gold{ flex:1 1 0; min-width:0; }

  /* 結果の配当リスト */
  .pay-list{ width:100%; display:flex; flex-direction:column; gap:7px; }
  .pay-row{ display:flex; align-items:center; gap:9px; font-size:15px; }
  .pay-row .p-dot{ width:20px; height:20px; }
  .pay-row .pr-nm{ flex:1 1 0; text-align:left; font-weight:700; }
  .pay-row .pr-delta{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:700; }
  .pr-delta.plus{ color:var(--turf-dark); }
  .pr-delta.minus{ color:var(--red); opacity:.8; }
  .result-head{ font-size:14px; font-weight:700; opacity:.7; }
  .carry-note{ font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif !important; font-weight:700; font-size:15px; color:var(--gold-dark); }

  /* 順位(チャンピオン) */
  .rank-list{ width:100%; display:flex; flex-direction:column; gap:8px; }
  .rank-row{ display:flex; align-items:center; gap:10px; font-size:17px; padding:8px 12px; border-radius:10px; background:#fff; }
  .rank-row.first{ background:linear-gradient(150deg,#fff5da,#ffe9a8); box-shadow:0 2px 8px rgba(210,144,20,.25); }
  .rank-row .rk{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:18px; width:34px; color:var(--gold-dark); }
  .rank-row .p-dot{ width:22px; height:22px; }
  .rank-row .rr-nm{ flex:1 1 0; font-weight:900; text-align:left; }
  .rank-row .rr-chips{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; color:var(--ink); }

  /* レース数・制限時間ステッパー */
  .rule-frame{ display:flex; gap:22px; justify-content:center; flex-wrap:wrap; align-items:flex-start;

  <a class="home-foot" id="homeFoot" href="./index.html"><span>牧村が作ったゲーム集へ</span></a>

  <!-- 左上あそびかた -->

  <!-- 右上効果音 -->
  <div class="snd-btns">
    <button class="snd-btn" id="seBtn"><svg viewBox="0 0 25 24"><path d="M3 9v6h4l5 4V5L7 9H3z" fill="currentColor"/><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M15 9.4c1.3 1.3 1.3 3.9 0 5.2"/><path d="M17.6 7.6c2.2 2.2 2.2 6.6 0 8.8"/></g></svg>効果音</button>

  <button class="chips-btn" id="chipsBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v12c0 1.7 3.6 3 8 3s8-1.3 8-3V6" stroke-linecap="round"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></svg>チップ状況</button>

  <!-- 確認(おわりにする) -->
  <div id="confirmOverlay">

  <div id="champOverlay">
    <div class="r-card">

        <button class="txt-btn" id="champHome">タイトルへ</button>

  <!-- スタンプ(気持ちを送る。対局中つねに表示。結果/総合ダイアログ表示中は隠す=中断ボタンと重ならないように) -->

    <button class="stamp-btn" data-i="0" aria-label="泣き"></button>
    <button class="stamp-btn" data-i="1" aria-label="うっとり"></button>

  <!-- あそびかた -->
  <div id="helpOverlay">
    <div class="r-card">
      <div class="r-title" style="font-size:clamp(20px,5.6vw,28px);">あそびかた</div>

  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  const COLORS=["#e3452f","#2f7de3","#2f9e55","#f39a1f","#8a5cd6","#17a2a2","#e35a9c","#8a6a3f",
    "#c0392b","#2472c8","#27ae60","#e67e22","#7b4bc0","#0f9b8e","#d6336c","#6b7280",
    "#d35400","#3b4b8a","#b8930f","#2a9d8f"];
  /* おまかせのお題は「今すぐ確認すれば絶対にわかる固定値」だけ(主観・記憶頼み・推定は入れない) */
  const THEMES=[
    "今のスマホの充電残量","LINEの未読数","カメラロールの写真の枚数","スマホの昨日の利用時間","入れてるアプリの数",
    "Twitterのフォロワー数","インスタのフォロワー数","今目の前に見えた数字","今日歩いた歩数(スマホの記録)","財布の中の小銭の枚数",
    "スマホの空き容量(GB)","今の手持ちの現金","財布のカードの枚数","プレイリストの曲数","今月のカレンダーの予定数",
    "スマホのホーム画面のアプリ数","持ってるポイントカードの数","カバンの中のレシートの枚数","今のスマホの通知の数","開いてるタブの数",
    "連絡先の登録数","昨日の歩数(スマホの記録)","入れてるサブスクの数","財布の中のお札の枚数","スマホの画面の明るさ(%)"
  ];
  let lastTheme="";
  function randTheme(){ let t; do{ t=THEMES[Math.floor(Math.random()*THEMES.length)]; }while(THEMES.length>1 && t===lastTheme); lastTheme=t; return t; }
  const INIT_CHIPS=100, MIN_BET=10, RESCUE=20;
  const MAXP=99, MINP=2;
  const MIN_ROUNDS=1, MAX_ROUNDS=30;
  let totalRounds=5;   // 何レースで総合結果か(部屋主/1台の設定)
  let roundsManual=false;   // レース数を手動で変えたか(false=人数に追従)
  let mode="local";   // "local" | "online"(autoFollowRoundsが初期化時に参照するので早めに宣言)
  const TIME_OPTS=[15,30,45,60,90,0];   // 0=無制限
  let timeLimit=0;     // 各操作の制限時間(秒)。初期=無制限(0)、そこから減らせる
  const MIN_CHIPS=10, MAX_CHIPS=10000;
  let initChips=INIT_CHIPS;   // 初期チップ枚数(設定可能・10刻み)

  let players=[];        // {name,color,chips}
  let round=0, repIdx=0, carry=0;
  let theme="", dir="hi";
  let numbers=[];        // 各プレイヤーの申告数字(index対応)
  let bets=[];           // {on:idx, amt:number}
  let seatIdx=0;         // いま端末を持っている人(入力/賭けのループ用)
  let curBet=10, curCand=-1;

  const titleScene=document.getElementById("titleScene"), gameScene=document.getElementById("gameScene");
  const playersList=document.getElementById("playersList");

  /* ---------- 音 (WebAudio) ---------- */
  let actx=null, seBus=null, seOn=true;
  try{ seOn=localStorage.getItem("drb.se")!=="0"; }catch(e){}
  function ensureAudio(){ if(actx) return; try{ actx=new (window.AudioContext||window.webkitAudioContext)(); seBus=actx.createGain(); seBus.gain.value=seOn?1:0; seBus.connect(actx.destination); }catch(e){} }
  function note(f,t,dur,peak,type){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain(); o.type=type||"sine"; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(seBus); o.start(t); o.stop(t+dur+0.05); }
  function click(t,f,peak){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain(); o.type="triangle"; o.frequency.setValueAtTime(f,t); o.frequency.exponentialRampToValueAtTime(f*.5,t+.07);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+.006); g.gain.exponentialRampToValueAtTime(0.0001,t+.11); o.connect(g); g.connect(seBus); o.start(t); o.stop(t+.16); }
  function playSelect(){ if(actx) click(actx.currentTime,1100,0.5); }
  function playTick(){ if(actx) click(actx.currentTime,1500,0.35); }
  function playChip(){ if(!actx) return; const t=actx.currentTime; click(t,1300,0.4); note(2000,t,0.05,0.2,"square"); }
  function playSad(){ if(!actx) return; const t=actx.currentTime;   // 脱落=しょんぼり下降
    note(392,t,0.3,0.3,"sine"); note(311,t+0.24,0.32,0.3,"sine"); note(233,t+0.5,0.6,0.28,"sine"); note(117,t+0.5,0.65,0.18,"sine"); }
  function playDeal(){ if(!actx) return; const t=actx.currentTime;   // 交渉成立=コインがチャリンチャリンと相手へ移る
    for(let k=0;k<5;k++){ click(t+k*0.08, 1500-k*90, 0.34); note(1800-k*60, t+k*0.08, 0.05, 0.16, "square"); }
    note(784,t+0.44,0.18,0.2,"triangle"); note(1175,t+0.52,0.22,0.14,"triangle"); note(1568,t+0.6,0.3,0.1,"sine"); }   // 着地のきらめき
  function playConfirm(){ if(!actx) return; const t=actx.currentTime; click(t,700,0.6); note(523,t+.05,0.18,0.28,"triangle"); }
  function playGo(){ if(!actx) return; const t=actx.currentTime;   // ファンファーレ(スタート)
    [392,523,659,784].forEach((f,i)=>note(f,t+i*0.1,0.22,0.32,"triangle")); }
  function playGallop(i){ if(!actx) return; const t=actx.currentTime;   // 蹄の音(パカッ)。左右交互にピッチを変えてギャロップ感、ピッチを下げて蹄っぽく
    const o=actx.createOscillator(), g=actx.createGain(); o.type="sine";
    o.frequency.setValueAtTime(155+(i%2)*26, t); o.frequency.exponentialRampToValueAtTime(68, t+0.06);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.18,t+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
    o.connect(g); g.connect(seBus); o.start(t); o.stop(t+0.13); }
  function playFinish(){ if(!actx) return; const t=actx.currentTime;   // ゴールの瞬間=笛＋着地のドン(はっきり鳴らす)
    note(1568,t,0.13,0.3,"triangle"); note(2093,t+0.05,0.17,0.22,"triangle");   // ピッ(笛)
    const o=actx.createOscillator(), g=actx.createGain(); o.type="sine";
    o.frequency.setValueAtTime(190,t); o.frequency.exponentialRampToValueAtTime(58,t+0.2);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.42,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.34);
    o.connect(g); g.connect(seBus); o.start(t); o.stop(t+0.38); }
  function playWin(){ if(!actx) return; const t=actx.currentTime;   // 大当たりのファンファーレ(上昇→締めの和音)
    [523,659,784,1047,1319,1568].forEach((f,i)=>note(f,t+i*0.088,0.32,0.32,"triangle"));
    note(1047,t+0.6,0.55,0.28,"triangle"); note(1319,t+0.6,0.55,0.2,"triangle"); note(1568,t+0.62,0.55,0.16,"sine"); note(2093,t+0.66,0.5,0.12,"triangle"); }
  function playStretch(){ if(!actx) return; const t=actx.currentTime; const o=actx.createOscillator(),g=actx.createGain();
    o.type="sawtooth"; o.frequency.setValueAtTime(280,t); o.frequency.exponentialRampToValueAtTime(880,t+0.85);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.12); g.gain.exponentialRampToValueAtTime(0.0001,t+1.0);
    o.connect(g); g.connect(seBus); o.start(t); o.stop(t+1.05); }

  /* ---------- タイトル: メンバー設定 ---------- */
  const DEFAULT_NAMES=["1","2"];
  function renderPlayersSetup(){
    playersList.innerHTML="";
    playersSetup.forEach((nm,i)=>{
      const c=COLORS[i%COLORS.length];
      const row=document.createElement("div"); row.className="p-row";
      row.innerHTML='<span class="p-dot" style="background:radial-gradient(circle at 35% 30%, '+tint(c)+', '+c+')"></span>'
        +'<input class="p-input" maxlength="8" placeholder="なまえ" value="'+esc(nm)+'">'
        +(playersSetup.length>MINP?'<button class="p-del" aria-label="削除">×</button>':'');
      const inp=row.querySelector(".p-input");
      inp.addEventListener("input",()=>{ playersSetup[i]=inp.value; });
      inp.addEventListener("focus",()=>{ setTimeout(()=>{ try{ inp.select(); }catch(e){} },0); });   // 選択時は全選択(すぐ書き換えられる)
      const del=row.querySelector(".p-del");
      if(del) del.addEventListener("click",()=>{ ensureAudio(); playSelect(); playersSetup.splice(i,1); renderPlayersSetup(); });
      playersList.appendChild(row);
    });
    const add=document.getElementById("addPlayer"), full=playersSetup.length>=MAXP;
    add.disabled=full;
    add.textContent = full ? "あ、本当に99人でやる人いるんだ" : "＋ メンバーを追加";
    autoFollowRounds(playersSetup.length);   // レース数=人数(既定)
  }
  let playersSetup=DEFAULT_NAMES.slice();
  function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function tint(hex){   // 明るめのハイライト色
    const n=parseInt(hex.slice(1),16), r=(n>>16)+70, g=((n>>8)&255)+70, b=(n&255)+70;
    return "rgb("+Math.min(255,r)+","+Math.min(255,g)+","+Math.min(255,b)+")";
  }
  document.getElementById("addPlayer").addEventListener("click",()=>{ ensureAudio(); playSelect();
    if(playersSetup.length>=MAXP) return; playersSetup.push(String(playersSetup.length+1)); renderPlayersSetup();
    const inps=playersList.querySelectorAll(".p-input"); const last=inps[inps.length-1]; last.focus(); try{ last.select(); }catch(e){}
  });
  renderPlayersSetup();

  // 長押し対応(押しっぱなしで連続実行。レース数・賭けチップ増減で共用)
  function attachHold(btn, fn){
    let t1=0,t2=0;
    const stop=()=>{ clearTimeout(t1); clearInterval(t2); t1=t2=0; };
    const start=(e)=>{ if(e) e.preventDefault(); if(btn.classList.contains("dim")) return; fn(); stop();
      t1=setTimeout(()=>{ t2=setInterval(()=>{ if(btn.classList.contains("dim")){ stop(); return; } fn(); }, 90); }, 420); };
    btn.addEventListener("pointerdown", start);
    ["pointerup","pointerleave","pointercancel"].forEach(ev=>btn.addEventListener(ev, stop));
  }
  // レース数ステッパー(タイトル1台側 + オンラインはロビーで)
  function renderRounds(){
    document.querySelectorAll(".rVal").forEach(el=>el.textContent=totalRounds);
    document.querySelectorAll(".stp-btn[data-rd]").forEach(b=>{ const d=+b.dataset.rd;
      b.classList.toggle("dim", (d<0&&totalRounds<=MIN_ROUNDS)||(d>0&&totalRounds>=MAX_ROUNDS)); });
  }
  function changeRounds(d){
    roundsManual=true;   // 手動で触ったら人数追従をやめる
    const nv=Math.max(MIN_ROUNDS,Math.min(MAX_ROUNDS,totalRounds+d));
    if(nv!==totalRounds){ totalRounds=nv; playTick(); renderRounds(); if(mode==="online"&&isHost&&oPhase==="lobby") broadcastSnap(); }
  }
  // 初期設定ではレース数を人数と同じにする(手動で変えるまで追従)
  function autoFollowRounds(cnt){
    if(roundsManual) return;
    const nv=Math.max(MIN_ROUNDS,Math.min(MAX_ROUNDS, cnt||MINP));
    if(nv!==totalRounds){ totalRounds=nv; renderRounds(); if(mode==="online"&&isHost&&oPhase==="lobby") broadcastSnap(); }
    else renderRounds();
  }
  // 制限時間ステッパー
  function fmtTime(v){ return (v && v>0) ? (v+"秒") : "無制限"; }
  function renderTime(){
    document.querySelectorAll(".tVal").forEach(el=>el.textContent=fmtTime(timeLimit));
    let idx=TIME_OPTS.indexOf(timeLimit); if(idx<0) idx=1;
    document.querySelectorAll(".stp-btn[data-tm]").forEach(b=>{ const d=+b.dataset.tm;
      b.classList.toggle("dim", (d<0&&idx<=0)||(d>0&&idx>=TIME_OPTS.length-1)); });
  }
  function changeTime(d){
    let idx=TIME_OPTS.indexOf(timeLimit); if(idx<0) idx=1;
    const ni=Math.max(0,Math.min(TIME_OPTS.length-1, idx+d));
    if(ni!==idx){ timeLimit=TIME_OPTS[ni]; playTick(); renderTime(); if(mode==="online"&&isHost&&oPhase==="lobby") broadcastSnap(); }
  }
  function renderInit(){
    document.querySelectorAll(".icVal").forEach(el=>el.textContent=initChips);
    document.querySelectorAll(".stp-btn[data-ic]").forEach(b=>{ const d=+b.dataset.ic;
      b.classList.toggle("dim", (d<0&&initChips<=MIN_CHIPS)||(d>0&&initChips>=MAX_CHIPS)); });
  }
  function changeInit(d){
    const nv=Math.max(MIN_CHIPS,Math.min(MAX_CHIPS, initChips+d));
    if(nv!==initChips){ initChips=nv; playTick(); renderInit(); if(mode==="online"&&isHost&&oPhase==="lobby") broadcastSnap(); }
  }
  function wireRoundStepper(scope){
    (scope||document).querySelectorAll(".stp-btn[data-rd]").forEach(b=>{
      if(b._wired) return; b._wired=true; attachHold(b, ()=>{ ensureAudio(); changeRounds(+b.dataset.rd); }); });
    (scope||document).querySelectorAll(".stp-btn[data-tm]").forEach(b=>{
      if(b._wired) return; b._wired=true; attachHold(b, ()=>{ ensureAudio(); changeTime(+b.dataset.tm); }); });
    (scope||document).querySelectorAll(".stp-btn[data-ic]").forEach(b=>{
      if(b._wired) return; b._wired=true; attachHold(b, ()=>{ ensureAudio(); changeInit(+b.dataset.ic); }); });
  }
  wireRoundStepper(document.getElementById("localSetup"));
  // ルールを初期設定に戻す(レース数5・制限時間30秒・初期チップ100)
  function resetRules(){ roundsManual=false; timeLimit=0; initChips=INIT_CHIPS;
    const cnt=(mode==="online")?orderedMembers().length:playersSetup.length;
    totalRounds=Math.max(MIN_ROUNDS,Math.min(MAX_ROUNDS, cnt||MINP));
    renderRounds(); renderTime(); renderInit(); }
  document.getElementById("localRec").addEventListener("click",()=>{ ensureAudio(); playSelect(); resetRules(); });
  renderRounds(); renderTime(); renderInit();

  document.getElementById("startBtn").addEventListener("click",()=>{
    ensureAudio(); playConfirm();
    const names=playersSetup.map((s,i)=>(s||"").trim()||String(i+1));
    if(names.length<MINP){ showToast("2人以上でね"); return; }
    players=names.map((nm,i)=>({name:nm, color:COLORS[i%COLORS.length], chips:initChips}));
    mode="local"; round=0; carry=0;
    titleScene.classList.remove("on"); gameScene.classList.add("on");
    startRound();
  });

  /* ---------- ラウンド進行 ---------- */
  const panels={ lobby:document.getElementById("lobbyPanel"), wait:document.getElementById("waitPanel"),
    theme:document.getElementById("themePanel"), enter:document.getElementById("enterPanel"),
    bet:document.getElementById("betPanel"), check:document.getElementById("checkPanel"), race:document.getElementById("racePanel"),
    nego:document.getElementById("negoPanel") };
  function showPanel(name){ Object.keys(panels).forEach(k=> panels[k].classList.toggle("on", k===name)); gameScene.classList.toggle("lobbying", name==="lobby"); try{ updateBackBtn(); }catch(e){} }
  function dotStyle(c){ return "background:radial-gradient(circle at 35% 30%, "+tint(c)+", "+c+")"; }

  // もち金が足りない人は誰かからチップをもらう。出せる人がいなければ脱落
  function rescueOrEliminate(){
    const eliminated=[];
    const broke=players.filter(p=>p.chips<MIN_BET).sort((a,b)=>a.chips-b.chips);
    broke.forEach(p=>{
      if(p.chips>=MIN_BET) return;
      const need=RESCUE-p.chips;
      let donor=null;   // 渡してもMIN_BET以上残る人の中で一番の金持ち
      players.forEach(q=>{ if(q===p||q.chips<MIN_BET) return; if(q.chips-need>=MIN_BET){ if(!donor||q.chips>donor.chips) donor=q; } });
      if(donor){ donor.chips-=need; p.chips+=need; }
      else{ p._out=true; eliminated.push(p.name); }
    });
    for(let i=players.length-1;i>=0;i--){ if(players[i]._out) players.splice(i,1); }
    return eliminated;
  }

  // 大小バッジ(画面上部固定)

    b.innerHTML=dirArrowSVG(dir)+"<span>"+(dir==="hi"?"大きいほど勝ち":"小さいほど勝ち")+"</span>";

    if(theme){ tb.style.display="inline-flex"; tb.innerHTML='お題「<span class="em">'+esc(theme)+'</span>」'; }
    else tb.style.display="none";
  }

  // ---- 制限時間タイマー(自分の操作画面で作動。0=無制限) ----
  let timerInt=0, timerEnd=0;
  function startTimer(){
    stopTimer(); stopDisplayTimer();
    if(mode==="local") return;   // 1台回しは制限時間なし(無限)
    if(!timeLimit || timeLimit<=0) return;
    timerEnd=Date.now()+timeLimit*1000;
    const el=document.getElementById("timer"); el.style.display="";
    const clock='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2M9 2h6"/></svg>';
    const tick=()=>{ const rem=Math.max(0,Math.ceil((timerEnd-Date.now())/1000));
      el.innerHTML=clock+'<span>'+rem+'</span>'; el.classList.toggle("urgent", rem<=5);
      if(rem<=0){ stopTimer(); onTimeout(); } };
    tick(); timerInt=setInterval(tick,250);
  }
  function stopTimer(){ if(timerInt){ clearInterval(timerInt); timerInt=0; } const el=document.getElementById("timer"); if(el){ el.style.display="none"; el.classList.remove("urgent"); } }
  // 待機中のプレイヤーにも残り時間を見せる表示専用タイマー(自動確定はしない)
  let dispTimerInt=0, dispKey="";
  function startDisplayTimer(sec, key){
    if(dispKey===key && dispTimerInt) return;   // 同じ局面では作り直さない(再描画で戻らない)
    stopDisplayTimer(); dispKey=key;
    if(!sec || sec<=0) return;
    const end=Date.now()+sec*1000;
    const el=document.getElementById("timer"); el.style.display="";
    const clock='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2M9 2h6"/></svg>';
    const tick=()=>{ const rem=Math.max(0,Math.ceil((end-Date.now())/1000)); el.innerHTML=clock+'<span>'+rem+'</span>'; el.classList.toggle("urgent", rem<=5); if(rem<=0) stopDisplayTimer(); };
    tick(); dispTimerInt=setInterval(tick,250);
  }
  function stopDisplayTimer(){ if(dispTimerInt){ clearInterval(dispTimerInt); dispTimerInt=0; } dispKey=""; const el=document.getElementById("timer"); if(el && !timerInt){ el.style.display="none"; el.classList.remove("urgent"); } }
  function onTimeout(){   // 時間切れ→お題は自動確定(お題は必須)、数字/賭けは「間に合わなかった=不参加/賭けなし」で自動確定しない
    if(panels.theme.classList.contains("on")){ const ti=document.getElementById("themeInput"); if(!ti.value.trim()) ti.value=randTheme(); document.getElementById("themeGo").click(); return; }
    if(panels.enter.classList.contains("on")){ enterGaveUp=round; showWait("時間切れ…今回のレースは不参加<br>次のレースを待ってね", true); return; }
    if(panels.bet.classList.contains("on")){ betGaveUp=round; showWait("時間切れ…今回は賭けなし<br>レースを待ってね", true); return; }
  }
  // ホスト側の強制進行(誰かが放置しても進める。クライアントより少し遅らせる)
  let hostTimer=0;
  function startHostTimer(){ if(!isHost) return; clearTimeout(hostTimer); if(!timeLimit||timeLimit<=0) return; hostTimer=setTimeout(hostForce,(timeLimit+3)*1000); }
  function stopHostTimer(){ clearTimeout(hostTimer); hostTimer=0; }
  function hostForce(){
    if(!isHost) return;
    if(oPhase==="theme"){ if(!theme){ theme=randTheme(); dir="hi"; } oPhase="enter"; broadcastSnap(); startHostTimer(); }
    else if(oPhase==="enter"){ endEnterPhase(); }   // 時間切れ=未入力の人は不参加(数字を埋めない)
    else if(oPhase==="bet"){ endBetPhase(); }        // 時間切れ=未入力の賭けはそのまま(賭けなし)
    else if(oPhase==="nego" && nego){ retireBeggarOnline(); }   // 交渉も時間切れ→強制リタイア
  }
  // 参加者=数字を入れた人。時間切れ時に確定
  function participantIdxs(){ return players.map((p,i)=>i).filter(i=>numbers[i]!=null); }
  function endEnterPhase(){
    const parts=participantIdxs();
    if(parts.length<2){ voidRound(); return; }   // 参加者が2人未満なら無効レース(レース数は消費しない)
    stopHostTimer(); oPhase="bet"; broadcastSnap(); startHostTimer();
  }
  function endBetPhase(){ stopHostTimer(); hostRace=genRaceParams(); oPhase="race"; broadcastSnap(); }
  function voidRound(){   // 無効レース: レース数を消費せず、同じ回をやり直す
    numbers=new Array(players.length).fill(null);
    bets=new Array(players.length).fill(null);
    picks={}; theme=""; dir="hi"; oPhase="theme";

    broadcastSnap(); startHostTimer();
  }
  let noticeId=0, lastNotice="";

  function startRound(){
    // チップ切れの人がいれば交渉(ねだる/リタイア)を先に済ませてから開始
    localNego(()=>{
      if(players.length<MINP){ setDirBadge(false); showChampion(); return; }
      round++;
      repIdx=(round-1)%players.length;
      numbers=new Array(players.length).fill(null);

  /* ---------- チップ切れ交渉(ねだる/リタイア) ---------- */
  const NEG_GIFT=RESCUE;   // ねだる初期額(=20)
  const NEG_MIN=MIN_BET, NEG_MAX=10000;
  let negoAmt=NEG_GIFT, negoRerender=null, negoMaxCur=NEG_MAX;
  // MAXは「実際にもらえる上限」=誰かがMIN_BETを残して出せる最大額
  function negoMaxAvail(brokeIdx, refusedSet){
    let m=NEG_MIN; players.forEach((p,i)=>{ if(i===brokeIdx||refusedSet.has(i)) return; m=Math.max(m, p.chips-MIN_BET); });
    return Math.max(NEG_MIN, Math.min(NEG_MAX, m));
  }
  function negoDonorEligible(donorIdx, brokeIdx, refusedSet){
    return donorIdx!==brokeIdx && players[donorIdx] && !refusedSet.has(donorIdx) && (players[donorIdx].chips-negoAmt>=MIN_BET);
  }
  function negoStep(d){ const nv=Math.max(NEG_MIN, Math.min(negoMaxCur, negoAmt+d)); if(nv!==negoAmt){ negoAmt=nv; playTick(); if(negoRerender) negoRerender(); } }
  function negoSet(v){ const nv=Math.max(NEG_MIN, Math.min(negoMaxCur, v)); if(nv!==negoAmt){ negoAmt=nv; playChip(); if(negoRerender) negoRerender(); } }
  document.querySelectorAll("#negoAmtRow .ba-btn[data-nd]").forEach(b=>attachHold(b, ()=>{ ensureAudio(); negoStep(+b.dataset.nd); }));   // ±のみ(MIN/MAXは別)
  document.getElementById("negoMin").addEventListener("click",()=>{ ensureAudio(); negoSet(NEG_MIN); });
  document.getElementById("negoMax").addEventListener("click",()=>{ ensureAudio(); negoSet(negoMaxCur); });
  // 交渉パネル描画(1台・オンライン共通)。onPick(donorIdx)/onRetire()
  function renderNegoPanel(brokeIdx, refusedSet, onPick, onRetire, declinedSet){
    declinedSet=declinedSet||new Set();
    negoRerender=()=>renderNegoPanel(brokeIdx, refusedSet, onPick, onRetire, declinedSet);
    negoMaxCur=negoMaxAvail(brokeIdx, refusedSet);   // もらえる上限
    if(negoAmt>negoMaxCur) negoAmt=negoMaxCur;
    document.getElementById("negoAmtVal").textContent=negoAmt;
    document.querySelectorAll("#negoAmtRow .ba-btn[data-nd]").forEach(b=>{ const d=+b.dataset.nd; b.classList.toggle("dim",(d<0&&negoAmt<=NEG_MIN)||(d>0&&negoAmt>=negoMaxCur)); });
    document.getElementById("negoMin").classList.toggle("dim", negoAmt<=NEG_MIN);
    document.getElementById("negoMax").classList.toggle("dim", negoAmt>=negoMaxCur);
    document.getElementById("negoQ").innerHTML='<span class="em">'+esc(players[brokeIdx].name)+'</span><br>チップがなくなった！誰かにねだろう';
    const list=document.getElementById("negoList"); list.innerHTML=""; let any=false;
    players.forEach((p,i)=>{
      if(i===brokeIdx) return;
      const el=document.createElement("div"); el.className="cand";
      const declined=declinedSet.has(i), refused=refusedSet.has(i);
      const ok=negoDonorEligible(i, brokeIdx, refusedSet) && !declined;
      if(!ok) el.classList.add("dim");
      el.innerHTML='<span class="p-dot" style="'+dotStyle(p.color)+'"></span><span class="c-nm">'+esc(p.name)+'</span>'
        +(declined?'<span class="c-me nego-retire">お断り</span>':(refused?'<span class="c-me">ことわられた</span>':(!ok?'<span class="c-me">よゆうなし</span>':'')))   // 状態はチップ枚数の左
        +'<span class="cand-chips">'+p.chips+'枚</span>';   // 全員の現在の枚数(右端)
      if(ok){ any=true; el.addEventListener("click",()=>{ ensureAudio(); playSelect(); onPick(i); }); }
      list.appendChild(el);
    });
    document.getElementById("negoHint").textContent = any ? "金額を決めて、くれそうな人を"+(window.__TAPW||"タップ") : "この額をくれる人がいない…減らすかリタイア";
    document.getElementById("negoRetire").onclick=()=>{ ensureAudio(); playSelect(); onRetire(); };
    showPanel("nego");
  }
  // ねだられた側の返事ダイアログ。cb(ok)
  function showBegOverlay(donor, beggar, amt, cb){
    document.getElementById("begTitle").textContent="申請が来ました";
    document.getElementById("begBody").innerHTML='<span class="em">'+esc(beggar.name)+'</span>さんに <b>'+amt+'枚</b> ねだられています。あげる？';
    const ov=document.getElementById("begOverlay"); ov.classList.add("on");
    document.getElementById("begYes").onclick=()=>{ ensureAudio(); playSelect(); ov.classList.remove("on"); cb(true); };
    document.getElementById("begNo").onclick=()=>{ ensureAudio(); playSelect(); ov.classList.remove("on"); cb(false); };
  }
  // 「交渉成立！」演出: A(あげる側/左)→B(もらう側/右)、コインが左→右へ。増減は視点で符号を変える(あげた人=−/もらった人=＋)
  function celebrateDeal(amt, from, to, iGave){
    const av=p=> '<div class="dd-av"><span class="dd-dot" style="'+(p?dotStyle(p.color):'background:#ccc')+'"></span><span class="dd-nm">'+(p?esc(p.name):'')+'</span></div>';
    const el=document.createElement("div"); el.className="deal-badge";
    el.innerHTML='<div class="dd-title">交渉成立！</div>'
      +'<div class="dd-amtline'+(iGave?' minus':'')+'">'+(iGave?'−':'＋')+amt+'枚</div>'
      +'<div class="dd-flow">'+av(from)+av(to)+'</div>';   // 金額は別行にしてコインと重ならない
    document.body.appendChild(el);
    const flow=el.querySelector(".dd-flow");
    for(let k=0;k<8;k++){ const c=document.createElement("div"); c.className="dd-coin"; c.style.animationDelay=(k*0.12)+"s"; flow.appendChild(c); }
    setTimeout(()=>el.remove(),2000);
    if(seOn) playDeal();
  }
  // 1台: チップ切れの人を順に交渉させる。全員終わったら done()
  function localNego(done){
    const bp=players.find(p=>p.chips<MIN_BET);
    if(!bp){ done(); return; }
    negoAmt=NEG_GIFT;
    const refused=new Set();
    const attempt=()=>{
      const brokeIdx=players.indexOf(bp);
      handoff(brokeIdx, "チップが足りない！ねだろう", ()=>{
        renderNegoPanel(brokeIdx, refused, (donorIdx)=>{
          const amt=negoAmt;
          handoff(donorIdx, "チップをねだられています", ()=>{
            showBegOverlay(players[donorIdx], bp, amt, (ok)=>{
              if(ok){ const donor=players[donorIdx]; players[donorIdx].chips-=amt; bp.chips+=amt;
                celebrateDeal(amt, {name:donor.name,color:donor.color}, {name:bp.name,color:bp.color}, false);   // 1台はもらう側視点(＋)
                showPanel("wait"); document.getElementById("waitMsg").innerHTML="交渉成立！"; document.getElementById("waitProg").textContent=""; document.getElementById("waitWho").innerHTML=""; document.getElementById("betLiveWait").innerHTML="";
                setTimeout(()=>localNego(done), 2100);   // 演出が終わってから次の人/次レースへ
              }
              else{ refused.add(donorIdx); attempt(); }
            });
          });
        }, ()=>{   // リタイア
          const bi=players.indexOf(bp); bp._out=true; if(bi>=0) players.splice(bi,1);
          showToast(bp.name+" はリタイア…",2200); if(seOn) playSad(); localNego(done);
        });
      });
    };
    attempt();
  }

  // 交代画面: 端末を渡してから続行

  // お題決定
  document.querySelectorAll("#themePanel .dir-btn").forEach(b=>{

      document.querySelectorAll("#themePanel .dir-btn").forEach(x=>x.classList.remove("sel"));

  // お題欄: タッチで全選択 / おまかせでランダム
  { const ti=document.getElementById("themeInput");
    ti.addEventListener("focus",()=>{ setTimeout(()=>{ try{ ti.select(); }catch(e){} },0); }); }
  document.getElementById("omakaseBtn").addEventListener("click",()=>{ ensureAudio(); playSelect();
    const ti=document.getElementById("themeInput"); ti.value=randTheme(); ti.focus(); try{ ti.select(); }catch(e){} });

  // 秘密の数字入力ループ
  function nextEnter(){
    if(seatIdx>=players.length){ seatIdx=0; nextBet(); return; }
    const idx=seatIdx;
    handoff(idx, "お題を見て数字を入力", ()=>{
      document.getElementById("enterQ").innerHTML='<span class="em">'+esc(players[idx].name)+'</span>さん<br>お題を見て数字を入力';
      const inp=document.getElementById("numInput"); inp.value=(numbers[idx]!=null)?String(numbers[idx]):"";   // 戻ってきた時は前の数字を維持
      document.getElementById("enterDone").innerHTML=""; document.getElementById("enterDone")._sig="";

  function doEnterBack(){   // 数字入力: 1人前へ(1人目は戻る不可=ボタン非表示)。前の数字は保持
    if(seatIdx>0){ ensureAudio(); playSelect(); seatIdx--; nextEnter(); }
  }
  function zen2han(s){ return (s||"").replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[－ー−―]/g,"-").replace(/[．。]/g,"."); }   // 全角数字/マイナス/小数点→半角
  document.getElementById("numInput").addEventListener("input",function(){
    let h=zen2han(this.value); const neg=h[0]==="-";
    h=h.replace(/[^0-9.]/g,"");            // 数字と小数点のみ
    const parts=h.split(".");             // 小数点は1つだけに
    h=parts.shift()+(parts.length?"."+parts.join(""):"");
    h=(neg?"-":"")+h;
    if(h!==this.value) this.value=h;
  });
  document.getElementById("numGo").addEventListener("click",()=>{
    ensureAudio();
    const raw=zen2han(document.getElementById("numInput").value).trim();
    if(raw===""||isNaN(Number(raw))){ showToast("数字を入れてね"); return; }
    playConfirm();
    if(mode==="online"){ myNum=Number(raw); sendAct("num",{n:myNum}); showWait("みんなの入力を待っています",false); return; }
    numbers[seatIdx]=Number(raw);
    seatIdx++; nextEnter();
  });

  // 賭けループ(1台。全員で見ながら順番に。最後に全員確認画面へ)
  let editSeat=null, editOrig=null, editReturn=null;   // 編集中の座席 / 元の賭け / 戻り先
  function nextBet(){
    if(seatIdx>=players.length){ showBetCheck(); return; }
    editSeat=null; editOrig=null; editReturn=null; curCand=-1; curBet=MIN_BET; openBetPanel(seatIdx);
  }
  function openBetPanel(idx){
    betIdx=idx; reBet=false;
    const editing=(editSeat!=null);
    document.getElementById("betGo").textContent = editing ? "編集完了" : "この予想で賭ける";
    // お題は常に表示(編集中も). 編集中は名前の横にピルを出すだけ=レイアウト不変
    const editPill = editing ? ' <span class="edit-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4l5 5L9 20H4v-5z"/></svg>編集中</span>' : '';
    document.getElementById("betQ").innerHTML='<span class="em">'+esc(players[idx].name)+'</span>さんの予想'+editPill+'<br><span class="hint">1位はだれ？</span>';
    document.getElementById("betChips").textContent=players[idx].chips;
    renderMyChips(idx);
    renderCandidates(idx);
    if(curCand>=0){ const els=document.querySelectorAll("#candList .cand"); if(els[curCand]) els[curCand].classList.add("sel"); }
    updateBetVal();
    renderBetLive(document.getElementById("betLive"));
    startTimer();
    showPanel("bet"); setDirBadge(true);   // 賭け画面ではお題も再表示
  }
  // 「持ちチップ」の横にチップ可視化(黄色統一・いっぱい集めてる感)
  function renderMyChips(idx){
    const el=document.getElementById("myChipStack"); if(!el) return;
    const chips=Math.max(0, players[idx].chips);
    // 100枚ごとに山を分ける(例: 230→100の山×2 + 30の山)。1山=最大10枚(1枚=10)
    const piles=[]; let left=chips;
    while(left>0){ const p=Math.min(100,left); piles.push(p); left-=p; }
    if(!piles.length) piles.push(0);
    const chipDiv='<div class="pool-chip" style="background:radial-gradient(circle at 40% 30%,#ffe08a,var(--gold))"></div>';
    el.innerHTML=piles.map(p=>{ const cnt=Math.max(1,Math.floor(p/10)); let s=""; for(let k=0;k<cnt;k++) s+=chipDiv; return '<div class="chip-pile">'+s+'</div>'; }).join("");   // 持ちチップ=floor(そろった山の数。例34→3段)
  }
  function showBetCheck(){
    editSeat=null; editOrig=null; editReturn=null; stopTimer();
    gameScene.classList.remove("editing");
    showPanel("check");
    const list=document.getElementById("checkList"); list.innerHTML="";
    players.forEach((p,i)=>{

  let betIdx=0;   // いま賭けている人のindex(1台=seatIdx / オンライン=自分)

  function chipStackHTML(n, roundFn){   // 100枚ごとに山を分ける(例:280→100×2+80)。1山=最大10段。roundFn=段の数え方(持ち=Math.floor「そろった山の数」例34→3段/賭け=Math.ceil「少しでも入れば1段」例34→4段)

  /* ---------- レース ---------- */
  function winnersOf(){
    let best=null;
    numbers.forEach(v=>{ if(v==null) return; if(best==null) best=v; else best=(dir==="hi"?Math.max(best,v):Math.min(best,v)); });
    const set=[]; numbers.forEach((v,i)=>{ if(v===best) set.push(i); });
    return {best, set};
  }

  function startRace(){
    stopTimer();
    showPanel("race"); setDirBadge(true);
    document.getElementById("raceTheme").innerHTML='お題「<span class="em">'+esc(theme)+'</span>」';
    document.getElementById("raceResultBtn").style.display="none";
    document.getElementById("cheerBtn").style.display=(mode==="online" && myIndex()>=0)?"":"none";   // 応援ボタンはオンラインのみ・破産者(players外)には出さない
    renderPoolView();
    const {set}=winnersOf();
    // レースに出るのは「数字を入れた人(参加者)」だけ。時間切れで未入力の人は不参加
    const parts=players.map((p,i)=>i).filter(i=>numbers[i]!=null);
    // ランク付け(勝者=先頭)。同値は同着=同じ順位(同点1位は両方ゴールする)
    const order=parts.slice().sort((a,b)=> dir==="hi" ? (numbers[b]-numbers[a]) : (numbers[a]-numbers[b]));
    const rankOf={}; let rk=0;
    order.forEach((idx,i)=>{ if(i>0 && numbers[idx]!==numbers[order[i-1]]) rk=i; rankOf[idx]=rk; });

    const goal=document.createElement("div"); goal.className="goal"; track.appendChild(goal);
    const runners=new Array(players.length).fill(null);   // プレイヤーindexで引ける(不参加はnull)

      const lane=document.createElement("div"); lane.className="lane"; lane.style.height=laneH+"px";

      lane.appendChild(run); track.appendChild(lane);
      runners[i]=run;
    });

    raceRunners=runners;

  let raceDone=false, raceRunners=[];
  let hostRace=null, netRace=null;
  function genRaceParams(){   // ホストが1回だけ生成→全員に配って同じレースにする
    const drama=0.4+Math.random()*0.6;
    const jn=players.map((p,i)=>{
      if(numbers[i]==null) return null;
      const roll=Math.random();
      const k = roll<0.28 ? (0.5+Math.random()*0.45) : roll>0.72 ? (2.7+Math.random()*1.5) : (1.0+Math.random()*1.5);
      return { k, amp:(0.14+Math.random()*0.28)*drama, f:0.6+Math.random()*1.3, p:Math.random()*6.283 };
    });
    return { drama, jn };
  }
  function runRace(runners, rankOf, winSet, W){
    playGo();
    raceDone=false;
    const N=runners.filter(Boolean).length, DUR=10000;   // 参加者のみ(不参加スロットはnull)
    // 着差=上位ほど詰める(先頭付近は団子=写真判定でどっちが勝つか最後まで不明・後方は今まで通り自然に伸びる)。全体幅は昔と同じ0.5
    const maxRank=Math.max(1,N-1), spread=0.5;
    const dotW = N>24 ? 15 : N>8 ? 22 : 32;    // アイコン径(CSS .track.tiny/.compact/既定と一致)
    const goalCX = W - 25;                      // ゴールテープ中心(.goal は right:22px・width:6px → 中心=右から25px)
    const startX = 4, endX = goalCX - dotW/2;   // つねに右向き(左→右)。アイコン中央がゴールテープ中心に触れた瞬間=ゴール(人数で縮小してもずれない)
    const setLeft=(run,prog)=>{ run.style.left=(startX + prog*(endX-startX))+"px"; };
    // オンラインはホスト配信の脚質を使う(全端末で同じレース)。1台/未配信は各自ランダム
    const useNet = (mode==="online" && netRace && netRace.jn);
    const drama = useNet ? netRace.drama : (0.4 + Math.random()*0.6);
    const jn=runners.map((r,i)=>{
      if(useNet && netRace.jn[i]) return netRace.jn[i];
      const roll=Math.random();
      const k = roll<0.28 ? (0.5 + Math.random()*0.45)
             : roll>0.72 ? (2.7 + Math.random()*1.5)
             :             (1.0 + Math.random()*1.5);
      return { k, amp:(0.14+Math.random()*0.28)*drama, f:0.6+Math.random()*1.3, p:Math.random()*6.283 };
    });
    const jRaw=(o,t)=> t + (o.amp/(6.283*o.f))*(Math.sin(6.283*o.f*t+o.p)-Math.sin(o.p));   // 単調増加の道のり(ゆらぎ)
    const jEnd=jn.map(o=>jRaw(o,1)||1);
    const finalP=runners.map((run,i)=> run ? (1 - spread*Math.pow((rankOf[i]||0)/maxRank, 2)) : 0);   // 上位ほど着差を詰める(2乗=1・2着はほぼ横並び/後方ほど自然に離れる)。同順位(同点)は同じ到達点=一緒にゴール
    const endRace=()=>{ if(raceDone) return; raceDone=true; runners.forEach(r=>{ if(r) r.classList.remove("surge"); }); finishRace(runners, winSet); };
    let start=null, lastGallop=0, crowdDone=false, prevTs=0;
    // 汗は失速した人だけ・全体で数回まで(ゴール前に全員汗は防ぐが、ちゃんと出す)
    let sweatBudget = Math.min(7, 2+Math.round(N*0.15)), lastSweatTs=-9999;
    const prevP=runners.map(()=>0), fxLast=runners.map(()=>0);
    function frame(ts){
      if(raceDone) return;
      if(start==null){ start=ts; prevTs=ts; }
      const el=ts-start, t=Math.min(1, el/DUR);
      const dt=Math.max(1, ts-prevTs); prevTs=ts;
      runners.forEach((run,i)=>{
        if(!run) return;   // 不参加スロットは飛ばす
        // 進行=最終到達点(順位)×ペース。ペース=線形22%+(道のり^k)78%で「最初からしっかり少しずつ動く」(完全静止させない=出だしの棒立ちを防ぐ)。前進のみ(逆走なし)
        const base=Math.max(0,Math.min(1, jRaw(jn[i],t)/jEnd[i]));
        const pace=0.22*base + 0.78*Math.pow(base, jn[i].k);
        let prog=finalP[i]*pace;
        prog=Math.max(prevP[i], Math.min(1,prog));   // 単調(絶対に後退させない)
        setLeft(run, prog);
        // 実際の速度で演出: 速い=みなぎる/後方流線(終盤の抜き去り)、遅い(失速)=汗(先行して失速する下位)
        const vrat=(prog-prevP[i])/(dt/DUR); prevP[i]=prog;
        run.classList.toggle("surge", vrat>1.35 && t<0.99);   // 加速=金オーラ+後方流線
        if(sweatBudget>0 && !winSet.includes(i) && vrat<0.5 && t>0.35 && t<0.9 && el-fxLast[i]>900 && ts-lastSweatTs>200){
          fxLast[i]=el; lastSweatTs=ts; sweatBudget--; spawnSweat(run);   // 失速=汗
        }
      });
      if(!crowdDone && t>=0.7){ crowdDone=true; if(seOn) playStretch(); }
      const gi=Math.max(80, 235-160*t);
      if(ts-lastGallop>gi){ lastGallop=ts; playGallop(Math.floor(el/100)); }
      if(t<1){ requestAnimationFrame(frame); }
      else endRace();
    }
    requestAnimationFrame(frame);
    // 保険: タブが裏でrAFが止まっても必ず完走させる
    setTimeout(()=>{ runners.forEach((run,i)=>{ if(run) setLeft(run, finalP[i]); }); endRace(); }, DUR+500);
  }
  function finishRace(runners, winSet){
    playFinish();
    document.getElementById("cheerBtn").style.display="none";   // ゴール後は応援ボタンを隠す
    // ゴールの瞬間をはっきり: レーンのウィンドウごとガッと傾いて着地
    const trackEl=document.getElementById("track");
    trackEl.classList.remove("goalhit"); void trackEl.offsetWidth; trackEl.classList.add("goalhit");
    setTimeout(()=>trackEl.classList.remove("goalhit"),640);
    // 数字は「負けてる人(後ろ)から」順に出す=1位の数字が最後に出る。不参加スロットは除外
    const revealOrder=runners.map((_,i)=>i).filter(i=>runners[i]).sort((a,b)=>{
      const la=parseFloat(runners[a].style.left)||0, lb=parseFloat(runners[b].style.left)||0;
      return la-lb;   // 左(後ろ=負け)ほど先に、右(前=勝ち)ほど後に
    });
    revealOrder.forEach((idx,k)=>{
      const num=runners[idx].querySelector(".r-num"); num.textContent=numbers[idx];

  function computePayout(){
    const {best,set}=winnersOf();
    let pool=carry; bets.forEach(b=>{ if(b) pool+=b.amt; });
    const correct=[]; let correctTotal=0;
    bets.forEach((b,i)=>{ if(b && set.includes(b.on)){ correct.push(i); correctTotal+=b.amt; } });
    const deltas=players.map(()=>0);
    bets.forEach((b,i)=>{ if(b) deltas[i]-=b.amt; });   // 賭け金は既に引いてあるが、表示用の増減として記録
    let nextCarry=0;
    if(correct.length===0){ nextCarry=pool; }
    else{
      let dist=0;
      correct.forEach(i=>{ const share=Math.floor(pool * bets[i].amt / correctTotal); players[i].chips+=share; deltas[i]+=share; dist+=share; });
      nextCarry=pool-dist;
    }
    carry=nextCarry;
    return {best, set, someoneWon:correct.length>0, deltas};
  }
