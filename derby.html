<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俺たちダービー</title>
<meta name="apple-mobile-web-app-title" content="俺たちダービー">
<meta name="application-name" content="俺たちダービー">
<meta name="description" content="パドックを走るのは馬じゃない、俺たちだ！お題に数字で答え、誰が1位かをチップで予想するパーティ賭けゲーム。1台をみんなで回して遊べます。">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap');
  :root{
    --bg:#f4f1e9;
    --ink:#22241f;
    --turf:#1f9bdc;
    --turf-dark:#127bb4;
    --rail:#f5f2ea;
    --gold:#f2b035;
    --gold-dark:#d0900f;
    --red:#e3452f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, rgba(255,255,255,.7), transparent 55%),
      radial-gradient(ellipse 100% 60% at 50% 115%, rgba(31,155,220,.12), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;
    position:relative; height:100svh; overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }

  /* ===== 画面切り替え ===== */
  .scene{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    opacity:0; pointer-events:none; transform:translateY(16px);
    transition:opacity .3s linear, transform .3s cubic-bezier(.2,.8,.3,1);
    overflow-y:auto; scrollbar-width:none;
  }
  .scene::-webkit-scrollbar{ display:none; }
  .scene.on{ opacity:1; pointer-events:auto; transform:translateY(0); }

  /* ===== タイトル ===== */
  #titleScene{ padding:13vh 20px 150px; gap:38px; }
  .t-main{
    font-size:clamp(38px, 10vw, 74px); font-weight:900; letter-spacing:.02em; line-height:1.2;
    color:var(--ink); text-shadow:0 2px 0 rgba(255,255,255,.7); text-align:center; white-space:nowrap;
  }
  .t-main .em{ color:var(--red); }
  .t-sub{ font-size:clamp(13px,3.6vw,17px); opacity:.72; letter-spacing:.1em; font-weight:700; text-align:center; margin-top:14px; }
  .sec-label{ font-size:14px; letter-spacing:.4em; text-indent:.4em; opacity:.6; text-align:center; margin-bottom:12px; font-weight:900; }

  .card-box{
    background:#fff; border-radius:16px; box-shadow:0 4px 16px rgba(34,36,31,.1);
    padding:22px 20px 20px; width:min(94vw, 440px);
  }
  .players-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  .p-row{ display:flex; align-items:center; gap:10px; }
  .p-dot{ width:26px; height:26px; border-radius:50%; flex:none; box-shadow:inset 0 2px 3px rgba(255,255,255,.4), 0 1px 3px rgba(0,0,0,.25); }
  .p-input{
    flex:1 1 0; min-width:0; font-family:inherit; font-size:17px; font-weight:700; color:var(--ink);
    padding:10px 12px; border:1.8px solid rgba(34,36,31,.25); border-radius:10px; background:#fff; outline:none;
  }
  .p-input:focus{ border-color:var(--turf); }
  .p-del{ flex:none; width:34px; height:34px; border:none; border-radius:9px; cursor:pointer;
    background:rgba(34,36,31,.08); color:rgba(34,36,31,.5); font-size:20px; font-weight:900; line-height:1; }
  .p-del:active{ transform:translateY(1px); }
  .p-add{
    width:100%; padding:11px; border:1.8px dashed rgba(31,155,220,.5); border-radius:10px; cursor:pointer;
    background:rgba(31,155,220,.06); color:var(--turf-dark); font-family:inherit; font-size:15px; font-weight:700;
  }
  .p-add:disabled{ opacity:.4; cursor:default; }

  /* モード選択 */
  .mode-row{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; width:min(94vw,440px); }
  .mode-btn{
    flex:1 1 0; min-width:150px; padding:18px 10px 15px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-weight:900; font-size:17px; letter-spacing:.06em; color:#fff; text-align:center;
    background:linear-gradient(160deg,#5cc0f0,var(--turf) 55%,var(--turf-dark)); border:none; border-radius:14px;
    box-shadow:0 4px 0 #0f6396, 0 7px 14px rgba(18,123,180,.34);
    transition:transform .14s cubic-bezier(.3,1.4,.5,1);
  }
  .mode-btn small{ display:block; margin-top:5px; font-size:11.5px; font-weight:700; opacity:.85; }
  .mode-btn:active{ transform:translateY(2px); box-shadow:0 2px 0 #0f6396; }
  .mode-btn.sel{ outline:4px solid var(--gold); outline-offset:2px; }
  .mode-btn.sm{ font-size:16px; padding:14px 8px 12px; }
  .setup-block{ display:none; flex-direction:column; align-items:center; gap:22px; }
  .setup-block.on{ display:flex; animation:panelIn .3s cubic-bezier(.2,.9,.3,1); }
  .room-btns{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .room-area{ display:flex; flex-direction:column; align-items:center; gap:12px; min-height:36px; text-align:center; }
  .code-show{ display:inline-flex; align-items:center; gap:12px; background:#fff; border:2.5px solid var(--turf); border-radius:12px; padding:8px 20px 10px 16px; cursor:pointer; }
  .code-show .cs-copy{ width:24px; height:24px; flex:none; fill:none; stroke:var(--turf); stroke-width:2; }
  .code-show .cs-code{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:40px; letter-spacing:.28em; text-indent:.28em; color:var(--turf-dark); }
  .code-input{ width:220px; padding:10px 6px; text-align:center; font-family:inherit; font-weight:900; font-size:26px; letter-spacing:.24em; text-indent:.24em; text-transform:uppercase; color:var(--ink); background:#fff; border:2px solid rgba(34,36,31,.4); border-radius:8px; outline:none; caret-color:var(--ink); }
  .room-note{ font-size:13.5px; font-weight:700; opacity:.75; letter-spacing:.06em; }
  .room-note.err{ color:var(--red); opacity:1; }
  @keyframes waitDots{ 0%,100%{ opacity:.4; } 50%{ opacity:1; } }
  .room-wait{ animation:waitDots 1.5s ease-in-out infinite; }

  /* ロビー / 待機 */
  .lobby-code{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .lobby-code:empty{ display:none; }
  #lobbyBack{ margin-top:2px; opacity:.72; }
  .lobby-list{ display:flex; flex-direction:column; gap:9px; width:min(94vw,400px); }
  .lobby-row{ display:flex; align-items:center; gap:10px; background:#fff; border-radius:10px; padding:9px 14px; }
  .lobby-row .p-dot{ width:24px; height:24px; }
  .lobby-row .lr-nm{ flex:1 1 0; font-weight:900; text-align:left; }
  .lobby-row .lr-host{ font-size:11px; font-weight:700; color:var(--gold-dark); background:rgba(242,176,53,.16); border-radius:999px; padding:2px 9px 3px; }
  .wait-prog{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:20px; color:var(--turf-dark); }
  .wait-who{ display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
  .wait-chip{ display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:700; background:#fff; border-radius:999px; padding:4px 11px 5px; opacity:.5; }
  .wait-chip.done{ opacity:1; background:rgba(31,155,220,.14); color:var(--turf-dark); }
  .wait-chip .p-dot{ width:14px; height:14px; }
  /* 賭け中のオッズ表示 */
  .cand .c-odds{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:13px; color:var(--gold-dark); margin-left:auto; }

  /* 大きめボタン(シリーズ共通のノリ) */
  .btn-main{
    padding:15px 44px 17px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-size:22px; font-weight:900; letter-spacing:.16em; text-indent:.16em; color:#fff;
    background:linear-gradient(150deg, #ff6a4d, var(--red) 60%, #c5361f);
    border:none; border-radius:14px; box-shadow:0 5px 0 #a82c17, 0 9px 18px rgba(227,69,47,.35);
  }
  .btn-main:active{ transform:translateY(3px); box-shadow:0 2px 0 #a82c17; }
  .btn-main:disabled{ filter:grayscale(.6) brightness(.9); box-shadow:0 5px 0 #7a7a72; cursor:default; }
  .btn-gold{
    padding:15px 44px 17px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-size:22px; font-weight:900; letter-spacing:.16em; text-indent:.16em; color:#3a2c05;
    background:linear-gradient(150deg, #ffd166, var(--gold) 60%, #dc9c14);
    border:none; border-radius:14px; box-shadow:0 5px 0 var(--gold-dark), 0 9px 18px rgba(210,144,20,.35);
  }
  .btn-gold:active{ transform:translateY(3px); box-shadow:0 2px 0 var(--gold-dark); }
  .btn-gold:disabled{ filter:grayscale(.55) brightness(.95); box-shadow:0 5px 0 #9a9a90; cursor:default; }
  .txt-btn{
    padding:9px 22px; cursor:pointer; font-family:inherit; font-size:15px; font-weight:700; letter-spacing:.1em;
    color:var(--ink); background:rgba(255,255,255,.8); white-space:nowrap;
    border:1.6px solid rgba(34,36,31,.3); border-radius:9px;
  }
  .txt-btn:active{ transform:translateY(1px); }

  /* ===== 進行画面(ラウンド) ===== */
  #gameScene{ padding:15vh 16px 70px; gap:0; justify-content:flex-start; }
  .panel{ display:none; flex-direction:column; align-items:center; gap:20px; width:min(96vw, 480px); }
  .panel.on{ display:flex; animation:panelIn .32s cubic-bezier(.2,.9,.3,1); }
  @keyframes panelIn{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:translateY(0); } }

  .top-bar{
    position:fixed; top:clamp(12px,4.5vh,40px); left:50%; transform:translateX(-50%); z-index:20;
    display:none; align-items:center; gap:8px; max-width:96vw; flex-wrap:wrap; justify-content:center;
  }
  #gameScene.on ~ .top-bar{ display:flex; }
  .round-pill{
    font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:14px; font-weight:700; letter-spacing:.1em; color:var(--turf-dark);
    background:rgba(255,255,255,.85); border:1.6px solid var(--turf); border-radius:999px; padding:5px 16px 6px; white-space:nowrap;
  }
  .dir-badge{
    display:none; align-items:center; gap:6px; font-size:13px; font-weight:900; letter-spacing:.04em;
    border-radius:999px; padding:5px 14px 6px; white-space:nowrap; color:#fff;
  }
  .dir-badge svg{ width:15px; height:15px; flex:none; }
  .dir-badge.hi{ background:linear-gradient(150deg,#ff7a5f,var(--red)); box-shadow:0 2px 6px rgba(227,69,47,.35); }
  .dir-badge.lo{ background:linear-gradient(150deg,#41b4ec,var(--turf-dark)); box-shadow:0 2px 6px rgba(18,123,180,.4); }
  .big-q{ font-size:clamp(20px,5.4vw,26px); font-weight:900; text-align:center; letter-spacing:.04em; line-height:1.45; }
  .big-q .em{ color:var(--red); }
  .hint{ font-size:13px; opacity:.62; font-weight:700; letter-spacing:.06em; text-align:center; }

  /* お題入力(テキスト欄。ボタンと区別できる見た目) */
  .field-wrap{ position:relative; width:100%; }
  .field-tag{ position:absolute; left:14px; top:-10px; z-index:1; background:var(--turf); color:#fff;
    font-size:11px; font-weight:900; letter-spacing:.1em; padding:2px 11px 3px; border-radius:999px; }
  .theme-input{
    width:100%; font-family:inherit; font-size:20px; font-weight:700; text-align:center; color:var(--ink);
    padding:16px 12px 14px; border:2px dashed rgba(34,36,31,.3); border-radius:12px; background:#fbfaf6; outline:none;
    box-shadow:inset 0 2px 5px rgba(34,36,31,.09);
  }
  .theme-input:focus{ border-style:solid; border-color:var(--turf); background:#fff; }
  /* 勝敗の決め方(トグルボタン。押せるとわかる立体感) */
  .dir-row{ display:flex; gap:12px; width:100%; }
  .dir-btn{
    flex:1 1 0; padding:13px 8px 14px; cursor:pointer; border-radius:12px; font-family:inherit; font-weight:900; font-size:16px;
    color:var(--ink); background:linear-gradient(#ffffff,#efece3); border:2px solid rgba(34,36,31,.16);
    box-shadow:0 3px 0 rgba(34,36,31,.18); text-align:center; line-height:1.3; transition:transform .1s, box-shadow .1s;
  }
  .dir-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(34,36,31,.18); }
  .dir-btn.sel{ background:linear-gradient(150deg,#ffdd82,var(--gold) 70%,#e6a51c); border-color:var(--gold-dark);
    color:#3a2c05; box-shadow:0 3px 0 var(--gold-dark); }

  /* 秘密の数字入力 */
  .num-input{
    width:min(80vw,320px); font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:44px; text-align:center; color:var(--turf-dark);
    padding:12px; border:2.5px solid var(--turf); border-radius:14px; background:#fff; outline:none; letter-spacing:.06em;
    -moz-appearance:textfield; appearance:textfield;
  }
  .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .secret-note{ font-size:12.5px; color:var(--red); font-weight:900; letter-spacing:.06em; }

  /* 賭け: 候補リスト */
  .cand-list{ display:flex; flex-direction:column; gap:9px; width:100%; }
  .cand{
    display:flex; align-items:center; gap:11px; cursor:pointer;
    padding:11px 14px; border-radius:12px; background:#fff; border:2px solid rgba(34,36,31,.15);
  }
  .cand.sel{ border-color:var(--gold); background:rgba(242,176,53,.12); }
  .cand .p-dot{ width:24px; height:24px; }
  .cand .c-nm{ flex:1 1 0; font-weight:900; font-size:17px; }
  .cand .c-me{ font-size:11px; font-weight:700; color:var(--turf-dark); background:rgba(31,155,220,.14); border-radius:999px; padding:2px 9px 3px; }
  .bet-amount{ display:flex; align-items:center; gap:12px; }
  .bet-amount .ba-btn{ width:44px; height:44px; border:none; border-radius:11px; cursor:pointer; font-size:24px; font-weight:900; color:#fff;
    background:linear-gradient(150deg,#ffd166,var(--gold) 60%,#dc9c14); box-shadow:0 3px 0 var(--gold-dark); line-height:1; }
  .bet-amount .ba-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--gold-dark); }
  .bet-amount .ba-val{ min-width:96px; text-align:center; font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:32px; color:var(--gold-dark); }
  .bet-allin{ font-size:13px; font-weight:800; letter-spacing:.08em; color:var(--red); background:none; border:none; cursor:pointer; text-decoration:underline; font-family:inherit; }
  .my-chips{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:16px; color:var(--ink); }
  .my-chips b{ color:var(--gold-dark); font-size:20px; }

  /* ===== レース ===== */
  .track{
    position:relative; width:min(96vw,480px); background:linear-gradient(180deg,#43a866,#3a9e5c 60%,#2c7d47);
    border-radius:12px; border:5px solid #fff; box-shadow:0 8px 22px rgba(34,36,31,.28), inset 0 0 24px rgba(0,0,0,.14);
    overflow:hidden;
  }
  .lane{ position:relative; height:46px; border-bottom:1px dashed rgba(255,255,255,.35); }
  .lane:last-child{ border-bottom:none; }
  .goal{ position:absolute; top:0; bottom:0; right:22px; width:6px; z-index:1;
    background:repeating-linear-gradient(45deg,#fff 0 6px,#111 6px 12px); opacity:.85; }
  .goal-tape{ position:absolute; top:0; bottom:0; right:24px; width:3px; background:var(--red); z-index:4;
    box-shadow:0 0 8px rgba(227,69,47,.6); transition:transform .3s ease, opacity .3s ease; transform-origin:top; }
  .goal-tape.broken{ transform:scaleY(1.15) rotate(4deg); opacity:0; }
  .runner{
    position:absolute; left:4px; top:50%; transform:translate(0,-50%);
    display:flex; align-items:center; gap:6px; z-index:3; will-change:left;
  }
  .runner .r-dot{
    width:32px; height:32px; border-radius:50%; flex:none; position:relative;
    box-shadow:inset 0 2px 4px rgba(255,255,255,.45), 0 2px 4px rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:14px;
  }
  .runner .r-num{
    position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:15px; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.6);
    white-space:nowrap; opacity:0; transition:opacity .2s linear;
  }
  .runner .r-num.show{ opacity:1; }
  .runner.win .r-dot{ animation:winBob .5s ease-in-out infinite; box-shadow:0 0 0 3px var(--gold), inset 0 2px 4px rgba(255,255,255,.45), 0 3px 6px rgba(0,0,0,.3); }
  @keyframes winBob{ 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-3px) scale(1.08); } }

  .burst{ position:fixed; border-radius:2px; z-index:60; pointer-events:none;
    animation:burstFly 1.6s cubic-bezier(.2,.7,.4,1) forwards; }
  @keyframes burstFly{ 0%{ transform:translate(0,0) rotate(0); opacity:1; } 100%{ transform:translate(var(--bx,0),var(--by,-260px)) rotate(540deg); opacity:0; } }

  /* ===== オーバーレイ(交代/結果/確認/あそびかた) ===== */
  #handoffOverlay, #resultOverlay, #confirmOverlay, #helpOverlay, #champOverlay{
    position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center;
    background:rgba(24,26,22,.5); opacity:0; pointer-events:none; transition:opacity .3s linear;
  }
  #handoffOverlay.on, #resultOverlay.on, #confirmOverlay.on, #helpOverlay.on, #champOverlay.on{ opacity:1; pointer-events:auto; }
  .r-card{
    display:flex; flex-direction:column; align-items:center; gap:18px;
    background:var(--bg); border-radius:18px; border-top:10px solid var(--turf);
    box-shadow:0 18px 44px rgba(20,22,18,.4);
    padding:28px 24px 24px; width:min(90vw, 440px); text-align:center;
    transform:scale(.6); opacity:0; transition:transform .3s cubic-bezier(.3,1.4,.5,1), opacity .25s linear;
  }
  #handoffOverlay.on .r-card, #resultOverlay.on .r-card, #confirmOverlay.on .r-card, #helpOverlay.on .r-card, #champOverlay.on .r-card{ transform:scale(1); opacity:1; }
  .r-title{ font-size:clamp(22px,6vw,32px); font-weight:900; letter-spacing:.08em; }
  .r-title.win{ color:var(--red); }
  .ho-name{ font-size:clamp(28px,8vw,44px); font-weight:900; color:var(--turf-dark); }
  .ho-dot{ width:40px; height:40px; border-radius:50%; box-shadow:inset 0 2px 4px rgba(255,255,255,.4), 0 2px 5px rgba(0,0,0,.25); }
  .r-card .sub-btns{ display:flex; gap:14px; width:100%; }
  .r-card .txt-btn, .r-card .btn-main, .r-card .btn-gold{ flex:1 1 0; min-width:0; }

  /* 結果の配当リスト */
  .pay-list{ width:100%; display:flex; flex-direction:column; gap:7px; }
  .pay-row{ display:flex; align-items:center; gap:9px; font-size:15px; }
  .pay-row .p-dot{ width:20px; height:20px; }
  .pay-row .pr-nm{ flex:1 1 0; text-align:left; font-weight:700; }
  .pay-row .pr-delta{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:700; }
  .pr-delta.plus{ color:var(--turf-dark); }
  .pr-delta.minus{ color:var(--red); opacity:.8; }
  .result-head{ font-size:14px; font-weight:700; opacity:.7; }
  .carry-note{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:15px; color:var(--gold-dark); }

  /* 順位(チャンピオン) */
  .rank-list{ width:100%; display:flex; flex-direction:column; gap:8px; }
  .rank-row{ display:flex; align-items:center; gap:10px; font-size:17px; padding:8px 12px; border-radius:10px; background:#fff; }
  .rank-row.first{ background:linear-gradient(150deg,#fff5da,#ffe9a8); box-shadow:0 2px 8px rgba(210,144,20,.25); }
  .rank-row .rk{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:18px; width:34px; color:var(--gold-dark); }
  .rank-row .p-dot{ width:22px; height:22px; }
  .rank-row .rr-nm{ flex:1 1 0; font-weight:900; text-align:left; }
  .rank-row .rr-chips{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; color:var(--ink); }

  /* レース数ステッパー */
  .rounds-box{ display:flex; flex-direction:column; align-items:center; gap:10px; }
  .rounds-row{ display:flex; align-items:center; justify-content:center; gap:16px; }
  .rounds-box .rl{ font-size:13px; font-weight:900; letter-spacing:.3em; text-indent:.3em; opacity:.6; }
  .stp-btn{ width:42px; height:42px; border:none; border-radius:12px; cursor:pointer; font-size:24px; font-weight:900; color:#fff; line-height:1;
    background:linear-gradient(150deg,#5cc0f0,var(--turf) 60%,var(--turf-dark)); box-shadow:0 3px 0 #0f6396; }
  .stp-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0f6396; }
  .stp-btn.dim{ opacity:.3; pointer-events:none; }
  .rounds-row .rv{ min-width:78px; text-align:center; font-weight:900; color:var(--turf-dark); }

  .res-row .rs-delta{ grid-column:3; grid-row:span 2; font-weight:900; font-size:17px; text-align:right; white-space:nowrap; }
  .rs-delta.plus{ color:var(--turf-dark); }
  .rs-delta.minus{ color:var(--red); opacity:.85; }

  /* 枠外リンク(中断する) */
  .link-out{ margin-top:16px; background:none; border:none; cursor:pointer; font-family:inherit;
    color:rgba(255,255,255,.92); text-decoration:underline; text-underline-offset:3px; font-size:14px; font-weight:700; letter-spacing:.12em; }

  /* レース演出 */
  .race-call{ position:fixed; left:50%; top:40%; transform:translate(-50%,-50%); z-index:65;

  .runner .r-dot::before{ content:""; position:absolute; right:100%; top:50%; height:3px; border-radius:3px; margin-right:2px;

  /* 左上あそびかた / 右上効果音 */
  .help-btn{

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  const COLORS=["#e3452f","#2f7de3","#2f9e55","#f39a1f","#8a5cd6","#17a2a2","#e35a9c","#8a6a3f"];
  const THEMES=["スマホの充電残量","LINEの未読数","昨日の睡眠時間","シャトルランの回数","カメラロールの写真の枚数","スマホの昨日の利用時間","入れてるアプリの数","Twitterのフォロワー数","インスタのフォロワー数"];
  function randTheme(){ return THEMES[Math.floor(Math.random()*THEMES.length)]; }
  const INIT_CHIPS=100, MIN_BET=10, RESCUE=20;
  const MAXP=8, MINP=2;
  const MIN_ROUNDS=1, MAX_ROUNDS=30;
  let totalRounds=5;   // 何レースで総合結果か(部屋主/1台の設定)

  let players=[];        // {name,color,chips}
  let round=0, repIdx=0, carry=0;
  let theme="", dir="hi";
  let numbers=[];        // 各プレイヤーの申告数字(index対応)
  let bets=[];           // {on:idx, amt:number}
  let seatIdx=0;         // いま端末を持っている人(入力/賭けのループ用)
  let curBet=10, curCand=-1;

  const titleScene=document.getElementById("titleScene"), gameScene=document.getElementById("gameScene");
  const playersList=document.getElementById("playersList");

  /* ---------- 音 (WebAudio) ---------- */
  let actx=null, seBus=null, seOn=true;
  try{ seOn=localStorage.getItem("drb.se")!=="0"; }catch(e){}
  function ensureAudio(){ if(actx) return; try{ actx=new (window.AudioContext||window.webkitAudioContext)(); seBus=actx.createGain(); seBus.gain.value=seOn?1:0; seBus.connect(actx.destination); }catch(e){} }
  function note(f,t,dur,peak,type){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain(); o.type=type||"sine"; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(seBus); o.start(t); o.stop(t+dur+0.05); }
  function click(t,f,peak){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain(); o.type="triangle"; o.frequency.setValueAtTime(f,t); o.frequency.exponentialRampToValueAtTime(f*.5,t+.07);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+.006); g.gain.exponentialRampToValueAtTime(0.0001,t+.11); o.connect(g); g.connect(seBus); o.start(t); o.stop(t+.16); }
  function playSelect(){ if(actx) click(actx.currentTime,1100,0.5); }
  function playTick(){ if(actx) click(actx.currentTime,1500,0.35); }
  function playChip(){ if(!actx) return; const t=actx.currentTime; click(t,1300,0.4); note(2000,t,0.05,0.2,"square"); }
  function playConfirm(){ if(!actx) return; const t=actx.currentTime; click(t,700,0.6); note(523,t+.05,0.18,0.28,"triangle"); }
  function playGo(){ if(!actx) return; const t=actx.currentTime;   // ファンファーレ(スタート)
    [392,523,659,784].forEach((f,i)=>note(f,t+i*0.1,0.22,0.32,"triangle")); }
  function playGallop(i){ if(!actx) return; const t=actx.currentTime; note(120+(i%2)*30,t,0.06,0.14,"sine"); }
  function playFinish(){ if(!actx) return; const t=actx.currentTime; note(1046,t,0.12,0.34,"triangle"); click(t+0.02,900,0.5); }
  function playWin(){ if(!actx) return; const t=actx.currentTime; [523,659,784,1047,1319].forEach((f,i)=>note(f,t+i*0.1,0.3,0.32,"triangle")); }
  function playStretch(){ if(!actx) return; const t=actx.currentTime; const o=actx.createOscillator(),g=actx.createGain();
    o.type="sawtooth"; o.frequency.setValueAtTime(280,t); o.frequency.exponentialRampToValueAtTime(880,t+0.85);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.12); g.gain.exponentialRampToValueAtTime(0.0001,t+1.0);
    o.connect(g); g.connect(seBus); o.start(t); o.stop(t+1.05); }

  /* ---------- タイトル: メンバー設定 ---------- */
  const DEFAULT_NAMES=["メンバー1","メンバー2"];
  function renderPlayersSetup(){
    playersList.innerHTML="";
    playersSetup.forEach((nm,i)=>{
      const row=document.createElement("div"); row.className="p-row";
      row.innerHTML='<span class="p-dot" style="background:radial-gradient(circle at 35% 30%, '+tint(COLORS[i])+', '+COLORS[i]+')"></span>'
        +'<input class="p-input" maxlength="8" placeholder="なまえ" value="'+esc(nm)+'">'
        +(playersSetup.length>MINP?'<button class="p-del" aria-label="削除">×</button>':'');
      const inp=row.querySelector(".p-input");
      inp.addEventListener("input",()=>{ playersSetup[i]=inp.value; });
      const del=row.querySelector(".p-del");
      if(del) del.addEventListener("click",()=>{ ensureAudio(); playSelect(); playersSetup.splice(i,1); renderPlayersSetup(); });
      playersList.appendChild(row);
    });
    document.getElementById("addPlayer").disabled = playersSetup.length>=MAXP;
  }
  let playersSetup=DEFAULT_NAMES.slice();
  function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function tint(hex){   // 明るめのハイライト色
    const n=parseInt(hex.slice(1),16), r=(n>>16)+70, g=((n>>8)&255)+70, b=(n&255)+70;
    return "rgb("+Math.min(255,r)+","+Math.min(255,g)+","+Math.min(255,b)+")";
  }
  document.getElementById("addPlayer").addEventListener("click",()=>{ ensureAudio(); playSelect();
    if(playersSetup.length>=MAXP) return; playersSetup.push(""); renderPlayersSetup();
    const inps=playersList.querySelectorAll(".p-input"); inps[inps.length-1].focus();

  // レース数ステッパー(1台/オンライン共通・同じ値を反映)
  function renderRounds(){
    document.querySelectorAll(".rVal").forEach(el=>el.textContent=totalRounds);
    document.querySelectorAll(".stp-btn").forEach(b=>{ const d=+b.dataset.rd;
      b.classList.toggle("dim", (d<0&&totalRounds<=MIN_ROUNDS)||(d>0&&totalRounds>=MAX_ROUNDS)); });
  }
  document.querySelectorAll(".stp-btn").forEach(b=>{

      const nv=Math.max(MIN_ROUNDS,Math.min(MAX_ROUNDS,totalRounds+d));
      if(nv!==totalRounds){ totalRounds=nv; playTick(); renderRounds(); } });

  renderRounds();

  document.getElementById("startBtn").addEventListener("click",()=>{

    const names=playersSetup.map((s,i)=>(s||"").trim()||("メンバー"+(i+1)));

  /* ---------- ラウンド進行 ---------- */
  const panels={ lobby:document.getElementById("lobbyPanel"), wait:document.getElementById("waitPanel"),
    theme:document.getElementById("themePanel"), enter:document.getElementById("enterPanel"),
    bet:document.getElementById("betPanel"), race:document.getElementById("racePanel") };
  function showPanel(name){ Object.keys(panels).forEach(k=> panels[k].classList.toggle("on", k===name)); }

  let mode="local";   // "local" | "online"

  // もち金が足りない人は誰かからチップをもらう。出せる人がいなければ脱落
  function rescueOrEliminate(){
    const eliminated=[];
    const broke=players.filter(p=>p.chips<MIN_BET).sort((a,b)=>a.chips-b.chips);
    broke.forEach(p=>{
      if(p.chips>=MIN_BET) return;
      const need=RESCUE-p.chips;
      let donor=null;   // 渡してもMIN_BET以上残る人の中で一番の金持ち
      players.forEach(q=>{ if(q===p||q.chips<MIN_BET) return; if(q.chips-need>=MIN_BET){ if(!donor||q.chips>donor.chips) donor=q; } });
      if(donor){ donor.chips-=need; p.chips+=need; }
      else{ p._out=true; eliminated.push(p.name); }
    });
    for(let i=players.length-1;i>=0;i--){ if(players[i]._out) players.splice(i,1); }
    return eliminated;
  }

  // 交代画面: 端末を渡してから続行

  // お題決定
  document.querySelectorAll("#themePanel .dir-btn").forEach(b=>{
    b.addEventListener("click",()=>{ ensureAudio(); playSelect();
      document.querySelectorAll("#themePanel .dir-btn").forEach(x=>x.classList.remove("sel"));

  document.getElementById("themeGo").addEventListener("click",()=>{

  // 秘密の数字入力ループ
  function nextEnter(){
    if(seatIdx>=players.length){ seatIdx=0; nextBet(); return; }
    const idx=seatIdx;
    handoff(idx, "お題を見て数字を入力", ()=>{
      document.getElementById("enterQ").innerHTML='お題「<span class="em">'+esc(theme)+'</span>」<br>'+esc(players[idx].name)+'さんは数字を入力';

  }
  document.getElementById("numGo").addEventListener("click",()=>{

    playConfirm();
    if(mode==="online"){ myNum=Number(raw); sendAct("num",{n:myNum}); showWait("みんなの入力を待っています",false); return; }
    numbers[seatIdx]=Number(raw);
    seatIdx++; nextEnter();
  });

  // 賭けループ
  function nextBet(){
    if(seatIdx>=players.length){ startRace(); return; }
    const idx=seatIdx; betIdx=idx;
    // 賭けは全員で見ながら順番に(端末は回さない)
    curCand=-1; curBet=MIN_BET;
    document.getElementById("betQ").innerHTML='<span class="em">'+esc(players[idx].name)+'</span>さんの予想<br><span class="hint">お題「'+esc(theme)+'」で1位は？</span>';
    document.getElementById("betChips").textContent=players[idx].chips;
    renderCandidates(idx);
    updateBetVal();
    renderBetLive(document.getElementById("betLive"));
    showPanel("bet");
  }
  // 「誰が誰に賭けているか」ライブ表示
  function renderBetLive(el){
    if(!el) return;
    const rows=[];
    players.forEach((p,i)=>{ const b=bets[i]; if(b){ rows.push({from:p, to:(players[b.on]||{name:"?",color:"#999"}), amt:b.amt}); } });
    if(!rows.length){ el.innerHTML=""; return; }
    let html='<div class="bl-head">賭け状況</div>';
    rows.forEach(r=>{ html+='<div class="bl-row"><span class="p-dot" style="'+dotStyle(r.from.color)+'"></span>'
      +'<span>'+esc(r.from.name)+'</span><span class="bl-arrow">→</span>'
      +'<span class="p-dot" style="'+dotStyle(r.to.color)+'"></span><span>'+esc(r.to.name)+'</span>'
      +'<span class="bl-amt"><span class="chip-ico"></span>'+r.amt+'</span></div>'; });
    el.innerHTML=html;
  }
  function renderCandidates(betterIdx){
    const list=document.getElementById("candList"); list.innerHTML="";
    players.forEach((p,i)=>{
      const el=document.createElement("div"); el.className="cand";
      el.innerHTML='<span class="p-dot" style="'+dotStyle(p.color)+'"></span><span class="c-nm">'+esc(p.name)+'</span>'
        +(i===betterIdx?'<span class="c-me">じぶん</span>':'');
      el.addEventListener("click",()=>{ ensureAudio(); playSelect();
        curCand=i; list.querySelectorAll(".cand").forEach(c=>c.classList.remove("sel")); el.classList.add("sel"); });
      list.appendChild(el);
    });
  }
  let betIdx=0;   // いま賭けている人のindex(1台=seatIdx / オンライン=自分)
  function betterChips(){ return players[betIdx].chips; }
  function updateBetVal(){
    const max=betterChips();
    if(curBet>max) curBet=max;
    if(curBet<MIN_BET) curBet=Math.min(MIN_BET,max);
    document.getElementById("baVal").textContent=curBet;
    document.getElementById("baMinus").classList.toggle("dim", curBet-10<MIN_BET);
    document.getElementById("baPlus").classList.toggle("dim", curBet+10>max);
  }
  document.getElementById("baMinus").addEventListener("click",()=>{ ensureAudio(); if(curBet-10>=MIN_BET){ curBet-=10; playTick(); updateBetVal(); } });
  document.getElementById("baPlus").addEventListener("click",()=>{ ensureAudio(); if(curBet+10<=betterChips()){ curBet+=10; playTick(); updateBetVal(); } });
  document.getElementById("baAllin").addEventListener("click",()=>{ ensureAudio(); playChip(); curBet=betterChips(); updateBetVal(); });
  document.getElementById("betGo").addEventListener("click",()=>{
    ensureAudio();
    if(curCand<0){ showToast("誰が1位か選んでね"); return; }
    const amt=Math.min(curBet, betterChips());
    if(amt<Math.min(MIN_BET, betterChips())){ showToast("賭けチップが足りない"); return; }
    playChip();
    if(mode==="online"){ sendAct("bet",{on:curCand, amt}); showWait("みんなの予想を待っています",false); return; }
    bets[seatIdx]={on:curCand, amt};
    players[seatIdx].chips-=amt;
    seatIdx++; nextBet();
  });

  /* ---------- レース ---------- */
  function winnersOf(){
    let best=null;
    numbers.forEach(v=>{ if(v==null) return; if(best==null) best=v; else best=(dir==="hi"?Math.max(best,v):Math.min(best,v)); });
    const set=[]; numbers.forEach((v,i)=>{ if(v===best) set.push(i); });
    return {best, set};
  }
  // レース中のチップ山(候補ごとに、賭けた人の色チップを積む)
  function renderPoolView(){
    const el=document.getElementById("poolView"); if(!el) return;
    const byCand={};
    bets.forEach((b,i)=>{ if(!b) return; (byCand[b.on]=byCand[b.on]||[]).push({color:players[i].color, amt:b.amt}); });
    const cands=Object.keys(byCand).map(Number).sort((a,b)=>{
      const ta=byCand[a].reduce((s,x)=>s+x.amt,0), tb=byCand[b].reduce((s,x)=>s+x.amt,0); return tb-ta; });
    let html="";
    cands.forEach(ci=>{
      const list=byCand[ci], total=list.reduce((s,x)=>s+x.amt,0);
      let chips=[]; list.forEach(x=>{ const n=Math.max(1,Math.round(x.amt/10)); for(let k=0;k<n;k++) chips.push(x.color); });
      chips=chips.slice(0,14);
      let stack=""; chips.forEach(c=>{ stack+='<div class="pool-chip" style="background:radial-gradient(circle at 40% 30%,'+tint(c)+','+c+')"></div>'; });
      const p=players[ci]; if(!p) return;
      html+='<div class="pool-col"><div class="pool-stack">'+stack+'</div>'
        +'<div class="pc-nm"><span class="p-dot" style="'+dotStyle(p.color)+'"></span>'+esc(p.name)+'</div>'
        +'<div class="pc-amt">'+total+'枚</div></div>';
    });
    if(carry>0){ html+='<div class="pool-col"><div class="pool-stack"><div class="pool-chip" style="background:radial-gradient(circle at 40% 30%,#ffe08a,var(--gold))"></div><div class="pool-chip" style="background:radial-gradient(circle at 40% 30%,#ffe08a,var(--gold))"></div></div><div class="pc-nm">持ち越し</div><div class="pc-amt">'+carry+'枚</div></div>'; }
    el.innerHTML=html;
  }
  function startRace(){
    showPanel("race"); setDirBadge(true);
    document.getElementById("raceTheme").innerHTML='お題「<span class="em">'+esc(theme)+'</span>」';
    document.getElementById("raceResultBtn").style.display="none";
    renderPoolView();
    const {set}=winnersOf();
    // ランク付け(勝者=先頭)。同値は同着扱い
    const order=players.map((p,i)=>i).sort((a,b)=> dir==="hi" ? (numbers[b]-numbers[a]) : (numbers[a]-numbers[b]));
    const rankOf={}; order.forEach((idx,r)=>rankOf[idx]=r);
    // トラック描画
    const track=document.getElementById("track"); track.innerHTML="";
    track.style.height=(players.length*46)+"px";
    const goal=document.createElement("div"); goal.className="goal"; track.appendChild(goal);
    const tape=document.createElement("div"); tape.className="goal-tape"; track.appendChild(tape);
    const runners=[];
    players.forEach((p,i)=>{
      const lane=document.createElement("div"); lane.className="lane";
      const run=document.createElement("div"); run.className="runner";
      run.innerHTML='<span class="r-dot" style="'+dotStyle(p.color)+'">'+esc(p.name.slice(0,1))+'</span><span class="r-num"></span>';
      lane.appendChild(run); track.appendChild(lane);
      runners.push(run);
    });
    // レースアニメ(rAF)。ゴール手前で止める(ゴール帯=右24px + 余白)
    const W=track.clientWidth, finish=W-46;
    runRace(runners, rankOf, set, finish, tape);
  }
  let raceDone=false, raceCallShown=false;
  function showRaceCall(txt){ const el=document.getElementById("raceCall"); el.textContent=txt; el.classList.remove("on"); void el.offsetWidth; el.classList.add("on"); }
  function runRace(runners, rankOf, winSet, finish, tape){
    playGo();
    raceDone=false; raceCallShown=false;
    const track=document.getElementById("track"); track.classList.add("running");
    const DUR=10000, gap=0.06;
    // 各馬の揺らぎ(抜きつ抜かれつ)。終盤に収束して本来の順位へ
    const osc=runners.map(()=>({p1:Math.random()*6.283, p2:Math.random()*6.283,
      f1:0.9+Math.random()*1.0, f2:2.4+Math.random()*1.6, amp:0.05+Math.random()*0.05}));
    const back=runners.map((_,i)=>rankOf[i]*gap);   // 最終的な後れ幅
    const smooth=x=>{ x=Math.max(0,Math.min(1,x)); return x*x*(3-2*x); };
    const endRace=()=>{ if(raceDone) return; raceDone=true; track.classList.remove("running"); finishRace(runners, winSet, tape); };
    let start=null, lastGallop=0;
    function frame(ts){
      if(raceDone) return;
      if(start==null) start=ts;
      const el=ts-start, t=Math.min(1, el/DUR);
      const F=Math.min(1, t*1.02);                 // 隊列の先頭(ほぼ等速で直線を進む)
      const S=smooth((t-0.55)/0.45);               // 終盤で隊列がばらけ、本来の順位が出る
      let leadIdx=0, leadProg=-1;
      runners.forEach((run,i)=>{
        const o=osc[i];
        const sec=el/1000;
        const j=(Math.sin(sec*o.f1*6.283+o.p1)*0.62 + Math.sin(sec*o.f2*6.283+o.p2)*0.38)*o.amp*(1-S);
        let prog=F - back[i]*S + j;
        prog=Math.max(0, Math.min(t<0.955?0.98:1, prog));
        run.style.left=(4 + prog*(finish-4))+"px";
        if(prog>leadProg){ leadProg=prog; leadIdx=i; }
      });
      runners.forEach((run,i)=>run.classList.toggle("lead", i===leadIdx && t<0.97));
      if(!raceCallShown && t>=0.58){ raceCallShown=true; showRaceCall("最後の直線ッ！"); playStretch(); }
      const gi=Math.max(95, 235-165*t);            // 終盤ほど蹄の音が速くなる
      if(ts-lastGallop>gi){ lastGallop=ts; playGallop(Math.floor(el/110)); }
      if(t<1){ requestAnimationFrame(frame); }
      else endRace();
    }
    requestAnimationFrame(frame);
    // 保険: タブが裏でrAFが止まっても必ず完走させる
    setTimeout(()=>{ runners.forEach((run,i)=>{ run.style.left=(4+(1-rankOf[i]*gap)*(finish-4))+"px"; run.classList.remove("lead"); }); endRace(); }, DUR+500);
  }
  function finishRace(runners, winSet, tape){
    tape.classList.add("broken");
    playFinish();
    // 数字を頭上に出す
    runners.forEach((run,i)=>{
      const num=run.querySelector(".r-num"); num.textContent=numbers[i];
      setTimeout(()=>num.classList.add("show"), 100+i*70);
    });
    // 勝者を強調＋チップ噴き上げ
    winSet.forEach(i=>{
      runners[i].classList.add("win");
      burstAt(runners[i]);
    });
    if(seOn) playWin();
    // 1台回しは「結果を見る」ボタンで進む。オンラインはホストが自動集計する
    if(mode==="local") setTimeout(()=>{ document.getElementById("raceResultBtn").style.display=""; }, 900);
    else if(isHost) setTimeout(()=>{ oSettle(); }, 1000);
  }
  function burstAt(run){
    const r=run.querySelector(".r-dot").getBoundingClientRect();
    for(let i=0;i<14;i++){
      const el=document.createElement("div"); el.className="burst";
      const s=7+Math.random()*7; el.style.width=el.style.height=s+"px";
      el.style.background=Math.random()<0.5?"var(--gold)":"#fff";
      el.style.left=(r.left+r.width/2)+"px"; el.style.top=(r.top+r.height/2)+"px";
      const a=Math.random()*Math.PI*2, d=60+Math.random()*120;
      el.style.setProperty("--bx",(Math.cos(a)*d).toFixed(0)+"px");
      el.style.setProperty("--by",(Math.sin(a)*d-100).toFixed(0)+"px");
      el.style.animationDelay=(Math.random()*0.25)+"s";
      document.body.appendChild(el); setTimeout(()=>el.remove(),1800);
    }
  }
  document.getElementById("raceResultBtn").addEventListener("click",()=>{ ensureAudio(); playSelect(); settlePayout(); });

  /* ---------- 配当 ---------- */
  // 集計だけ行い、結果を返す(chips/carryも更新)。表示はしない
  function computePayout(){
    const {best,set}=winnersOf();
    let pool=carry; bets.forEach(b=>{ if(b) pool+=b.amt; });
    const correct=[]; let correctTotal=0;
    bets.forEach((b,i)=>{ if(b && set.includes(b.on)){ correct.push(i); correctTotal+=b.amt; } });
    const deltas=players.map(()=>0);
    bets.forEach((b,i)=>{ if(b) deltas[i]-=b.amt; });   // 賭け金は既に引いてあるが、表示用の増減として記録
    let nextCarry=0;
    if(correct.length===0){ nextCarry=pool; }
    else{
      let dist=0;
      correct.forEach(i=>{ const share=Math.floor(pool * bets[i].amt / correctTotal); players[i].chips+=share; deltas[i]+=share; dist+=share; });
      nextCarry=pool-dist;
    }
    carry=nextCarry;
    return {best, set, someoneWon:correct.length>0, deltas};
  }
  function settlePayout(){   // 1台回し用
    const r=computePayout();
    showResult(r.best, r.set, r.someoneWon, r.deltas);
  }
  function showResult(best, set, someoneWon, deltas){
    const ov=document.getElementById("resultOverlay");
    const winNames=set.map(i=>players[i]?players[i].name:"").filter(Boolean).join("・");
    document.getElementById("resWin").textContent="1位　"+winNames+"！";
    document.getElementById("resHead").textContent="お題「"+theme+"」＝ "+best+"（"+(dir==="hi"?"最大":"最小")+"）";
    // 数字の順位(1位が上)に並べて、数字・賭け先・損益をまとめて表示
    const order=players.map((p,i)=>i).sort((a,b)=> dir==="hi" ? (numbers[b]-numbers[a]) : (numbers[a]-numbers[b]));
    const tbl=document.getElementById("resTable"); tbl.innerHTML="";
    order.forEach(i=>{
      const p=players[i]; if(!p) return;
      const d=deltas[i]||0, isWin=set.includes(i), b=bets[i];
      const betTxt = b ? ('賭け → '+esc((players[b.on]||{}).name||"?")+' に '+b.amt+'枚') : '賭けなし';
      const sign=d>0?"+":(d<0?"":"±"); const cls=d>0?"plus":(d<0?"minus":"zero");
      const row=document.createElement("div"); row.className="res-row"+(isWin?" win":"");
      row.innerHTML='<span class="rs-dot p-dot" style="'+dotStyle(p.color)+'"></span>'
        +'<span class="rs-nm">'+esc(p.name)+(isWin?'<span class="rs-crown">1位</span>':'')
        +' <span class="rs-num">数字 <b>'+(numbers[i]!=null?numbers[i]:"-")+'</b></span></span>'
        +'<span class="rs-bet">'+betTxt+'</span>'
        +'<span class="rs-delta '+cls+'">'+sign+d+'</span>';
      tbl.appendChild(row);
    });
    document.getElementById("carryNote").textContent = someoneWon
      ? (carry>0?"端数 "+carry+"枚 は次のレースへ持ち越し":"")
      : "だれも当てられず！ プール "+carry+"枚 がキャリーオーバー";
    document.getElementById("nextBtn").textContent = round>=totalRounds ? "総合結果へ" : "次のレース";
    ov.classList.add("on");
  }
  document.getElementById("nextBtn").addEventListener("click",()=>{ ensureAudio(); playSelect();
    document.getElementById("resultOverlay").classList.remove("on");

  function tuneResultButtons(){
    const next=document.getElementById("nextBtn"), end=document.getElementById("endBtn");
    if(mode!=="online"){ next.style.display=""; end.style.display=""; return; }
    next.style.display=isHost?"":"none"; end.style.display=isHost?"":"none";
  }
  function tuneChampButtons(){
    const again=document.getElementById("champAgain");
    again.style.display=(mode==="online"&&!isHost)?"none":"";
  }

  // ---- ゲスト→ホスト 送信(ack再送) ----
  function sendAct(kind, data){
    if(kind==="num") numDoneRound=round;
    if(kind==="bet") betDoneRound=round;
    if(isHost){ localAct(kind,data); return; }   // ホストは自分で処理
    const aid=myId+":"+(actSeq++);
    const payload=Object.assign({aid, id:myId, kind}, data);
    const send=()=>{ if(!ch) return; try{ ch.send({ type:"broadcast", event:"act", payload }); }catch(e){} };
    send();
    pendingActs[aid]={ payload, timer:setInterval(send, 1200) };
  }
  function ackAct(aid){ if(ch && aid){ try{ ch.send({ type:"broadcast", event:"actack", payload:{aid} }); }catch(e){} } }
})();
</script>
</body>
</html>
