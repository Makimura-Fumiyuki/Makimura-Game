    snap.bets=bets.map(b=>b?{on:b.on,amt:b.amt}:null);   // 常に共有(チップ状況のプール表示用)
    if(oPhase==="bet"){ snap.picks=picks; }   // 仮選択のライブ共有
    if(oPhase==="race"||oPhase==="result"||oPhase==="champ"){
      snap.numbers=numbers.slice();
    }
    if(oPhase==="race" && hostRace) snap.race=hostRace;
    if(oPhase==="bankrupt" && bankruptInfo) snap.bk=bankruptInfo;
    if(oPhase==="champ"||oPhase==="bankrupt") snap.bks=bankrupts.map(b=>({id:b.id,name:b.name,color:b.color}));
    if(oPhase==="result" && window.__lastResult){ snap.result=window.__lastResult; }
    if(oPhase==="nego"){ snap.nego = nego ? {begId:nego.begId, refused:nego.refused.slice(), declined:(nego.declined||[]).slice(), pending:nego.pending, amt:nego.amt||NEG_GIFT, dealing:!!nego.dealing} : null; }
    if(pendingDeal){ snap.deal=pendingDeal; pendingDeal=null; }
    try{ ch.send({ type:"broadcast", event:"snap", payload:snap }); }catch(e){}
    if(isHost) applySnap(snap);   // ホスト自身も同じ描画経路
  }

  // ---- ゲスト受信(ホストも自分のsnapを適用) ----
  function applySnap(s){
    if(!s || s.ver<=lastVer) return;
    lastVer=s.ver;
    // 共有stateを流し込む
    players=s.players.map(p=>({id:p.id,name:p.name,color:p.color,chips:p.chips}));
    theme=s.theme||""; dir=s.dir||"hi"; carry=s.carry||0; round=s.round||0;
    totalRounds=s.totalRounds||totalRounds;
    if(s.timeLimit!=null) timeLimit=s.timeLimit;
    if(s.initChips!=null) initChips=s.initChips;
    repIdx=Math.max(0, players.findIndex(p=>p.id===s.repId));
    // ホストは自分が権威なので上書きしない。ゲストは届いた分だけ反映(数字はレース時のみ届く)
    if(s.numbers) numbers=s.numbers.slice();
    if(s.race) netRace=s.race;
    if(s.bks) lastBks=s.bks;
    if(s.bets) bets=s.bets.map(b=>b?{on:b.on,amt:b.amt}:null);
    if(s.entered) lastEntered=s.entered;
    if(!isHost) picks = s.picks || {};
    oPhase=s.phase;
    if(s.lobby) lastLobby=s.lobby;   // スタンプ色の割り出し用
    if(s.phase!=="race") lastRacedRound=-1;   // レース以外に来たらリセット=次のレースは必ず走る(ロビー/もう一回で前回レースが残るバグ対策)
    if(s.noticeId && s.noticeId>lastNoticeShown){ lastNoticeShown=s.noticeId; if(s.notice){ showToast(s.notice, 2600); if(/脱落/.test(s.notice) && seOn) playSad(); } }   // 無効レース/脱落のお知らせ
    if(s.deal && s.deal.id>lastDealShown){ lastDealShown=s.deal.id; celebrateDeal(s.deal.amt, s.deal.from, s.deal.to, s.deal.fromId===myId); }   // 交渉成立の演出(あげた人は−表示)
    document.getElementById("roundPill").textContent = s.phase==="lobby" ? "ロビー" : ("第"+round+" / "+totalRounds+" レース");
    setDirBadge(s.phase==="enter"||s.phase==="bet"||s.phase==="race"||s.phase==="result");
    renderByPhase(s);
  }
  const myIndex=()=>players.findIndex(p=>p.id===myId);
  let lastEntered=[];   // 直近snapの「数字を入れた人」(ゲストの未出場判定用)
  function renderByPhase(s){
    const on=name=>panels[name].classList.contains("on");   // すでに表示中か(再配信での作り直しを防ぐ)
    // フェーズが結果/総合でなければ、開きっぱなしのオーバーレイを閉じる(次ラウンドへの遷移など)
    if(s.phase!=="result") document.getElementById("resultOverlay").classList.remove("on");
    if(s.phase!=="champ") document.getElementById("champOverlay").classList.remove("on");
    if(s.phase!=="nego"){ document.getElementById("begOverlay").classList.remove("on"); negoBegSeen=null; hideDeclineBtn(); }
    if(s.phase!=="bankrupt") document.getElementById("bankruptOverlay").classList.remove("on");
    if(s.phase==="race"||s.phase==="result"||s.phase==="champ"||s.phase==="lobby") stopDisplayTimer();
    if(s.phase==="lobby"){ renderLobby(s); return; }
    if(s.phase==="bankrupt"){
      document.getElementById("begOverlay").classList.remove("on");
      showWait("…", false);
      document.getElementById("bkName").textContent=(s.bk&&s.bk.name)||"？";
      document.getElementById("bkNext").style.display = isHost ? "" : "none";
      document.getElementById("bankruptOverlay").classList.add("on");
      if(s.bk && s.bk.id && s.bk.id>lastBkShown){ lastBkShown=s.bk.id; if(seOn) playSad(); }
      return;
    }
    if(s.phase==="nego"){
      const neg=s.nego, mi=myIndex();
      if(!neg){ showWait("チップの交渉中…", true); return; }
      // 交渉成立の演出中は全員、他ダイアログを閉じて待機(次のねだるダイアログは演出後に出す)
      if(neg.dealing){ document.getElementById("begOverlay").classList.remove("on"); stopDisplayTimer(); showWait("交渉成立！", false); return; }
      const begName=(players.find(p=>p.id===neg.begId)||{}).name||"だれか";
      const iAmBeggar = (mi>=0 && players[mi].id===neg.begId);
      startDisplayTimer(timeLimit, "nego"+neg.begId);   // 交渉も制限時間に含む(全員に残り時間)
      hideDeclineBtn();
      if(neg.pending===myId){                    // 自分がねだられている→返事ダイアログ
        showWait(begName+" と交渉中…", true);
        showBegOverlay(players[mi], (players.find(p=>p.id===neg.begId)||{name:begName}), (neg.amt||NEG_GIFT), (ok)=>{ document.getElementById("begOverlay").classList.remove("on"); sendAct("begReply",{ok:!!ok}); });
      }else if(iAmBeggar){   // 自分が交渉者
        document.getElementById("begOverlay").classList.remove("on");
        if(negoBegSeen!==neg.begId){ negoBegSeen=neg.begId; negoAmt=NEG_GIFT; }   // 交渉開始時に金額リセット
        if(neg.pending){ showWait("返事を待っています…", true); }
        else{ const refusedSet=new Set((neg.refused||[]).map(id=>idxOfId(id)).filter(x=>x>=0));
          const declinedSet=new Set((neg.declined||[]).map(id=>idxOfId(id)).filter(x=>x>=0));
          renderNegoPanel(idxOfId(neg.begId), refusedSet, (donorIdx)=>sendAct("beg",{to:donorIdx, amt:negoAmt}), ()=>sendAct("retire",{}), declinedSet); }
      }else{                                       // 傍観(ねだられ待ち)
        document.getElementById("begOverlay").classList.remove("on");
        showWait(begName+" がチップを交渉中…", true);
        updateDeclineBtn(neg, mi);
      }
      return;
    }
    if(s.phase==="theme"){
      numDoneRound=-1; betDoneRound=-1; enterGaveUp=-1; betGaveUp=-1;   // 新しいお題(無効レースのやり直し含む)で全リセット
      if(s.repId===myId){
        if(!on("theme")){   // 入力中は作り直さない(入力が消えるのを防ぐ)
          document.getElementById("themeInput").value=randTheme();
          document.querySelectorAll("#themePanel .dir-btn").forEach(b=>b.classList.toggle("sel", b.dataset.dir==="hi"));
          document.querySelector("#themePanel .big-q").innerHTML='<span class="em">'+esc(myName)+'</span>さん、お題を決めよう';
          showPanel("theme"); startTimer(); setTimeout(()=>document.getElementById("themeInput").focus(),60);
        }
      }else{
        const rep=players[repIdx]?players[repIdx].name:"だれか";
        if(!on("wait")||document.getElementById("waitMsg").dataset.k!=="theme"+round){ showWait(esc(rep)+" がお題を考え中…", true); document.getElementById("waitMsg").dataset.k="theme"+round; }
        startDisplayTimer(timeLimit, "theme"+round);   // 待機側にも残り時間を表示
      }
      return;
    }
    if(s.phase==="enter"){
      const mi=myIndex(), gave=(enterGaveUp===round);
      if(mi>=0 && !myNumDoneFor(round) && !gave){
        if(!on("enter")){
          document.getElementById("enterQ").innerHTML='あなた<br>お題を見て数字を入力';
          document.getElementById("secretNote").style.display="none";   // オンラインは各自の端末なので不要
          const inp=document.getElementById("numInput"); inp.value=""; showPanel("enter"); startTimer(); setTimeout(()=>inp.focus(),60);
        }
        renderDoneRoster(document.getElementById("enterDone"), s.entered, "入力ずみ");   // 誰が入力済みか
      }else if(gave){
        showWait("時間切れ…今回のレースは不参加<br>次のレースを待ってね", true);
        startDisplayTimer(timeLimit, "enter"+round);
      }else{
        showWaitProgress("みんなの入力を待っています", s.entered, false);
        startDisplayTimer(timeLimit, "enter"+round);   // 待機側にも残り時間
        if(myNumDoneFor(round)){ const wb=document.getElementById("waitBack"); wb.style.display=""; wb.dataset.ctx="enter"; }   // まだ変更できる
      }
      return;
    }
    if(s.phase==="bet"){
      const mi=myIndex(), gave=(betGaveUp===round);
      const iAmIn = mi>=0 && s.entered && s.entered.includes(myId);   // 数字を入れた人=このレースの参加者
      if(mi>=0 && !iAmIn){ showWait("入力が間に合わず、今回は不参加…<br>次のレースを待っています", true); renderBetLive(document.getElementById("betLiveWait")); return; }
      if(mi>=0 && !myBetDoneFor(round) && !gave){
        if(!on("bet")){
          betIdx=mi; curCand=-1; curBet=MIN_BET; reBet=false;
          gameScene.classList.remove("editing");
          document.getElementById("betGo").textContent="この予想で賭ける";
          document.querySelector("#betPanel .big-q").innerHTML='あなたの予想<br><span class="hint">1位はだれ？</span>';
          document.getElementById("betChips").textContent=players[mi].chips; renderMyChips(mi);
          renderCandidates(mi); updateBetVal(); showPanel("bet"); startTimer();
        }
        renderBetLive(document.getElementById("betLive"));
      }else if(gave){
        showWait("時間切れ…今回は賭けなし<br>レースを待ってね", true);
        startDisplayTimer(timeLimit, "bet"+round);
      }else{
        showWaitProgress("みんなの予想を待っています", s.betDone, true);
        renderBetLive(document.getElementById("betLiveWait"));
        startDisplayTimer(timeLimit, "bet"+round);   // 待機側にも残り時間
        if(myBetDoneFor(round)){ const wb=document.getElementById("waitBack"); wb.style.display=""; wb.dataset.ctx="bet"; }   // まだ変更できる
      }
      return;
    }
    if(s.phase==="race"){
      if(lastRacedRound!==round){ lastRacedRound=round; startRace(); }
      else { showPanel("race"); if(!document.getElementById("poolView").innerHTML) renderPoolView(); }   // 保険: 再配信で画面がズレても必ずレース画面を出す
      return;
    }
    if(s.phase==="result"){
      if(s.result && !document.getElementById("resultOverlay").classList.contains("on")){
        showResult(s.result.best, s.result.set, s.result.someoneWon, s.result.deltas); tuneResultButtons();
      }
      return;
    }
    if(s.phase==="champ"){
      if(!document.getElementById("champOverlay").classList.contains("on")){
        document.getElementById("resultOverlay").classList.remove("on"); showChampion(); tuneChampButtons();
      }
      return;
    }
  }
  // 自分がこのラウンドで送信済みか(snapのentered/betDoneでも判定できるが、送信直後の即時反映用)
  let numDoneRound=-1, betDoneRound=-1, enterGaveUp=-1, betGaveUp=-1;
  function myNumDoneFor(r){ return numDoneRound===r; }
  function myBetDoneFor(r){ return betDoneRound===r; }

  function renderLobbyCode(){
    const box=document.getElementById("lobbyCode");
    if(box.dataset.code===code) return;
    box.dataset.code=code;
    box.innerHTML='<div class="room-note">合言葉（'+(window.__TAPW||"タップ")+'でコピー）</div>'
      +'<div class="code-show" id="lobbyCodeShow"><svg class="cs-copy" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"/></svg><span class="cs-code">'+code+'</span></div>';
    document.getElementById("lobbyCodeShow").addEventListener("click", async ()=>{
      try{ await navigator.clipboard.writeText(code); showToast("合言葉をコピーした"); }catch(e){}
    });
  }
  function renderLobbyRounds(cnt){
    const box=document.getElementById("lobbyRounds");
    if(isHost){
      if(box.dataset.built!=="host"){
        box.dataset.built="host";
        box.innerHTML='<div class="rule-frame">'
          +'<div class="rule-col"><div class="rl">レース数</div><div class="rounds-row"><button class="stp-btn" data-rd="-1">−</button><div class="rv"><b class="rVal">'+totalRounds+'</b></div><button class="stp-btn" data-rd="1">＋</button></div></div>'
          +'<div class="rule-col"><div class="rl">制限時間</div><div class="rounds-row"><button class="stp-btn" data-tm="-1">−</button><div class="rv"><b class="tVal">'+fmtTime(timeLimit)+'</b></div><button class="stp-btn" data-tm="1">＋</button></div></div>'
          +'<div class="rule-col"><div class="rl">初期チップ</div><div class="rounds-row"><button class="stp-btn" data-ic="-10">−</button><div class="rv"><b class="icVal">'+initChips+'</b></div><button class="stp-btn" data-ic="10">＋</button></div></div>'
          +'</div>'
          +'<button class="rec-btn" id="lobbyRec">初期設定に戻す</button>';
        wireRoundStepper(box);
        document.getElementById("lobbyRec").addEventListener("click",()=>{ ensureAudio(); playSelect();
          resetRules(); if(oPhase==="lobby") broadcastSnap(); });
      }
      renderRounds(); renderTime(); renderInit();
    }else{
      box.dataset.built="guest";
      box.innerHTML='<div class="lr-ro">レース数：'+totalRounds+' ／ 制限：'+fmtTime(timeLimit)+' ／ 初期'+initChips+'枚</div>';
    }
  }
  function renderLobby(s){
    showPanel("lobby");
    renderLobbyCode();
    const roster=(s.lobby||[]);
    const list=document.getElementById("lobbyList"); list.innerHTML="";
    roster.forEach((m,i)=>{
      const row=document.createElement("div"); row.className="lobby-row";
      const col=COLORS[i%COLORS.length];
      row.innerHTML='<span class="p-dot" style="'+dotStyle(col)+'"></span><span class="lr-nm">'+esc(m.name)+'</span>'+(m.host?'<span class="lr-host">部屋主</span>':'')+(m.id===myId?'<span class="lr-you">じぶん</span>':'');
      list.appendChild(row);
    });
    const cnt=roster.length;
    renderLobbyRounds(cnt);
    if(isHost){
      document.getElementById("lobbyHint").textContent=cnt<MINP?"2人以上集まったら出走できます":"みんな集まった？ 出走できます";
      { const ls=document.getElementById("lobbyStart"); ls.style.display=""; ls.disabled=cnt<MINP; }   // 最初から見せて、人数不足はグレーアウト
    }else{
      document.getElementById("lobbyHint").textContent="ホストの開始を待っています…";
      document.getElementById("lobbyStart").style.display="none";
    }
  }

  document.getElementById("lobbyStart").addEventListener("click",()=>{ ensureAudio(); playConfirm(); if(isHost) oStartGame(); });
  function showLobbyWaiting(){ showPanel("lobby"); renderLobbyCode(); renderLobbyRounds(0); document.getElementById("lobbyHint").textContent="部屋に入りました。ホストの開始を待っています…"; document.getElementById("lobbyStart").style.display="none"; document.getElementById("lobbyList").innerHTML=""; }
  document.getElementById("lobbyBack").addEventListener("click",()=>{ ensureAudio(); playSelect(); goTitle(); });

  // 待機画面
  function showWait(msg, dots){ stopTimer(); showPanel("wait"); document.getElementById("waitMsg").innerHTML=msg; document.getElementById("waitProg").textContent=""; document.getElementById("waitWho").innerHTML=""; document.getElementById("betLiveWait").innerHTML=""; document.getElementById("waitMsg").className="big-q"; document.getElementById("waitBack").style.display="none"; }
  // 入力済みロスター(数字入力中に表示)
  function renderDoneRoster(el, doneIds, label){
    if(!el) return;
    const done=new Set(doneIds||[]);
    const sig=label+":"+players.map(p=>p.id+(done.has(p.id)?"1":"0")).join(",");
    if(el._sig===sig) return; el._sig=sig;
    let html='<div class="bl-head">'+label+' '+done.size+' / '+players.length+'</div><div class="dr-chips">';
    players.forEach(p=>{ html+='<span class="wait-chip'+(done.has(p.id)?" done":"")+'"><span class="p-dot" style="'+dotStyle(p.color)+'"></span>'+esc(p.name)+'</span>'; });
    el.innerHTML=html+'</div>';
  }
  function showWaitProgress(msg, doneIds, isBet){
    stopTimer();
    showPanel("wait");
    document.getElementById("waitBack").style.display="none";
    document.getElementById("waitMsg").textContent=msg;
    if(!isBet) document.getElementById("betLiveWait").innerHTML="";
    const done=new Set(doneIds||[]);
    document.getElementById("waitProg").textContent=done.size+" / "+players.length+" 人";
    const who=document.getElementById("waitWho"); who.innerHTML="";
    players.forEach(p=>{
      const c=document.createElement("span"); c.className="wait-chip"+(done.has(p.id)?" done":"");
      c.innerHTML='<span class="p-dot" style="'+dotStyle(p.color)+'"></span>'+esc(p.name);
      who.appendChild(c);
    });
  }

  // 結果/総合のボタンを、オンラインでは操作権を持つ人だけに
  function tuneResultButtons(){
    const next=document.getElementById("nextBtn"), end=document.getElementById("endBtn");
    if(mode!=="online"){ next.style.display=""; end.style.display=""; return; }
    next.style.display=isHost?"":"none"; end.style.display=isHost?"":"none";
  }
  function tuneChampButtons(){
    const again=document.getElementById("champAgain"), home=document.getElementById("champHome");
    if(mode==="online"){
      home.textContent="ロビーに戻る"; home.style.display=isHost?"":"none";
      again.style.display=isHost?"":"none";
    }else{
      home.textContent="タイトルへ"; home.style.display=""; again.style.display="";
    }
  }

  // ---- ゲスト→ホスト 送信(ack再送) ----
  function sendAct(kind, data){
    if(kind==="num") numDoneRound=round;
    if(kind==="bet") betDoneRound=round;
    if(isHost){ localAct(kind,data); return; }   // ホストは自分で処理
    const aid=myId+":"+(actSeq++);
    const payload=Object.assign({aid, id:myId, kind}, data);
    const send=()=>{ if(!ch) return; try{ ch.send({ type:"broadcast", event:"act", payload }); }catch(e){} };
    send();
    pendingActs[aid]={ payload, timer:setInterval(send, 1200) };
  }
  function ackAct(aid){ if(ch && aid){ try{ ch.send({ type:"broadcast", event:"actack", payload:{aid} }); }catch(e){} } }
  // 仮選択(確定前)の送信。ackなし・最新優先(ロストしても実害なし)
  function sendPick(on){
    const amt=Math.max(0, Math.min(curBet, betterChips()));   // 今選んでいる金額も一緒に共有
    if(isHost){ onAct({id:myId, kind:"pick", on, amt}); return; }
    if(!ch) return; try{ ch.send({ type:"broadcast", event:"act", payload:{id:myId, kind:"pick", on, amt} }); }catch(e){}
  }
})();
</script>
<script>document.addEventListener("focusin",function(e){var t=e.target;if(t&&t.tagName==="INPUT"&&t.value){setTimeout(function(){try{t.select();}catch(_){}},0);}});(function(){var tap=(window.matchMedia&&matchMedia("(pointer:coarse)").matches)?"タップ":"クリック";window.__TAPW=tap;function run(){var w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);var n;while(n=w.nextNode()){var v=n.nodeValue;if(v&&(v.indexOf("タップ")>=0||v.indexOf("タッチ")>=0))n.nodeValue=v.split("タッチ").join(tap).split("タップ").join(tap);}}if(document.readyState!=="loading")run();else document.addEventListener("DOMContentLoaded",run);})();</script>
