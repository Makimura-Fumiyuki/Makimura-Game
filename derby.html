<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俺たちダービー</title>
<meta name="apple-mobile-web-app-title" content="俺たちダービー">
<meta name="application-name" content="俺たちダービー">
<meta name="description" content="パドックを走るのは馬じゃない、俺たちだ！お題に数字で答え、誰が1位かをチップで予想するパーティ賭けゲーム。1台をみんなで回して遊べます。">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@700;800;900&display=swap');
  :root{
    --bg:#f4f1e9;
    --ink:#22241f;
    --turf:#1f9bdc;
    --turf-dark:#127bb4;
    --rail:#f5f2ea;
    --gold:#f2b035;
    --gold-dark:#d0900f;
    --red:#e3452f;
    --fnum:"M PLUS Rounded 1c","Noto Sans JP","Hiragino Sans",sans-serif;   /* 数字・値用のサブフォント(丸ゴシックで太く見やすく) */
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  /* 数字・値はサブフォント(丸ゴシック・太め) */
  .code-show .cs-code, .wait-prog, .num-input, .bet-amount .ba-val, .my-chips b,
  .rounds-row .rv, .timer, .rb-delta, .rr2-num, .pool-col .pc-amt, .chk-row .chk-amt,
  .bet-live .bl-amt, .rank-row .rk, .rank-row .rr-chips, .runner .r-num, .lr-ro{ font-family:var(--fnum) !important; font-weight:800; }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, rgba(255,255,255,.7), transparent 55%),
      radial-gradient(ellipse 100% 60% at 50% 115%, rgba(31,155,220,.12), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;
    position:relative; height:100svh; overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }

  /* ===== 画面切り替え ===== */
  .scene{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    opacity:0; pointer-events:none; transform:translateY(16px);
    transition:opacity .3s linear, transform .3s cubic-bezier(.2,.8,.3,1);
    overflow-y:auto; scrollbar-width:none;
  }
  .scene::-webkit-scrollbar{ display:none; }
  .scene.on{ opacity:1; pointer-events:auto; transform:translateY(0); }

  /* ===== タイトル ===== */
  #titleScene{ padding:13vh 20px 150px; gap:38px; }
  .t-main{
    font-size:clamp(38px, 10vw, 74px); font-weight:900; letter-spacing:.02em; line-height:1.2;
    color:var(--ink); text-shadow:0 2px 0 rgba(255,255,255,.7); text-align:center; white-space:nowrap;
  }
  .t-main .em{ color:var(--red); }
  .t-sub{ font-size:clamp(13px,3.6vw,17px); opacity:.72; letter-spacing:.1em; font-weight:700; text-align:center; margin-top:14px; }
  .sec-label{ font-size:14px; letter-spacing:.4em; text-indent:.4em; opacity:.6; text-align:center; margin-bottom:12px; font-weight:900; }

  .card-box{
    background:#fff; border-radius:16px; box-shadow:0 4px 16px rgba(34,36,31,.1);
    padding:22px 20px 20px; width:min(94vw, 440px);
  }
  .players-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  .p-row{ display:flex; align-items:center; gap:10px; }
  .p-dot{ width:26px; height:26px; border-radius:50%; flex:none; box-shadow:inset 0 2px 3px rgba(255,255,255,.4), 0 1px 3px rgba(0,0,0,.25); }
  .p-input{
    flex:1 1 0; min-width:0; font-family:inherit; font-size:17px; font-weight:700; color:var(--ink);
    padding:10px 12px; border:1.8px solid rgba(34,36,31,.25); border-radius:10px; background:#fff; outline:none;
  }
  .p-input:focus{ border-color:var(--turf); }
  .p-del{ flex:none; width:34px; height:34px; border:none; border-radius:9px; cursor:pointer;
    background:rgba(34,36,31,.08); color:rgba(34,36,31,.5); font-size:20px; font-weight:900; line-height:1; }
  .p-del:active{ transform:translateY(1px); }
  .p-add{
    width:100%; padding:11px; border:1.8px dashed rgba(31,155,220,.5); border-radius:10px; cursor:pointer;
    background:rgba(31,155,220,.06); color:var(--turf-dark); font-family:inherit; font-size:15px; font-weight:700;
  }
  .p-add:disabled{ opacity:.4; cursor:default; }

  /* モード選択 */
  .mode-row{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; width:min(94vw,440px); }
  .mode-btn{
    flex:1 1 0; min-width:150px; padding:18px 10px 15px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-weight:900; font-size:17px; letter-spacing:.06em; color:#fff; text-align:center;
    background:linear-gradient(160deg,#5cc0f0,var(--turf) 55%,var(--turf-dark)); border:none; border-radius:14px;
    box-shadow:0 4px 0 #0f6396, 0 7px 14px rgba(18,123,180,.34);
    transition:transform .14s cubic-bezier(.3,1.4,.5,1);
  }
  .mode-btn small{ display:block; margin-top:5px; font-size:11.5px; font-weight:700; opacity:.85; }
  .mode-btn:active{ transform:translateY(2px); box-shadow:0 2px 0 #0f6396; }
  .mode-btn.sel{ outline:4px solid var(--gold); outline-offset:2px; }
  .mode-btn.sm{ font-size:16px; padding:14px 8px 12px; }
  .setup-block{ display:none; flex-direction:column; align-items:center; gap:22px; }
  .setup-block.on{ display:flex; animation:panelIn .3s cubic-bezier(.2,.9,.3,1); }
  .room-btns{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .room-area{ display:flex; flex-direction:column; align-items:center; gap:12px; min-height:36px; text-align:center; }
  .code-show{ display:inline-flex; align-items:center; gap:12px; background:#fff; border:2.5px solid var(--turf); border-radius:12px; padding:8px 20px 10px 16px; cursor:pointer; }
  .code-show .cs-copy{ width:24px; height:24px; flex:none; fill:none; stroke:var(--turf); stroke-width:2; }
  .code-show .cs-code{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:900; font-size:40px; letter-spacing:.28em; text-indent:.28em; color:var(--turf-dark); }
  .code-row{ display:flex; align-items:center; gap:6px; }
  .paste-btn{ flex:none; display:flex; align-items:center; justify-content:center; cursor:pointer; padding:4px; background:none; border:none; color:var(--turf); }
  .paste-btn svg{ width:26px; height:26px; }
  .paste-btn:active{ transform:translateY(1px); }
  .code-input{ width:220px; padding:10px 6px; text-align:center; font-family:inherit; font-weight:900; font-size:26px; letter-spacing:.24em; text-indent:.24em; text-transform:uppercase; color:var(--ink); background:#fff; border:2px solid rgba(34,36,31,.4); border-radius:8px; outline:none; caret-color:var(--ink); }
  .room-note{ font-size:13.5px; font-weight:700; opacity:.75; letter-spacing:.06em; }
  .room-note.err{ color:var(--red); opacity:1; }
  @keyframes waitDots{ 0%,100%{ opacity:.4; } 50%{ opacity:1; } }
  .room-wait{ animation:waitDots 1.5s ease-in-out infinite; }

  /* ロビー / 待機 */
  .lobby-code{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .lobby-code:empty{ display:none; }
  #lobbyBack{ margin-top:2px; opacity:.72; }
  .lobby-list{ display:flex; flex-direction:column; gap:9px; width:min(94vw,400px); }
  .lobby-row{ display:flex; align-items:center; gap:10px; background:#fff; border-radius:10px; padding:9px 14px; }
  .lobby-row .p-dot{ width:24px; height:24px; }
  .lobby-row .lr-nm{ flex:1 1 0; font-weight:900; text-align:left; }
  .lobby-row .lr-host{ font-size:11px; font-weight:700; color:var(--gold-dark); background:rgba(242,176,53,.16); border-radius:999px; padding:2px 9px 3px; }
  .wait-prog{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:900; font-size:20px; color:var(--turf-dark); }
  .wait-who{ display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
  .wait-chip{ display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:700; background:#fff; border-radius:999px; padding:4px 11px 5px; opacity:.5; }
  .wait-chip.done{ opacity:1; background:rgba(31,155,220,.14); color:var(--turf-dark); }
  .enter-done{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .enter-done:empty{ display:none; }
  .enter-done .dr-chips{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .back-btn{ opacity:.75; }
  /* 全員のかけ確認(1台) */
  .chk-list{ display:flex; flex-direction:column; gap:8px; width:100%; }
  .chk-row{ display:flex; align-items:center; gap:8px; background:#fff; border-radius:11px; padding:10px 13px; font-size:15px; font-weight:700; cursor:pointer; }
  .chk-row:active{ transform:scale(.99); }
  .chk-row .p-dot{ width:20px; height:20px; }
  .chk-row .chk-nm{ font-weight:900; }
  .chk-row .chk-arrow{ opacity:.45; font-weight:900; }
  .chk-row .chk-amt{ margin-left:auto; color:var(--gold-dark); font-weight:900; display:flex; align-items:center; gap:4px; white-space:nowrap; }
  .chk-row .chk-none{ margin-left:auto; color:var(--red); font-weight:900; }
  .wait-chip .p-dot{ width:14px; height:14px; }
  /* 賭け中のオッズ表示 */
  .cand .c-odds{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:13px; color:var(--gold-dark); margin-left:auto; }

  /* 大きめボタン(シリーズ共通のノリ) */
  .btn-main{
    padding:15px 44px 17px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-size:22px; font-weight:900; letter-spacing:.16em; text-indent:.16em; color:#fff;
    background:linear-gradient(150deg, #ff6a4d, var(--red) 60%, #c5361f);
    border:none; border-radius:14px; box-shadow:0 5px 0 #a82c17, 0 9px 18px rgba(227,69,47,.35);
  }
  .btn-main:active{ transform:translateY(3px); box-shadow:0 2px 0 #a82c17; }
  .btn-main:disabled{ filter:grayscale(.6) brightness(.9); box-shadow:0 5px 0 #7a7a72; cursor:default; }
  .btn-gold{
    padding:15px 44px 17px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-size:22px; font-weight:900; letter-spacing:.16em; text-indent:.16em; color:#3a2c05;
    background:linear-gradient(150deg, #ffd166, var(--gold) 60%, #dc9c14);
    border:none; border-radius:14px; box-shadow:0 5px 0 var(--gold-dark), 0 9px 18px rgba(210,144,20,.35);
  }
  .btn-gold:active{ transform:translateY(3px); box-shadow:0 2px 0 var(--gold-dark); }
  .btn-gold:disabled{ filter:grayscale(.55) brightness(.95); box-shadow:0 5px 0 #9a9a90; cursor:default; }
  .txt-btn{
    padding:9px 22px; cursor:pointer; font-family:inherit; font-size:15px; font-weight:700; letter-spacing:.1em;
    color:var(--ink); background:rgba(255,255,255,.8); white-space:nowrap;
    border:1.6px solid rgba(34,36,31,.3); border-radius:9px;
  }
  .txt-btn:active{ transform:translateY(1px); }

  /* ===== 進行画面(ラウンド) ===== */
  #gameScene{ padding:19vh 16px 80px; gap:0; justify-content:flex-start; }
  .panel{ display:none; flex-direction:column; align-items:center; gap:20px; width:min(96vw, 480px); }
  .panel.on{ display:flex; animation:panelIn .32s cubic-bezier(.2,.9,.3,1); }
  @keyframes panelIn{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:translateY(0); } }

  .top-bar{
    position:fixed; top:clamp(12px,4.5vh,40px); left:50%; transform:translateX(-50%); z-index:20;
    display:none; align-items:center; gap:8px; max-width:96vw; flex-wrap:wrap; justify-content:center;
  }
  #gameScene.on ~ .top-bar{ display:flex; }
  .round-pill{
    font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:14px; font-weight:700; letter-spacing:.1em; color:var(--turf-dark);
    background:rgba(255,255,255,.85); border:1.6px solid var(--turf); border-radius:999px; padding:5px 16px 6px; white-space:nowrap;
  }
  .dir-badge{
    display:none; align-items:center; gap:6px; font-size:13px; font-weight:900; letter-spacing:.04em;
    border-radius:999px; padding:5px 14px 6px; white-space:nowrap; color:#fff;
  }
  .dir-badge svg{ width:15px; height:15px; flex:none; }
  .dir-badge.hi{ background:linear-gradient(150deg,#ff7a5f,var(--red)); box-shadow:0 2px 6px rgba(227,69,47,.35); }
  .dir-badge.lo{ background:linear-gradient(150deg,#41b4ec,var(--turf-dark)); box-shadow:0 2px 6px rgba(18,123,180,.4); }
  .timer{ position:fixed; top:calc(clamp(12px,4.5vh,40px) + 42px); left:50%; transform:translateX(-50%); z-index:19;
    display:inline-flex; align-items:center; gap:6px; font-size:15px; font-weight:800; letter-spacing:.02em; color:#3a2c05;
    background:linear-gradient(150deg,#ffe08a,var(--gold) 70%,#e6a51c); border:none; border-radius:999px; padding:5px 15px 6px; white-space:nowrap;
    box-shadow:0 2px 7px rgba(210,144,20,.45); }
  .timer svg{ width:15px; height:15px; flex:none; }
  .timer.urgent{ color:#fff; background:var(--red); box-shadow:0 2px 9px rgba(227,69,47,.55); animation:tPulse .5s ease-in-out infinite; }
  @keyframes tPulse{ 0%,100%{ transform:translateX(-50%) scale(1); } 50%{ transform:translateX(-50%) scale(1.12); } }
  .big-q{ font-size:clamp(20px,5.4vw,26px); font-weight:900; text-align:center; letter-spacing:.04em; line-height:1.45; }
  .big-q .em{ color:var(--red); }
  .hint{ font-size:13px; opacity:.62; font-weight:700; letter-spacing:.06em; text-align:center; }

  /* お題入力(テキスト欄。ボタンと区別できる見た目) */
  .field-wrap{ position:relative; width:100%; }
  .field-tag{ position:absolute; left:14px; top:-10px; z-index:1; background:var(--turf); color:#fff;
    font-size:11px; font-weight:900; letter-spacing:.1em; padding:2px 11px 3px; border-radius:999px; }
  .theme-row{ display:flex; align-items:stretch; gap:8px; width:100%; }
  .omakase-btn{ flex:none; padding:0 14px; border:none; border-radius:12px; cursor:pointer; font-family:inherit; font-weight:900; font-size:14px; letter-spacing:.04em; white-space:nowrap;
    color:#fff; background:linear-gradient(150deg,#5cc0f0,var(--turf) 60%,var(--turf-dark)); box-shadow:0 3px 0 #0f6396; touch-action:manipulation; }
  .omakase-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0f6396; }
  .theme-input{
    flex:1 1 0; min-width:0; font-family:inherit; font-size:20px; font-weight:700; text-align:center; color:var(--ink);
    padding:16px 12px 14px; border:2px dashed rgba(34,36,31,.3); border-radius:12px; background:#fbfaf6; outline:none;
    box-shadow:inset 0 2px 5px rgba(34,36,31,.09);
  }
  .theme-input:focus{ border-style:solid; border-color:var(--turf); background:#fff; }
  /* 勝敗の決め方(トグルボタン。押せるとわかる立体感) */
  .dir-row{ display:flex; gap:12px; width:100%; }
  .dir-btn{
    flex:1 1 0; padding:13px 8px 14px; cursor:pointer; border-radius:12px; font-family:inherit; font-weight:900; font-size:16px;
    color:var(--ink); background:linear-gradient(#ffffff,#efece3); border:2px solid rgba(34,36,31,.16);
    box-shadow:0 3px 0 rgba(34,36,31,.18); text-align:center; line-height:1.3; transition:transform .1s, box-shadow .1s;
  }
  .dir-btn .dir-ic{ width:17px; height:17px; vertical-align:-3px; margin-right:5px; }
  .dir-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(34,36,31,.18); }
  .dir-btn.sel{ background:linear-gradient(150deg,#ffdd82,var(--gold) 70%,#e6a51c); border-color:var(--gold-dark);
    color:#3a2c05; box-shadow:0 3px 0 var(--gold-dark); }

  /* 秘密の数字入力 */
  .num-input{
    width:min(80vw,320px); font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:900; font-size:44px; text-align:center; color:var(--turf-dark);
    padding:12px; border:2.5px solid var(--turf); border-radius:14px; background:#fff; outline:none; letter-spacing:.06em;
    -moz-appearance:textfield; appearance:textfield;
  }
  .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .secret-note{ font-size:12.5px; color:var(--red); font-weight:900; letter-spacing:.06em; }

  /* 賭け: 候補リスト */
  .cand-list{ display:flex; flex-direction:column; gap:9px; width:100%; }
  .cand{
    display:flex; align-items:center; gap:11px; cursor:pointer;
    padding:11px 14px; border-radius:12px; background:#fff; border:2px solid rgba(34,36,31,.15);
  }
  .cand.sel{ border-color:var(--gold); background:rgba(242,176,53,.12); }
  .cand .p-dot{ width:24px; height:24px; }
  .cand .c-nm{ flex:1 1 0; font-weight:900; font-size:17px; }
  .cand .c-me{ font-size:11px; font-weight:700; color:var(--turf-dark); background:rgba(31,155,220,.14); border-radius:999px; padding:2px 9px 3px; }
  .bet-amount{ display:flex; align-items:center; gap:7px; justify-content:center; flex-wrap:nowrap; }
  .bet-amount .ba-btn{ min-width:44px; height:46px; padding:0 7px; border:none; border-radius:11px; cursor:pointer; font-size:18px; font-weight:900; color:#fff;
    background:linear-gradient(150deg,#ffd166,var(--gold) 60%,#dc9c14); box-shadow:0 3px 0 var(--gold-dark); line-height:1;
    font-family:inherit; white-space:nowrap; touch-action:manipulation; -webkit-user-select:none; user-select:none; }
  .bet-amount .ba-btn.ba-wide{ min-width:52px; }
  .bet-amount .ba-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--gold-dark); }
  .bet-amount .ba-btn.dim{ opacity:.3; pointer-events:none; box-shadow:0 3px 0 #9a9a90; }
  .bet-amount .ba-val{ min-width:72px; text-align:center; font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:900; font-size:30px; color:var(--gold-dark); }
  .bet-allin{ font-size:13px; font-weight:800; letter-spacing:.08em; color:var(--red); background:none; border:none; cursor:pointer; text-decoration:underline; font-family:inherit; }
  .my-chips{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:16px; color:var(--ink); }
  .my-chips b{ color:var(--gold-dark); font-size:20px; }

  /* ===== レース ===== */
  .track{
    position:relative; width:min(96vw,480px); background:linear-gradient(180deg,#43a866,#3a9e5c 60%,#2c7d47);
    border-radius:12px; border:5px solid #fff; box-shadow:0 8px 22px rgba(34,36,31,.28), inset 0 0 24px rgba(0,0,0,.14);
    overflow:hidden;
  }
  .lane{ position:relative; height:46px; border-bottom:1px dashed rgba(255,255,255,.35); }
  .track.compact .r-dot{ width:22px; height:22px; font-size:11px; }
  .track.compact .runner .r-num{ font-size:12px; bottom:22px; }
  .runner.cheer .r-dot{ box-shadow:0 0 0 3px var(--gold), 0 0 10px rgba(242,176,53,.8), inset 0 2px 4px rgba(255,255,255,.45), 0 2px 5px rgba(0,0,0,.3); }
  .cheer-tag{ position:absolute; top:100%; left:50%; transform:translateX(-50%); margin-top:2px; z-index:4;
    font-size:9px; font-weight:900; color:#3a2c05; background:var(--gold); border-radius:6px; padding:0 5px 1px; white-space:nowrap; box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .lane:last-child{ border-bottom:none; }
  .goal{ position:absolute; top:0; bottom:0; right:22px; width:6px; z-index:1;
    background:repeating-linear-gradient(45deg,#fff 0 6px,#111 6px 12px); opacity:.85; }
  .goal-tape{ position:absolute; top:0; bottom:0; right:24px; width:3px; background:var(--red); z-index:4;
    box-shadow:0 0 8px rgba(227,69,47,.6); transition:transform .3s ease, opacity .3s ease; transform-origin:top; }
  .goal-tape.broken{ transform:scaleY(1.15) rotate(4deg); opacity:0; }
  .runner{
    position:absolute; left:4px; top:50%; transform:translate(0,-50%);
    display:flex; align-items:center; gap:6px; z-index:3; will-change:left;
  }
  .runner .r-dot{
    width:32px; height:32px; border-radius:50%; flex:none; position:relative;
    box-shadow:inset 0 2px 4px rgba(255,255,255,.45), 0 2px 4px rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:14px;
  }
  .runner .r-num{
    position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:15px; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.6);
    white-space:nowrap; opacity:0; transition:opacity .2s linear;
  }
  .runner .r-num.show{ opacity:1; }
  .runner.win .r-dot{ animation:winBob .5s ease-in-out infinite; box-shadow:0 0 0 3px var(--gold), inset 0 2px 4px rgba(255,255,255,.45), 0 3px 6px rgba(0,0,0,.3); }
  @keyframes winBob{ 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-3px) scale(1.08); } }

  .burst{ position:fixed; border-radius:2px; z-index:60; pointer-events:none;
    animation:burstFly 1.6s cubic-bezier(.2,.7,.4,1) forwards; }
  @keyframes burstFly{ 0%{ transform:translate(0,0) rotate(0); opacity:1; } 100%{ transform:translate(var(--bx,0),var(--by,-260px)) rotate(540deg); opacity:0; } }
  .confetti{ position:fixed; top:-14px; z-index:62; pointer-events:none; border-radius:2px; animation:confFall linear forwards; }
  @keyframes confFall{ 0%{ transform:translateY(0) rotate(0); opacity:1; } 100%{ transform:translateY(112vh) rotate(var(--rot,540deg)); opacity:.15; } }

  /* ===== オーバーレイ(交代/結果/確認/あそびかた) ===== */
  #handoffOverlay, #resultOverlay, #confirmOverlay, #helpOverlay, #champOverlay{
    position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center;
    background:rgba(24,26,22,.5); opacity:0; pointer-events:none; transition:opacity .3s linear;
  }
  #handoffOverlay.on, #resultOverlay.on, #confirmOverlay.on, #helpOverlay.on, #champOverlay.on{ opacity:1; pointer-events:auto; }
  .r-card{
    display:flex; flex-direction:column; align-items:center; gap:18px;
    background:var(--bg); border-radius:18px; border-top:10px solid var(--turf);
    box-shadow:0 18px 44px rgba(20,22,18,.4);
    padding:28px 24px 24px; width:min(90vw, 440px); text-align:center;
    transform:scale(.6); opacity:0; transition:transform .3s cubic-bezier(.3,1.4,.5,1), opacity .25s linear;
  }
  #handoffOverlay.on .r-card, #resultOverlay.on .r-card, #confirmOverlay.on .r-card, #helpOverlay.on .r-card, #champOverlay.on .r-card{ transform:scale(1); opacity:1; }
  .r-title{ font-size:clamp(22px,6vw,32px); font-weight:900; letter-spacing:.08em; }
  .r-title.win{ color:var(--red); }
  .r-title.res-hit{ color:var(--gold-dark); }
  .r-title.res-miss{ color:rgba(34,36,31,.5); }
  .ho-name{ font-size:clamp(28px,8vw,44px); font-weight:900; color:var(--turf-dark); }
  .ho-dot{ width:40px; height:40px; border-radius:50%; box-shadow:inset 0 2px 4px rgba(255,255,255,.4), 0 2px 5px rgba(0,0,0,.25); }
  .r-card .sub-btns{ display:flex; gap:14px; width:100%; }
  .r-card .txt-btn, .r-card .btn-main, .r-card .btn-gold{ flex:1 1 0; min-width:0; }

  /* 結果の配当リスト */
  .pay-list{ width:100%; display:flex; flex-direction:column; gap:7px; }
  .pay-row{ display:flex; align-items:center; gap:9px; font-size:15px; }
  .pay-row .p-dot{ width:20px; height:20px; }
  .pay-row .pr-nm{ flex:1 1 0; text-align:left; font-weight:700; }
  .pay-row .pr-delta{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:700; }
  .pr-delta.plus{ color:var(--turf-dark); }
  .pr-delta.minus{ color:var(--red); opacity:.8; }
  .result-head{ font-size:14px; font-weight:700; opacity:.7; }
  .carry-note{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:15px; color:var(--gold-dark); }

  /* 順位(チャンピオン) */
  .rank-list{ width:100%; display:flex; flex-direction:column; gap:8px; }
  .rank-row{ display:flex; align-items:center; gap:10px; font-size:17px; padding:8px 12px; border-radius:10px; background:#fff; }
  .rank-row.first{ background:linear-gradient(150deg,#fff5da,#ffe9a8); box-shadow:0 2px 8px rgba(210,144,20,.25); }
  .rank-row .rk{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-size:18px; width:34px; color:var(--gold-dark); }
  .rank-row .p-dot{ width:22px; height:22px; }
  .rank-row .rr-nm{ flex:1 1 0; font-weight:900; text-align:left; }
  .rank-row .rr-chips{ font-family:"Noto Sans JP","Hiragino Sans",sans-serif; color:var(--ink); }

  /* レース数・制限時間ステッパー */
  .rule-frame{ display:flex; gap:22px; justify-content:center; flex-wrap:wrap; align-items:flex-start;
    background:rgba(255,255,255,.55); border:2px solid rgba(31,155,220,.35); border-radius:16px; padding:14px 22px 16px; }
  .rule-col{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .rounds-box{ display:flex; flex-direction:column; align-items:center; gap:10px; }
  .rounds-row{ display:flex; align-items:center; justify-content:center; gap:14px; }
  .rounds-box .rl{ font-size:13px; font-weight:900; letter-spacing:.3em; text-indent:.3em; opacity:.6; }
  .stp-btn{ width:42px; height:42px; border:none; border-radius:12px; cursor:pointer; font-size:24px; font-weight:900; color:#fff; line-height:1;
    background:linear-gradient(150deg,#5cc0f0,var(--turf) 60%,var(--turf-dark)); box-shadow:0 3px 0 #0f6396;
    touch-action:manipulation; -webkit-user-select:none; user-select:none; }
  .stp-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0f6396; }
  .stp-btn.dim{ opacity:.3; pointer-events:none; }
  .rounds-row .rv{ min-width:64px; text-align:center; font-weight:900; color:var(--turf-dark); }
  .rounds-row .rv b{ font-size:34px; }
  /* ロビーのレース数 / 名前入力 */
  .lobby-rounds{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .lobby-rounds:empty{ display:none; }
  .lobby-rounds .rec-btn{ background:none; border:none; cursor:pointer; font-family:inherit; font-weight:900; font-size:13px;
    color:var(--turf-dark); text-decoration:underline; text-underline-offset:3px; letter-spacing:.02em; }
  .lobby-rounds .rec-btn:active{ opacity:.7; }
  .lobby-rounds .lr-ro{ font-size:15px; font-weight:900; color:var(--turf-dark); letter-spacing:.08em; }
  .name-block{ display:flex; flex-direction:column; align-items:center; gap:12px; width:min(94vw,440px); }
  .online-name{ width:min(80vw,320px); text-align:center; font-size:22px; padding:14px 12px; letter-spacing:.04em; }

  /* +/- グレーアウト */
  .bet-amount .ba-btn.dim{ opacity:.3; pointer-events:none; box-shadow:0 3px 0 #9a9a90; }

  /* 賭けライブ表示(誰が誰に) */
  .bet-live{ display:flex; flex-direction:column; gap:6px; width:100%; }
  .bet-live:empty{ display:none; }
  .bl-head{ font-size:11px; font-weight:900; letter-spacing:.2em; opacity:.55; text-align:center; }
  .bet-live.undoable .bl-row{ cursor:pointer; }
  .bet-live.undoable .bl-row:active{ transform:scale(.98); }
  .bl-undo{ margin-left:6px; font-size:10.5px; font-weight:900; color:var(--red); opacity:.75; }
  .bet-live .bl-row{ display:flex; align-items:center; gap:7px; font-size:13.5px; font-weight:700;
    background:rgba(255,255,255,.72); border-radius:9px; padding:6px 11px; }
  .bet-live .bl-row.pick{ opacity:.72; background:rgba(255,255,255,.5); border:1.5px dashed rgba(34,36,31,.25); }
  .bet-live .bl-ok{ margin-left:4px; width:16px; height:16px; color:var(--turf-dark); flex:none; }
  .bet-live .bl-sel{ margin-left:auto; font-size:11px; font-weight:900; opacity:.6; }
  .bet-live .p-dot{ width:17px; height:17px; }
  .bet-live .bl-arrow{ opacity:.45; font-weight:900; }
  .bet-live .bl-amt{ margin-left:auto; color:var(--gold-dark); font-weight:900; display:flex; align-items:center; gap:4px; white-space:nowrap; }
  .chip-ico{ width:16px; height:16px; border-radius:50%; flex:none; position:relative;
    background:radial-gradient(circle at 38% 32%,#ffe9a8,var(--gold) 68%,#dc9c14);
    box-shadow:0 1px 2px rgba(0,0,0,.3), inset 0 0 0 2px rgba(255,255,255,.6); }
  .chip-ico::after{ content:""; position:absolute; inset:4px; border-radius:50%; border:1.5px dashed rgba(255,255,255,.7); }

  /* レース中のチップ山 */
  .pool-view{ display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-end; gap:16px; width:100%; }
  .pool-view:empty{ display:none; }
  .pool-col{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .pool-stack{ display:flex; flex-direction:column-reverse; align-items:center; justify-content:flex-start; min-height:14px; padding-bottom:2px; }
  .pool-chip{ width:40px; height:12px; border-radius:50%; margin-top:-8px; position:relative;
    box-shadow:0 2px 0 rgba(0,0,0,.26), inset 0 -2px 3px rgba(0,0,0,.28), inset 0 2px 2px rgba(255,255,255,.55); }
  .pool-col .pc-nm{ font-size:11.5px; font-weight:900; display:flex; align-items:center; gap:4px; margin-top:3px; }
  .pool-col .pc-nm .p-dot{ width:14px; height:14px; }
  .pool-col .pc-amt{ font-size:12.5px; font-weight:900; color:var(--gold-dark); }

  /* 結果(メイン=賭け / サブ=レース順位) */
  .res-wrap{ display:flex; flex-direction:column; align-items:center; }
  .res-sec-label{ align-self:flex-start; font-size:12px; font-weight:900; letter-spacing:.12em; color:var(--turf-dark); margin:2px 0 -2px 2px; }
  .res-sec-label.sub{ color:rgba(34,36,31,.55); }
  .res-table{ width:100%; display:flex; flex-direction:column; gap:6px; max-height:34vh; overflow-y:auto; }
  .rb-row{ display:flex; align-items:center; gap:9px; background:#fff; border-radius:11px; padding:9px 12px; font-size:15px; text-align:left; }
  .rb-row.hit{ background:linear-gradient(150deg,#fff5da,#ffe9a8); box-shadow:0 2px 7px rgba(210,144,20,.22); }
  .rb-row .rb-dot{ width:22px; height:22px; flex:none; }
  .rb-row .rb-nm{ font-weight:900; flex:none; }
  .rb-row .rb-bet{ flex:1 1 0; min-width:0; font-size:12px; opacity:.75; font-weight:700; display:flex; align-items:center; gap:4px; }
  .rb-row .rb-tdot{ width:13px; height:13px; flex:none; }
  .rb-row .rb-delta{ font-weight:900; font-size:18px; white-space:nowrap; }
  .rb-delta.plus{ color:var(--turf-dark); }
  .rb-delta.minus{ color:var(--red); opacity:.85; }
  .rb-delta.zero{ opacity:.4; }
  .res-sub{ width:100%; margin-top:4px; padding-top:10px; border-top:1.5px dashed rgba(34,36,31,.18); display:flex; flex-direction:column; gap:6px; }
  .res-race{ width:100%; display:flex; flex-direction:column; gap:4px; max-height:26vh; overflow-y:auto; }
  .rr2-row{ display:flex; align-items:center; gap:8px; font-size:13.5px; padding:4px 8px; border-radius:8px; text-align:left; }
  .rr2-row.win{ background:rgba(242,176,53,.16); }
  .rr2-row .rr2-rk{ width:20px; font-weight:900; color:var(--gold-dark); text-align:center; flex:none; }
  .rr2-row .rr2-dot{ width:16px; height:16px; flex:none; }
  .rr2-row .rr2-nm{ flex:1 1 0; font-weight:700; }
  .rr2-row .rr2-num{ font-weight:900; color:var(--turf-dark); }

  /* 枠外リンク(中断する) */
  .link-out{ margin-top:16px; background:none; border:none; cursor:pointer; font-family:inherit;
    color:rgba(255,255,255,.92); text-decoration:underline; text-underline-offset:3px; font-size:14px; font-weight:700; letter-spacing:.12em; }
  .link-out:active{ opacity:.7; }

  /* あそびかた */
  #helpOverlay .help-body{ font-size:14px; line-height:1.9; letter-spacing:.02em; text-align:left; font-weight:700; }
  #helpOverlay .help-body .h-sec{ display:flex; align-items:center; gap:8px; font-weight:900; letter-spacing:.08em; font-size:15px; }
  #helpOverlay .help-body .h-sec::before{ content:""; width:5px; height:17px; border-radius:2px; background:var(--turf); flex:none; }
  #helpOverlay .help-body .h-sec.hl{ color:var(--gold-dark); }
  #helpOverlay .help-body .h-sec.hl::before{ background:var(--gold); }
  #helpOverlay .help-body p{ margin:3px 0 0; }
  #helpOverlay .help-body p + .h-sec{ margin-top:14px; }

  /* 左上あそびかた / 右上効果音 */
  .help-btn{
    position:fixed; left:10px; top:10px; z-index:80;
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
    font-family:inherit; font-size:12.5px; font-weight:700; letter-spacing:.08em; color:rgba(34,36,31,.75);
    background:rgba(255,255,255,.72); border:1.5px solid rgba(34,36,31,.3); border-radius:999px; padding:6px 14px 7px;
  }
  .help-btn span{ display:inline-flex; align-items:center; justify-content:center; width:17px; height:17px; border-radius:50%; background:var(--turf); color:#fff; font-size:11.5px; font-weight:900; }
  .help-btn:active{ transform:translateY(1px); }
  .back-fixed{ position:fixed; left:10px; top:48px; z-index:80; cursor:pointer;
    font-family:inherit; font-size:12.5px; font-weight:700; letter-spacing:.08em; color:var(--turf-dark);
    background:rgba(255,255,255,.85); border:1.5px solid var(--turf); border-radius:999px; padding:6px 15px 7px; }
  .back-fixed:active{ transform:translateY(1px); }
  .snd-btns{ position:fixed; right:10px; top:10px; z-index:80; }
  .snd-btn{
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
    font-family:inherit; font-size:12.5px; font-weight:700; letter-spacing:.08em; color:rgba(34,36,31,.75);
    background:rgba(255,255,255,.72); border:1.5px solid rgba(34,36,31,.3); border-radius:999px; padding:6px 14px 7px;
  }
  .snd-btn svg{ width:14px; height:13px; }
  .snd-btn.off{ opacity:.42; text-decoration:line-through; }

  .toast{
    position:fixed; left:50%; top:60px; transform:translate(-50%,-8px); z-index:90;
    background:rgba(34,36,31,.88); color:#fff; font-size:14px; font-weight:700; letter-spacing:.06em;
    border-radius:999px; padding:9px 22px 10px; opacity:0; pointer-events:none;
    transition:opacity .25s linear, transform .25s cubic-bezier(.3,1.3,.5,1); white-space:nowrap; max-width:94vw;
  }
  .toast.on{ opacity:1; transform:translate(-50%,0); }

  .home-foot{
    position:fixed; left:0; right:0; bottom:0; z-index:40; display:block; text-align:center;
    padding:32px 0 14px; font-size:12px; font-weight:800; letter-spacing:.2em;
    color:rgba(34,36,31,.42); text-shadow:none;
    background:linear-gradient(to top, rgba(31,155,220,.12), rgba(31,155,220,.04) 55%, transparent);
    text-decoration:none; opacity:0; pointer-events:none; transition:opacity .32s linear;
  }
  .home-foot span{ pointer-events:none; }
  #titleScene.on ~ .home-foot{ opacity:1; }
  #titleScene.on ~ .home-foot span{ pointer-events:auto; cursor:pointer; }
</style>
</head>
<body>

  <!-- ===== タイトル ===== -->
  <div class="scene on" id="titleScene">
    <div>
      <div class="t-main">俺たち<span class="em">ダービー</span></div>
      <div class="t-sub">ー走るのは馬じゃない。俺たちだー</div>
    </div>
    <div class="mode-row" id="modeSelect">
      <button class="mode-btn" data-mode="local">1台で遊ぶ<small>近くの友達とダービー</small></button>
      <button class="mode-btn" data-mode="online">オンラインで遊ぶ<small>遠くの友達とダービー</small></button>
    </div>

    <div class="setup-block" id="localSetup">
      <div class="card-box">
        <div class="sec-label">出走メンバー</div>
        <div class="players-list" id="playersList"></div>
        <button class="p-add" id="addPlayer">＋ メンバーを追加</button>
      </div>
      <div class="rule-frame">
        <div class="rule-col">
          <div class="rl">レース数</div>
          <div class="rounds-row">
            <button class="stp-btn" data-rd="-1">−</button>
            <div class="rv"><b class="rVal">5</b></div>
            <button class="stp-btn" data-rd="1">＋</button>
          </div>
        </div>
      </div>
      <button class="btn-main" id="startBtn">出走</button>
    </div>

    <div class="setup-block" id="onlineSetup">
      <div class="name-block">
        <div class="sec-label">あなたの名前</div>
        <input class="p-input online-name" id="onlineName" maxlength="8" placeholder="なまえ" autocomplete="off">
      </div>
      <div class="room-btns">
        <button class="mode-btn sm" id="makeRoom">部屋を作る<small>合言葉を発行</small></button>
        <button class="mode-btn sm" id="joinRoom">部屋に入る<small>合言葉で入室</small></button>
      </div>
      <div class="room-area" id="roomArea"></div>
    </div>
  </div>

  <!-- ===== 進行画面 ===== -->
  <div class="scene" id="gameScene">

    <!-- ロビー(オンライン) -->
    <div class="panel" id="lobbyPanel">
      <div class="big-q">出走メンバーを待っています</div>
      <div class="lobby-list" id="lobbyList"></div>
      <div class="lobby-code" id="lobbyCode"></div>
      <div class="lobby-rounds" id="lobbyRounds"></div>
      <div class="hint" id="lobbyHint"></div>
      <button class="btn-main" id="lobbyStart" style="display:none;">出走</button>
      <button class="txt-btn" id="lobbyBack">← タイトルにもどる</button>
    </div>

    <!-- 待機(オンライン: みんなの入力待ち / お題待ち) -->
    <div class="panel" id="waitPanel">
      <div class="big-q" id="waitMsg"></div>
      <div class="wait-prog" id="waitProg"></div>
      <div class="wait-who" id="waitWho"></div>
      <div class="bet-live" id="betLiveWait"></div>
    </div>

    <!-- お題を決める -->
    <div class="panel" id="themePanel">
      <div class="big-q"><span id="repName" class="em"></span>さん、お題を決めよう</div>
      <div class="field-wrap">
        <div class="theme-row">
          <button class="omakase-btn" id="omakaseBtn" aria-label="おまかせ">おまかせ</button>
          <input class="theme-input" id="themeInput" maxlength="24" placeholder="お題" autocomplete="off">
        </div>
      </div>
      <div class="hint">勝敗の決め方</div>
      <div class="dir-row">
        <button class="dir-btn sel" data-dir="hi"><svg class="dir-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V5M6 11l6-6 6 6"/></svg>大きいほど勝ち</button>
        <button class="dir-btn" data-dir="lo"><svg class="dir-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v15M6 13l6 6 6-6"/></svg>小さいほど勝ち</button>
      </div>
      <button class="btn-main" id="themeGo">決定</button>
    </div>

    <!-- 秘密の数字入力 -->
    <div class="panel" id="enterPanel">
      <div class="big-q" id="enterQ"></div>
      <input class="num-input" id="numInput" type="number" inputmode="numeric" min="0" placeholder="0" autocomplete="off">
      <button class="btn-main" id="numGo">決定</button>
      <div class="secret-note">※ まわりの人に見られないように！</div>
      <div class="enter-done" id="enterDone"></div>
    </div>

    <!-- 賭ける -->
    <div class="panel" id="betPanel">
      <div class="big-q" id="betQ"></div>
      <div class="my-chips">持ちチップ <b id="betChips">0</b></div>
      <div class="cand-list" id="candList"></div>
      <div class="bet-amount">
        <button class="ba-btn ba-wide" data-d="-10">-10</button>
        <button class="ba-btn" data-d="-1">-1</button>
        <div class="ba-val" id="baVal">10</div>
        <button class="ba-btn" data-d="1">+1</button>
        <button class="ba-btn ba-wide" data-d="10">+10</button>
      </div>
      <button class="bet-allin" id="baAllin">全ブッパ</button>
      <button class="btn-gold" id="betGo">この予想で賭ける</button>
      <div class="bet-live" id="betLive"></div>
    </div>

    <!-- 全員のかけ状況確認(1台) -->
    <div class="panel" id="checkPanel">
      <div class="big-q">みんなのかけ、これでOK？<br><span class="hint">タップでやり直し</span></div>
      <div class="chk-list" id="checkList"></div>
      <button class="btn-gold" id="checkGo">全員OK！レースへ</button>
    </div>

    <!-- レース -->
    <div class="panel" id="racePanel">
      <div class="big-q" id="raceTheme"></div>
      <div class="track" id="track"></div>
      <div class="pool-view" id="poolView"></div>
      <button class="btn-gold" id="raceResultBtn" style="display:none;">結果を見る</button>
    </div>
  </div>

  <!-- 進行画面の上部バー(第Nレース + 大小バッジ) -->
  <div class="top-bar" id="topBar">
    <div class="round-pill" id="roundPill"></div>
    <div class="dir-badge" id="dirBadge"></div>
  </div>
  <div class="timer" id="timer" style="display:none;"></div>

  <!-- タイトルへ戻るフッター -->
  <a class="home-foot" id="homeFoot" href="./index.html"><span>牧村が作ったゲーム集へ</span></a>

  <!-- 左上あそびかた -->
  <button class="help-btn" id="helpBtn" aria-label="あそびかた"><span>？</span>あそびかた</button>
  <!-- 左上・一つ前に戻る(1台) -->
  <button class="back-fixed" id="backFixed" style="display:none;">← もどる</button>
  <!-- 右上効果音 -->
  <div class="snd-btns">
    <button class="snd-btn" id="seBtn"><svg viewBox="0 0 25 24"><path d="M3 9v6h4l5 4V5L7 9H3z" fill="currentColor"/><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M15 9.4c1.3 1.3 1.3 3.9 0 5.2"/><path d="M17.6 7.6c2.2 2.2 2.2 6.6 0 8.8"/></g></svg>効果音</button>
  </div>

  <!-- 交代(次の人に渡す) -->
  <div id="handoffOverlay">
    <div class="r-card">
      <div class="ho-dot" id="hoDot"></div>
      <div class="ho-name" id="hoName"></div>
      <div class="hint" id="hoHint">に、はしを渡してね</div>
      <button class="btn-main" id="hoGo">準備OK</button>
    </div>
  </div>

  <!-- 結果 -->
  <div id="resultOverlay">
    <div class="res-wrap">
      <div class="r-card result-card">
        <div class="r-title" id="resWin"></div>
        <div class="res-sec-label">賭けの結果</div>
        <div class="res-table" id="resBet"></div>
        <div class="carry-note" id="carryNote"></div>
        <div class="res-sub">
          <div class="res-sec-label sub" id="resRaceLabel">レース結果</div>
          <div class="res-race" id="resRace"></div>
        </div>
        <button class="btn-main" id="nextBtn" style="width:100%;">次のレース</button>
      </div>
      <button class="link-out" id="endBtn">中断する</button>
    </div>
  </div>

  <!-- 確認(おわりにする) -->
  <div id="confirmOverlay">
    <div class="r-card">
      <div class="r-title" style="font-size:clamp(19px,5vw,25px);">レースを終える？</div>
      <div class="sub-btns">
        <button class="txt-btn" id="cfNo">つづける</button>
        <button class="txt-btn" id="cfYes">終える</button>
      </div>
    </div>
  </div>

  <!-- チャンピオン(総合結果) -->
  <div id="champOverlay">
    <div class="r-card">
      <div class="r-title win">総合結果</div>
      <div class="rank-list" id="rankList"></div>
      <div class="sub-btns">
        <button class="txt-btn" id="champHome">タイトルへ</button>
        <button class="btn-main" id="champAgain">もう一回</button>
      </div>
    </div>
  </div>

  <!-- あそびかた -->
  <div id="helpOverlay">
    <div class="r-card">
      <div class="r-title" style="font-size:clamp(20px,5.6vw,28px);">あそびかた</div>
      <div class="help-body" id="helpBody"></div>
      <button class="txt-btn" id="helpClose">とじる</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  const COLORS=["#e3452f","#2f7de3","#2f9e55","#f39a1f","#8a5cd6","#17a2a2","#e35a9c","#8a6a3f",
    "#c0392b","#2472c8","#27ae60","#e67e22","#7b4bc0","#0f9b8e","#d6336c","#6b7280",
    "#d35400","#3b4b8a","#b8930f","#2a9d8f"];
  const THEMES=[
    "スマホの充電残量","LINEの未読数","昨日の睡眠時間","シャトルランの回数","カメラロールの写真の枚数",
    "スマホの昨日の利用時間","入れてるアプリの数","Twitterのフォロワー数","インスタのフォロワー数","今目の前に見えた数字",
    "今日歩いた歩数","財布の中の小銭の枚数","今月の外食の回数","好きな数字","今日飲んだ水の杯数",
    "持ってる靴の数","今日見た広告の数","今週見た夢の数","今日送ったLINEの数","カバンの中のレシートの枚数",
    "今年行った旅行の回数","今日食べたお菓子の数","1日のコーヒーの杯数","冷蔵庫の中の飲み物の数","今月読んだ本の冊数",
    "今日開いたアプリの数","1週間の自炊の回数","持ってる漫画の冊数","今年泣いた回数","昨日のスクショの枚数",
    "今月のコンビニ利用の回数","好きな人の数","今のバッテリー残量","スマホの空き容量(GB)","今週のアラーム設定の数",
    "手持ちの現金","今年観た映画の本数","一番高い持ち物の値段","今日会話した人数","持ってる靴下の数(片方)",
    "昨日もらったいいねの数","今日のあくびの回数","持ってる充電ケーブルの数","今週の遅刻の回数","好きな食べ物の数",
    "1週間のシャワーの回数","スマホを落とした回数(通算)","今年ひいた風邪の回数","財布のカードの枚数","今日のため息の回数",
    "今月の課金額","プレイリストの曲数","今日会ったペットの数","1週間の飲み会の回数","今年買った服の数",
    "持ってるマグカップの数","今の体感気温","今日のぼった階段の段数","今週作った料理の品数","好きな映画の本数",
    "今月のサブスクの数","今持ってるポイントカードの数","スマホのホーム画面のアプリ数","今日見た猫の数","今月のカレンダーの予定数",
    "今年撮った自撮りの枚数","今日言った「ありがとう」の回数","1日のトイレの回数","今日踏んだ横断歩道の数","持ってるペンの数",
    "今週のゲーム時間","昨日の歩数","今日のスワイプ回数(推定)","1年のカラオケ回数","今日のまばたき(推定)",
    "今月の残業時間","今日のスクロール距離(m/推定)","好きなYouTuberの数","今日の残り歩数(目標まで)","持ってるTシャツの数",
    "今年泊まったホテルの数","今日見た信号の数","1週間のカップ麺の数","今月の映画館の回数","今のやる気(100点満点)"
  ];
  let lastTheme="";
  function randTheme(){ let t; do{ t=THEMES[Math.floor(Math.random()*THEMES.length)]; }while(THEMES.length>1 && t===lastTheme); lastTheme=t; return t; }
  const INIT_CHIPS=100, MIN_BET=10, RESCUE=20;
  const MAXP=20, MINP=2;
  const MIN_ROUNDS=1, MAX_ROUNDS=30;
  let totalRounds=5;   // 何レースで総合結果か(部屋主/1台の設定)
  const TIME_OPTS=[15,30,45,60,90,0];   // 0=無制限
  let timeLimit=30;    // 各操作の制限時間(秒)。0で無制限

  let players=[];        // {name,color,chips}
  let round=0, repIdx=0, carry=0;
  let theme="", dir="hi";
  let numbers=[];        // 各プレイヤーの申告数字(index対応)
  let bets=[];           // {on:idx, amt:number}
  let seatIdx=0;         // いま端末を持っている人(入力/賭けのループ用)
  let curBet=10, curCand=-1;

  const titleScene=document.getElementById("titleScene"), gameScene=document.getElementById("gameScene");
  const playersList=document.getElementById("playersList");

  /* ---------- 音 (WebAudio) ---------- */
  let actx=null, seBus=null, seOn=true;
  try{ seOn=localStorage.getItem("drb.se")!=="0"; }catch(e){}
  function ensureAudio(){ if(actx) return; try{ actx=new (window.AudioContext||window.webkitAudioContext)(); seBus=actx.createGain(); seBus.gain.value=seOn?1:0; seBus.connect(actx.destination); }catch(e){} }
  function note(f,t,dur,peak,type){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain(); o.type=type||"sine"; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(seBus); o.start(t); o.stop(t+dur+0.05); }
  function click(t,f,peak){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain(); o.type="triangle"; o.frequency.setValueAtTime(f,t); o.frequency.exponentialRampToValueAtTime(f*.5,t+.07);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+.006); g.gain.exponentialRampToValueAtTime(0.0001,t+.11); o.connect(g); g.connect(seBus); o.start(t); o.stop(t+.16); }
  function playSelect(){ if(actx) click(actx.currentTime,1100,0.5); }
  function playTick(){ if(actx) click(actx.currentTime,1500,0.35); }
  function playChip(){ if(!actx) return; const t=actx.currentTime; click(t,1300,0.4); note(2000,t,0.05,0.2,"square"); }
  function playConfirm(){ if(!actx) return; const t=actx.currentTime; click(t,700,0.6); note(523,t+.05,0.18,0.28,"triangle"); }
  function playGo(){ if(!actx) return; const t=actx.currentTime;   // ファンファーレ(スタート)
    [392,523,659,784].forEach((f,i)=>note(f,t+i*0.1,0.22,0.32,"triangle")); }
  function playGallop(i){ if(!actx) return; const t=actx.currentTime; note(120+(i%2)*30,t,0.06,0.14,"sine"); }
  function playFinish(){ if(!actx) return; const t=actx.currentTime; note(1046,t,0.12,0.34,"triangle"); click(t+0.02,900,0.5); }
  function playWin(){ if(!actx) return; const t=actx.currentTime; [523,659,784,1047,1319].forEach((f,i)=>note(f,t+i*0.1,0.3,0.32,"triangle")); }
  function playStretch(){ if(!actx) return; const t=actx.currentTime; const o=actx.createOscillator(),g=actx.createGain();
    o.type="sawtooth"; o.frequency.setValueAtTime(280,t); o.frequency.exponentialRampToValueAtTime(880,t+0.85);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.12); g.gain.exponentialRampToValueAtTime(0.0001,t+1.0);
    o.connect(g); g.connect(seBus); o.start(t); o.stop(t+1.05); }

  /* ---------- タイトル: メンバー設定 ---------- */
  const DEFAULT_NAMES=["1","2"];
  function renderPlayersSetup(){
    playersList.innerHTML="";
    playersSetup.forEach((nm,i)=>{
      const c=COLORS[i%COLORS.length];
      const row=document.createElement("div"); row.className="p-row";
      row.innerHTML='<span class="p-dot" style="background:radial-gradient(circle at 35% 30%, '+tint(c)+', '+c+')"></span>'
        +'<input class="p-input" maxlength="8" placeholder="なまえ" value="'+esc(nm)+'">'
        +(playersSetup.length>MINP?'<button class="p-del" aria-label="削除">×</button>':'');
      const inp=row.querySelector(".p-input");
      inp.addEventListener("input",()=>{ playersSetup[i]=inp.value; });
      inp.addEventListener("focus",()=>{ setTimeout(()=>{ try{ inp.select(); }catch(e){} },0); });   // 選択時は全選択(すぐ書き換えられる)
      const del=row.querySelector(".p-del");
      if(del) del.addEventListener("click",()=>{ ensureAudio(); playSelect(); playersSetup.splice(i,1); renderPlayersSetup(); });
      playersList.appendChild(row);
    });
    document.getElementById("addPlayer").disabled = playersSetup.length>=MAXP;
  }
  let playersSetup=DEFAULT_NAMES.slice();
  function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function tint(hex){   // 明るめのハイライト色
    const n=parseInt(hex.slice(1),16), r=(n>>16)+70, g=((n>>8)&255)+70, b=(n&255)+70;
    return "rgb("+Math.min(255,r)+","+Math.min(255,g)+","+Math.min(255,b)+")";
  }
  document.getElementById("addPlayer").addEventListener("click",()=>{ ensureAudio(); playSelect();
    if(playersSetup.length>=MAXP) return; playersSetup.push(String(playersSetup.length+1)); renderPlayersSetup();
    const inps=playersList.querySelectorAll(".p-input"); const last=inps[inps.length-1]; last.focus(); try{ last.select(); }catch(e){}
  });
  renderPlayersSetup();

  // 長押し対応(押しっぱなしで連続実行。レース数・賭けチップ増減で共用)
  function attachHold(btn, fn){
    let t1=0,t2=0;
    const stop=()=>{ clearTimeout(t1); clearInterval(t2); t1=t2=0; };
    const start=(e)=>{ if(e) e.preventDefault(); if(btn.classList.contains("dim")) return; fn(); stop();
      t1=setTimeout(()=>{ t2=setInterval(()=>{ if(btn.classList.contains("dim")){ stop(); return; } fn(); }, 90); }, 420); };
    btn.addEventListener("pointerdown", start);
    ["pointerup","pointerleave","pointercancel"].forEach(ev=>btn.addEventListener(ev, stop));
  }
  // レース数ステッパー(タイトル1台側 + オンラインはロビーで)
  function renderRounds(){
    document.querySelectorAll(".rVal").forEach(el=>el.textContent=totalRounds);
    document.querySelectorAll(".stp-btn[data-rd]").forEach(b=>{ const d=+b.dataset.rd;
      b.classList.toggle("dim", (d<0&&totalRounds<=MIN_ROUNDS)||(d>0&&totalRounds>=MAX_ROUNDS)); });
  }
  function changeRounds(d){
    const nv=Math.max(MIN_ROUNDS,Math.min(MAX_ROUNDS,totalRounds+d));
    if(nv!==totalRounds){ totalRounds=nv; playTick(); renderRounds(); if(mode==="online"&&isHost&&oPhase==="lobby") broadcastSnap(); }
  }
  // 制限時間ステッパー
  function fmtTime(v){ return (v && v>0) ? (v+"秒") : "無制限"; }
  function renderTime(){
    document.querySelectorAll(".tVal").forEach(el=>el.textContent=fmtTime(timeLimit));
    let idx=TIME_OPTS.indexOf(timeLimit); if(idx<0) idx=1;
    document.querySelectorAll(".stp-btn[data-tm]").forEach(b=>{ const d=+b.dataset.tm;
      b.classList.toggle("dim", (d<0&&idx<=0)||(d>0&&idx>=TIME_OPTS.length-1)); });
  }
  function changeTime(d){
    let idx=TIME_OPTS.indexOf(timeLimit); if(idx<0) idx=1;
    const ni=Math.max(0,Math.min(TIME_OPTS.length-1, idx+d));
    if(ni!==idx){ timeLimit=TIME_OPTS[ni]; playTick(); renderTime(); if(mode==="online"&&isHost&&oPhase==="lobby") broadcastSnap(); }
  }
  function wireRoundStepper(scope){
    (scope||document).querySelectorAll(".stp-btn[data-rd]").forEach(b=>{
      if(b._wired) return; b._wired=true; attachHold(b, ()=>{ ensureAudio(); changeRounds(+b.dataset.rd); }); });
    (scope||document).querySelectorAll(".stp-btn[data-tm]").forEach(b=>{
      if(b._wired) return; b._wired=true; attachHold(b, ()=>{ ensureAudio(); changeTime(+b.dataset.tm); }); });
  }
  wireRoundStepper(document.getElementById("localSetup"));
  renderRounds(); renderTime();

  document.getElementById("startBtn").addEventListener("click",()=>{
    ensureAudio(); playConfirm();
    const names=playersSetup.map((s,i)=>(s||"").trim()||String(i+1));
    if(names.length<MINP){ showToast("2人以上でね"); return; }
    players=names.map((nm,i)=>({name:nm, color:COLORS[i%COLORS.length], chips:INIT_CHIPS}));
    mode="local"; round=0; carry=0;
    titleScene.classList.remove("on"); gameScene.classList.add("on");
    startRound();
  });

  /* ---------- ラウンド進行 ---------- */
  const panels={ lobby:document.getElementById("lobbyPanel"), wait:document.getElementById("waitPanel"),
    theme:document.getElementById("themePanel"), enter:document.getElementById("enterPanel"),
    bet:document.getElementById("betPanel"), check:document.getElementById("checkPanel"), race:document.getElementById("racePanel") };
  function showPanel(name){ Object.keys(panels).forEach(k=> panels[k].classList.toggle("on", k===name)); try{ updateBackBtn(); }catch(e){} }
  function dotStyle(c){ return "background:radial-gradient(circle at 35% 30%, "+tint(c)+", "+c+")"; }

  let mode="local";   // "local" | "online"

  // もち金が足りない人は誰かからチップをもらう。出せる人がいなければ脱落
  function rescueOrEliminate(){
    const eliminated=[];
    const broke=players.filter(p=>p.chips<MIN_BET).sort((a,b)=>a.chips-b.chips);
    broke.forEach(p=>{
      if(p.chips>=MIN_BET) return;
      const need=RESCUE-p.chips;
      let donor=null;   // 渡してもMIN_BET以上残る人の中で一番の金持ち
      players.forEach(q=>{ if(q===p||q.chips<MIN_BET) return; if(q.chips-need>=MIN_BET){ if(!donor||q.chips>donor.chips) donor=q; } });
      if(donor){ donor.chips-=need; p.chips+=need; }
      else{ p._out=true; eliminated.push(p.name); }
    });
    for(let i=players.length-1;i>=0;i--){ if(players[i]._out) players.splice(i,1); }
    return eliminated;
  }

  // 大小バッジ(画面上部固定)
  function dirArrowSVG(d){
    return d==="hi"
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V5M6 11l6-6 6 6"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v15M6 13l6 6 6-6"/></svg>';
  }
  function setDirBadge(show){
    const b=document.getElementById("dirBadge");
    if(!show){ b.style.display="none"; return; }
    b.style.display="inline-flex";
    b.className="dir-badge "+(dir==="hi"?"hi":"lo");
    b.innerHTML=dirArrowSVG(dir)+"<span>"+(dir==="hi"?"大きいほど勝ち":"小さいほど勝ち")+"</span>";
  }

  // ---- 制限時間タイマー(自分の操作画面で作動。0=無制限) ----
  let timerInt=0, timerEnd=0;
  function startTimer(){
    stopTimer();
    if(mode==="local") return;   // 1台回しは制限時間なし(無限)
    if(!timeLimit || timeLimit<=0) return;
    timerEnd=Date.now()+timeLimit*1000;
    const el=document.getElementById("timer"); el.style.display="";
    const clock='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2M9 2h6"/></svg>';
    const tick=()=>{ const rem=Math.max(0,Math.ceil((timerEnd-Date.now())/1000));
      el.innerHTML=clock+'<span>'+rem+'</span>'; el.classList.toggle("urgent", rem<=5);
      if(rem<=0){ stopTimer(); onTimeout(); } };
    tick(); timerInt=setInterval(tick,250);
  }
  function stopTimer(){ if(timerInt){ clearInterval(timerInt); timerInt=0; } const el=document.getElementById("timer"); if(el){ el.style.display="none"; el.classList.remove("urgent"); } }
  function onTimeout(){   // 時間切れ→現在の画面を自動確定(未入力はランダム/最低額)
    if(panels.theme.classList.contains("on")){ const ti=document.getElementById("themeInput"); if(!ti.value.trim()) ti.value=randTheme(); document.getElementById("themeGo").click(); return; }
    if(panels.enter.classList.contains("on")){ const inp=document.getElementById("numInput"); if(inp.value.trim()===""||isNaN(Number(inp.value))) inp.value=String(Math.floor(Math.random()*100)); document.getElementById("numGo").click(); return; }
    if(panels.bet.classList.contains("on")){ if(curCand<0) curCand=Math.floor(Math.random()*players.length); document.getElementById("betGo").click(); return; }
  }
  // ホスト側の強制進行(誰かが放置しても進める。クライアントより少し遅らせる)
  let hostTimer=0;
  function startHostTimer(){ if(!isHost) return; clearTimeout(hostTimer); if(!timeLimit||timeLimit<=0) return; hostTimer=setTimeout(hostForce,(timeLimit+3)*1000); }
  function stopHostTimer(){ clearTimeout(hostTimer); hostTimer=0; }
  function hostForce(){
    if(!isHost) return;
    if(oPhase==="theme"){ if(!theme){ theme=randTheme(); dir="hi"; } oPhase="enter"; broadcastSnap(); startHostTimer(); }
    else if(oPhase==="enter"){ activeIdxs().forEach(i=>{ if(numbers[i]==null) numbers[i]=Math.floor(Math.random()*100); }); oPhase="bet"; broadcastSnap(); startHostTimer(); }
    else if(oPhase==="bet"){ activeIdxs().forEach(i=>{ if(bets[i]==null){ const amt=Math.min(MIN_BET,players[i].chips); bets[i]={on:Math.floor(Math.random()*players.length),amt}; players[i].chips-=amt; } }); stopHostTimer(); oPhase="race"; broadcastSnap(); }
  }

  function startRound(){
    const elim=rescueOrEliminate();
    if(players.length<MINP){ if(elim.length) showToast(elim.join("・")+" が脱落。ゲーム終了！",2600); setDirBadge(false); showChampion(); return; }
    round++;
    repIdx=(round-1)%players.length;
    if(elim.length) showToast(elim.join("・")+" はチップ切れで脱落…",2600);
    numbers=new Array(players.length).fill(null);
    bets=new Array(players.length).fill(null);
    theme=""; dir="hi"; setDirBadge(false);
    document.getElementById("roundPill").textContent="第"+round+" / "+totalRounds+" レース";
    // お題入力へ
    document.getElementById("repName").textContent=players[repIdx].name;
    document.getElementById("themeInput").value=randTheme();
    document.querySelectorAll("#themePanel .dir-btn").forEach(b=>b.classList.toggle("sel", b.dataset.dir==="hi"));
    handoff(repIdx, "お題を決める", ()=>{ showPanel("theme"); startTimer(); setTimeout(()=>document.getElementById("themeInput").focus(),80); });
  }

  // 交代画面: 端末を渡してから続行
  function handoff(idx, hint, done){
    stopTimer();
    const ov=document.getElementById("handoffOverlay");
    document.getElementById("hoDot").style.cssText=dotStyle(players[idx].color);
    document.getElementById("hoName").textContent=players[idx].name;
    document.getElementById("hoHint").textContent=hint;
    ov._done=done;
    ov.classList.add("on");
  }
  document.getElementById("hoGo").addEventListener("click",()=>{
    ensureAudio(); playSelect();
    const ov=document.getElementById("handoffOverlay"); ov.classList.remove("on");
    const d=ov._done; ov._done=null; if(d) d();
  });

  // お題決定
  document.querySelectorAll("#themePanel .dir-btn").forEach(b=>{
    b.addEventListener("click",()=>{ ensureAudio(); playSelect();
      document.querySelectorAll("#themePanel .dir-btn").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel"); });
  });
  // お題欄: タッチで全選択 / おまかせでランダム
  { const ti=document.getElementById("themeInput");
    ti.addEventListener("focus",()=>{ setTimeout(()=>{ try{ ti.select(); }catch(e){} },0); }); }
  document.getElementById("omakaseBtn").addEventListener("click",()=>{ ensureAudio(); playSelect();

  /* ---------- レース ---------- */
  function winnersOf(){
    let best=null;
    numbers.forEach(v=>{ if(v==null) return; if(best==null) best=v; else best=(dir==="hi"?Math.max(best,v):Math.min(best,v)); });
    const set=[]; numbers.forEach((v,i)=>{ if(v===best) set.push(i); });
    return {best, set};
  }
  // レース中のチップ山(候補ごとに、賭けた人の色チップを積む)
  function renderPoolView(){
    const el=document.getElementById("poolView"); if(!el) return;
    const byCand={};
    bets.forEach((b,i)=>{ if(!b) return; (byCand[b.on]=byCand[b.on]||[]).push({color:players[i].color, amt:b.amt}); });
    const cands=Object.keys(byCand).map(Number).sort((a,b)=>{
      const ta=byCand[a].reduce((s,x)=>s+x.amt,0), tb=byCand[b].reduce((s,x)=>s+x.amt,0); return tb-ta; });

        +'<div class="pc-nm"><span class="p-dot" style="'+dotStyle(p.color)+'"></span>'+esc(p.name)+'</div>'
        +'<div class="pc-amt">'+total+'枚</div></div>';
    });
    if(carry>0){ html+='<div class="pool-col"><div class="pool-stack"><div class="pool-chip" style="background:radial-gradient(circle at 40% 30%,#ffe08a,var(--gold))"></div><div class="pool-chip" style="background:radial-gradient(circle at 40% 30%,#ffe08a,var(--gold))"></div></div><div class="pc-nm">持ち越し</div><div class="pc-amt">'+carry+'枚</div></div>'; }

  function startRace(){
    stopTimer();
    showPanel("race"); setDirBadge(true);
    document.getElementById("raceTheme").innerHTML='お題「<span class="em">'+esc(theme)+'</span>」';

    renderPoolView();
    const {set}=winnersOf();
    // ランク付け(勝者=先頭)。同値は同着扱い
    const order=players.map((p,i)=>i).sort((a,b)=> dir==="hi" ? (numbers[b]-numbers[a]) : (numbers[a]-numbers[b]));
    const rankOf={}; order.forEach((idx,r)=>rankOf[idx]=r);
    // トラック描画(人数が多い時はレーンを細くして収める)

    const goal=document.createElement("div"); goal.className="goal"; track.appendChild(goal);
    const tape=document.createElement("div"); tape.className="goal-tape"; track.appendChild(tape);
    const runners=[];
    players.forEach((p,i)=>{
      const lane=document.createElement("div"); lane.className="lane"; lane.style.height=laneH+"px";
      const run=document.createElement("div"); run.className="runner";
      run.innerHTML='<span class="r-dot" style="'+dotStyle(p.color)+'">'+esc(p.name.slice(0,1))+'</span><span class="r-num"></span>';
      lane.appendChild(run); track.appendChild(lane);

    // 自分が賭けた馬(応援している馬)を強調(オンライン)

    } }
    // レースアニメ(rAF)。ゴール手前で止める(ゴール帯=右24px + 余白)
    const W=track.clientWidth, finish=W-46;
    runRace(runners, rankOf, set, finish, tape);
  }
  let raceDone=false;
  function runRace(runners, rankOf, winSet, finish, tape){
    playGo();
    raceDone=false;
    const N=runners.length, DUR=10000;
    const gap=0.5/Math.max(1,N-1);   // 最下位が中央あたりに来る程度の順位差
    // 各馬のドラマ: 序盤の位置(順位と無関係=弱い奴が前もあり)・揺らぎ・急減速(こけ)・突然の加速(まくり)
    const dram=runners.map(()=>({
      early:(Math.random()*2-1),
      amp:0.03+Math.random()*0.055, f1:0.8+Math.random()*1.3, p1:Math.random()*6.283,
      f2:1.8+Math.random()*1.6, p2:Math.random()*6.283,
      stumble: Math.random()<0.45 ? {at:0.15+Math.random()*0.4, dur:0.05+Math.random()*0.06, depth:0.1+Math.random()*0.13} : null,
      surge:   Math.random()<0.5  ? {at:0.3+Math.random()*0.4, dur:0.07+Math.random()*0.07, amp:0.08+Math.random()*0.1} : null
    }));
    const back=runners.map((_,i)=>rankOf[i]*gap);
    const smooth=x=>{ x=Math.max(0,Math.min(1,x)); return x*x*(3-2*x); };
    const endRace=()=>{ if(raceDone) return; raceDone=true; finishRace(runners, winSet, tape); };
    let start=null, lastGallop=0, crowdDone=false;
    function frame(ts){
      if(raceDone) return;
      if(start==null) start=ts;
      const el=ts-start, t=Math.min(1, el/DUR);
      const F=Math.min(1, t*1.02);                 // 隊列の先頭(ほぼ等速)
      const W=smooth((t-0.66)/0.34);               // 終盤に本来の順位へ一気に収束(強い奴が急浮上)
      const E=Math.max(0,1-t/0.78);                // 序盤の順位無関係なばらけ(中盤で消える)
      const sec=el/1000;
      runners.forEach((run,i)=>{
        const d=dram[i];
        const jostle=(Math.sin(sec*d.f1*6.283+d.p1)*0.6 + Math.sin(sec*d.f2*6.283+d.p2)*0.4)*d.amp*(1-W*0.8);
        const earlySpread=d.early*0.15*E;
        let dip=0; if(d.stumble && t>d.stumble.at){ const x=(t-d.stumble.at)/d.stumble.dur; dip=d.stumble.depth*Math.exp(-x*x); }
        let sg=0; if(d.surge && t>d.surge.at){ const x=(t-d.surge.at)/d.surge.dur; sg=d.surge.amp*Math.exp(-x*x)*(1-W*0.6); }
        let prog=F + earlySpread - back[i]*W + jostle - dip + sg;
        prog=Math.max(0, Math.min(t<0.955?0.98:1, prog));
        run.style.left=(4 + prog*(finish-4))+"px";
      });
      if(!crowdDone && t>=0.7){ crowdDone=true; if(seOn) playStretch(); }   // 最終直線の歓声スウェル
      const gi=Math.max(80, 235-160*t);            // 終盤ほど蹄の音が速くなる
      if(ts-lastGallop>gi){ lastGallop=ts; playGallop(Math.floor(el/100)); }
      if(t<1){ requestAnimationFrame(frame); }
      else endRace();
    }
    requestAnimationFrame(frame);
    // 保険: タブが裏でrAFが止まっても必ず完走させる
    setTimeout(()=>{ runners.forEach((run,i)=>{ run.style.left=(4+(1-rankOf[i]*gap)*(finish-4))+"px"; }); endRace(); }, DUR+500);
  }
  function finishRace(runners, winSet, tape){
    tape.classList.add("broken");
    playFinish();
    // 数字を頭上に出す
    runners.forEach((run,i)=>{
      const num=run.querySelector(".r-num"); num.textContent=numbers[i];
      setTimeout(()=>num.classList.add("show"), 100+i*70);
    });
    // 勝者を強調＋チップ噴き上げ
    winSet.forEach(i=>{
      runners[i].classList.add("win");
      burstAt(runners[i]);
    });
    spawnConfetti();
    if(seOn) playWin();
    // 1台回しは「結果を見る」ボタンで進む。オンラインはホストが自動集計する
    if(mode==="local") setTimeout(()=>{ document.getElementById("raceResultBtn").style.display=""; }, 900);
    else if(isHost) setTimeout(()=>{ oSettle(); }, 1000);
  }
  function burstAt(run){
    const r=run.querySelector(".r-dot").getBoundingClientRect();
    for(let i=0;i<14;i++){
      const el=document.createElement("div"); el.className="burst";

      document.body.appendChild(el); setTimeout(()=>el.remove(),1800);
    }
  }
  // ゴール時の画面全体の紙吹雪
  function spawnConfetti(){
    const cols=["var(--gold)","var(--red)","var(--turf)","#fff","#ffd166","#2f9e55"];
    for(let i=0;i<46;i++){

    }
  }
  document.getElementById("raceResultBtn").addEventListener("click",()=>{ ensureAudio(); playSelect(); settlePayout(); });

  /* ---------- 配当 ---------- */
  // 集計だけ行い、結果を返す(chips/carryも更新)。表示はしない
  function computePayout(){
    const {best,set}=winnersOf();
    let pool=carry; bets.forEach(b=>{ if(b) pool+=b.amt; });
    const correct=[]; let correctTotal=0;
    bets.forEach((b,i)=>{ if(b && set.includes(b.on)){ correct.push(i); correctTotal+=b.amt; } });
    const deltas=players.map(()=>0);
    bets.forEach((b,i)=>{ if(b) deltas[i]-=b.amt; });   // 賭け金は既に引いてあるが、表示用の増減として記録
    let nextCarry=0;
    if(correct.length===0){ nextCarry=pool; }
    else{
      let dist=0;
      correct.forEach(i=>{ const share=Math.floor(pool * bets[i].amt / correctTotal); players[i].chips+=share; deltas[i]+=share; dist+=share; });
      nextCarry=pool-dist;
    }
    carry=nextCarry;
    return {best, set, someoneWon:correct.length>0, deltas};
  }
  function settlePayout(){   // 1台回し用
    const r=computePayout();
    showResult(r.best, r.set, r.someoneWon, r.deltas);
  }
  function showResult(best, set, someoneWon, deltas){
    const ov=document.getElementById("resultOverlay");
    // タイトル: オンラインは自分視点(大当たり/ざんぱい)、1台は当たった人名(or 大当たりなし)
    const winEl=document.getElementById("resWin"); winEl.className="r-title";
    const isCorrect=i=> !!(bets[i] && set.includes(bets[i].on));   // 1位を当てたか
    if(mode==="online"){
      const mi=myIndex();
      if(mi>=0){
        if(isCorrect(mi)){ winEl.textContent="大当たり！"; winEl.classList.add("res-hit"); }
        else{ winEl.textContent="ざんぱい…"; winEl.classList.add("res-miss"); }
      }else{ winEl.textContent="レース結果"; winEl.classList.add("res-miss"); }
    }else{

    }
    if(s.phase==="race"){
      if(lastRacedRound!==round){ lastRacedRound=round; startRace(); }
      else { showPanel("race"); if(!document.getElementById("poolView").innerHTML) renderPoolView(); }   // 保険: 再配信で画面がズレても必ずレース画面を出す
      return;
    }
    if(s.phase==="result"){
      if(s.result && !document.getElementById("resultOverlay").classList.contains("on")){
        showResult(s.result.best, s.result.set, s.result.someoneWon, s.result.deltas); tuneResultButtons();
      }
      return;
    }
    if(s.phase==="champ"){
      if(!document.getElementById("champOverlay").classList.contains("on")){
        document.getElementById("resultOverlay").classList.remove("on"); showChampion(); tuneChampButtons();
      }
      return;
    }
  }
  // 自分がこのラウンドで送信済みか(snapのentered/betDoneでも判定できるが、送信直後の即時反映用)
  let numDoneRound=-1, betDoneRound=-1;
  function myNumDoneFor(r){ return numDoneRound===r; }
  function myBetDoneFor(r){ return betDoneRound===r; }

  function renderLobbyCode(){
    const box=document.getElementById("lobbyCode");
    if(box.dataset.code===code) return;
    box.dataset.code=code;
    box.innerHTML='<div class="room-note">合言葉（タップでコピー）</div>'
      +'<div class="code-show" id="lobbyCodeShow"><svg class="cs-copy" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"/></svg><span class="cs-code">'+code+'</span></div>';
    document.getElementById("lobbyCodeShow").addEventListener("click", async ()=>{
      try{ await navigator.clipboard.writeText(code); showToast("合言葉をコピーした"); }catch(e){}
    });
  }
  function renderLobbyRounds(cnt){
    const box=document.getElementById("lobbyRounds");
    if(isHost){
      if(box.dataset.built!=="host"){
        box.dataset.built="host";
        box.innerHTML='<div class="rule-frame">'
          +'<div class="rule-col"><div class="rl">レース数</div><div class="rounds-row"><button class="stp-btn" data-rd="-1">−</button><div class="rv"><b class="rVal">'+totalRounds+'</b></div><button class="stp-btn" data-rd="1">＋</button></div></div>'
          +'<div class="rule-col"><div class="rl">制限時間</div><div class="rounds-row"><button class="stp-btn" data-tm="-1">−</button><div class="rv"><b class="tVal">'+fmtTime(timeLimit)+'</b></div><button class="stp-btn" data-tm="1">＋</button></div></div>'
          +'</div>'
          +'<button class="rec-btn" id="lobbyRec">おすすめ：参加人数と同じレース数</button>';
        wireRoundStepper(box);
        document.getElementById("lobbyRec").addEventListener("click",()=>{ ensureAudio(); playSelect();
          const n=Math.max(MIN_ROUNDS,Math.min(MAX_ROUNDS, orderedMembers().length||MINP));
          if(n!==totalRounds){ totalRounds=n; renderRounds(); if(oPhase==="lobby") broadcastSnap(); } });
      }
      renderRounds(); renderTime();
    }else{
      box.dataset.built="guest";
      box.innerHTML='<div class="lr-ro">レース数：'+totalRounds+' ／ 制限：'+fmtTime(timeLimit)+'</div>';
    }
  }
  function renderLobby(s){
    showPanel("lobby");
    renderLobbyCode();
    const roster=(s.lobby||[]);
    const list=document.getElementById("lobbyList"); list.innerHTML="";
    roster.forEach((m,i)=>{
      const row=document.createElement("div"); row.className="lobby-row";
      const col=COLORS[i%COLORS.length];
      row.innerHTML='<span class="p-dot" style="'+dotStyle(col)+'"></span><span class="lr-nm">'+esc(m.name)+'</span>'+(m.host?'<span class="lr-host">ホスト</span>':'');
      list.appendChild(row);
    });
    const cnt=roster.length;
    renderLobbyRounds(cnt);
    if(isHost){
      document.getElementById("lobbyHint").textContent=cnt<MINP?("2人以上集まったら出走できます（現在"+cnt+"人）"):"みんな集まった？ 出走できます";
      document.getElementById("lobbyStart").style.display= cnt>=MINP ? "" : "none";
    }else{
      document.getElementById("lobbyHint").textContent="ホストの開始を待っています…";
      document.getElementById("lobbyStart").style.display="none";
    }
  }

  document.getElementById("lobbyStart").addEventListener("click",()=>{ ensureAudio(); playConfirm(); if(isHost) oStartGame(); });
  function showLobbyWaiting(){ showPanel("lobby"); renderLobbyCode(); renderLobbyRounds(0); document.getElementById("lobbyHint").textContent="部屋に入りました。ホストの開始を待っています…"; document.getElementById("lobbyStart").style.display="none"; document.getElementById("lobbyList").innerHTML=""; }
  document.getElementById("lobbyBack").addEventListener("click",()=>{ ensureAudio(); playSelect(); goTitle(); });

  // 待機画面
  function showWait(msg, dots){ stopTimer(); showPanel("wait"); document.getElementById("waitMsg").innerHTML=msg; document.getElementById("waitProg").textContent=""; document.getElementById("waitWho").innerHTML=""; document.getElementById("betLiveWait").innerHTML=""; document.getElementById("waitMsg").className="big-q"; }
  // 入力済みロスター(数字入力中に表示)
  function renderDoneRoster(el, doneIds, label){
    if(!el) return;
    const done=new Set(doneIds||[]);
    const sig=label+":"+players.map(p=>p.id+(done.has(p.id)?"1":"0")).join(",");
    if(el._sig===sig) return; el._sig=sig;
    let html='<div class="bl-head">'+label+' '+done.size+' / '+players.length+'</div><div class="dr-chips">';
    players.forEach(p=>{ html+='<span class="wait-chip'+(done.has(p.id)?" done":"")+'"><span class="p-dot" style="'+dotStyle(p.color)+'"></span>'+esc(p.name)+'</span>'; });
    el.innerHTML=html+'</div>';
  }
  function showWaitProgress(msg, doneIds, isBet){
    stopTimer();
    showPanel("wait");
    document.getElementById("waitMsg").textContent=msg;
    if(!isBet) document.getElementById("betLiveWait").innerHTML="";
    const done=new Set(doneIds||[]);
    document.getElementById("waitProg").textContent=done.size+" / "+players.length+" 人";
    const who=document.getElementById("waitWho"); who.innerHTML="";
    players.forEach(p=>{
      const c=document.createElement("span"); c.className="wait-chip"+(done.has(p.id)?" done":"");
      c.innerHTML='<span class="p-dot" style="'+dotStyle(p.color)+'"></span>'+esc(p.name);
      who.appendChild(c);
    });
  }

  // 結果/総合のボタンを、オンラインでは操作権を持つ人だけに
  function tuneResultButtons(){
    const next=document.getElementById("nextBtn"), end=document.getElementById("endBtn");
    if(mode!=="online"){ next.style.display=""; end.style.display=""; return; }
    next.style.display=isHost?"":"none"; end.style.display=isHost?"":"none";
  }
  function tuneChampButtons(){
    const again=document.getElementById("champAgain"), home=document.getElementById("champHome");
    if(mode==="online"){
      home.textContent="ロビーへ"; home.style.display=isHost?"":"none";
      again.style.display=isHost?"":"none";
    }else{
      home.textContent="タイトルへ"; home.style.display=""; again.style.display="";
    }
  }

  // ---- ゲスト→ホスト 送信(ack再送) ----
  function sendAct(kind, data){
    if(kind==="num") numDoneRound=round;
    if(kind==="bet") betDoneRound=round;
    if(isHost){ localAct(kind,data); return; }   // ホストは自分で処理
    const aid=myId+":"+(actSeq++);
    const payload=Object.assign({aid, id:myId, kind}, data);
    const send=()=>{ if(!ch) return; try{ ch.send({ type:"broadcast", event:"act", payload }); }catch(e){} };
    send();
    pendingActs[aid]={ payload, timer:setInterval(send, 1200) };
  }
  function ackAct(aid){ if(ch && aid){ try{ ch.send({ type:"broadcast", event:"actack", payload:{aid} }); }catch(e){} } }
  // 仮選択(確定前)の送信。ackなし・最新優先(ロストしても実害なし)
  function sendPick(on){
    if(isHost){ onAct({id:myId, kind:"pick", on}); return; }
    if(!ch) return; try{ ch.send({ type:"broadcast", event:"act", payload:{id:myId, kind:"pick", on} }); }catch(e){}
  }
})();
</script>
</body>
