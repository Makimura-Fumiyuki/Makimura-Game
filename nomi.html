<script>
(function(){
"use strict";
const $=id=>document.getElementById(id);
const TAPW=(window.matchMedia&&matchMedia("(pointer:coarse)").matches)?"タップ":"クリック";
window.__TAPW=TAPW;

/* ================= 効果音(全合成) ================= */
let actx=null, noiseBuf=null;
function ensureAudio(){
  if(!actx){
    try{
      actx=new (window.AudioContext||window.webkitAudioContext)();
      const len=actx.sampleRate*1;
      noiseBuf=actx.createBuffer(1,len,actx.sampleRate);
      const d=noiseBuf.getChannelData(0);
      for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    }catch(e){}
  }
  if(actx && actx.state==="suspended"){ try{ actx.resume(); }catch(e){} }
}
function note(f,t,dur,vol,type){
  if(!actx) return null;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type||"sine"; o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.005); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+dur+0.02);
  return o;
}
/* つぶす音: プチッが主役(プチプチの気泡系の短い弾け)。今作の肝。
   4パターンを用意し、クリックするたびに変わる(同じのが2連続しないランダム)+毎回ピッチゆらぎ */
function popNoise(t,f1,f2,q,vol,dur){   // バンドパスノイズの弾け
  const n=actx.createBufferSource(); n.buffer=noiseBuf;
  const b=actx.createBiquadFilter(); b.type="bandpass"; b.frequency.setValueAtTime(f1,t); b.frequency.exponentialRampToValueAtTime(f2,t+dur*0.8); b.Q.value=q;
  const g=actx.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.0015); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  n.connect(b); b.connect(g); g.connect(actx.destination); n.start(t); n.stop(t+dur+0.02);
}
function popBody(t,f1,f2,vol,dur){   // 丸みの支え(sineの落ち)
  const o=actx.createOscillator(), g=actx.createGain();
  o.type="sine"; o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(f2,t+dur*0.7);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.004); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+dur+0.02);
}
function popCrisp(t,hpf,vol,dur){   // ごく短い高域のパリッ
  const n=actx.createBufferSource(); n.buffer=noiseBuf;
  const h=actx.createBiquadFilter(); h.type="highpass"; h.frequency.setValueAtTime(hpf,t);
  const g=actx.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.001); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  n.connect(h); h.connect(g); g.connect(actx.destination); n.start(t); n.stop(t+dur+0.01);
}
let lastSquishVar=-1;
function playSquish(){   // ポップさは保ちつつ一段低く・聞き心地よく(カリカリした高域を抑え、丸いボディを少し戻した)
  if(!actx) return;
  const t=actx.currentTime, p=0.9+Math.random()*0.35;
  let v=Math.floor(Math.random()*4); if(v===lastSquishVar) v=(v+1)%4; lastSquishVar=v;
  if(v===0){        // 標準のポンッ
    popNoise(t,2600*p,1300*p,1.4,0.5,0.028); popCrisp(t,3900*p,0.15,0.01); popBody(t,470*p,190*p,0.3,0.05);
  }else if(v===1){  // 高めのピッ
    popNoise(t,3100*p,1650*p,1.6,0.44,0.024); popCrisp(t,4400*p,0.13,0.009); popBody(t,540*p,230*p,0.24,0.042);
  }else if(v===2){  // 丸めのポコッ
    popNoise(t,2000*p,1000*p,1.3,0.5,0.032); popCrisp(t,3300*p,0.11,0.01); popBody(t,400*p,155*p,0.34,0.058);
  }else{            // ポポッ(軽い二連)
    popNoise(t,2700*p,1400*p,1.5,0.44,0.024); popBody(t,470*p,200*p,0.24,0.042);
    popNoise(t+0.032,3200*p,1700*p,1.6,0.3,0.02); popBody(t+0.032,560*p,250*p,0.15,0.035);
  }
}

// ランキングに記録を送るのは本番ドメイン(makimura-gamehub.com)から開いた時だけ。

function getUid(){

function myNames(){   // 自分がこのゲームで過去に使った名前=同じ端末なら取り戻せる(doxとは独立)

let lastSync=0, lastSentScore=0, flushTimer=null;
async function sbSubmit(opts){   // 自分の累計を1行追加で送る(読む側が最大値だけ拾う)
  if(!RANKED) return;   // 本番ドメイン以外(ローカル/直接ファイル起動)は送信しない=ランキングに反映されない

  }catch(e){ lastSentScore=prev; }

function scheduleSync(){   // つぶすたびに呼ぶ。行を増やしすぎない送り方(初回すぐ→以降は+10匹かつ15秒あけて)
  if(!playerName()) return;

let count=0; try{ count=parseInt(localStorage.getItem("nomi.count")||"0",10)||0; }catch(e){}
const countEl=$("count"), countWrap=$("countWrap");
/* スコアはノミに押されて動く(物理はframe()内。初期位置=上中央のノミが届く高さ) */
let cX=0, cY=0, cVX=0, cVY=0, cReady=false;
let cH=Math.random()*6.283, cSeed=Math.random()*6.283;   // 数字のさまよい用(向きとゆらぎの種)
/* タップ/長押しが数字の近くに当たったら、かるーくノックバック */
function nudgeCount(x,y,power){
  if(!cReady) return;
  const rx=countEl.offsetWidth/2+26, ry=countEl.offsetHeight/2+24;   // 少し外側まで効く
  const dx=cX-x, dy=cY-y, nd=Math.hypot(dx/rx,dy/ry);
  if(nd<1.2){
    const dist=Math.hypot(dx,dy)||1, k=power*(1.2-nd);
    cVX+=dx/dist*k; cVY+=dy/dist*k;
  }
}
function placeCount(){ countWrap.style.transform="translate("+cX+"px,"+cY+"px) translate(-50%,-50%)"; }

/* 複数タブ対策: 別のタブが保存した累計の方が大きければ取り込む(上書きで数字が巻き戻るのを防ぐ) */

/* ================= ノミの野原 ================= */
const cv=$("cv"), ctx=cv.getContext("2d");
let vw=0, vh=0, dpr=1;
function resize(){
  dpr=Math.min(2, window.devicePixelRatio||1);
  vw=window.innerWidth; vh=window.innerHeight;
  cv.width=Math.round(vw*dpr); cv.height=Math.round(vh*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize",resize); resize();

/* ノミのスプライト=本当にただの点(まるい黒点のみ。トゲ・脚・影なし)
   注意: スプライトは2倍解像度で描く(1倍で作るとdpr拡大でふちがぼやける=「ぼかしがある」と指摘された) */
const SPRITES=[];
(function makeSprites(){
  const RES=2;
  for(let v=0;v<6;v++){
    const coreR=1.5+Math.random()*0.6;         // 点の大きさ(すこしだけ個体差。1.5〜2.1=小さめ・上限も控えめ)
    const S=Math.ceil(coreR*2)+4;
    const oc=document.createElement("canvas"); oc.width=S*RES; oc.height=S*RES;
    const c=oc.getContext("2d");
    c.fillStyle="#161616";
    c.beginPath(); c.arc(S*RES/2,S*RES/2,coreR*RES,0,6.284); c.fill();
    SPRITES.push({cv:oc, size:S, coreR:coreR});
  }
})();

/* ノミの上下の移動範囲: ボタン(名前・地球儀・ゲーム集リンク)のある「高さの帯」全体に入らない
   =上は「HUDボタンの下端」より下・下は「ゲーム集リンクの上端」より上だけを動く
   ※この宣言はspawnFlea/初期湧きより前に置くこと(後ろに置くとTDZで起動時に全体が死ぬ) */
let bandTop=70, bandBottom=1e9;
function updateNoGo(){
  let t=0, b=vh||1e9;
  ["namePill","worldBtn"].forEach(id=>{ const el=$(id); if(!el) return;
    const r=el.getBoundingClientRect(); if(r.width>0) t=Math.max(t,r.bottom); });
  const hf=document.querySelector(".home-foot");
  if(hf){ const r=hf.getBoundingClientRect(); if(r.width>0 && r.top>0) b=Math.min(b,r.top); }
  bandTop=t+10; bandBottom=b-10;
}
setInterval(updateNoGo,2000); window.addEventListener("resize",updateNoGo); setTimeout(updateNoGo,300);

const FLEA_CAP=20000;     // 実質無限にたまる(描画=点1個をスタンプするだけなので大量でも軽い。1.5秒に1匹なので到達には8時間超)
const SPAWN_MS=3000;      // 3秒に1匹
const fleas=[], parts=[], splats=[], ripples=[];
function spawnFlea(scatter){
  if(fleas.length>=FLEA_CAP) return;
  if(vw<50||vh<50) return;   // 画面サイズが取れていない間(裏タブでの起動直後など)は湧かせない
  const m=26;
  const top=Math.max(20,bandTop), bot=Math.min(vh-20,bandBottom);
  let x,y,h;
  if(scatter){   // 裏タブ放置のまとめ分=もう画面全体に散らばっている(左右端に固まらない)
    x=20+Math.random()*(vw-40); y=top+Math.random()*Math.max(40,bot-top); h=Math.random()*6.283;
  }else{         // ふだんの湧き=左右の画面外から歩いて入ってくる(上下から入れるとボタンの帯を横切るのでやめた)
    if(Math.random()<0.5){ x=-m; }else{ x=vw+m; }
    y=top+Math.random()*Math.max(40,bot-top);
    h=Math.atan2(((top+bot)/2 + (Math.random()-0.5)*(bot-top)*0.5)-y, vw*(0.25+Math.random()*0.5)-x);
  }
  fleas.push({
    x:x, y:y, h:h, sp:7+Math.random()*9,   // ゆっくり(px/秒)
    spr:SPRITES[Math.floor(Math.random()*SPRITES.length)],
    ph:Math.random()*6.283, turnSeed:Math.random()*6.283,
    inField:!!scatter
  });
}
/* たまり方のルール(2026-07-14): 閉じている間も増える。最後に開いていた時刻(nomi.lastAlive)からの
   経過ぶんを「起動した瞬間に」一括で画面に散らばせて出す。
   ※以前あった「時差でぽんぽん湧く」変な現象は、留守分を少しずつ分割して湧かせていたのが原因→一括spawnに変更 */
let backlog=0;
try{
  const la=parseInt(localStorage.getItem("nomi.lastAlive")||"0",10);
  if(la>0) backlog=Math.min(FLEA_CAP, Math.floor((Date.now()-la)/SPAWN_MS));
}catch(e){}
function flushBacklog(){   // たまっていた分を全部その場で出す(分割しない)
  if(backlog<=0 || vw<50 || vh<50) return;   // 裏タブ起動などで画面サイズ不明の間だけ保留(見えた瞬間に一括で出す)
  while(backlog>0 && fleas.length<FLEA_CAP){ spawnFlea(true); backlog--; }
  backlog=0;
}
/* 複数タブ対策: 同時に「数える/湧く」タブは1つだけ(タブごとにノミが湧いて倍速で稼げるのを防ぐ)。
   最後に開いた or タップしたタブがアクティブ。ほかのタブは湧き・カウントを止めて案内を出す */
const TAB_ID=(function(){ try{ const a=new Uint8Array(6); crypto.getRandomValues(a); return [...a].map(b=>b.toString(16).padStart(2,"0")).join(""); }catch(e){ return "t"+Math.random(); } })();
let amActive=true;
const pausedOverlay=$("pausedOverlay");
function renderActive(){ if(pausedOverlay) pausedOverlay.style.display=amActive?"none":"flex"; }
function claimActive(){ try{ localStorage.setItem("nomi.owner",JSON.stringify({id:TAB_ID,ts:Date.now()})); }catch(e){} if(!amActive) lastSpawn=Date.now(); amActive=true; renderActive(); }
function checkActive(){
  let o=null; try{ o=JSON.parse(localStorage.getItem("nomi.owner")||"null"); }catch(e){}
  const now=Date.now();
  if(!o||!o.id||now-(o.ts||0)>2500){ claimActive(); }                                    // 誰も居ない/持ち主が消えた→自分が引き継ぐ
  else if(o.id===TAB_ID){ try{ localStorage.setItem("nomi.owner",JSON.stringify({id:TAB_ID,ts:now})); }catch(e){} if(!amActive){ amActive=true; renderActive(); } }
  else if(amActive){ amActive=false; renderActive(); }                                    // 別タブがアクティブ→自分は停止
}
if(pausedOverlay) pausedOverlay.addEventListener("pointerdown",e=>{ e.stopPropagation(); ensureAudio(); claimActive(); });
claimActive();   // 起動時は自分がアクティブ(最後に開いたタブが操作対象)

let lastSpawn=Date.now();
setInterval(()=>{
  checkActive();
  const now=Date.now();
  try{ localStorage.setItem("nomi.lastAlive",String(now)); }catch(e){}   // 生存時刻は在室していれば(非アクティブでも)更新
  if(!amActive){ lastSpawn=now; return; }   // 非アクティブなタブは湧かせない(復帰時に一気に増やさない)
  flushBacklog();   // 裏タブ起動で保留になっていた場合の保険(表に出た瞬間に一括)
  // スマホ保護: 描画が重くなってきたら(約25fps未満)それ以上は増やさない(端末が軽くなれば再開)
  const heavy = avgFrameMs>40 && fleas.length>1500;
  let n=Math.floor((now-lastSpawn)/SPAWN_MS);   // 時間ベース=裏タブでタイマーが間引かれてもまとめて追いつく
  if(n>0){ lastSpawn+=n*SPAWN_MS;
    if(!heavy){ const scatter=n>=3; while(n-->0) spawnFlea(scatter); } }   // まとめて追いつく時(裏タブ放置後)は画面全体に散らばせる。ふだん(1匹ずつ)は左右の画面外から
},1000);
for(let i=0;i<5;i++) spawnFlea();   // 起動した瞬間から出はじめる
flushBacklog();   // 普通に開けば、この瞬間に留守分が全部画面に出ている
window.addEventListener("pagehide",()=>{ try{ localStorage.setItem("nomi.lastAlive",String(Date.now())); }catch(e){} });

function updateFlea(f,dt,t){
  // 特殊な動きは無し=本当にじーっとゆっくり動き続けるだけ(ふらふら彷徨う)
  f.h += Math.sin(t*0.7+f.turnSeed)*0.9*dt + (Math.random()-0.5)*0.5*dt;
  const sp=f.sp*(0.75+0.25*Math.sin(t*0.9+f.ph));
  f.x+=Math.cos(f.h)*sp*dt; f.y+=Math.sin(f.h)*sp*dt;
  // 動ける範囲(左右のふち+上下の帯)の外に出かけたら、範囲の中心へゆるく向き直す
  const m=12;
  const top=Math.max(m,bandTop), bot=Math.min(vh-m,bandBottom);
  if(!f.inField && f.x>m && f.x<vw-m && f.y>top && f.y<bot) f.inField=true;
  if(f.inField && (f.x<m||f.x>vw-m||f.y<top||f.y>bot)){
    const ta=Math.atan2((top+bot)/2-f.y, vw/2-f.x);
    let d=ta-f.h; while(d>3.1416)d-=6.283; while(d<-3.1416)d+=6.283;
    f.h+=d*Math.min(1, 4*dt);
    f.x+=Math.cos(f.h)*20*dt; f.y+=Math.sin(f.h)*20*dt;   // 少し早足で範囲へ戻る
  }
}
function drawFlea(f){
  // ただの点をそのまま置くだけ(回転・ゆらぎ・脚・影なし)。2倍解像度スプライトを実寸で置く=ふちがくっきり
  ctx.drawImage(f.spr.cv, f.x-f.spr.size/2, f.y-f.spr.size/2, f.spr.size, f.spr.size);
}
/* つぶした跡(すぐ薄れて消える。生々しくしない) */
function addSplat(x,y,r){
  const blobs=[];
  for(let i=0;i<4;i++){ const a=Math.random()*6.283, d=r*(0.4+Math.random()*1.1);
    blobs.push({dx:Math.cos(a)*d, dy:Math.sin(a)*d, rx:r*(0.8+Math.random()*0.8), ry:r*(0.5+Math.random()*0.6), rot:Math.random()*3.14}); }
  splats.push({x:x,y:y,blobs:blobs,t:0});
  for(let i=0;i<8;i++){ const a=Math.random()*6.283, v=60+Math.random()*160;
    parts.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,t:0,life:0.24+Math.random()*0.18,r:1+Math.random()*1.6}); }
}
function drawFx(dt){
  for(let i=splats.length-1;i>=0;i--){ const s=splats[i]; s.t+=dt; const k=s.t/0.6;
    if(k>=1){ splats.splice(i,1); continue; }
    ctx.save(); ctx.translate(s.x,s.y); ctx.globalAlpha=0.3*(1-k); ctx.fillStyle="#222";
    const g=1+k*0.3;
    s.blobs.forEach(b=>{ ctx.beginPath(); ctx.ellipse(b.dx*g,b.dy*g,b.rx,b.ry,b.rot,0,6.284); ctx.fill(); });
    ctx.restore(); }
  for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.t+=dt;
    if(p.t>=p.life){ parts.splice(i,1); continue; }
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.9; p.vy*=0.9;
    ctx.globalAlpha=0.7*(1-p.t/p.life); ctx.fillStyle="#1c1c1c";
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.284); ctx.fill(); ctx.globalAlpha=1; }
  for(let i=ripples.length-1;i>=0;i--){ const r=ripples[i]; r.t+=dt; const k=r.t/0.32;
    if(k>=1){ ripples.splice(i,1); continue; }
    ctx.globalAlpha=0.24*(1-k); ctx.strokeStyle="#777"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(r.x,r.y,HIT_R*0.55+k*26,0,6.284); ctx.stroke(); ctx.globalAlpha=1; }   // 波紋は当たり判定より2回り小さい円から始まり、広がっていく
}

let lastTs=0, lastFrameAt=Date.now(), avgFrameMs=16;   // avgFrameMs=描画の重さ(スマホ保護の判定に使う)
function frame(ts){
  const raw=ts-lastTs;
  if(raw>0 && raw<250) avgFrameMs=avgFrameMs*0.95+raw*0.05;
  const dt=Math.min(0.05,raw/1000)||0.016; lastTs=ts; lastFrameAt=Date.now();
  const t=ts/1000;
  ctx.clearRect(0,0,vw,vh);
  fleas.forEach(f=>{ updateFlea(f,dt,t); drawFlea(f); });
  drawFx(dt);
  updateCountPush(dt,t);
  requestAnimationFrame(frame);
}
/* ===== スコアはノミに押されて動かされる(rAFと1fps保険の両方から呼ぶ) ===== */
function updateCountPush(dt,t){
  if(!cReady){
    if(vw>50){ cX=vw/2; cY=vh/2; cReady=true; placeCount(); }   // 初期位置=画面の上下左右ど真ん中
    return;
  }
  const rx=countEl.offsetWidth/2+8, ry=countEl.offsetHeight/2+6;   // 数字の当たり(楕円)。ノミは被ってOK(押すだけ)
  let fx=0, fy=0, pc=0;
  for(let i=0;i<fleas.length;i++){ const f=fleas[i];
    const dx=cX-f.x, dy=cY-f.y;
    if(dx>-rx-6 && dx<rx+6 && dy>-ry-6 && dy<ry+6){
      const nx=dx/rx, ny=dy/ry, d=Math.hypot(nx,ny)||0.001;
      // 触れているノミが自分と反対側へ押す。個体ごとに力のムラ(0.3〜1.7倍)=大群でも押し合いが完全に釣り合わず漂流する
      if(d<1.15){ const w=0.3+((f.ph*1.618)%1)*1.4 + 0.35*Math.sin(t*1.3+f.turnSeed); fx+=nx/d*w; fy+=ny/d*w; pc++; }
    } }
  if(pc){ const k=64/Math.sqrt(pc); cVX+=fx*k*dt; cVY+=fy*k*dt; }
  const fr=Math.pow(0.22,dt); cVX*=fr; cVY*=fr;   // 摩擦(指数)=押されなくなったらすっと止まる。※`1-1.5*dt`だと低fps環境でdtが大きい時に0になり完全静止するバグがあった
  // 何にも触れられていなくても、本当にすこーしだけ彷徨い続ける(ノミと同じ動かし方・動きは小さめ)
  cH += Math.sin(t*0.5+cSeed)*0.6*dt + (Math.random()-0.5)*0.4*dt;
  const drift=3.5+1.5*Math.sin(t*0.7+cSeed);
  cX+=Math.cos(cH)*drift*dt; cY+=Math.sin(cH)*drift*dt;
  cX+=cVX*dt; cY+=cVY*dt;
  const mTop=Math.max(60,bandTop+24), mBot=Math.min(vh-40,bandBottom-24);   // ノミの動ける範囲の中にとどめる=押されっぱなしで画面外に行かない
  if(cX<70){ cX=70; cVX=Math.abs(cVX)*0.3; } if(cX>vw-70){ cX=vw-70; cVX=-Math.abs(cVX)*0.3; }
  if(cY<mTop){ cY=mTop; cVY=Math.abs(cVY)*0.3; } if(cY>mBot){ cY=mBot; cVY=-Math.abs(cVY)*0.3; }
  placeCount();
}
requestAnimationFrame(frame);
/* rAFが止まる環境(裏タブ等)でも最低限動かす保険 */
setInterval(()=>{ if(Date.now()-lastFrameAt>900){ lastFrameAt=Date.now(); const t=Date.now()/1000;
  ctx.clearRect(0,0,vw,vh); fleas.forEach(f=>{ updateFlea(f,0.9,t); drawFlea(f); }); drawFx(0.9); updateCountPush(0.9,t); } },1000);

/* ================= つぶす ================= */
const HIT_R=(matchMedia("(pointer:coarse)").matches?48:40);   // 広め=タップ地点のまわりをまとめてつぶせる
function squishHits(x,y){   // その地点を中心に、半径内のノミをまとめてつぶす(音は鳴らさない)。つぶした数を返す
  let n=0;
  for(let i=fleas.length-1;i>=0;i--){ const f=fleas[i];
    if(Math.hypot(f.x-x,f.y-y) < HIT_R+f.spr.coreR*1.5){ addSplat(f.x,f.y,f.spr.coreR); fleas.splice(i,1); n++; } }
  return n;
}
function squishFeedback(n){ if(!n || !amActive) return; playSquish(); if(navigator.vibrate){ try{ navigator.vibrate(12); }catch(_){}} bumpCount(n); }   // 非アクティブタブでは数えない
/* タップ+長押し+なぞり: 押している間はつぶし続ける */
const heldPts=new Map();
cv.addEventListener("pointerdown",e=>{
  ensureAudio();
  try{ cv.setPointerCapture(e.pointerId); }catch(_){}   // キャプチャ=ボタンの上や画面外を通っても、押している限りつぶし続けられる
  heldPts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  const n=squishHits(e.clientX,e.clientY);
  squishFeedback(n);
  nudgeCount(e.clientX,e.clientY,80);   // 数字の近くを叩いたら、かるーくノックバック
  if(n===0) ripples.push({x:e.clientX,y:e.clientY,t:0});
});
/* 動かした時は前回位置からの経路を刻んで全部判定=素早く動かしても取りこぼさない。
   判定した点それぞれに波紋も出す=判定の密度とエフェクトの数が見合う */
cv.addEventListener("pointermove",e=>{
  const p=heldPts.get(e.pointerId); if(!p) return;
  const dx=e.clientX-p.x, dy=e.clientY-p.y, dist=Math.hypot(dx,dy);
  const steps=Math.max(1, Math.ceil(dist/(HIT_R*0.6)));
  let n=0;
  for(let i=1;i<=steps;i++){ const sx=p.x+dx*i/steps, sy=p.y+dy*i/steps;
    n+=squishHits(sx,sy); ripples.push({x:sx,y:sy,t:0}); nudgeCount(sx,sy,16); }   // なぞりが数字をかすめたら少しずつ押す
  squishFeedback(n);
  p.x=e.clientX; p.y=e.clientY;
});
["pointerup","pointercancel","lostpointercapture"].forEach(ev=>cv.addEventListener(ev,e=>heldPts.delete(e.pointerId)));   // ※pointerleaveで消さない=HUDの上や画面外に出ただけで長押しが切れていたバグの修正
/* 長押し中: 80msごとに足元をつぶし+波紋を出しつづける(押してる感)。数字の近くなら押しつづけてノックバック */
setInterval(()=>{ heldPts.forEach(p=>{ squishFeedback(squishHits(p.x,p.y)); ripples.push({x:p.x,y:p.y,t:0}); nudgeCount(p.x,p.y,22); }); },80);
cv.addEventListener("contextmenu",e=>e.preventDefault());

/* ================= 名前 ================= */
const nameOverlay=$("nameOverlay"), nameInput=$("nameInput"), nameErr=$("nameErr"), nameOk=$("nameOk");
let nameRequired=false;
function renderName(){
  const n=playerName();
  $("myName").textContent=n;
  $("namePill").classList.toggle("show",!!n);
}
function openNameModal(req){
  nameRequired=!!req;
  $("nameX").style.display=nameRequired?"none":"";   // 初回の必須登録では×を出さない
  nameErr.classList.remove("show");
  nameInput.value=playerName();
  nameOk.disabled=false; nameOk.textContent="決定";
  nameOverlay.classList.add("on"); document.body.classList.add("veil");
  setTimeout(()=>{ try{ nameInput.focus(); nameInput.select(); }catch(e){} },60);
}
function closeNameModal(){ nameOverlay.classList.remove("on"); document.body.classList.remove("veil"); }
let nameErrTimer=null;
function showNameErr(msg){
  nameErr.textContent=msg; nameErr.classList.add("show");
  if(nameErrTimer) clearTimeout(nameErrTimer);
  nameErrTimer=setTimeout(()=>{ nameErr.classList.remove("show"); },3000);   // 3秒表示してフェードアウト
}
async function confirmName(){
  const v=[...(nameInput.value||"")].slice(0,10).join("").trim();
  if(!v){ showNameErr("名前を入力してください"); return; }
  const cur=playerName();
  if(v===cur){ closeNameModal(); return; }
  nameOk.disabled=true; nameOk.textContent="確認中…";
  let ok=true;
  if(!myNames().has(v)){ ok=!(await sbNameTaken(v)); }   // 自分が過去に使った名前なら取り戻せる
  nameOk.disabled=false; nameOk.textContent="決定";
  if(!ok){ showNameErr("この名前は使われています"); return; }
  setPlayerName(v);
  renderName();
  closeNameModal();
  lastSentScore=0; sbSubmit();   // 名前を確定したらすぐ1回送る(改名なら新しい名前の行が最新=ランキングも変わる)
}
nameOk.addEventListener("click",()=>{ ensureAudio(); confirmName(); });   // 枠外タップでは閉じない
$("nameX").addEventListener("click",()=>{ ensureAudio(); playSelect(); closeNameModal(); });   // ×=新しい名前を入力していても更新せずに閉じる
nameInput.addEventListener("keydown",e=>{ if(e.key==="Enter" && !e.isComposing){ e.preventDefault(); confirmName(); } });
nameInput.addEventListener("input",()=>nameErr.classList.remove("show"));
$("namePill").addEventListener("click",()=>{ ensureAudio(); playSelect(); openNameModal(false); });   // ペン+名前のどこを押しても変更できる
renderName();
if(!playerName()) openNameModal(true);   // 初回起動時のみ名前入力を依頼

/* ================= 世界オーバーレイ ================= */
const worldOverlay=$("worldOverlay"), wTotal=$("wTotal"), wList=$("wList");
async function loadWorld(){
  wTotal.textContent="-";
  wList.innerHTML='<div class="w-state">読み込み中…</div>';
  let raw=null;
  try{
    const r=await fetch(SB_URL+"/rest/v1/scores?mode=like.nomi:*&order=score.desc,created_at.asc&limit=1000&select=name,score,mode",{headers:SB_HEAD});
    if(!r.ok) throw new Error("load "+r.status);
    raw=await r.json();
  }catch(e){
    wList.innerHTML='<div class="w-state">読み込みに失敗しました（通信環境を確認）</div><div style="text-align:center"><button class="w-retry" id="wRetry">再読み込み</button></div>';
    const rb=$("wRetry"); if(rb) rb.addEventListener("click",()=>{ playSelect(); loadWorld(); });
    return;
  }
  // 個人(mode=nomi:ID)ごとに最大値の行だけ残す(累計は増える一方なので最大=最新。名前も最新のもの)
  const seen=new Map();
  raw.forEach(r=>{ if(!seen.has(r.mode)) seen.set(r.mode,{name:r.name, score:r.score|0, mode:r.mode}); });
  // 自分のまだ送っていない分もその場で反映(見た目上ずれないように)
  const me=playerName();
  if(me && count>0){
    const mine=seen.get(MYMODE);
    if(mine){ mine.score=Math.max(mine.score, count|0); mine.name=me; }
    else seen.set(MYMODE,{name:me, score:count|0, mode:MYMODE});
  }
  const rows=[...seen.values()].sort((a,b)=>b.score-a.score);
  const SHOW_N=999;   // ランキングは999位まで表示
  const total=rows.reduce((s,r)=>s+r.score,0);
  wTotal.textContent=total.toLocaleString("ja-JP");
  if(!rows.length){ wList.innerHTML='<div class="w-state">まだ誰も遊んでないよ...</div>'; return; }
  const myIdx=rows.findIndex(r=>r.mode===MYMODE);
  let html="";
  rows.slice(0,SHOW_N).forEach((r,i)=>{
    html+='<div class="w-row'+(i===myIdx?" me":"")+'"'+(i===myIdx?' id="wMeRow"':'')+'><span class="rk">'+(i+1)+'</span><span class="nm">'+escHtml(r.name)+'</span><span class="sc">'+r.score.toLocaleString("ja-JP")+'</span></div>';
  });
  wList.innerHTML=html;
  // 自分の順位の常設行(リストの下)。タッチでリスト内の自分の行までスクロール(圏外=リストに行が無ければ何も起きない)
  const wMe=$("wMe");
  if(me){
    const myRank = myIdx>=0 ? (myIdx+1) : "—";
    const mySc = myIdx>=0 ? rows[myIdx].score : (count|0);
    wMe.innerHTML='<span class="rk">'+myRank+'</span><span class="nm">'+escHtml(me)+'</span><span class="sc">'+mySc.toLocaleString("ja-JP")+'</span>';
    wMe.style.display="";
  }else{
    wMe.style.display="none";
  }
}
function escHtml(s){ return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function closeWorld(){ worldOverlay.classList.remove("on"); document.body.classList.remove("veil"); }
$("worldBtn").addEventListener("click",()=>{ ensureAudio(); playSelect(); worldOverlay.classList.add("on"); document.body.classList.add("veil"); loadWorld(); });
// 閉じるのは右上の×だけ(下部のとじるは廃止・枠外タップでも閉じない)
$("worldX").addEventListener("click",()=>{ playSelect(); closeWorld(); });
// 自分の順位の常設行タッチ→リスト内の自分の行まで自動スクロール(行が無い=圏外なら何も起きない)
// ※smoothはrAF駆動で環境により動かないため、scrollTopを直接動かす確実な方式
$("wMe").addEventListener("click",()=>{
  const r=document.getElementById("wMeRow"); if(!r) return;
  playSelect();
  wList.scrollTop = r.offsetTop - wList.clientHeight/2 + r.offsetHeight/2;   // 自分の行をリスト中央へ
});

window.addEventListener("pointerdown",ensureAudio,{passive:true});

/* 入力欄は、内容があればタッチで全選択(全入力欄共通) */
document.addEventListener("focusin",e=>{
  const t=e.target;
  if(t && t.tagName==="INPUT" && t.value){ setTimeout(()=>{ try{ t.select(); }catch(_){}} ,0); }
});
})();
