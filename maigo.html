<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ま囲碁</title>
<meta name="apple-mobile-web-app-title" content="ま囲碁">
<meta name="application-name" content="ま囲碁">
<meta name="description" content="Q.普通の囲碁？ A.いいえ、置いた碁石が迷子になって盤のどこかへ動くかも。友達と戦うのはもちろん、AIとも戦える… ※先に碁石を取ったら勝ちの簡易ルールを採用しています">
<!-- リンクを人に送った時のカード(OGP)。文言はハブのゲームカードと同じ -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="牧村が作ったゲーム集">
<meta property="og:title" content="ま囲碁">
<meta property="og:description" content="Q.普通の囲碁？ A.いいえ、置いた碁石が迷子になって盤のどこかへ動くかも。友達と戦うのはもちろん、AIとも戦える… ※先に碁石を取ったら勝ちの簡易ルールを採用しています">
<meta name="twitter:card" content="summary">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap');
  :root{
    --washi:#f3ead7;          /* 和紙 */
    --sumi:#332f2a;           /* 墨 */
    --wood:#dcaf6e;           /* 碁盤の木 */
    --wood-dark:#b98c4f;
    --line:#6b5236;
    --shu:#c73e2e;            /* 朱 */
    --moku:#9aa0a6;           /* 煙 */
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(ellipse 120% 90% at 50% -20%, rgba(255,255,255,.55), transparent 60%),
      radial-gradient(ellipse 100% 70% at 50% 115%, rgba(150,120,70,.12), transparent 60%),
      var(--washi);
    color:var(--sumi);
    font-family:"Yuji Syuku","Hiragino Mincho ProN","Yu Mincho",serif;
    position:relative; height:100svh; overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }

  /* ===== 画面切り替え(シームレスなクロスフェード) ===== */
  .scene{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    opacity:0; pointer-events:none; transform:translateY(16px);
    transition:opacity .32s linear, transform .32s cubic-bezier(.2,.8,.3,1);
    overflow-y:auto;
    scrollbar-width:none;   /* スクロールバー自体を非表示に(ずれ・隙間の根本原因を断つ) */
  }
  .scene::-webkit-scrollbar{ display:none; }
  .scene.on{ opacity:1; pointer-events:auto; transform:translateY(0); }

  /* ===== タイトル ===== */
  #titleScene{ padding:9vh 20px 150px; gap:34px; }   /* 下余白はフッターの帯より深く(入室ボタン等が被らない) */
  .t-wrap{ position:relative; text-align:center; }
  .t-main{
    font-size:clamp(40px, 11vw, 76px); letter-spacing:.08em; line-height:1.25;
    color:var(--sumi); text-shadow:0 2px 0 rgba(255,255,255,.6);
  }
  .t-main .maigo-moji{ color:var(--shu); display:inline-block; animation:maigoWander 7.5s ease-in-out infinite; }
  @keyframes maigoWander{   /* 「ま」が迷子のようにふらふら彷徨う: 左へふらり→立ち止まってきょろ→右へふらふら→戻ってくる */
    0%{ transform:translate(0,0) rotate(0); }
    9%{ transform:translate(-15px,-2px) rotate(-9deg); }
    18%{ transform:translate(-24px,3px) rotate(-3deg); }
    26%{ transform:translate(-25px,2px) rotate(7deg); }    /* 立ち止まってきょろっ */
    33%{ transform:translate(-24px,3px) rotate(-5deg); }
    46%{ transform:translate(-4px,-4px) rotate(4deg); }
    58%{ transform:translate(17px,1px) rotate(10deg); }
    68%{ transform:translate(25px,5px) rotate(2deg); }
    76%{ transform:translate(23px,3px) rotate(-8deg); }    /* 振り返る */
    88%{ transform:translate(6px,-2px) rotate(-3deg); }
    100%{ transform:translate(0,0) rotate(0); }
  }
  .t-sub{ margin-top:14px; font-size:clamp(13px,3.6vw,17px); opacity:.72; letter-spacing:.15em; }
  /* 背後を漂う煙 */
  .t-cloud{ position:absolute; border-radius:50%; z-index:-1; opacity:.5; filter:blur(2px);
    background:radial-gradient(circle at 40% 38%, #fff, rgba(255,255,255,0) 70%); }
  .t-cloud.c1{ width:130px; height:90px; left:-60px; top:-30px; animation:drift 7s ease-in-out infinite; }
  .t-cloud.c2{ width:100px; height:70px; right:-50px; bottom:-20px; animation:drift 9s ease-in-out infinite reverse; }
  @keyframes drift{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(14px,-10px); } }

  .sec-label{ font-size:15px; letter-spacing:.35em; opacity:.6; text-align:center; margin-bottom:10px; }

  /* 難易度・手番: 木札 */
  .fuda-row{ display:flex; gap:14px; justify-content:center; width:min(92vw, 430px); margin:0 auto; }
  .fuda{
    flex:1 1 0; min-width:0; padding:14px 8px 15px; text-align:center; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-size:19px; letter-spacing:.1em; color:var(--sumi);
    background:linear-gradient(160deg, #ecd9ac, var(--wood) 55%, var(--wood-dark));
    border:2px solid #7a5c34; border-radius:8px;
    box-shadow:0 3px 0 #7a5c34, 0 6px 10px rgba(60,40,10,.25);
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
  }
  .fuda:active{ transform:translateY(2px); box-shadow:0 1px 0 #7a5c34; }
  .fuda.sel{
    color:#fff; background:linear-gradient(160deg, #e0684f, var(--shu) 55%, #9c2c1f);
    border-color:#7d2318; box-shadow:0 3px 0 #7d2318, 0 6px 12px rgba(150,40,20,.35);
    transform:scale(1,1.08);   /* 縦にだけ膨らむ: 横幅が変わらないので行ごとの幅がずれて見えない */
  }
  .fuda small{ display:block; font-size:11px; opacity:.75; margin-top:4px; letter-spacing:.05em; }
  /* あそびかた行は3枚並ぶので、少し広く・文字は小さめに */
  #modeRow{ width:min(94vw, 500px); }
  #modeRow .fuda{ font-size:clamp(12px,3.3vw,15px); letter-spacing:.02em; padding-left:3px; padding-right:3px; }
  #modeRow .fuda small{ font-size:10px; }
  .fuda.ghost{ opacity:.45; cursor:default; filter:grayscale(.5); }
  .fuda.ghost:active{ transform:none; box-shadow:0 3px 0 #7a5c34, 0 6px 10px rgba(60,40,10,.25); }
  /* あそびかた選択後に出現する設定ブロック */
  .setup{ display:none; flex-direction:column; align-items:center; gap:30px; }
  .setup.on{ display:flex; animation:setupIn .3s cubic-bezier(.2,.9,.3,1); }
  @keyframes setupIn{ 0%{ opacity:0; transform:translateY(16px); } 100%{ opacity:1; transform:translateY(0); } }
  .prep-note{ font-size:clamp(12px,3.3vw,14px); letter-spacing:.1em; opacity:.65; text-align:center; }
  /* ルール設定(迷子確率・とる数) */
  #ruleBox{ display:none; flex-direction:column; align-items:center; gap:11px; }
  .rule-frame{ display:flex; flex-direction:column; align-items:center; gap:12px;
    background:rgba(255,255,255,.45); border:1px solid rgba(51,47,42,.2); border-radius:14px;
    padding:16px 30px 12px; box-shadow:0 2px 8px rgba(60,40,10,.08); }
  .rc-reset{
    padding:5px 16px 6px; cursor:pointer; font-family:inherit; font-size:12px; letter-spacing:.15em;
    color:var(--sumi); opacity:.7; background:transparent;
    border:1px solid rgba(51,47,42,.35); border-radius:6px;
  }
  .rc-reset:active{ transform:translateY(1px); }
  .setup.on #ruleBox, #ruleBox.on{ display:flex; }
  /* 迷子のゆくえ トグル(特殊ルール) */
  .mg-row{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .mg-name{ font-size:13px; letter-spacing:.15em; opacity:.65; text-align:center; }
  .mg-name small{ display:block; font-size:10px; letter-spacing:.1em; opacity:.7; margin-top:2px; }
  .mg-toggle{ display:flex; gap:10px; width:min(90vw,320px); }
  .mg-btn{ flex:1 1 0; min-width:0; padding:7px 8px 8px; cursor:pointer; font-family:inherit; font-size:13px; letter-spacing:.03em; white-space:nowrap; text-align:center;
    color:var(--sumi); background:rgba(255,255,255,.5); border:1.5px solid rgba(51,47,42,.35); border-radius:7px; }
  .mg-btn.sel{ color:#fff; background:linear-gradient(160deg,#e0684f,var(--shu) 55%,#9c2c1f); border-color:#7d2318; }
  .mg-btn:active{ transform:translateY(1px); }
  .rule-ctrls{ display:flex; gap:34px; justify-content:center; }
  .rc{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .rc-name{ font-size:13px; letter-spacing:.15em; opacity:.65; }
  .rc-row{ display:flex; align-items:center; gap:12px; }
  .rc-btn{
    width:40px; height:40px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:22px; line-height:1;
    color:var(--sumi); background:linear-gradient(160deg, #ecd9ac, var(--wood) 60%, var(--wood-dark));
    border:2px solid #7a5c34; box-shadow:0 2px 0 #7a5c34;
  }
  .rc-btn:active{ transform:translateY(2px); box-shadow:none; }
  .rc-val{ min-width:74px; text-align:center; font-size:26px; letter-spacing:.05em; color:var(--shu); }
  .rc-note{ font-size:12px; letter-spacing:.1em; opacity:.6; min-height:16px; }
  /* オンライン: 合言葉まわり */
  .room-area{ display:flex; flex-direction:column; align-items:center; gap:14px; min-height:40px; text-align:center; }
  .room-code{ margin-top:-8px; }   /* 「合言葉」ラベルと本体を近づける */
  .room-code{ font-size:clamp(36px,9vw,48px); letter-spacing:.3em; text-indent:.3em; color:var(--shu);
    text-shadow:0 2px 0 rgba(255,255,255,.6); margin-top:-9px; }
  .room-note{ font-size:clamp(12px,3.3vw,14px); letter-spacing:.1em; opacity:.7; }
  .room-note.err{ color:var(--shu); opacity:1; }
  .copy-ic{ width:.55em; height:.55em; margin-right:14px; vertical-align:baseline; opacity:.55; }
  .code-row{ display:flex; align-items:center; gap:8px; }
  .paste-btn{ flex:none; display:flex; align-items:center; justify-content:center; cursor:pointer; padding:4px;
    color:rgba(51,47,42,.6); background:none; border:none; }   /* ボタン枠なし・アイコンのみ(コピーボタンと揃える) */
  .paste-btn svg{ width:26px; height:26px; }
  .paste-btn:active{ transform:translateY(1px); }
  .code-input{
    width:230px; padding:10px 6px; text-align:center; font-family:inherit;
    font-size:26px; letter-spacing:.25em; text-indent:.25em; text-transform:uppercase;
    color:var(--sumi); background:#fff; border:2px solid rgba(51,47,42,.45); border-radius:8px; outline:none;
    line-height:1.2; caret-color:var(--sumi);   /* スマホ(WebKit)でletter-spacing付きの入力欄はカーソルが見えなくなる既知の癖があるため明示 */
  }
  @keyframes waitDots{ 0%,100%{ opacity:.35; } 50%{ opacity:1; } }
  .room-wait{ animation:waitDots 1.6s ease-in-out infinite; }
  .stone-mini{ display:inline-block; width:16px; height:16px; border-radius:50%; vertical-align:-2px; margin-right:6px; border:1px solid rgba(0,0,0,.4); }
  .stone-mini.b{ background:radial-gradient(circle at 35% 30%, #666, #111 65%); }
  .stone-mini.w{ background:radial-gradient(circle at 35% 30%, #fff, #cfcabc 70%); }
  /* おまかせ=黒(左上)に白(右下)を少し斜めに重ねる。テキストへ近づけるため右余白は詰める */
  .stone-mini.rnd{ background:none; border:none; position:relative; top:-3px; width:22px; height:20px; margin-right:3px; vertical-align:middle; }
  .stone-mini.rnd::before, .stone-mini.rnd::after{ content:""; position:absolute; width:15px; height:15px; border-radius:50%; border:1px solid rgba(0,0,0,.4); box-sizing:border-box; }
  .stone-mini.rnd::before{ left:0; top:0; background:radial-gradient(circle at 35% 30%, #666, #111 65%); }   /* 黒(左上・奥) */
  .stone-mini.rnd::after{ left:7px; top:5px; background:radial-gradient(circle at 35% 30%, #fff, #cfcabc 70%); }   /* 白(右下・手前) */

  .start-btn{
    margin-top:6px; padding:16px 58px 18px; cursor:pointer; white-space:nowrap;
    font-family:inherit; font-size:26px; letter-spacing:.3em; text-indent:.3em; color:#fff;
    background:linear-gradient(160deg, #4a453d, var(--sumi) 60%, #171512);
    border:2px solid #14120f; border-radius:10px;
    box-shadow:0 4px 0 #14120f, 0 8px 14px rgba(0,0,0,.3);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .start-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #14120f; }

  /* 画面下部いっぱいのフッター帯(上に向かって透けるグラデーション) */
  /* タイトル画面のフッター: 画面(viewport)に直接固定 */
  .home-foot{
    position:fixed; left:0; right:0; bottom:0; z-index:40;
    display:block; text-align:center;
    padding:34px 0 16px; font-size:13px; letter-spacing:.2em;
    color:rgba(244,244,241,.95); text-shadow:0 1px 2px rgba(40,30,15,.4);
    background:linear-gradient(to top, rgba(51,47,42,.55), rgba(51,47,42,.3) 50%, rgba(51,47,42,0));
    text-decoration:none;
    opacity:0; pointer-events:none; transition:opacity .32s linear;
  }
  /* 帯全体ではなく文字の部分だけタップに反応させる(入室ボタン等への誤射を防ぐ) */
  .home-foot span{ pointer-events:none; }
  #titleScene.on ~ .home-foot{ opacity:1; }   /* タイトル表示中だけ現れる */
  #titleScene.on ~ .home-foot span{ pointer-events:auto; cursor:pointer; }
  .home-foot:hover{ color:#fff; }

  /* ===== 対局画面 ===== */
  #gameScene{ padding:12px 10px 30px; gap:10px; justify-content:center; }
  /* 現在ルールの表示(上部・2枚): ボタンに見えない「貼り紙」風。2枚は同サイズ */
  .rule-tags{ display:flex; gap:12px; justify-content:center; width:min(94vw, 380px); }
  .rule-tag{
    flex:1 1 0; min-width:0; padding:4px 0 6px; border-radius:3px; text-align:center; white-space:nowrap;
    font-size:clamp(12px,3.4vw,15px); letter-spacing:.12em; color:rgba(51,47,42,.78);
    background:rgba(255,255,255,.48); border:1px dashed rgba(51,47,42,.35);
  }
  /* 音ON/OFF(全画面共通・右上): 控えめな見た目 */
  .snd-btns{ position:fixed; right:10px; top:10px; z-index:80; display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
  .snd-btn{
    display:flex; align-items:center; justify-content:flex-end; gap:5px;
    width:82px; padding:4px 10px 5px 0; cursor:pointer;
    font-family:inherit; font-size:12px; letter-spacing:.06em; white-space:nowrap;
    color:rgba(51,47,42,.7); background:rgba(255,255,255,.4);
    border:1px solid rgba(51,47,42,.28); border-radius:14px;
    transition:opacity .15s linear;
  }
  .snd-btn svg{ width:14px; height:13px; flex:none; }
  .snd-btn:active{ transform:translateY(1px); }
  .snd-btn.off{ opacity:.42; text-decoration:line-through; }
  /* 左上: あそびかたボタン(対局シーン表示中だけ現れる。効果音ボタンと同じ質感) */
  /* 左上・全画面共通(タイトルでも対局中でも見られる) */
  .help-btn{
    position:fixed; left:10px; top:10px; z-index:80;
    display:flex; align-items:center; gap:5px;
    padding:4px 12px 5px 8px; cursor:pointer;
    font-family:inherit; font-size:12px; letter-spacing:.06em; white-space:nowrap;
    color:rgba(51,47,42,.7); background:rgba(255,255,255,.4);
    border:1px solid rgba(51,47,42,.28); border-radius:14px;
  }
  .help-btn span{
    display:inline-flex; align-items:center; justify-content:center;
    width:15px; height:15px; border-radius:50%; flex:none;
    background:var(--shu); color:#fff; font-size:11px; font-weight:700;
  }
  .help-btn:active{ transform:translateY(1px); }
  /* あそびかた説明のオーバーレイ(投了確認と同じ挙動) */
  #helpOverlay, #undoOverlay{
    position:fixed; inset:0; z-index:60; display:flex;
    align-items:center; justify-content:center;
    background:rgba(30,26,20,.55);
    opacity:0; pointer-events:none; transition:opacity .25s linear;
  }
  #helpOverlay.on, #undoOverlay.on{ opacity:1; pointer-events:auto; }
  #helpOverlay .r-card, #undoOverlay .r-card{ transform:scale(.6); opacity:0; }
  #helpOverlay.on .r-card, #undoOverlay.on .r-card{ transform:scale(1); opacity:1; }
  .help-card{ width:min(88vw, 420px); align-items:stretch; }
  .help-title{ font-size:22px; letter-spacing:.12em; text-align:center; color:var(--shu); font-weight:700; }
  #helpOverlay .help-body{ font-size:14px; line-height:1.95; letter-spacing:.03em; text-align:left; }
  /* 見出し: すみかっこをやめて色棒方式(全角かっこの左余白による「右ズレ錯覚」も解消) */
  #helpOverlay .help-body .h-sec{
    display:flex; align-items:center; gap:8px;
    font-weight:700; letter-spacing:.1em; font-size:15px;
  }
  #helpOverlay .help-body .h-sec::before{
    content:""; width:5px; height:17px; border-radius:2px; background:var(--sumi); flex:none;
  }
  #helpOverlay .help-body .h-sec.hl{ color:var(--shu); }
  #helpOverlay .help-body .h-sec.hl::before{ background:var(--shu); }
  #helpOverlay .help-body p{ margin:3px 0 0; }
  #helpOverlay .help-body p + .h-sec{ margin-top:15px; }
  .help-body .hl{ color:var(--shu); font-weight:700; }
  .help-body b{ font-weight:700; }
  /* 対局中の一時メッセージ(画面上部中央にふわっと) */
  #toast{
    position:fixed; left:50%; top:64px; transform:translate(-50%,-8px); z-index:70;
    max-width:86vw; padding:9px 18px; border-radius:999px;
    background:var(--sumi); color:#fff;
    font-size:13px; letter-spacing:.06em; white-space:nowrap; text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,.3);
    opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
  }
  #toast.on{ opacity:1; transform:translate(-50%,0); }
  /* 迷子: きょろきょろする碁石の頭上に浮かぶ「？」 */
  .qmark{
    position:fixed; z-index:65; pointer-events:none; color:var(--shu);
    font-family:inherit; line-height:1; text-shadow:0 2px 0 rgba(255,255,255,.7);
    transform-origin:50% 100%;
    animation:qmarkPop .45s cubic-bezier(.3,1.5,.5,1) backwards, qmarkSway 1.1s ease-in-out .4s infinite;
  }
  @keyframes qmarkPop{ 0%{ transform:scale(0); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
  @keyframes qmarkSway{ 0%,100%{ transform:scale(1) rotate(-7deg); } 50%{ transform:scale(1.08) rotate(7deg); } }
  /* 迷子: とてとて歩いていく碁石(外側=移動 / 内側=ぴょこぴょこ跳ねる) */
  .walker{ position:fixed; z-index:60; pointer-events:none; }
  .walker-in{ width:100%; height:100%; border-radius:50%; box-shadow:0 5px 10px rgba(0,0,0,.35);
    animation:walkHop .19s ease-in-out infinite; }
  .walker-in.b{ background:radial-gradient(circle at 35% 30%, #6e6e6e, #1c1c1c 60%, #000); }
  .walker-in.w{ background:radial-gradient(circle at 35% 30%, #ffffff, #e9e2cf 55%, #b9b2a0); }
  @keyframes walkHop{ 0%,100%{ transform:translateY(0) scale(1,1); } 50%{ transform:translateY(-30%) scale(.94,1.08); } }
  /* 歩いたあとに残る足あと(すっと消える) */
  .footp{ position:fixed; z-index:44; width:7px; height:10px; border-radius:50%;
    background:rgba(51,47,42,.4); pointer-events:none; animation:footFade 1.3s linear forwards; }
  @keyframes footFade{ 0%{ opacity:.55; } 100%{ opacity:0; } }
  /* 勝利: 勝った側の碁笥から碁石が吹き上がる */
  .burst{ position:fixed; z-index:40; border-radius:50%; pointer-events:none;   /* 碁笥より上のレイヤーから飛び出す */
    box-shadow:0 4px 8px rgba(0,0,0,.3);
    animation:burstFly 1.25s cubic-bezier(.3,.4,.5,1) forwards; }
  .burst.b{ background:radial-gradient(circle at 35% 30%, #6e6e6e, #1c1c1c 60%, #000); }
  .burst.w{ background:radial-gradient(circle at 35% 30%, #ffffff, #e9e2cf 55%, #b9b2a0); }
  @keyframes burstFly{
    0%{ transform:translate(0,0) rotate(0) scale(.7); opacity:1; }
    45%{ transform:translate(calc(var(--bx)*0.55), var(--by)) rotate(220deg) scale(1.05); opacity:1; }
    100%{ transform:translate(var(--bx), 60vh) rotate(440deg) scale(1); opacity:0; }
  }
  /* 碁笥(碁石入れ) */
  .bowl{
    position:absolute; bottom:16px; width:clamp(62px,17vw,102px); aspect-ratio:1/1; border-radius:50%;
    background:radial-gradient(circle at 35% 28%, #c89a5c, #8a6a3c 62%, #5d4426 95%);
    box-shadow:inset 0 8px 14px rgba(0,0,0,.5), inset 0 -3px 6px rgba(255,255,255,.15), 0 5px 10px rgba(60,40,10,.35);
    opacity:.4; transition:opacity .3s linear; pointer-events:none;
    z-index:6;   /* 勝利の碁石(z4)より上: 石は碁笥の下から湧いて見える */
  }
  .bowl.bk{ left:12px; } .bowl.wh{ right:12px; }
  .bowl .bs{ position:absolute; width:26%; height:26%; border-radius:50%; box-shadow:0 1px 3px rgba(0,0,0,.4); }
  .bowl.bk .bs{ background:radial-gradient(circle at 35% 30%, #6e6e6e, #1c1c1c 60%, #000); }
  .bowl.wh .bs{ background:radial-gradient(circle at 35% 30%, #ffffff, #e9e2cf 55%, #b9b2a0); }
  .bowl.active{ opacity:1; animation:bowlBreath 1.5s ease-in-out infinite; }   /* 手番側はふくらんで呼吸する */
  @keyframes bowlBreath{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.1); } }
  .bowl.pop{ animation:bowlPop .32s cubic-bezier(.3,1.4,.5,1); }
  /* 碁笥の上のラベル(碁笥のゆれから独立して固定) */
  .bowl-tag{
    position:absolute; bottom:calc(16px + clamp(62px,17vw,102px) + 7px);
    width:clamp(62px,17vw,102px); text-align:center;
    font-size:clamp(11px,3vw,14px); letter-spacing:.06em; white-space:nowrap;
    color:rgba(51,47,42,.75); pointer-events:none;
  }
  /* とった数/ノルマ: 勝敗に直結する大事な数字なので大きく朱色で */
  .bowl-tag b{
    display:block; margin-top:2px; font-weight:700;
    font-size:clamp(20px,5.4vw,27px); letter-spacing:.06em;
    color:var(--shu); text-shadow:0 1px 0 rgba(255,255,255,.65);
  }
  .bowl-tag.bk-t{ left:12px; }
  .bowl-tag.wh-t{ right:12px; }
  @keyframes bowlPop{ 0%{ transform:scale(1); } 35%{ transform:scale(1.22,0.82) translateY(4px); } 70%{ transform:scale(0.94,1.1) translateY(-5px); } 100%{ transform:scale(1); } }
  /* 碁笥から盤へ飛ぶ石 */
  .fly{ position:fixed; z-index:60; border-radius:50%; pointer-events:none;
    box-shadow:0 5px 10px rgba(0,0,0,.35);
    transition:transform .3s cubic-bezier(.35,.75,.35,1); }
  .fly.b{ background:radial-gradient(circle at 35% 30%, #6e6e6e, #1c1c1c 60%, #000); }
  .fly.w{ background:radial-gradient(circle at 35% 30%, #ffffff, #e9e2cf 55%, #b9b2a0); }

  /* 碁盤 */
  .board-wrap{ position:relative; width:min(94vw, 64svh); aspect-ratio:1/1; }
  #board{
    position:absolute; inset:0; border-radius:6px;
    background:
      radial-gradient(ellipse 90% 70% at 30% 20%, rgba(255,255,255,.35), transparent 55%),
      linear-gradient(150deg, #e6bd7d, var(--wood) 45%, #c99a58);
    border:3px solid #6e5330;
    box-shadow:0 6px 0 #6e5330, 0 12px 24px rgba(60,40,10,.3);
  }
  .gline{ position:absolute; background:var(--line); opacity:.85; }
  .gline.v{ width:1px; top:3.846%; height:92.308%; }
  .gline.h{ height:1px; left:3.846%; width:92.308%; }
  .gstar{ position:absolute; width:5px; height:5px; border-radius:50%; background:var(--line); transform:translate(-50%,-50%); }
  .cell{ position:absolute; width:7.692%; height:7.692%; transform:translate(-50%,-50%); cursor:pointer; }
  /* 置けるよの赤丸は「自分が打てる時」だけ(#boardに.myturnが付く) */
  @media (pointer:fine){ #board.myturn .cell:hover::after{ content:""; position:absolute; inset:15%; border-radius:50%; background:rgba(199,62,46,.18); } }
  .cell.taken{ cursor:default; }
  .cell.taken:hover::after{ display:none; }

  .stone{
    position:absolute; inset:7%; border-radius:50%;
    box-shadow:0 2px 4px rgba(0,0,0,.35);
    animation:stoneIn .22s cubic-bezier(.3,1.5,.5,1);
  }
  .stone.b{ background:radial-gradient(circle at 35% 30%, #6e6e6e, #1c1c1c 60%, #000); }
  .stone.w{ background:radial-gradient(circle at 35% 30%, #ffffff, #e9e2cf 55%, #b9b2a0); }
  @keyframes stoneIn{ 0%{ transform:scale(1.7); opacity:.4; } 70%{ transform:scale(.92); opacity:1; } 100%{ transform:scale(1); } }
  /* 迷子前の「きょろきょろ」: 落ち着かない様子であたりを見回す */
  .stone.kyoro{ animation:kyoroLook .66s ease-in-out forwards; }
  .stone.kyoro.long{ animation-duration:1.3s; }   /* 勝負を決める/阻止する一手は長きょろきょろ */
  /* 決着級の一手が迷子にならなかった！: 碁石が一時的に黄金の巨石になって輝き、その後もとに戻る */
  .stone.gold{ background:radial-gradient(circle at 35% 30%, #ffefae, #f0b53a 55%, #a97a18) !important; }
  .stone.gold.shine{ animation:shineGlow 1.05s cubic-bezier(.25,1.2,.4,1) forwards; z-index:4; }   /* 勝利ラインの点滅より優先 */
  @keyframes shineGlow{
    0%{ transform:scale(2.3); box-shadow:0 0 0 0 rgba(245,185,66,.95), 0 0 30px 10px rgba(255,230,150,.95), 0 2px 4px rgba(0,0,0,.35); filter:brightness(1.9); }
    45%{ transform:scale(1.45); filter:brightness(1.4); }
    100%{ transform:scale(1.45); box-shadow:0 0 0 34px rgba(245,185,66,0), 0 0 16px 4px rgba(255,220,130,.6), 0 2px 4px rgba(0,0,0,.35); filter:brightness(1.15); }
  }
  .spark{
    position:absolute; left:50%; top:50%; border-radius:50%; pointer-events:none; z-index:6;
    background:radial-gradient(circle, #fff3c9, #f5b942 55%, rgba(245,185,66,0) 75%);
    transform:translate(-50%,-50%) scale(.5); opacity:1;
    animation:sparkFly .85s ease-out forwards;
  }
  @keyframes sparkFly{
    0%{ transform:translate(-50%,-50%) scale(.5); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--sx,0px)), calc(-50% + var(--sy,-40px))) scale(1.15); opacity:0; }
  }
  @keyframes kyoroLook{
    0%{ transform:scale(1) rotate(0); }
    20%{ transform:scale(1.06) rotate(-16deg) translateX(-5%); }
    42%{ transform:scale(1.06) rotate(14deg) translateX(5%); }
    62%{ transform:scale(1.1) rotate(-12deg) translateX(-4%); }
    82%{ transform:scale(1.1) rotate(10deg) translateX(4%); }
    100%{ transform:scale(1.14) rotate(0); }
  }
  /* そろった列: 金色にピカピカ輝く */
  .stone.win-glow{ animation:winPulse .75s ease-in-out infinite; }
  @keyframes winPulse{
    0%,100%{ box-shadow:0 2px 4px rgba(0,0,0,.35), 0 0 0 0 rgba(245,185,66,.85), 0 0 6px 1px rgba(255,224,140,.4);
             filter:brightness(1.6) saturate(1.15); }
    50%{ box-shadow:0 2px 4px rgba(0,0,0,.35), 0 0 0 11px rgba(245,185,66,0), 0 0 16px 4px rgba(255,224,140,.85);
         filter:brightness(1.05); }
  }
  /* 勝利: 決め手の石ぜんぶが同時に金色にふくらみ、同じリズムで輝く(同時に付けるので点滅の位相もそろう) */
  .stone.win-gold{
    background:radial-gradient(circle at 35% 30%, #ffefae, #f0b53a 55%, #a97a18) !important;
    z-index:4;
    animation:winGoldIn .55s cubic-bezier(.25,1.2,.4,1) forwards, winPulse .75s ease-in-out .55s infinite;
  }
  @keyframes winGoldIn{ 0%{ transform:scale(1); } 55%{ transform:scale(1.5); } 100%{ transform:scale(1.28); } }
  /* 一番最後に置かれた碁石の目印(朱の輪) */
  .stone.last::after{ content:""; position:absolute; inset:33%; border-radius:50%; border:2px solid rgba(199,62,46,.85); box-sizing:border-box; }

  /* 煙 */
  .puff{
    position:absolute; border-radius:50%; pointer-events:none; z-index:5;
    background:radial-gradient(circle at 42% 40%, rgba(255,255,255,.95), rgba(190,190,190,.75) 55%, rgba(190,190,190,0) 75%);
    animation:puffUp .75s ease-out forwards;
  }
  @keyframes puffUp{
    0%{ transform:translate(-50%,-50%) scale(.25); opacity:1; }
    30%{ opacity:.95; }
    100%{ transform:translate(calc(-50% + var(--px,0px)), calc(-50% + var(--py,-26px))) scale(var(--ps,1.8)); opacity:0; }
  }
  .puff{ animation-duration:.85s; }

  .sub-btns{ display:flex; gap:16px; }
  .txt-btn{
    padding:8px 22px; cursor:pointer; font-family:inherit; font-size:15px; letter-spacing:.15em;
    color:var(--sumi); background:rgba(255,255,255,.5); white-space:nowrap;
    border:1px solid rgba(51,47,42,.35); border-radius:7px;
  }
  .txt-btn:active{ transform:translateY(1px); }
  .txt-btn:disabled{ opacity:.35; cursor:default; pointer-events:none; }   /* 相手の思考中などはグレーアウト */

  /* ===== 結果 ===== */
  #resultOverlay{
    position:fixed; inset:0; z-index:50; display:flex;
    align-items:center; justify-content:center; flex-direction:column; gap:26px;
    background:rgba(30,26,20,.55);
    opacity:0; pointer-events:none; transition:opacity .3s linear;
  }
  #resultOverlay.on{ opacity:1; pointer-events:auto; }
  /* 投了の確認ダイアログ(結果ダイアログと同じ作法) */
  /* ルール変更ダイアログ(結果画面から・部屋を抜けずに) */
  #ruleOverlay{
    position:fixed; inset:0; z-index:65; display:flex;
    align-items:center; justify-content:center;
    background:rgba(30,26,20,.55);
    opacity:0; pointer-events:none; transition:opacity .25s linear;
  }
  #ruleOverlay.on{ opacity:1; pointer-events:auto; }
  #ruleOverlay .r-card{ transform:scale(.6); opacity:0; }
  #ruleOverlay.on .r-card{ transform:scale(1); opacity:1; }
  #ruleOverlay .r-card{ width:min(94vw,480px); padding-left:14px; padding-right:14px; }
  #ruleOverlay #ruleBox{ background:transparent; border:none; box-shadow:none; padding:0; width:100%; }
  #ruleOverlay .rule-frame{ background:transparent; border:none; box-shadow:none; padding:0; width:100%; }
  #ruleOverlay .rule-ctrls{ flex-direction:column; gap:12px; align-items:center; }   /* ダイアログ内は縦積みでラベルの見切れを防ぐ */
  #confirmOverlay{
    position:fixed; inset:0; z-index:60; display:flex;
    align-items:center; justify-content:center;
    background:rgba(30,26,20,.55);
    opacity:0; pointer-events:none; transition:opacity .25s linear;
  }
  #confirmOverlay.on{ opacity:1; pointer-events:auto; }
  #confirmOverlay .r-card{ transform:scale(.6); opacity:0; }
  #confirmOverlay.on .r-card{ transform:scale(1); opacity:1; }
  .cf-msg{ font-size:clamp(20px,5.4vw,28px); letter-spacing:.1em; }
  .r-card .sub-btns{ width:100%; }
  .r-card .txt-btn{ flex:1 1 0; min-width:120px; }
  .r-card{
    background:var(--washi); border:3px solid var(--sumi); border-radius:12px;
    width:min(84vw, 56svh); padding:26px 22px 24px; text-align:center;
    display:flex; flex-direction:column; gap:18px; align-items:center;
    box-shadow:0 14px 30px rgba(0,0,0,.4);
    transform:scale(.6); opacity:0;
    transition:transform .3s cubic-bezier(.3,1.4,.5,1), opacity .25s linear;
  }
  #resultOverlay.on .r-card{ transform:scale(1); opacity:1; }
  /* 枠の外をタップ → ダイアログを引っ込めて盤面を眺める(もう一度タップで再表示)
     ※ .onの表示ルールより後に書いて確実に上書きする */
  #resultOverlay.on.peek{ background:rgba(30,26,20,0); }
  #resultOverlay.on.peek .r-card{ opacity:0; transform:scale(.92); pointer-events:none; }
  .r-title{ font-size:clamp(24px,6.5vw,36px); letter-spacing:.12em; }
  .r-title.win{ color:var(--shu); }
  .r-sub{ font-size:14px; opacity:.7; letter-spacing:.1em; }
  .r-foe{ display:inline-block; margin-top:4px; font-size:12px; opacity:.75; letter-spacing:.06em; color:var(--shu); }
</style>
</head>
<body>

  <!-- ===== タイトル ===== -->
  <div class="scene on" id="titleScene">
    <div class="t-wrap">
      <div class="t-cloud c1"></div><div class="t-cloud c2"></div>
      <div class="t-main"><span class="maigo-moji">ま</span>囲碁</div>
      <div class="t-sub">― 置いた碁石、迷子になって別のマスへ ―</div>
    </div>

    <div>
      <div class="sec-label">あそびかた</div>
      <div class="fuda-row" id="modeRow">
        <button class="fuda" data-mode="local">1台で遊ぶ<small>近くの友と対局</small></button>
        <button class="fuda" data-mode="friend">オンラインで遊ぶ<small>遠くの友と対局</small></button>
        <button class="fuda" data-mode="robot">ひとりで遊ぶ<small>ロボットと対局</small></button>
      </div>
    </div>


    <!-- ルール設定(あそびかた選択後、選んだ側のブロックに移動して出現) -->
    <div id="ruleBox">
      <div class="rule-frame">
      <div class="sec-label">ルール</div>
      <div class="rule-ctrls">
        <div class="rc">
          <div class="rc-name">迷子確率</div>
          <div class="rc-row"><button class="rc-btn" data-t="p" data-d="-1">−</button><span class="rc-val" id="probVal">20%</span><button class="rc-btn" data-t="p" data-d="1">＋</button></div>
        </div>
        <div class="rc">
          <div class="rc-name">何個囲んだら勝ち</div>
          <div class="rc-row"><button class="rc-btn" data-t="w" data-d="-1">−</button><span class="rc-val" id="winVal">1</span><button class="rc-btn" data-t="w" data-d="1">＋</button></div>
        </div>
      </div>
      <div class="mg-row">
        <div class="mg-name">迷子のゆくえ</div>
        <div class="mg-toggle" id="stayToggle">
          <button class="mg-btn sel" data-stay="1">盤の中へ移動</button>
          <button class="mg-btn" data-stay="0">盤の外へ消える</button>
        </div>
      </div>
      </div><!-- /.rule-frame : 以下は枠の外 -->
      <button class="rc-reset" id="ruleReset">初期設定に戻す</button>
      <div class="rc-note" id="ruleNote"></div>
    </div>

    <!-- ロボット対局の設定(あそびかた選択後に出現) -->
    <div class="setup" id="cpuSetup">
      <div>
        <div class="sec-label">つよさ</div>
        <div class="fuda-row" id="lvRow">
          <button class="fuda" data-lv="0">初級<small>お手柔らかに</small></button>
          <button class="fuda sel" data-lv="1">中級<small>いい勝負</small></button>
          <button class="fuda" data-lv="2">上級<small>勝てたら侍</small></button>
        </div>
      </div>
      <div>
        <div class="sec-label">手番</div>
        <div class="fuda-row" id="orderRow">
          <button class="fuda sel" data-first="1"><span class="stone-mini b"></span>先手<small>黒で打つ</small></button>
          <button class="fuda" data-first="0"><span class="stone-mini w"></span>後手<small>白で打つ</small></button>
          <button class="fuda" data-first="r"><span class="stone-mini rnd"></span>おまかせ<small>先後ランダム</small></button>
        </div>
      </div>
      <button class="start-btn" id="startBtn">いざ、対局</button>
    </div>

    <!-- ならんで遊ぶ(1台で交互に対局) -->
    <div class="setup" id="localSetup">
      <button class="start-btn" id="startLocalBtn">いざ、対局</button>
    </div>

    <!-- 友と遊ぶ(オンライン): 合言葉方式 -->
    <div class="setup" id="friendSetup">
      <div class="fuda-row">
        <button class="fuda" id="makeRoomBtn">部屋を作る<small>合言葉を発行</small></button>
        <button class="fuda" id="joinRoomBtn">部屋に入る<small>合言葉で入室</small></button>
      </div>
      <div class="room-area" id="roomArea"></div>
    </div>

  </div>

  <!-- ===== 対局 ===== -->
  <div class="scene" id="gameScene">
    <div class="rule-tags">
      <div class="rule-tag" id="tagProb"></div>
      <div class="rule-tag" id="tagWin"></div>
    </div>
    <div class="board-wrap"><div id="board"></div></div>
    <div class="sub-btns">
      <button class="txt-btn" id="undoBtn">一手戻る</button>
      <button class="txt-btn" id="giveupBtn">投了</button>
    </div>
    <!-- 碁笥(碁石入れ): 黒=左下 / 白=右下。手番側がゆれる -->
    <div class="bowl-tag bk-t" id="bowlTagB"></div>
    <div class="bowl-tag wh-t" id="bowlTagW"></div>
    <div class="bowl bk" id="bowlB">
      <div class="bs" style="left:22%;top:26%"></div><div class="bs" style="left:44%;top:22%;width:23%;height:23%"></div>
      <div class="bs" style="left:60%;top:36%;width:21%;height:21%"></div><div class="bs" style="left:30%;top:44%"></div>
      <div class="bs" style="left:50%;top:50%;width:24%;height:24%"></div><div class="bs" style="left:18%;top:56%;width:20%;height:20%"></div>
      <div class="bs" style="left:40%;top:62%;width:22%;height:22%"></div><div class="bs" style="left:12%;top:38%;width:19%;height:19%"></div>
      <div class="bs" style="left:64%;top:56%;width:20%;height:20%"></div><div class="bs" style="left:36%;top:14%;width:18%;height:18%"></div>
      <div class="bs" style="left:56%;top:18%;width:17%;height:17%"></div><div class="bs" style="left:26%;top:64%;width:18%;height:18%"></div>
    </div>
    <div class="bowl wh" id="bowlW">
      <div class="bs" style="left:22%;top:26%"></div><div class="bs" style="left:44%;top:22%;width:23%;height:23%"></div>
      <div class="bs" style="left:60%;top:36%;width:21%;height:21%"></div><div class="bs" style="left:30%;top:44%"></div>
      <div class="bs" style="left:50%;top:50%;width:24%;height:24%"></div><div class="bs" style="left:18%;top:56%;width:20%;height:20%"></div>
      <div class="bs" style="left:40%;top:62%;width:22%;height:22%"></div><div class="bs" style="left:12%;top:38%;width:19%;height:19%"></div>
      <div class="bs" style="left:64%;top:56%;width:20%;height:20%"></div><div class="bs" style="left:36%;top:14%;width:18%;height:18%"></div>
      <div class="bs" style="left:56%;top:18%;width:17%;height:17%"></div><div class="bs" style="left:26%;top:64%;width:18%;height:18%"></div>
    </div>
  </div>

  <!-- タイトル画面のフッター(シーンの外・画面に直接固定するので隙間が出ない) -->
  <a class="home-foot" id="homeFoot" href="./index.html"><span>牧村が作ったゲーム集へ</span></a>

  <!-- 全画面共通: あそびかた(左上)。タイトルでも対局中でも見られる -->
  <button class="help-btn" id="helpBtn" aria-label="あそびかた"><span>？</span>あそびかた</button>

  <!-- 全画面共通: 効果音のON/OFF -->
  <div class="snd-btns">
    <button class="snd-btn" id="seBtn"><svg viewBox="0 0 25 24"><path d="M3 9v6h4l5 4V5L7 9H3z" fill="currentColor"/><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M15 9.4c1.3 1.3 1.3 3.9 0 5.2"/><path d="M17.6 7.6c2.2 2.2 2.2 6.6 0 8.8"/><path d="M20.2 5.8c3.1 3.1 3.1 9.3 0 12.4"/></g></svg>効果音</button>
  </div>

  <!-- 対局中の一時メッセージ(待った申し込み等) -->
  <div id="toast"></div>

  <!-- ===== あそびかた説明 ===== -->
  <div id="helpOverlay">
    <div class="r-card help-card">
      <div class="help-title">あそびかた</div>
      <div class="help-body" id="helpBody"></div>
      <div class="sub-btns"><button class="txt-btn" id="helpClose">とじる</button></div>
    </div>
  </div>

  <!-- ===== 待った(一手戻る)の確認 ===== -->
  <div id="undoOverlay">
    <div class="r-card">
      <div class="cf-msg" id="undoMsg">「待った」を許すか？</div>
      <div class="sub-btns">
        <button class="txt-btn" id="undoYes">許す</button>
        <button class="txt-btn" id="undoNo">断る</button>
      </div>
    </div>
  </div>

  <!-- ===== 投了の確認 ===== -->
  <div id="confirmOverlay">
    <div class="r-card">
      <div class="cf-msg">まことに投了する？</div>
      <div class="sub-btns">
        <button class="txt-btn" id="cfNo">やめておく</button>
        <button class="txt-btn" id="cfYes">投了する</button>
      </div>
    </div>
  </div>

  <!-- ===== ルール変更(結果画面から・部屋を抜けずに) ===== -->
  <div id="ruleOverlay">
    <div class="r-card help-card">
      <div class="cf-msg">ルールを変える</div>
      <div id="ruleSlot"></div>
      <div class="sub-btns">
        <button class="txt-btn" id="ruleOk">これでよし</button>
      </div>
    </div>
  </div>

  <!-- ===== 結果 ===== -->
  <div id="resultOverlay">
    <div class="r-card">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  const N=13, EMPTY=0, BLACK=1, WHITE=2;
  const boardEl=document.getElementById("board");
  const bowlB=document.getElementById("bowlB"), bowlW=document.getElementById("bowlW");
  const tagProb=document.getElementById("tagProb"), tagWin=document.getElementById("tagWin");
  const titleScene=document.getElementById("titleScene"), gameScene=document.getElementById("gameScene");
  const resultOverlay=document.getElementById("resultOverlay");
  const rTitle=document.getElementById("rTitle"), rSub=document.getElementById("rSub");

  let board=[], stones=[], turn=BLACK, human=BLACK, cpuLv=1;
  const LV_NAMES=["初級","中級","上級"];
  let undoUsed=false;   // ロボット戦で一手戻るを使ったか(結果画面で「待ったなし」自慢に使う)
  let prob=0, over=false, busy=false;
  let capB=0, capW=0;   // とった石の数(黒がとった数 / 白がとった数)
  let local=false;   // 1台で遊ぶ(交互に打つ)モード
  let hist=[];       // 局面の履歴(一手戻る用。打つ前の盤面をまるごと保存)
  /* --- カスタムルール --- */
  let maigoProb=20, normNum=1;   // 迷子確率% / 先に何目とったら勝ちか
  let maigoStay=true;   // 迷子は盤の外へ消えず、盤上の別マスへ移動する(初期ON)。OFFで盤の外へ消える
  const KAN=["","一","二","三","四","五","六","七","八","九","十"];
  const PROB_STEPS=(()=>{ const a=[]; for(let p=0;p<=95;p+=5)a.push(p); a.push(99); return a; })();   // 0,5,...,95,99
  let probIdx=PROB_STEPS.indexOf(20);
  /* --- オンライン状態 --- */
  const SB_URL="https://kvgmsyognvgxqxkhvltx.supabase.co";
  const SB_KEY="sb_publishable_cak3-W9Mmgahnwawreoa1Q_CVuhmkKL";
  let sb=null, ch=null, online=false, isHost=false, startSent=false;
  let myRematch=false, peerRematch=false, joinWatch=0;
  let peerGone=false;   // あいてが部屋からいなくなった(再戦不可)
  /* --- 一番最後に置かれた碁石の目印 --- */
  let lastStoneEl=null;
  function markLast(el){ if(lastStoneEl && lastStoneEl.isConnected) lastStoneEl.classList.remove("last"); lastStoneEl=el||null; if(el) el.classList.add("last"); }
  /* --- この部屋での成績(オンライン連戦用) --- */
  let roomWins=0, roomLosses=0, roomDraws=0, roomStreak=0;
  function bumpRoomStats(res){
    if(res==="win"){ roomWins++; roomStreak++; }
    else if(res==="lose"){ roomLosses++; roomStreak=0; }
    else { roomDraws++; roomStreak=0; }
    renderRoomStats();
  }
  function renderRoomStats(){
    const el=document.getElementById("rStats"); if(!el) return;
    const total=roomWins+roomLosses;
    if(!online || (total+roomDraws)===0){ el.style.display="none"; return; }
    let t="この部屋の成績 "+roomWins+"勝"+roomLosses+"敗"+(roomDraws? roomDraws+"分":"");
    if(total) t+="・勝率"+Math.round(roomWins*100/total)+"%";
    if(roomStreak>=2) t+="・"+roomStreak+"連勝中";
    el.style.display=""; el.textContent=t;
  }
  let undoPending=false;   // オンライン: 自分が「待った」を申し込んで返事待ちの間true
  const myId=Math.random().toString(36).slice(2,10);
  /* 一手の送信を確実に届ける仕組み: broadcastは届く保証がなく、通信が一瞬切れただけで
     「両者とも相手の手番だと思い込み、誰も打てなくなる」進行不能に陥るため、
     受け取った側が必ずackを返し、届くまで送った側が送り直す(五もくもく並べと同じ仕組み) */
  let mySeq=0, lastRecvSeq=0, pendingSeq=0, moveResendTimer=0;

  /* ---------- 盤の生成 ---------- */
  const cells=[];
  (function buildBoard(){
    const pc=i=>((i+0.5)*100/N)+"%";
    let html="";
    for(let i=0;i<N;i++){
      html+='<div class="gline v" style="left:'+pc(i)+'"></div>';
      html+='<div class="gline h" style="top:'+pc(i)+'"></div>';
    }
    [[3,3],[3,9],[6,6],[9,3],[9,9]].forEach(([r,c])=>{
      html+='<div class="gstar" style="left:'+pc(c)+';top:'+pc(r)+'"></div>';
    });
    boardEl.innerHTML=html;
    for(let r=0;r<N;r++){ cells.push([]);
      for(let c=0;c<N;c++){
        const d=document.createElement("div");
        d.className="cell"; d.style.left=pc(c); d.style.top=pc(r);
        d.addEventListener("click",()=>{ ensureAudio(); humanPlace(r,c); });
        boardEl.appendChild(d); cells[r].push(d);
      }
    }
  })();

  /* ---------- 音 (WebAudio 生成 / 効果音のみ) ---------- */
  let actx=null, master=null, noiseBuf=null, seBus=null;
  let seOn=localStorage.getItem("maigo.se")!=="0";
  function ensureAudio(){
    if(actx) return;
    try{
      actx=new (window.AudioContext||window.webkitAudioContext)();
      master=actx.createGain(); master.gain.value=0.9;
      const comp=actx.createDynamicsCompressor(); comp.threshold.value=-10;
      master.connect(comp).connect(actx.destination);
      seBus=actx.createGain();  seBus.gain.value = seOn?1:0;  seBus.connect(master);
      const n=Math.floor(actx.sampleRate*0.3);
      noiseBuf=actx.createBuffer(1,n,actx.sampleRate);
      const d=noiseBuf.getChannelData(0);
      for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
    }catch(e){}
  }
  function note(f,t,dur,peak,type,bus){
    if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||"sine"; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(peak,t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g).connect(bus||seBus); o.start(t); o.stop(t+dur+0.05);
  }
  /* --- 和風SEパーツ --- */
  function pluck(f,t,dur,peak,bus){   // 琴の爪弾き(カープラス・ストロング法: 弦の物理シミュレーション)
    if(!actx) return;
    const dl=actx.createDelay(0.06); dl.delayTime.value=1/f;
    const fb=actx.createGain(); fb.gain.setValueAtTime(f<400?0.977:0.962, t);
    fb.gain.linearRampToValueAtTime(0, t+dur);   // 弦の減衰(ループ停止も兼ねる)
    const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=Math.min(f*7, 5200);
    const out=actx.createGain();
    out.gain.setValueAtTime(peak*1.7, t); out.gain.exponentialRampToValueAtTime(0.0001, t+dur+0.1);
    const s=actx.createBufferSource(); s.buffer=noiseBuf;   // 爪で弾く一瞬のノイズ
    const ex=actx.createGain(); ex.gain.setValueAtTime(0.9,t); ex.gain.exponentialRampToValueAtTime(0.0001,t+0.012);
    s.connect(ex); ex.connect(dl);
    dl.connect(lp); lp.connect(fb); fb.connect(dl);   // 弦ループ
    dl.connect(out); out.connect(bus||seBus);
    s.start(t); s.stop(t+0.02);
  }
  function taiko(t,f0,peak,bus){      // 和太鼓「ドンッ」
    if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type="sine"; o.frequency.setValueAtTime(f0||120,t); o.frequency.exponentialRampToValueAtTime(46,t+0.12);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(peak||0.7,t+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.3);
    o.connect(g).connect(bus||seBus); o.start(t); o.stop(t+0.34);
    const s=actx.createBufferSource(); s.buffer=noiseBuf;
    const f=actx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=850;
    const g2=actx.createGain(); g2.gain.setValueAtTime((peak||0.7)*0.32,t); g2.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
    s.connect(f).connect(g2).connect(bus||seBus); s.start(t); s.stop(t+0.07);
  }
  function hyoshigi(t,peak,bus){      // 拍子木「カンッ！」
    if(!actx) return;
    const s=actx.createBufferSource(); s.buffer=noiseBuf;
    const f=actx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=3100; f.Q.value=7;
    const g=actx.createGain(); g.gain.setValueAtTime(peak||0.6,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.09);
    s.connect(f).connect(g).connect(bus||seBus); s.start(t); s.stop(t+0.12);
    note(1750,t,0.05,(peak||0.6)*0.23,"sine",bus);
  }
  function playStone(){   // 石「パチッ」+ 盤の低い響き
    if(!actx) return; const t=actx.currentTime;
    const s=actx.createBufferSource(); s.buffer=noiseBuf;
    const f=actx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=2600; f.Q.value=1.2;
    const g=actx.createGain();
    g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
    s.connect(f).connect(g).connect(seBus); s.start(t); s.stop(t+0.09);
    note(150,t,0.12,0.2,"sine");
  }
  function playPuff(){    // もくもく: 小太鼓「ぽんっ」+ 煙の「ぼふっ」
    if(!actx) return; const t=actx.currentTime;
    taiko(t, 220, 0.5);
    const s=actx.createBufferSource(); s.buffer=noiseBuf;
    const f=actx.createBiquadFilter(); f.type="lowpass";
    f.frequency.setValueAtTime(1600,t); f.frequency.exponentialRampToValueAtTime(220,t+0.3);
    const g=actx.createGain();
    g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
    s.connect(f).connect(g).connect(seBus); s.start(t); s.stop(t+0.38);
  }
  function playKyoro(dur){    // 迷子前の「きょろきょろ」: 琴の問いかけ(ん？んん？)
    if(!actx) return; const t=actx.currentTime, D=dur||0.66;
    pluck(392, t, 0.28, 0.16);
    pluck(523, t+0.16, 0.34, 0.2);
    if(D>1){ pluck(392, t+0.62, 0.28, 0.15); pluck(587, t+0.8, 0.4, 0.2); }
  }
  function playWalk(i){       // とてとて歩く足音(交互に高さが変わる)
    if(!actx) return; const t=actx.currentTime;
    note(i%2 ? 620 : 470, t, 0.07, 0.14, "triangle");
    const s=actx.createBufferSource(); s.buffer=noiseBuf;
    const f=actx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=900;
    const g=actx.createGain(); g.gain.setValueAtTime(0.16,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
    s.connect(f).connect(g).connect(seBus); s.start(t); s.stop(t+0.07);
  }
  function playCapture(){     // 石をとった！: 拍子木＋太鼓＋琴のひと弾き
    if(!actx) return; const t=actx.currentTime;
    hyoshigi(t, 0.55); taiko(t+0.06, 150, 0.7);
    pluck(587, t+0.14, 0.4, 0.2);
  }
  function playNo(){          // そこには打てぬ: 低い二連の琴
    if(!actx) return; const t=actx.currentTime;
    pluck(220, t, 0.25, 0.2); pluck(185, t+0.11, 0.3, 0.2);
  }
  function playTick(){ if(actx) hyoshigi(actx.currentTime, 0.4); }   // ルール増減も他UIと同じ拍子木
  function playShine(){   // 決着級の一手が耐えた！: 琴のきらめく上昇 + 拍子木
    if(!actx) return; const t=actx.currentTime;
    [659,880,1319].forEach((f,i)=> pluck(f, t+i*0.07, 0.6, 0.2));
    hyoshigi(t+0.22, 0.45);
  }
  function playSelect(){ if(actx) hyoshigi(actx.currentTime); }            // 選択 = 拍子木「カンッ」
  function playStart(){ if(actx){ const t=actx.currentTime; taiko(t,130,0.8); hyoshigi(t+0.09,0.5); } }   // 対局開始 = 「ドンッ、カッ」
  function playWin(){    // 勝ち = 琴の華やかなかき上げ + 上オクターブ追い + 太鼓二連打 + きらめき(手応え強化)
    if(!actx) return; const t=actx.currentTime;
    [294,330,349,440,587].forEach((f,i)=> pluck(f, t+i*0.085, 0.55, 0.28));   // 平調子のかき上げ
    [587,659,698,880].forEach((f,i)=> pluck(f, t+0.30+i*0.07, 0.5, 0.2));      // 上のオクターブで華やかに追い足す
    taiko(t+0.5, 150, 0.85); taiko(t+0.66, 110, 0.6);                          // 締めの太鼓 二連打(ドン・ドンッ)
    hyoshigi(t+0.5, 0.55); hyoshigi(t+0.66, 0.4);                              // 拍子木も重ねる
    note(1319, t+0.62, 0.5, 0.13, "triangle"); note(1760, t+0.70, 0.6, 0.09, "sine");   // 最後に鈴のようなきらめき
  }
  function playLose(){   // 負け = 琴の下降 + 遠い太鼓
    if(!actx) return; const t=actx.currentTime;
    [440,349,294].forEach((f,i)=> pluck(f, t+i*0.16, 0.6, 0.2));
    taiko(t+0.52, 90, 0.5);
  }

  /* ---------- 進行 ---------- */
  function rollProb(){ prob=maigoProb; }
  function setTurnLabel(){   // 手番は碁笥(碁石入れ)のゆれで表現
    bowlB.classList.toggle("active", !over && turn===BLACK);
    bowlW.classList.toggle("active", !over && turn===WHITE);
  }

  function startGame(){
    board=[]; for(let r=0;r<N;r++){ board.push(new Array(N).fill(EMPTY)); }
    stones=[]; for(let r=0;r<N;r++){ stones.push(new Array(N).fill(null)); }
    cells.forEach(row=>row.forEach(d=>{ d.innerHTML=""; d.classList.remove("taken"); }));
    over=false; busy=false; turn=BLACK; hist=[]; capB=0; capW=0; undoUsed=false;
    myRematch=false; peerRematch=false; undoPending=false; peerGone=false;
    clearTimeout(moveResendTimer); moveResendTimer=0; mySeq=0; lastRecvSeq=0; pendingSeq=0;
    undoBtn.style.display = "";   // 一手戻るは全モードで使える(オンラインは相手の許可制)
    markLast(null);
    { const rcb=document.getElementById("ruleChgBtn"); if(rcb) rcb.style.display=(!online||isHost)?"":"none"; }   // ルール変更はオンラインでは部屋主だけ
    if(maigoProb===0){   // 迷子なし = 普通の囲碁(ポン抜きルール)
      tagProb.style.display="none";
      tagWin.textContent=(normNum===1) ? "普通の囲碁" : normNum+"個とったら勝ち";
    }else{
      tagProb.style.display="";
      tagProb.textContent="迷子確率"+maigoProb+"%";
      tagWin.textContent=normNum+"個とったら勝ち";
    }
    resultOverlay.classList.remove("on","peek");
    setGiveupVisible(true); stopVictory();
    renderBowlTags();
    titleScene.classList.remove("on"); gameScene.classList.add("on");
    startTurn();
  }
  function startTurn(){
    if(over) return;
    rollProb(); setTurnLabel();
    if(!legalCells(board,turn).length){ finishByCount(); return; }   // 打てる場所が無い → とった数で勝負あり
    if(local){ busy=false; }                          // ならんで遊ぶ: どちらの番も同じ端末で打つ
    else if(online){ busy=(turn!==human); }           // オンライン: 相手の手はbroadcastで届く
    else if(turn!==human){ busy=true; setTimeout(cpuMove, 750+Math.random()*550); }
    else busy=false;
    boardEl.classList.toggle("myturn", !busy);        // 打てる時だけhoverの赤丸を出す
    undoBtn.disabled = busy || !hist.length || undoPending;   // 相手のターン中・戻す手がない・待った返事待ちは押せない
  }
  function switchTurn(){ turn=(turn===BLACK)?WHITE:BLACK; startTurn(); }

  function humanPlace(r,c){
    if(over||busy||undoPending) return;   // 待ったの返事待ち中は打てない(打てると相手の許可と噛み合わなくなる)
    if(!local && turn!==human) return;   // ならんで遊ぶ: どちらの手番でもタップで打てる
    if(board[r][c]!==EMPTY) return;
    if(!isLegal(board,r,c,turn)){ playNo(); showToast("そこには打てぬ(置いた瞬間に囲まれてしまう)"); return; }
    if(online){
      // 迷子・フェイント抽選は打った側が行い、結果ごと相手に送る(両者の演出と盤面が必ず一致)
      const maigo=(Math.random()*100)<prob;
      const fake=(!maigo && prob>0 && (isCritical(r,c,human) || Math.random()<0.05));   // 決着級の一手は必ずきょろきょろ(0%設定なら無し)
      let dr=-1, dc=-1;
      if(maigo && maigoStay){ const d=pickDest(human,r,c); if(d){ dr=d[0]; dc=d[1]; } }   // 盤内移動ルール: 行き先も打った側が決めて送る
      mySeq++; pendingSeq=mySeq;
      sendMove({ r,c,maigo,fake,dr,dc,seq:mySeq });
      tryPlace(r,c,maigo,fake,dr,dc);
      return;
    }
    tryPlace(r,c);
  }
  /* 一手を送り、ack(moveack)が届くまで一定間隔で送り直す(通信の瞬断で進行不能になるのを防ぐ) */
  function sendMove(payload){
    if(!ch) return;
    clearTimeout(moveResendTimer);
    const send=()=>{
      if(!online || !ch || payload.seq!==pendingSeq) return;   // 既に届いた・対局が終わった等なら打ち切り
      ch.send({ type:"broadcast", event:"move", payload });
      moveResendTimer=setTimeout(send, 1400);
    };
    send();
  }

  /* 碁笥から盤上のマスへ石が飛んでいく */
  function flyStone(color,r,c,done){
    const bowl=(color===BLACK)?bowlB:bowlW;
    bowl.classList.remove("pop"); void bowl.offsetWidth; bowl.classList.add("pop");
    setTimeout(()=> bowl.classList.remove("pop"), 340);   // popが残ると手番のゆれが止まる
    const cr=cells[r][c].getBoundingClientRect(), br=bowl.getBoundingClientRect();
    const size=cr.width*0.86;
    // 発射位置は碁笥の中でランダムにずらす(毎回同じ一点から出ると不自然なため)
    const ox=br.left+br.width/2+(Math.random()*0.5-0.25)*br.width;
    const oy=br.top+br.height/2+(Math.random()*0.5-0.25)*br.height;
    const el=document.createElement("div");
    el.className="fly "+(color===BLACK?"b":"w");
    el.style.width=el.style.height=size+"px";
    el.style.left=(ox-size/2)+"px";
    el.style.top=(oy-size/2)+"px";
    document.body.appendChild(el);
    const dx=(cr.left+cr.width/2)-ox;
    const dy=(cr.top+cr.height/2)-oy;
    void el.offsetWidth;   // 開始位置を確定させてからtransform(これが無いと稀に瞬間移動する)
    el.style.transform="translate("+dx+"px,"+dy+"px) rotate(300deg)";
    setTimeout(()=>{ el.remove(); if(done) done(); }, 300);
  }

  /* 迷子前の「きょろきょろ」: 石の頭上に「？」が浮かぶ */
  function qmarkAt(r,c,ms){
    const cr=cells[r][c].getBoundingClientRect();
    const q=document.createElement("div"); q.className="qmark";
    q.textContent="？";
    q.style.left=(cr.left+cr.width*0.66)+"px";
    q.style.top=(cr.top-cr.height*0.62)+"px";
    q.style.fontSize=(cr.width*0.9)+"px";
    document.body.appendChild(q);
    setTimeout(()=>q.remove(), (ms||660)+150);
  }
  function spawnSparks(r,c){   // 金色の粒が飛び散る(耐えた祝福)
    const base=cells[r][c];
    for(let i=0;i<9;i++){
      const p=document.createElement("div"); p.className="spark";
      const sz=(20+Math.random()*22);
      p.style.width=p.style.height=sz+"%";
      const a=Math.random()*Math.PI*2, d=34+Math.random()*55;
      p.style.setProperty("--sx",(Math.cos(a)*d).toFixed(0)+"px");
      p.style.setProperty("--sy",(Math.sin(a)*d-14).toFixed(0)+"px");
      p.style.animationDelay=(i*0.03)+"s";
      base.appendChild(p);
      setTimeout(()=>p.remove(), 1200);
    }
  }
  /* 迷子の碁石がとてとて歩いて行く(足あとを残しながら) */
  let footFlip=1;
  function footprintAt(x,y){
    const f=document.createElement("div"); f.className="footp";
    footFlip*=-1;
    f.style.left=(x+footFlip*5)+"px"; f.style.top=y+"px";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(), 1350);
  }
  /* 迷子の碁石は一番近い盤のふちへ歩いて行き、そのまま盤の外へ消える */
  function walkOffBoard(color, r, c, done){
    const a=cells[r][c].getBoundingClientRect();
    const bw=boardEl.getBoundingClientRect();
    const size=a.width*0.86;
    const x0=a.left+a.width/2, y0=a.top+a.height/2;
    // 出口 = 一番近いふちの外側(同じ距離なら運まかせ)
    const exits=[
      { x:bw.left-size*1.4,  y:y0, v:x0-bw.left },
      { x:bw.right+size*1.4, y:y0, v:bw.right-x0 },
      { x:x0, y:bw.top-size*1.4,    v:y0-bw.top },
      { x:x0, y:bw.bottom+size*1.4, v:bw.bottom-y0 },
    ].sort((p,q)=>(p.v-q.v) || Math.random()-0.5);
    const x1=exits[0].x, y1=exits[0].y;
    const hops=Math.max(3, Math.min(8, Math.round(Math.hypot(x1-x0, y1-y0)/55)));
    const el=document.createElement("div");
    el.className="walker";
    el.innerHTML='<div class="walker-in '+(color===BLACK?"b":"w")+'"></div>';
    el.style.width=el.style.height=size+"px";
    el.style.left=(x0-size/2)+"px"; el.style.top=(y0-size/2)+"px";
    document.body.appendChild(el);
    const HOP=190;
    let i=0;
    const step=()=>{
      i++;
      const t=i/hops, nx=(x1-x0)*t, ny=(y1-y0)*t;
      el.style.transition="transform "+(HOP/1000)+"s cubic-bezier(.3,.7,.3,1), opacity "+(HOP/1000)+"s linear";
      el.style.transform="translate("+nx+"px,"+ny+"px)";
      if(i>=hops-1) el.style.opacity=(i>=hops)?"0":".55";   // 最後の2歩ですうっと消える
      playWalk(i);
      footprintAt(x0+nx-(x1-x0)/hops*0.5, y0+ny-(y1-y0)/hops*0.5+size*0.32);
      if(i<hops) setTimeout(step, HOP);
      else setTimeout(()=>{ el.remove(); if(done) done(); }, HOP);
    };
    step();
  }
  /* 特殊ルール用: 迷子の碁石が盤上の別マス(r1,c1)まで歩いて行く(消えずに移動) */
  function walkToCell(color, r0,c0, r1,c1, done){
    const a=cells[r0][c0].getBoundingClientRect(), b=cells[r1][c1].getBoundingClientRect();
    const size=a.width*0.86;
    const x0=a.left+a.width/2, y0=a.top+a.height/2, x1=b.left+b.width/2, y1=b.top+b.height/2;
    const hops=Math.max(3, Math.min(9, Math.round(Math.hypot(x1-x0,y1-y0)/50)));
    const el=document.createElement("div"); el.className="walker";
    el.innerHTML='<div class="walker-in '+(color===BLACK?"b":"w")+'"></div>';
    el.style.width=el.style.height=size+"px"; el.style.left=(x0-size/2)+"px"; el.style.top=(y0-size/2)+"px";
    document.body.appendChild(el);
    const HOP=180; let i=0;
    const step=()=>{ i++; const t=i/hops, nx=(x1-x0)*t, ny=(y1-y0)*t;
      el.style.transition="transform "+(HOP/1000)+"s cubic-bezier(.3,.7,.3,1)";
      el.style.transform="translate("+nx+"px,"+ny+"px)";
      playWalk(i); footprintAt(x0+nx-(x1-x0)/hops*0.5, y0+ny-(y1-y0)/hops*0.5+size*0.32);
      if(i<hops) setTimeout(step, HOP); else setTimeout(()=>{ el.remove(); if(done) done(); }, HOP);
    };
    step();
  }
  /* 迷子の移動先: 盤上の空きマスから運まかせに選ぶ(元の位置は除く)。即囲まれて取られる場所もアリ(そこに座って即お陀仏もOK)。無ければnull */
  function pickDest(p, avoidR, avoidC){
    const cand=[];
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      if(r===avoidR && c===avoidC) continue;
      if(board[r][c]===EMPTY) cand.push([r,c]);
    }
    return cand.length ? cand[Math.floor(Math.random()*cand.length)] : null;
  }
  /* 勝利: 勝った側の碁笥から碁石が吹き上がる
     左下(黒)の碁笥→上から右へ大きく / 右下(白)の碁笥→上から左へ大きく */
  function emitStones(color, count, power){
    const bowl=(color===BLACK)?bowlB:bowlW;
    const dir=(color===BLACK)? 1 : -1;   // 黒=右向き / 白=左向き
    const br=bowl.getBoundingClientRect();
    const base=Math.max(16, br.width*0.3);
    for(let i=0;i<count;i++){
      const el=document.createElement("div");
      el.className="burst "+(color===BLACK?"b":"w");
      const s=base*(0.6+Math.random()*0.75);
      el.style.width=el.style.height=s+"px";
      // 発射位置を碁笥の中でランダムに散らす
      el.style.left=(br.left+br.width/2+(Math.random()*0.5-0.25)*br.width-s/2)+"px";
      el.style.top=(br.top+br.height/2+(Math.random()*0.5-0.25)*br.height-s/2)+"px";
      const ang=(-0.18+Math.random()*1.34)*(Math.PI/2);   // 逆側に少し〜真横を越えるまで、大きな扇状
      const dist=(0.45+Math.random()*0.75)*Math.max(window.innerWidth, window.innerHeight)*power;
      el.style.setProperty("--bx", (dir*Math.sin(ang)*dist).toFixed(0)+"px");
      el.style.setProperty("--by", (-(Math.cos(ang)*dist+90*power)).toFixed(0)+"px");   // 上向きの下駄もpowerで縮む(小さい泉は横に広がる)
      el.style.animationDelay=(Math.random()*0.3)+"s";
      gameScene.appendChild(el);   // 碁笥と同じ重なり空間に入れて、碁笥の下から湧かせる
      setTimeout(()=>el.remove(), 1900);
    }
  }
  let victoryTimer=0;
  function burstStones(color){
    emitStones(color, 26, 1);                                        // 勝利の瞬間: 大放出
    clearInterval(victoryTimer);
    victoryTimer=setInterval(()=> emitStones(color, 1, 0.24), 95);   // 以降: 小さな扇でポポポポポ…と湧き続ける
  }
  function stopVictory(){ clearInterval(victoryTimer); victoryTimer=0; }

  /* 石を置く(迷子判定込み)。人間/ロボット/通信相手 共通
     maigo: 迷子になって歩いて行き、盤から消える / fake: きょろきょろだけして結局そこに座る(いや迷子にならんのかい！) */
  function tryPlace(r,c,forcedMaigo,forcedFake,forcedDR,forcedDC){
    busy=true; boardEl.classList.remove("myturn");
    const me=turn;
    const maigo=(forcedMaigo===undefined) ? (Math.random()*100)<prob : forcedMaigo;
    // 石をとる一手・アタリの味方を助ける一手は必ず「きょろきょろ」を入れる(本物でも嘘でも)。通常の嘘きょろきょろは5%
    const critical=prob>0 && isCritical(r,c,me);
    // winMove=この一手(消えずに座れば)自分の勝ちが決まる手。黄金演出はこの時だけ(相手の勝ちを防ぐだけの時は出さない)
    const winMove=critical && (()=>{ const caps=capturedBy(board,r,c,me); return caps.length>0 && capOf(me)+caps.length>=normNum; })();
    const fake=(forcedFake===undefined) ? (!maigo && (critical || (prob>0 && Math.random()<0.05))) : forcedFake;
    hist.push({ p:me, snap:board.map(row=>row.slice()), capB, capW });   // 一手戻る用(打つ前の局面まるごと)
    flyStone(me, r, c, ()=>{
      const st=document.createElement("div");
      st.className="stone "+(me===BLACK?"b":"w");
      cells[r][c].appendChild(st);
      playStone();
      const tameMs=critical?1250:640, kyoroCls=critical?"kyoro long":"kyoro";   // 決着級の一手は長きょろきょろ
      if(maigo){
        setTimeout(()=>{   // きょろきょろ → 迷子になって歩き出す
          st.className+=" "+kyoroCls; playKyoro(tameMs/1000); qmarkAt(r,c,tameMs);
          setTimeout(()=>{
            st.remove();
            if(maigoStay){   // 特殊ルール: 盤の外へ出ず、盤上の別マスへ歩いて移動
              let dest;
              if(forcedDR===undefined) dest=pickDest(me,r,c);              // ローカル/ロボット: 自分で行き先を抽選
              else dest = (forcedDR>=0) ? [forcedDR,forcedDC] : null;      // オンライン: 送られた行き先(-1=行き先なし)
              if(dest){
                walkToCell(me, r, c, dest[0], dest[1], ()=>{
                  const st2=document.createElement("div"); st2.className="stone "+(me===BLACK?"b":"w");
                  cells[dest[0]][dest[1]].appendChild(st2); playStone();
                  commitStone(dest[0], dest[1], me, st2);   // 移動先で着地(取り・勝敗判定もここで)
                });
                return;
              }
            }
            walkOffBoard(me, r, c, ()=>{ if(!over) switchTurn(); });       // 通常(OFF)/移動先が無い時は盤の外へ消える
          }, tameMs);
        }, 130);
        return;
      }
      if(fake){
        setTimeout(()=>{   // きょろきょろ → 迷子にならず、そこに座る(フェイント)
          st.className+=" "+kyoroCls; playKyoro(tameMs/1000); qmarkAt(r,c,tameMs);
          setTimeout(()=>{
            st.classList.remove("kyoro","long");
            if(winMove){   // 勝ちを決める一手が迷子にならなかった！黄金の巨石に(1.3秒でもとの色・サイズへ戻る)
              spawnSparks(r,c); playShine();   // 金色化はfinish/勝敗判定で全勝利石に同時付与(この石だけ先行させない)
            }
            commitStone(r, c, me, st);
          }, tameMs);
        }, 130);
        return;
      }
      commitStone(r, c, me, st);
    });
  }
  /* 石が盤に座る: とれる石をとり、勝敗を確かめ、手番を渡す */
  function commitStone(r,c,p,st){
    board[r][c]=p; stones[r][c]=st; cells[r][c].classList.add("taken");
    markLast(st);   // 一番最後に置かれた石の目印
    const dead=deadNeighbors(board,r,c);
    let wait=200;
    if(dead.length){
      takeStones(p, dead);
      if(over) return;   // ノルマ到達 → takeStones内でfinish済み
      wait=560;
    } else if(groupInfo(board,r,c).libs===0){
      // 保険: 迷子が着地した瞬間に囲まれてしまう場所だったら、その石はそのまま昇天(誰の得点にもならない)
      board[r][c]=EMPTY; stones[r][c]=null; cells[r][c].classList.remove("taken");
      st.remove(); spawnPuffs(r,c); playPuff();
    }
    renderBowlTags();
    setTimeout(()=>{ if(!over) switchTurn(); }, wait);
  }
  /* 相手の石をとる: とった石が自分の碁笥へ飛んでいき、ノルマに達したら勝ち */
  function takeStones(taker, dead){
    playCapture();
    const bowl=(taker===BLACK)?bowlB:bowlW;
    const br=bowl.getBoundingClientRect();
    const glow=new Set();   // 囲んでいた自分の石たち(勝った時に光らせる)
    dead.forEach(([dr,dc])=>{
      neighborsOf(dr,dc).forEach(([nr,nc])=>{ if(board[nr][nc]===taker && stones[nr][nc]) glow.add(stones[nr][nc]); });
    });
    dead.forEach(([dr,dc])=>{
      const el=stones[dr][dc];
      const cr=cells[dr][dc].getBoundingClientRect();
      board[dr][dc]=EMPTY; stones[dr][dc]=null; cells[dr][dc].classList.remove("taken");
      if(el) el.remove();
      const f=document.createElement("div");
      f.className="fly "+(taker===BLACK?"w":"b");   // とられるのは相手の色
      const size=cr.width*0.86;
      f.style.width=f.style.height=size+"px";
      f.style.left=(cr.left+(cr.width-size)/2)+"px";
      f.style.top=(cr.top+(cr.height-size)/2)+"px";
      f.style.transition="transform .5s cubic-bezier(.45,.6,.4,1), opacity .5s linear";
      document.body.appendChild(f);
      void f.offsetWidth;
      const dx=(br.left+br.width/2)-(cr.left+cr.width/2), dy=(br.top+br.height/2)-(cr.top+cr.height/2);
      f.style.transform="translate("+dx+"px,"+dy+"px) rotate(300deg) scale(.35)";
      setTimeout(()=>f.remove(), 540);
    });
    setTimeout(()=>{ bowl.classList.remove("pop"); void bowl.offsetWidth; bowl.classList.add("pop"); setTimeout(()=>bowl.classList.remove("pop"),340); }, 470);
    if(taker===BLACK) capB+=dead.length; else capW+=dead.length;
    renderBowlTags();
    if(capOf(taker)>=normNum) finish(taker, [...glow], false);
  }
  function spawnPuffs(r,c){
    const base=cells[r][c];
    // どかんと大きい中心雲
    const big=document.createElement("div"); big.className="puff";
    big.style.width=big.style.height="230%";
    big.style.left="50%"; big.style.top="50%";
    big.style.setProperty("--px","0px"); big.style.setProperty("--py","-34px");
    big.style.setProperty("--ps","2.4");
    base.appendChild(big); setTimeout(()=>big.remove(), 1300);
    // まわりに小雲をまき散らす
    for(let i=0;i<9;i++){
      const p=document.createElement("div"); p.className="puff";
      const sz=60+Math.random()*80;
      p.style.width=p.style.height=sz+"%";
      p.style.left="50%"; p.style.top="50%";
      p.style.setProperty("--px",(Math.random()*90-45).toFixed(0)+"px");
      p.style.setProperty("--py",(-18-Math.random()*60).toFixed(0)+"px");
      p.style.setProperty("--ps",(1.6+Math.random()*1.2).toFixed(2));
      p.style.animationDelay=(i*0.035)+"s";
      base.appendChild(p);
      setTimeout(()=>p.remove(), 1300);
    }
  }

  /* ---------- 碁の基礎(かたまり・呼吸点・合法手) ---------- */
  function neighborsOf(r,c){
    const out=[];
    if(r>0) out.push([r-1,c]);
    if(r<N-1) out.push([r+1,c]);
    if(c>0) out.push([r,c-1]);
    if(c<N-1) out.push([r,c+1]);
    return out;
  }
  /* (r,c)の石とタテヨコでつながる同色のかたまりと、その呼吸点(息)の数 */
  function groupInfo(b,r,c){
    const p=b[r][c], seen=new Set([r*N+c]), libs=new Set(), gstones=[], stack=[[r,c]];
    while(stack.length){
      const [rr,cc]=stack.pop(); gstones.push([rr,cc]);
      for(const [nr,nc] of neighborsOf(rr,cc)){
        const v=b[nr][nc], k=nr*N+nc;
        if(v===EMPTY) libs.add(k);
        else if(v===p && !seen.has(k)){ seen.add(k); stack.push([nr,nc]); }
      }
    }
    return { stones:gstones, libs:libs.size };
  }
  /* (r,c)に置かれたばかりの石の隣で、息が無くなった相手のかたまり(の石一覧) */
  function deadNeighbors(b,r,c){
    const p=b[r][c], foe=(p===BLACK)?WHITE:BLACK, out=[], seen=new Set();
    for(const [nr,nc] of neighborsOf(r,c)){
      if(b[nr][nc]!==foe || seen.has(nr*N+nc)) continue;
      const g=groupInfo(b,nr,nc);
      g.stones.forEach(([a,bb])=>seen.add(a*N+bb));
      if(g.libs===0) out.push(...g.stones);
    }
    return out;
  }
  /* pが(r,c)に打ったらとれる石(盤は書き換えない) */
  function capturedBy(b,r,c,p){
    b[r][c]=p; const out=deadNeighbors(b,r,c); b[r][c]=EMPTY;
    return out;
  }
  /* 打てる場所か: 置いた瞬間に自分が囲まれる手(自殺手)は禁止。ただし相手の石をとれるならOK */
  function isLegal(b,r,c,p){
    if(b[r][c]!==EMPTY) return false;
    if(capturedBy(b,r,c,p).length) return true;
    b[r][c]=p; const libs=groupInfo(b,r,c).libs; b[r][c]=EMPTY;
    return libs>0;
  }
  function legalCells(b,p){
    const out=[];
    for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(isLegal(b,r,c,p)) out.push([r,c]);
    return out;
  }
  /* 決着級の一手か: 相手の石をとれる or アタリ(息1)の味方を本当に助けられる手 */
  function isCritical(r,c,p){
    if(capturedBy(board,r,c,p).length) return true;
    let rescue=false;
    for(const [nr,nc] of neighborsOf(r,c)){
      if(board[nr][nc]===p && groupInfo(board,nr,nc).libs===1){ rescue=true; break; }
    }
    if(!rescue) return false;
    board[r][c]=p; const after=groupInfo(board,r,c).libs; board[r][c]=EMPTY;
    return after>=2;   // つないで息が増えるなら本当の救出
  }
  function capOf(p){ return (p===BLACK)?capB:capW; }
  /* 碁笥の上のラベル: 手番の名前 + とった石の数/ノルマ */
  function renderBowlTags(){
    const foe = (!local && !online) ? LV_NAMES[cpuLv]+"ロボ" : "あいて";   // ロボット戦は相手の碁笥に階級を常時表示
    const lb= local ? "先手" : (human===BLACK)?"自分":foe;
    const lw= local ? "後手" : (human===WHITE)?"自分":foe;
    document.getElementById("bowlTagB").innerHTML=lb+"<b>"+capB+"/"+normNum+"</b>";
    document.getElementById("bowlTagW").innerHTML=lw+"<b>"+capW+"/"+normNum+"</b>";
  }
  const giveupBtn=document.getElementById("giveupBtn");
  const undoBtn=document.getElementById("undoBtn");
  /* 一手戻るの演出: 下げる石が自分の碁笥へ飛んで帰る */
  function flyBackStone(color,r,c){
    const bowl=(color===BLACK)?bowlB:bowlW;
    const cr=cells[r][c].getBoundingClientRect(), br=bowl.getBoundingClientRect();
    const size=cr.width*0.86;
    const f=document.createElement("div");
    f.className="fly "+(color===BLACK?"b":"w");
    f.style.width=f.style.height=size+"px";
    f.style.left=(cr.left+(cr.width-size)/2)+"px";
    f.style.top=(cr.top+(cr.height-size)/2)+"px";
    f.style.transition="transform .34s cubic-bezier(.5,.15,.6,1)";
    document.body.appendChild(f);
    void f.offsetWidth;
    const dx=(br.left+br.width/2)-(cr.left+cr.width/2), dy=(br.top+br.height/2)-(cr.top+cr.height/2);
    f.style.transform="translate("+dx+"px,"+dy+"px) scale(.45) rotate(-260deg)";
    setTimeout(()=>f.remove(), 360);
    setTimeout(()=>{ bowl.classList.remove("pop"); void bowl.offsetWidth; bowl.classList.add("pop"); setTimeout(()=>bowl.classList.remove("pop"),340); }, 300);   // 受け取った碁笥がぽよん
  }
  /* 一手戻るの演出: とられていた石が相手の碁笥から盤へ戻ってくる */
  function flyFromBowl(color,r,c){
    const bowl=(color===BLACK)?bowlW:bowlB;   // とられた石は相手の碁笥に入っている
    const st=stones[r][c]; if(st) st.style.opacity="0";
    const cr=cells[r][c].getBoundingClientRect(), br=bowl.getBoundingClientRect();
    const size=cr.width*0.86;
    const f=document.createElement("div");
    f.className="fly "+(color===BLACK?"b":"w");
    f.style.width=f.style.height=size+"px";
    f.style.left=(br.left+(br.width-size)/2)+"px";
    f.style.top=(br.top+(br.height-size)/2)+"px";
    f.style.transition="transform .32s cubic-bezier(.35,.75,.35,1)";
    document.body.appendChild(f);
    void f.offsetWidth;
    const dx=(cr.left+cr.width/2)-(br.left+br.width/2), dy=(cr.top+cr.height/2)-(br.top+br.height/2);
    f.style.transform="translate("+dx+"px,"+dy+"px)";
    setTimeout(()=>{ f.remove(); if(st) st.style.opacity=""; }, 330);
  }
  /* 一手戻る: 保存してある「打つ前の局面」に盤ごと巻き戻す(とった石の数も戻る) */
  function restoreState(h){
    const oldB=board;
    board=h.snap.map(row=>row.slice()); capB=h.capB; capW=h.capW;
    // 差分を調べて演出: 盤から下げる石は碁笥へ帰り、復活する石は相手の碁笥から戻ってくる
    const backIn=[];
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      if(oldB[r][c]!==EMPTY && board[r][c]===EMPTY) flyBackStone(oldB[r][c], r, c);
      else if(oldB[r][c]===EMPTY && board[r][c]!==EMPTY) backIn.push([r,c]);
    }
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      const cell=cells[r][c]; cell.innerHTML=""; cell.classList.remove("taken"); stones[r][c]=null;
      if(board[r][c]!==EMPTY){
        const st=document.createElement("div");
        st.className="stone "+(board[r][c]===BLACK?"b":"w");
        st.style.animation="none";   // 並べ直しで石がパラパラ湧いて見えないように
        cell.appendChild(st); cell.classList.add("taken"); stones[r][c]=st;
      }
    }
    backIn.forEach(([r,c])=> flyFromBowl(board[r][c], r, c));
    renderBowlTags();
    markLast(null);   // 巻き戻し後は目印なし(どれが最後か分からないため)
  }
  /* 自分の直前の一手の直前まで巻き戻す(相手の応手ごと)。requester視点で使う共通処理 */
  function undoToPlayer(requester){
    let h=null;
    while(hist.length){ const m=hist.pop(); if(m.p===requester){ h=m; break; } }
    if(!h) return;
    restoreState(h);
    turn=requester; over=false;
    startTurn();
  }
  undoBtn.addEventListener("click",()=>{
    if(over||busy||!hist.length) return;
    ensureAudio(); playSelect();
    if(online){
      if(turn!==human || undoPending) return;
      // オンラインは相手の許可制(待った)。申し込んで返事を待つ
      undoPending=true; undoBtn.disabled=true;
      if(ch) ch.send({ type:"broadcast", event:"undoreq", payload:{} });
      showToast("「待った」を申し込んだ。あいての返事を待て");
      return;
    }
    if(local){
      const m=hist.pop(); if(m){ restoreState(m); turn=m.p; }   // 戻した手の持ち主の番からやり直し
      startTurn();
    } else {
      if(turn!==human) return;
      undoUsed=true;   // ロボット戦で待った使用
      undoToPlayer(human);   // ロボットの応手＋自分の一手を戻す
    }
  });
  function setGiveupVisible(v){   // 終局後は投了・一手戻るを隠す(盤面眺めモードで違和感が出るため)
    giveupBtn.style.visibility = v ? "" : "hidden";
    undoBtn.style.visibility = v ? "" : "hidden";
  }
  function finish(winner, glowEls, byCount){
    over=true; busy=true; setGiveupVisible(false); markLast(null);
    document.getElementById("confirmOverlay").classList.remove("on");   // 開きっぱなしの投了確認を閉じる
    // とった瞬間、囲んでいた自分の石たちが金色に光り出す
    if(glowEls && glowEls.length) setTimeout(()=>{ glowEls.forEach(el=>{ if(el && el.isConnected){ el.classList.remove("gold","shine","kyoro","long","last"); el.classList.add("win-gold"); } }); }, 150);
    setTimeout(()=>{
      if(winner!==0) burstStones(winner);   // 勝利陣営の碁笥から碁石が吹き上がる
      const subWin = byCount ? "とった石の数で勝負あり" : "みごと"+normNum+"個囲んだ";
      if(winner===0){ rTitle.textContent="引き分け"; rTitle.className="r-title"; rSub.textContent="打てる場所がなくなった"; }
      else if(local){ rTitle.textContent=(winner===BLACK?"先手":"後手")+"の勝ち！"; rTitle.className="r-title win"; rSub.textContent=subWin; playWin(); }
      else if(winner===human){ rTitle.textContent="あなたの勝ち！"; rTitle.className="r-title win"; rSub.textContent=subWin; playWin(); }
      else { rTitle.textContent=(online?"あいての勝ち…":"ロボットの勝ち…"); rTitle.className="r-title"; rSub.textContent="次はきっと勝てる"; playLose(); }
      if(!local && !online){   // ロボット戦: 戦った階級と待ったの有無を表示(勝ちの自慢に)
        rSub.innerHTML += '<br><span class="r-foe">'+LV_NAMES[cpuLv]+'ロボットと対局'+(undoUsed?'（一手戻りあり）':'（待ったなし）')+'</span>';
      }
      if(online) bumpRoomStats(winner===0?"draw":(winner===human?"win":"lose")); else renderRoomStats();   // この部屋での成績
      resultOverlay.classList.add("on");
    }, (glowEls&&glowEls.length)?1050:350);
  }
  /* 打てる場所が無くなった: とった石の数の多いほうが勝ち */
  function finishByCount(){
    finish(capB>capW ? BLACK : (capW>capB ? WHITE : 0), null, true);
  }

  /* ---------- オンライン対戦 (Supabase Realtime / 合言葉方式) ---------- */
  const roomArea=document.getElementById("roomArea");
  const CODE_CHARS="ABCDEFGHJKMNPRSTUVWXYZ23456789";   // 紛らわしい文字は除外(Qは9と聞き間違えるので抜く)
  function genCode(){ let s=""; for(let i=0;i<5;i++) s+=CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)]; return s; }
  function rulePayload(){ return { p:maigoProb, w:normNum, s:maigoStay?1:0 }; }   // 部屋主のルール一式(start/restart/rulesで同送)
  function applyNetRules(payload){   // 部屋主から届いたルールを自分にも反映
    if(!payload) return;
    if(typeof payload.p==="number"){ maigoProb=Math.max(0, Math.min(99, payload.p|0)); probIdx=Math.max(0, PROB_STEPS.indexOf(maigoProb)); }
    if(typeof payload.w==="number") normNum=Math.max(1, Math.min(30, payload.w|0));
    if(typeof payload.s==="number") maigoStay=(payload.s===1);
    renderRules(); renderStay();
  }
  function sbClient(){ if(!sb) sb=window.supabase.createClient(SB_URL, SB_KEY); return sb; }
  function leaveChannel(){
    clearTimeout(joinWatch); clearTimeout(moveResendTimer); moveResendTimer=0;
    if(ch){ try{ sbClient().removeChannel(ch); }catch(e){} ch=null; }
    online=false; isHost=false; startSent=false;
  }
  function roomStatus(html){ roomArea.innerHTML=html; }
  function presenceCount(){ try{ return Object.keys(ch.presenceState()).length; }catch(e){ return 0; } }

  function openChannel(code, asHost, onReady){
    leaveChannel();
    isHost=asHost;
    roomWins=0; roomLosses=0; roomDraws=0; roomStreak=0;   // 新しい部屋 = 成績リセット
    ch=sbClient().channel("maigo_"+code, { config:{ presence:{ key:myId }, broadcast:{ self:false } } });
    ch.on("presence",{event:"sync"},()=>{
      if(isHost && !startSent && presenceCount()>=2){
        startSent=true;
        const hc=(Math.random()<0.5)?BLACK:WHITE;   // 先手(黒)はランダム
        ch.send({ type:"broadcast", event:"start", payload:{ hc, ...rulePayload() } });
        beginOnline(hc);
      }
    });
    ch.on("presence",{event:"leave"},()=>{
      if(!online || presenceCount()>=2) return;
      if(over){   // 決着後の退出: 結果はそのまま、再戦だけ不可に
        online=false; peerGone=true; leaveChannel();
        if(resultOverlay.classList.contains("on")) rSub.textContent="あいては退出しました";
        return;
      }
      opponentLeft();   // 対局中の退出
    });
    // あいてがタイトルへ戻った(明示の退出通知。presenceのleaveより確実・即時)
    ch.on("broadcast",{event:"bye"},()=>{
      if(!online) return;
      if(over){
        online=false; peerGone=true; leaveChannel();
        if(resultOverlay.classList.contains("on")) rSub.textContent="あいては退出しました";
        return;
      }
      opponentLeft();
    });
    ch.on("broadcast",{event:"start"},({payload})=>{
      if(isHost) return;
      applyNetRules(payload);   // 部屋主のルールを受け取って揃える
      beginOnline(payload && payload.hc===BLACK ? WHITE : BLACK);
    });
    ch.on("broadcast",{event:"move"},({payload})=>{
      if(!online||!payload) return;
      if(ch) ch.send({ type:"broadcast", event:"moveack", payload:{ seq:payload.seq } });   // 届いたことを必ず伝える(届かなければ相手が送り直してくる)
      if(over) return;
      if(typeof payload.seq==="number"){
        if(payload.seq<=lastRecvSeq) return;   // 送り直しの重複 → ackだけ返して無視(二重に打たれるのを防ぐ)
        lastRecvSeq=payload.seq;
      }
      if(turn===human) turn=(human===BLACK)?WHITE:BLACK;   // 手番のズレを検知したら、届いた一手を信頼して補正する(自己修復)
      const r=payload.r|0, c=payload.c|0;
      if(r<0||r>=N||c<0||c>=N||board[r][c]!==EMPTY) return;
      tryPlace(r, c, !!payload.maigo, !!payload.fake, (payload.dr==null)?-1:(payload.dr|0), (payload.dc==null)?-1:(payload.dc|0));
    });
    ch.on("broadcast",{event:"moveack"},({payload})=>{
      if(payload && payload.seq===pendingSeq){ clearTimeout(moveResendTimer); moveResendTimer=0; }
    });
    ch.on("broadcast",{event:"resign"},()=>{
      if(!online||over) return;
      over=true; busy=true; setGiveupVisible(false);
      document.getElementById("confirmOverlay").classList.remove("on");
      rTitle.textContent="あいての投了！"; rTitle.className="r-title win";
      rSub.textContent="あなたの勝ち"; playWin(); bumpRoomStats("win"); resultOverlay.classList.add("on");
    });
    ch.on("broadcast",{event:"rematch"},()=>{
      peerRematch=true;
      if(myRematch){ if(isHost) hostRestart(); }   // 両者合意: 部屋主が先手後手を引き直して開始合図を送る
      else if(resultOverlay.classList.contains("on")) rSub.textContent="あいてが「もう一局」を希望！";
    });
    ch.on("broadcast",{event:"restart"},({payload})=>{   // 再戦: 先手後手は毎回引き直し。ルールも部屋主のものに揃え直す
      if(isHost) return;
      applyNetRules(payload);
      beginOnline(payload && payload.hc===BLACK ? WHITE : BLACK);
    });
    // 部屋主がルールを変えた(次の一局から反映)
    ch.on("broadcast",{event:"rules"},({payload})=>{
      if(isHost) return;
      applyNetRules(payload);
      showToast("部屋主がルールを変えた。次の一局から反映");
    });
    // 待った(一手戻る)の申し込みが相手から届いた → 許可を尋ねる
    ch.on("broadcast",{event:"undoreq"},()=>{
      if(!online||over||!hist.length) return;
      undoOverlay.classList.add("on");
    });
    // 相手が許可 → 双方が同じ手数だけ巻き戻す(棋譜が一致しているので結果も一致)
    ch.on("broadcast",{event:"undoyes"},()=>{
      if(!online||!undoPending) return;
      undoPending=false;
      undoToPlayer(human);   // 相手の応手＋自分の一手を戻し、自分の番に戻す
      showToast("「待った」が受け入れられた");
    });
    ch.on("broadcast",{event:"undono"},()=>{
      if(!online||!undoPending) return;
      undoPending=false; startTurn();
      showToast("「待った」は断られた");
    });
    ch.subscribe(async (status)=>{
      if(status==="SUBSCRIBED"){ try{ await ch.track({}); }catch(e){} if(onReady) onReady(); }
      else if(status==="CHANNEL_ERROR"||status==="TIMED_OUT"){
        roomStatus('<div class="room-note err">通信失敗。通信環境を見直すのだ</div>');
      }
    });
  }
  function hostRestart(){   // 部屋主: 先手後手をランダムに引き直して再戦
    const hc=(Math.random()<0.5)?BLACK:WHITE;
    if(ch) ch.send({ type:"broadcast", event:"restart", payload:{ hc, ...rulePayload() } });
    beginOnline(hc);
  }
  function beginOnline(color){
    clearTimeout(joinWatch);
    online=true; local=false; human=color;
    playStart(); startGame();
  }
  function opponentLeft(){
    over=true; busy=true; online=false; peerGone=true; setGiveupVisible(false);
    rTitle.textContent="あいてが退出しました"; rTitle.className="r-title";
    rSub.textContent="部屋を作りなおし、再戦したまえ";

  }

  document.getElementById("makeRoomBtn").addEventListener("click",()=>{

  document.getElementById("joinRoomBtn").addEventListener("click",()=>{

    roomStatus('<div class="code-row">'

      +'<input class="code-input" id="codeInput" maxlength="5" autocomplete="off" spellcheck="false" placeholder="合言葉">'

    document.getElementById("pasteBtn").addEventListener("click", async ()=>{

      if(code.length!==5){ note.textContent="合言葉は五文字だ"; note.className="room-note err"; return; }
      note.textContent="部屋を探しておる…"; note.className="room-note room-wait";
      openChannel(code, false);
      // 見張り役は接続の成否によらずクリック時点から起動(通信が固まっても必ず答えが出る)
      joinWatch=setTimeout(()=>{
        if(!online){ note.textContent="部屋がみつからぬ。合言葉を再確認したまえ"; note.className="room-note err"; leaveChannel(); }
      }, 4000);
