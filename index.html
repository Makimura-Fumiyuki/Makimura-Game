<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牧村制作ゲームリンク集</title>
<meta name="description" content="牧村が制作したブラウザゲームで遊べるハブページ。インストール不要、PCでもスマホでもすぐ遊べます。">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DotGothic16&display=swap');
  :root{
    --red:#ff3616;      /* メイン */
    --red-dark:#d92406;
    --teal:#006987;     /* サブ */
    --teal-dark:#00506b;
    --ink:#20211f;
    --bg:#f7f6f3;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;   /* 源ノ角ゴシック(=Noto Sans JP) */
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
  }

  /* ===== ヒーロー(ロゴの平行四辺形モチーフ) ===== */
  header{
    position:relative; width:100%; overflow:hidden;
    background:linear-gradient(150deg, #ff4a2b, var(--red) 55%, var(--red-dark));
    color:#fff; text-align:center;
    padding:74px 20px 86px;
    clip-path:polygon(0 0, 100% 0, 100% 100%, 0 calc(100% - 18px));   /* 底辺をゆるやかな斜めにカット(左から右へ落ちる) */
  }
  /* 背景に漂う、ロゴ風の傾いた枠 */
  .h-frame{
    position:absolute; border:10px solid rgba(255,255,255,.16); border-radius:26px;
    transform:skewX(-14deg);
  }
  .h-frame.f1{ width:300px; height:150px; left:-80px; top:-40px; }
  .h-frame.f2{ width:380px; height:190px; right:-120px; bottom:-50px; border-color:rgba(255,255,255,.12); }
  .h-en{
    font-family:"DotGothic16",sans-serif;
    font-size:clamp(12px,2.8vw,15px); letter-spacing:.55em; text-indent:.55em;
    color:rgba(255,255,255,.85); margin-bottom:10px;
  }
  .h-title{
    font-size:clamp(30px,6.6vw,54px); font-weight:800; letter-spacing:.06em; line-height:1.3;
  }

  main{ width:100%; max-width:1160px; padding:44px 24px 64px; flex:1; }

  /* ===== ゲームカード ===== */
  .games{ display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:26px; }
  /* 並び替え */
  .sort-row{ display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-bottom:4px; }
  .sort-label{ font-size:12.5px; font-weight:700; color:rgba(32,33,31,.55); }
  #sortSel{ font-family:inherit; font-size:13px; font-weight:700; color:var(--ink);
    padding:6px 12px; border:1.6px solid rgba(32,33,31,.25); border-radius:8px; background:#fff; cursor:pointer; }
  /* カテゴリ見出し */
  .sec-h{ font-size:20px; font-weight:900; letter-spacing:.06em; color:var(--ink);
    margin:34px 0 14px; display:flex; align-items:center; gap:10px; }
  .sec-h::before{ content:""; width:8px; height:22px; border-radius:3px; background:var(--red); flex:none; }
  #sections .sec-h:first-of-type{ margin-top:6px; }
  #sections > .games:first-child{ margin-top:26px; }   /* 一覧表示(見出しなし)の時もカードとの間隔を確保 */
  /* リリース1ヶ月以内のゲームに付くNEWバッジ */
  .new-badge{
    position:absolute; top:18px; left:12px; z-index:2;
    font-family:"DotGothic16",sans-serif; font-size:13px; letter-spacing:.14em; text-indent:.07em;
    color:#fff; background:var(--red); border-radius:999px; padding:3px 13px 4px;
    box-shadow:0 2px 6px rgba(255,54,22,.4);
    transform:rotate(-3deg);
  }
  .card{
    position:relative;
    display:flex; flex-direction:column; text-decoration:none; color:var(--ink);
    background:#fff; border-radius:16px; overflow:hidden;
    box-shadow:0 2px 10px rgba(32,33,31,.08);
    transition:transform .18s cubic-bezier(.3,1.3,.5,1), box-shadow .18s ease;
  }
  .card:hover{ transform:translateY(-6px); box-shadow:0 12px 24px rgba(255,54,22,.18); }
  .card:active{ transform:translateY(-2px); }
  .c-bar{ height:6px; background:var(--red); flex:none; }
  /* ゲームのイメージ画(SVG) */
  .c-thumb{ height:132px; flex:none; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .c-thumb svg{ width:100%; height:100%; display:block; }
  .c-thumb.t-dox{ background:#f4f4f1; }
  .c-thumb.t-moku{ background:#f3ead7; }
  .c-body{ padding:22px 22px 20px; display:flex; flex-direction:column; flex:1; }
  .c-name{ font-size:26px; font-weight:800; letter-spacing:.04em; color:var(--red);
    display:flex; align-items:center; gap:10px; }
  /* プレイ人数バッジ */
  .c-players{
    display:inline-flex; align-items:center; gap:4px; flex:none;
    font-size:12px; font-weight:700; letter-spacing:.05em; color:#fff;
    background:var(--teal); border-radius:999px; padding:3px 12px 4px;
  }
  .c-players svg{ width:12px; height:12px; }
  .c-desc{ margin-top:10px; font-size:14px; font-weight:500; line-height:1.85; color:rgba(32,33,31,.72); flex:1; }
  .c-tags{ margin-top:14px; display:flex; gap:4px 8px; flex-wrap:wrap-reverse; }   /* 行間はつめる(縦4px/横8px)。複数行になる時は下の行が長くなる */
  .t-brk{ width:100%; height:0; }   /* 行の強制区切り */
  .tag{
    font-family:"DotGothic16",sans-serif;
    font-size:12px; letter-spacing:.05em;
    color:var(--teal); border:1.6px solid var(--teal); border-radius:999px; padding:2px 11px 3px;
  }
  .c-play{
    margin-top:18px; align-self:flex-start;
    font-size:14px; font-weight:800; letter-spacing:.18em; text-indent:.09em; color:#fff;
    background:linear-gradient(150deg, #ff4a2b, var(--red) 60%, var(--red-dark));
    border-radius:999px; padding:9px 26px 10px;
    box-shadow:0 3px 8px rgba(255,54,22,.35);
  }
  .card:hover .c-play{ box-shadow:0 5px 14px rgba(255,54,22,.5); }

  /* 準備中カード */
  .card.soon{ pointer-events:none; background:transparent; box-shadow:none;
    border:2.5px dashed rgba(32,33,31,.25); border-radius:16px; }
  .card.soon .c-bar{ display:none; }
  .card.soon .c-name{ color:rgba(32,33,31,.4); }
  .card.soon .c-play{ background:rgba(32,33,31,.25); box-shadow:none; }

  /* ===== このサイトについて ===== */
  .about{
    margin-top:52px; background:#fff; border-radius:16px;
    box-shadow:0 2px 10px rgba(32,33,31,.08);
    padding:30px 32px 28px;
    border-left:8px solid var(--teal);
  }
  .about h2{ font-size:19px; font-weight:800; letter-spacing:.06em; color:var(--teal); margin-bottom:12px; }
  .about p{ font-size:14px; font-weight:500; line-height:2; color:rgba(32,33,31,.75); }

  /* ===== フッター(サブカラー) ===== */
  footer{
    width:100%; text-align:center; padding:30px 20px 34px;
    background:linear-gradient(150deg, var(--teal), var(--teal-dark));
    color:rgba(255,255,255,.88); font-size:13px; font-weight:500; letter-spacing:.05em;
    clip-path:polygon(0 0, 100% 12px, 100% 100%, 0 100%);   /* 上辺をゆるやかな斜めカット(左から右へ落ちる・ヒーローと平行) */
    padding-top:44px;
  }
  footer a{ color:#fff; font-weight:700; text-decoration:none; margin:0 12px; }
  footer nav a{ display:inline-flex; align-items:center; gap:5px; vertical-align:middle; }
  footer nav a svg{ width:13px; height:13px; flex:none; opacity:.85; }
  footer a:hover{ text-decoration:underline; }
  .f-mail{ margin-top:14px; font-size:11px; color:rgba(255,255,255,.45); }
  .f-mail a{ color:rgba(255,255,255,.55); font-weight:500; margin:0; }
  .copy{ margin-top:12px; color:rgba(255,255,255,.55); font-size:12px; letter-spacing:.12em; font-family:"DotGothic16",sans-serif; }
</style>
</head>

<script>
(function(){
  /* ゲームのデータ: release=リリース日 / cats=カテゴリ / clicks=あそばれた回数(サーバー集計) */
  const GAMES=[
    { id:"dox",  tpl:"tpl-dox",  release:"2026-07-06", cats:["スコアアタック"], clicks:0 },
    { id:"moku", tpl:"tpl-moku", release:"2026-07-07", cats:["対戦"], clicks:0 },
  ];
  /* Newはリリースから31日以内のゲームが自動判定(カテゴリと NEWバッジの両方に使う) */
  const isNew=g=>g.release && (Date.now()-new Date(g.release+"T00:00:00"))/86400000<=31;
  const SECTIONS=[
    { label:"New", filter:isNew },
    { label:"対戦", filter:g=>g.cats.includes("対戦") },
    { label:"スコアアタック", filter:g=>g.cats.includes("スコアアタック") },
  ];
  /* ---- 人気順: クリック数をSupabaseに記録・集計(doxランキングと同じ場所を間借り) ---- */
  const SB_URL="https://kvgmsyognvgxqxkhvltx.supabase.co";
  const SB_KEY="sb_publishable_cak3-W9Mmgahnwawreoa1Q_CVuhmkKL";
  const SB_HEAD={ "apikey":SB_KEY, "Authorization":"Bearer "+SB_KEY };
  function logClick(g){   // カードを開いた瞬間に1票(ページ遷移してもkeepaliveで届く)
    try{
      fetch(SB_URL+"/rest/v1/scores", { method:"POST", keepalive:true,
        headers:{ ...SB_HEAD, "Content-Type":"application/json", "Prefer":"return=minimal" },
        body:JSON.stringify({ name:"__hub__", mode:"hub_"+g.id, score:1 }) });
    }catch(e){}
  }
  async function loadClicks(){
    await Promise.all(GAMES.map(async g=>{
      try{
        const r=await fetch(SB_URL+"/rest/v1/scores?name=eq.__hub__&mode=eq.hub_"+g.id+"&select=id",
          { method:"HEAD", headers:{ ...SB_HEAD, "Prefer":"count=exact" } });
        const cr=r.headers.get("content-range");
        g.clicks=cr ? (parseInt(cr.split("/")[1],10)||0) : 0;
      }catch(e){}
    }));
    render();   // 集計が届いたら並びを更新
  }
  /* ---- 並び替え ---- */
  const byRelease=(a,b)=>new Date(b.release)-new Date(a.release);          // 新しいものが左
  const byPop=(a,b)=>(b.clicks-a.clicks)||byRelease(a,b);                  // 遊ばれた回数が多い順
  const wrap=document.getElementById("sections");
  const sel=document.getElementById("sortSel");
  function card(g){
    const el=document.getElementById(g.tpl).content.firstElementChild.cloneNode(true);
    if(g.id) el.addEventListener("click", ()=>logClick(g));
    if(isNew(g)){ const b=document.createElement("span"); b.className="new-badge"; b.textContent="NEW"; el.appendChild(b); }
    return el;
  }
  function grid(list){ const d=document.createElement("div"); d.className="games"; list.forEach(g=>d.appendChild(card(g))); return d; }
  function head(t){ const h=document.createElement("h2"); h.className="sec-h"; h.textContent=t; return h; }
  function render(){
    const sort=sel.value;
    wrap.innerHTML="";
    if(sort==="cat"){   // カテゴリ順: セクション分け(各セクション内は新しい順)
      SECTIONS.forEach(sec=>{
        const list=GAMES.filter(sec.filter).sort(byRelease);
        if(!list.length) return;
        wrap.appendChild(head(sec.label)); wrap.appendChild(grid(list));
      });
      wrap.appendChild(head("Coming Soon")); wrap.appendChild(grid([{tpl:"tpl-soon"}]));
    } else {            // リリース順/人気順: カテゴリを分けず一覧で
      const list=[...GAMES].sort(sort==="pop" ? byPop : byRelease);
      const d=grid(list); d.appendChild(card({tpl:"tpl-soon"}));
      wrap.appendChild(d);
    }
  }
  sel.addEventListener("change", render);
  render();
  loadClicks();
})();
</script>
</body>
</html>
