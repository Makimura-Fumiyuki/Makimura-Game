<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牧村が作ったゲーム集</title>
<!-- スマホのホーム画面に追加した時のアイコン名。<title>より優先して使われるので明示しておく -->
<meta name="apple-mobile-web-app-title" content="牧村が作ったゲーム集">
<meta name="application-name" content="牧村が作ったゲーム集">
<meta name="description" content="牧村が制作したブラウザゲームで遊べるハブページ。インストール不要、PCでもスマホでもすぐ遊べます。">
<!-- LINEやDiscordでリンクを送った時に出るカードの内容(OGP)。文言はここを書き換えれば変わる -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="牧村が作ったゲーム集">
<meta property="og:title" content="牧村が作ったゲーム集">
<meta property="og:description" content="無料で遊び放題！たのしいよ">
<meta property="og:url" content="https://makimura-gamehub.com/">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DotGothic16&display=swap');
  :root{
    --red:#ff3616;      /* メイン */
    --red-dark:#d92406;
    --teal:#006987;     /* サブ */
    --teal-dark:#00506b;
    --ink:#20211f;
    --bg:#f7f6f3;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;   /* 源ノ角ゴシック(=Noto Sans JP) */
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
  }

  /* ===== ヒーロー(ロゴの平行四辺形モチーフ) ===== */
  header{
    position:relative; width:100%; overflow:hidden;
    background:linear-gradient(150deg, #ff4a2b, var(--red) 55%, var(--red-dark));
    color:#fff; text-align:center;
    padding:74px 20px 86px;
    clip-path:polygon(0 0, 100% 0, 100% 100%, 0 calc(100% - 18px));   /* 底辺をゆるやかな斜めにカット(左から右へ落ちる) */
  }
  /* 背景に漂う、ロゴ風の傾いた枠 */
  .h-frame{
    position:absolute; border:10px solid rgba(255,255,255,.16); border-radius:26px;
    transform:skewX(-14deg);
  }
  .h-frame.f1{ width:300px; height:150px; left:-80px; top:-40px; }
  .h-frame.f2{ width:380px; height:190px; right:-120px; bottom:-50px; border-color:rgba(255,255,255,.12); }
  .h-en{
    font-family:"DotGothic16",sans-serif;
    font-size:clamp(12px,2.8vw,15px); letter-spacing:.55em; text-indent:.55em;
    color:rgba(255,255,255,.85); margin-bottom:10px;
  }
  .h-title{
    font-size:clamp(30px,6.6vw,54px); font-weight:800; letter-spacing:.06em; line-height:1.3;
  }

  main{ width:100%; max-width:1160px; padding:44px 24px 64px; flex:1; }

  /* ===== ゲームカード ===== */
  .games{ display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:26px; }
  /* 並び替え */
  .sort-row{ display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-bottom:4px; }
  .sort-label{ font-size:12.5px; font-weight:700; color:rgba(32,33,31,.55); }
  #sortSel{ font-family:inherit; font-size:13px; font-weight:700; color:var(--ink);
    padding:6px 12px; border:1.6px solid rgba(32,33,31,.25); border-radius:8px; background:#fff; cursor:pointer; }
  /* カテゴリ見出し */
  .sec-h{ font-size:20px; font-weight:900; letter-spacing:.06em; color:var(--ink);
    margin:34px 0 14px; display:flex; align-items:center; gap:10px; }
  .sec-h::before{ content:""; width:8px; height:22px; border-radius:3px; background:var(--red); flex:none; }
  #sections .sec-h:first-of-type{ margin-top:6px; }
  #sections > .games:first-child{ margin-top:26px; }   /* 一覧表示(見出しなし)の時もカードとの間隔を確保 */
  /* リリース1ヶ月以内のゲームに付くNEWバッジ */
  .new-badge{
    position:absolute; top:18px; left:12px; z-index:2;
    font-family:"DotGothic16",sans-serif; font-size:13px; letter-spacing:.14em; text-indent:.07em;
    color:#fff; background:var(--red); border-radius:999px; padding:3px 13px 4px;
    box-shadow:0 2px 6px rgba(255,54,22,.4);
    transform:rotate(-3deg);
  }
  .card{
    position:relative;
    display:flex; flex-direction:column; text-decoration:none; color:var(--ink);
    background:#fff; border-radius:16px; overflow:hidden;
    box-shadow:0 2px 10px rgba(32,33,31,.08);
    transition:transform .18s cubic-bezier(.3,1.3,.5,1), box-shadow .18s ease;
  }
  .card:hover{ transform:translateY(-6px); box-shadow:0 12px 24px rgba(255,54,22,.18); }
  .card:active{ transform:translateY(-2px); }
  .c-bar{ height:6px; background:var(--red); flex:none; }
  /* ゲームのイメージ画(SVG) */
  .c-thumb{ position:relative; height:132px; flex:none; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .c-thumb svg{ width:100%; height:100%; display:block; }
  .c-thumb.t-dox{ background:#f4f4f1; }
  .c-thumb.t-moku{ background:#f3ead7; }
  .c-thumb.t-maigo{ background:#f3ead7; }
  .c-thumb.t-maigomoku{ background:#f3ead7; }
  .c-thumb.t-bamiri{ background:#eef1ea; }
  .c-body{ padding:22px 22px 20px; display:flex; flex-direction:column; flex:1; }
  .c-name{ font-size:22px; font-weight:800; letter-spacing:.02em; color:var(--red);
    display:flex; align-items:center; gap:9px; }
  /* プレイ人数バッジ(サムネ内・右下。背景は半透明) */
  .c-players{
    display:inline-flex; align-items:center; gap:4px; flex:none;
    font-size:12px; font-weight:700; letter-spacing:.05em; color:#fff;
    background:var(--teal); border-radius:999px; padding:3px 12px 4px;
  }
  .c-players svg{ width:12px; height:12px; }
  .c-thumb .c-players{
    position:absolute; right:10px; bottom:10px; z-index:2;
    background:rgba(0,105,135,.72); backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
    box-shadow:0 1px 4px rgba(32,33,31,.18);
  }
  .c-desc{ margin-top:10px; font-size:14px; font-weight:500; line-height:1.85; color:rgba(32,33,31,.72); flex:1; }
  /* 説明文の中の「※〜」注記: 本文より小さくグレーで、改行して少し離す(このサイトについての※と同じ雰囲気) */
  .c-note{ display:block; margin-top:9px; font-size:12px; font-weight:500; line-height:1.7; color:rgba(32,33,31,.45); }
  .c-tags{ margin-top:14px; display:flex; gap:4px 8px; flex-wrap:wrap-reverse; }   /* 行間はつめる(縦4px/横8px)。複数行になる時は下の行が長くなる */
  .t-brk{ width:100%; height:0; }   /* 行の強制区切り */
  .tag{
    font-family:"DotGothic16",sans-serif;
    font-size:12px; letter-spacing:.05em;
    color:var(--teal); border:1.6px solid var(--teal); border-radius:999px; padding:2px 11px 3px;
  }
  /* カード下段: あそぶボタン(左) + いいね・あそばれた回数(右) */
  .c-foot{ margin-top:18px; display:flex; align-items:flex-end; justify-content:space-between; gap:10px; }
  .c-foot-right{ display:flex; align-items:center; gap:12px; }   /* いいねと回数を同じ高さで横並びに */
  .c-play{
    align-self:flex-start; flex:none;
    font-size:14px; font-weight:800; letter-spacing:.18em; text-indent:.09em; color:#fff;
    background:linear-gradient(150deg, #ff4a2b, var(--red) 60%, var(--red-dark));
    border-radius:999px; padding:9px 26px 10px;
    box-shadow:0 3px 8px rgba(255,54,22,.35);
  }
  /* いいねボタン(みんなが押せる。もう一度押すと取り消せる=トグル) */
  .c-like{
    flex:none; display:inline-flex; align-items:center; gap:4px; cursor:pointer;
    font-family:"DotGothic16",sans-serif; letter-spacing:.06em; font-size:11px;
    color:var(--red); background:#fff; border:1.5px solid var(--red);
    border-radius:999px; padding:4px 10px 5px; white-space:nowrap;
    transition:transform .14s cubic-bezier(.3,1.4,.5,1), background .15s ease, color .15s ease, box-shadow .15s ease;
  }
  .c-like svg{ width:12px; height:12px; fill:currentColor; flex:none; }
  .c-like b{ font-size:12px; font-weight:400; }
  .c-like:hover{ box-shadow:0 3px 9px rgba(255,54,22,.3); transform:translateY(-1px); }
  .c-like:active{ transform:scale(.92); }
  .c-like.liked{ color:#fff; background:linear-gradient(150deg, #ff4a2b, var(--red) 60%, var(--red-dark)); border-color:transparent; }
  /* 押した瞬間、ハートがぽんっと跳ねる */
  @keyframes likePop{ 0%{ transform:scale(1); } 40%{ transform:scale(1.45); } 100%{ transform:scale(1); } }
  .c-like.pop svg{ animation:likePop .4s ease-out; }
  .c-count{
    position:relative; cursor:default;
    display:inline-flex; align-items:center; gap:5px;
    font-family:"DotGothic16",sans-serif; letter-spacing:.06em;
    white-space:nowrap;
  }
  .c-count svg{ width:13px; height:13px; fill:var(--teal); flex:none; opacity:.85; }
  .c-count b{ font-size:13px; color:var(--teal); }
  /* ホバーで「あそばれた回数」の吹き出し(人数バッジと同じティール地×白文字)
     本体を右に10px張り出させ、三角が角の丸みと重ならない平らな底辺に立つようにする */
  .c-count::after{
    content:"あそばれた回数";
    position:absolute; bottom:calc(100% + 7px); right:-10px;
    background:var(--teal); color:#fff;
    font-family:"Noto Sans JP","Hiragino Sans",sans-serif; font-weight:700;
    font-size:11px; letter-spacing:.08em;
    padding:5px 10px 6px; border-radius:7px; white-space:nowrap;
    opacity:0; transform:translateY(3px); pointer-events:none;
    transition:opacity .15s ease, transform .15s ease;
  }
  .c-count::before{   /* 吹き出しの三角(数字の末尾の真上) */
    content:""; position:absolute; bottom:calc(100% + 2px); right:0;
    border:5px solid transparent; border-top-color:var(--teal); border-bottom:none;
    opacity:0; transform:translateY(3px); pointer-events:none;
    transition:opacity .15s ease, transform .15s ease;
  }
  .c-count:hover::after, .c-count:hover::before{ opacity:1; transform:translateY(0); }
  .card:hover .c-play{ box-shadow:0 5px 14px rgba(255,54,22,.5); }

  /* 準備中(実在するが未公開)のカード: グレーアウト+COMING SOON */
  .card.coming{ filter:grayscale(.85); cursor:default; }
  .card.coming:hover{ transform:none; box-shadow:0 2px 10px rgba(32,33,31,.08); }   /* ホバーで浮かせない */
  .card.coming .c-thumb::after{ content:""; position:absolute; inset:0; background:rgba(32,33,31,.3); z-index:1; }   /* サムネを暗く */
  .card.coming .c-play{ background:rgba(32,33,31,.32); box-shadow:none; }
  .coming-badge{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) rotate(-4deg); z-index:3;
    font-family:"DotGothic16",sans-serif; font-size:15px; letter-spacing:.14em; text-indent:.07em; color:#fff;
    background:rgba(32,33,31,.72); border:1.5px solid rgba(255,255,255,.55);
    border-radius:999px; padding:6px 16px 7px; white-space:nowrap;
  }
  /* 準備中カード */
  .card.soon{ pointer-events:none; background:transparent; box-shadow:none;
    border:2.5px dashed rgba(32,33,31,.25); border-radius:16px; }
  .card.soon .c-bar{ display:none; }
  .card.soon .c-name{ color:rgba(32,33,31,.4); }
  /* サムネ・タグが無いぶん詰まって見えるので、説明文とボタンの間隔を必ず確保する
     (単独の行に来て他カードに引き伸ばされない画面幅でも近づきすぎない) */
  .card.soon .c-body{ padding:34px 22px 30px; }
  .card.soon .c-desc{ flex:none; }
  .card.soon .c-play{ margin-top:28px; background:rgba(32,33,31,.25); box-shadow:none; }

  /* ===== このサイトについて ===== */
  .about{
    margin-top:52px; background:#fff; border-radius:16px;
    box-shadow:0 2px 10px rgba(32,33,31,.08);
    padding:30px 32px 28px;
    border-left:8px solid var(--teal);
  }
  .about h2{ font-size:19px; font-weight:800; letter-spacing:.06em; color:var(--teal); margin-bottom:12px; }
  .about p{ font-size:14px; font-weight:500; line-height:2; color:rgba(32,33,31,.75); }
  .about .about-ai{ margin-top:8px; font-size:12.5px; color:rgba(32,33,31,.5); }
  /* 公式Discord・アンケートへのボタン */
  .about-links{ margin-top:20px; display:flex; gap:12px; flex-wrap:wrap; }
  .about-btn{
    display:inline-flex; align-items:center; gap:8px;
    font-size:14px; font-weight:800; letter-spacing:.06em; text-decoration:none; color:#fff;
    border-radius:999px; padding:10px 22px 11px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .about-btn:hover{ transform:translateY(-2px); }
  .about-btn svg{ width:17px; height:17px; flex:none; }
  /* Discord = ブランドカラーの青紫(Blurple #5865F2) */
  .about-btn.discord{ background:linear-gradient(150deg, #6f7cf7, #5865f2 60%, #4752c4); box-shadow:0 3px 8px rgba(88,101,242,.38); }
  .about-btn.discord:hover{ box-shadow:0 6px 14px rgba(88,101,242,.5); }
  /* アンケート = 暖色のアンバー(ロゴの赤とも喧嘩しない黄橙) */
  .about-btn.survey{ background:linear-gradient(150deg, #ffb03a, #f59300 60%, #e07d00); box-shadow:0 3px 8px rgba(245,147,0,.38); }
  .about-btn.survey:hover{ box-shadow:0 6px 14px rgba(245,147,0,.5); }

  /* ===== フッター(サブカラー) ===== */
  footer{
    width:100%; text-align:center; padding:30px 20px 34px;
    background:linear-gradient(150deg, var(--teal), var(--teal-dark));
    color:rgba(255,255,255,.88); font-size:13px; font-weight:500; letter-spacing:.05em;
    clip-path:polygon(0 0, 100% 12px, 100% 100%, 0 100%);   /* 上辺をゆるやかな斜めカット(左から右へ落ちる・ヒーローと平行) */
    padding-top:44px;
  }
  footer a{ color:#fff; font-weight:700; text-decoration:none; margin:0 12px; }
  footer nav a{ display:inline-flex; align-items:center; gap:5px; vertical-align:middle; }
  footer nav a svg{ width:13px; height:13px; flex:none; opacity:.85; }
  footer a:hover{ text-decoration:underline; }
  .f-mail{ margin-top:14px; font-size:11px; color:rgba(255,255,255,.45); }
  .f-mail a{ color:rgba(255,255,255,.55); font-weight:500; margin:0; }
  .copy{ margin-top:12px; color:rgba(255,255,255,.55); font-size:12px; letter-spacing:.12em; font-family:"DotGothic16",sans-serif; }
</style>
</head>
<body>
  <header>
    <div class="h-frame f1"></div><div class="h-frame f2"></div>
    <div class="h-en">MAKIMURA GAME HUB</div>
    <h1 class="h-title">牧村が作ったゲーム集</h1>
  </header>

  <main>
    <div class="sort-row">
      <span class="sort-label">並び替え</span>
      <select id="sortSel">
        <option value="release" selected>リリース順</option>
        <option value="pop">いいね数順</option>
        <option value="play">あそばれた回数順</option>
        <option value="fav">お気に入り順</option>
        <option value="cat">カテゴリ順</option>
      </select>
    </div>
    <div id="sections"></div>

    <template id="tpl-dox">
      <a class="card" href="./dox.html">
        <div class="c-bar"></div>
        <div class="c-thumb t-dox">
          <!-- dox: 本編の質感を再現(3x5ドット数字・光沢box・背景グリッド・タイマーの気配) -->
          <svg viewBox="0 0 260 132" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="dxAcc" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#ffa96b"/><stop offset=".5" stop-color="#ff6a00"/><stop offset="1" stop-color="#e65f00"/>
              </linearGradient>
              <radialGradient id="dxTimer" cx=".5" cy=".5" r=".5">
                <stop offset="0" stop-color="rgba(30,30,30,.12)"/><stop offset="1" stop-color="rgba(30,30,30,.03)"/>
              </radialGradient>
              <pattern id="dxGrid" width="26" height="26" patternUnits="userSpaceOnUse">
                <path d="M26 0H0V26" fill="none" stroke="rgba(30,30,30,.06)" stroke-width="1"/>
              </pattern>
            </defs>
            <rect width="260" height="132" fill="#f4f4f1"/>
            <rect width="260" height="132" fill="url(#dxGrid)"/>
            <circle cx="130" cy="66" r="62" fill="url(#dxTimer)"/>
            <!-- 上7 / 下2 / 左9 / 右4 / 中央5 (本編と同じ3x5スクエア数字) -->
            <g transform="translate(130,66)">
              <g transform="translate(-15,-59) rotate(-1.2 15 15)"><rect width="30" height="30" fill="#f4f4f1" stroke="#1e1e1e" stroke-width="2.6"/><path transform="translate(11,8) scale(2.8)" fill="#1e1e1e" d="M0 0h1v1H0zM1 0h1v1H1zM2 0h1v1H2zM2 1h1v1H2zM1 2h1v1H1zM2 2h1v1H2zM1 3h1v1H1zM1 4h1v1H1z"/></g>
              <g transform="translate(-15,29) rotate(1 15 15)"><rect width="30" height="30" fill="#f4f4f1" stroke="#1e1e1e" stroke-width="2.6"/><path transform="translate(11,8) scale(2.8)" fill="#1e1e1e" d="M0 0h1v1H0zM1 0h1v1H1zM2 0h1v1H2zM2 1h1v1H2zM0 2h1v1H0zM1 2h1v1H1zM2 2h1v1H2zM0 3h1v1H0zM0 4h1v1H0zM1 4h1v1H1zM2 4h1v1H2z"/></g>
              <g transform="translate(-59,-15) rotate(1.4 15 15)"><rect width="30" height="30" fill="#f4f4f1" stroke="#1e1e1e" stroke-width="2.6"/><path transform="translate(11,8) scale(2.8)" fill="#1e1e1e" d="M0 0h1v1H0zM1 0h1v1H1zM2 0h1v1H2zM0 1h1v1H0zM2 1h1v1H2zM0 2h1v1H0zM1 2h1v1H1zM2 2h1v1H2zM2 3h1v1H2zM0 4h1v1H0zM1 4h1v1H1zM2 4h1v1H2z"/></g>
              <g transform="translate(29,-15) rotate(-1 15 15)"><rect width="30" height="30" fill="#f4f4f1" stroke="#1e1e1e" stroke-width="2.6"/><path transform="translate(11,8) scale(2.8)" fill="#1e1e1e" d="M0 0h1v1H0zM2 0h1v1H2zM0 1h1v1H0zM2 1h1v1H2zM0 2h1v1H0zM1 2h1v1H1zM2 2h1v1H2zM2 3h1v1H2zM2 4h1v1H2z"/></g>
              <g transform="translate(-15,-15) rotate(-.8 15 15)"><rect width="30" height="30" fill="url(#dxAcc)" stroke="#1e1e1e" stroke-width="2.6"/><path transform="translate(11,8) scale(2.8)" fill="#fff" d="M0 0h1v1H0zM1 0h1v1H1zM2 0h1v1H2zM0 1h1v1H0zM0 2h1v1H0zM1 2h1v1H1zM2 2h1v1H2zM2 3h1v1H2zM0 4h1v1H0zM1 4h1v1H1zM2 4h1v1H2z"/></g>
            </g>
          </svg>
        </div>
        <div class="c-body">
          <div class="c-name">dox
            <span class="c-players"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="7.2" r="4.2"/><path d="M12 13.4c-4.4 0-8 2.5-8 6.1V21h16v-1.5c0-3.6-3.6-6.1-8-6.1z"/></svg>1人</span>
          </div>
          <div class="c-desc">
            いちばん近い数字にドッキング！十字に並んだ数字を瞬時に見比べて、中央のboxを正しい方向へ
          </div>
          <div class="c-tags">
            <span class="tag">知育</span><span class="tag">ランキング</span><span class="tag">PC推奨</span>
          </div>
          <div class="c-foot"><span class="c-play">あそぶ ▶</span><span class="c-count"></span></div>
        </div>
      </a>
    </template>

    <template id="tpl-moku">
      <a class="card" href="./gomokumoku.html">
        <div class="c-bar"></div>
        <div class="c-thumb t-moku">
          <!-- 五もくもく並べ: 本編と同じ木盤・碁石・煙の質感 -->
          <svg viewBox="0 0 260 132" xmlns="http://www.w3.org/2000/svg">

<script>
(function(){
  /* ゲームのデータ: release=リリース日 / cats=カテゴリ / clicks=あそばれた回数(サーバー集計) */
  const GAMES=[
    { id:"dox",  tpl:"tpl-dox",  release:"2026-07-06", cats:["スコアアタック"], clicks:null, likes:null },   // clicks/likes: null=集計未着(表示しない)
    { id:"bamiri", tpl:"tpl-bamiri", release:"2026-07-08", cats:["対戦"], clicks:null, likes:null },
    { id:"maigomoku", tpl:"tpl-maigomoku", release:"2026-07-08", cats:["対戦"], clicks:null, likes:null },
    { id:"maigo", tpl:"tpl-maigo", release:"2026-07-07", cats:["対戦"], clicks:null, likes:null },   // 同日リリースはこの並び順が優先される(新しい方を先頭に)
    { id:"moku", tpl:"tpl-moku", release:"2026-07-07", cats:["対戦"], clicks:null, likes:null },
  ];
  /* Newはリリースから31日以内のゲームが自動判定(カテゴリと NEWバッジの両方に使う) */
  const isNew=g=>g.release && (Date.now()-new Date(g.release+"T00:00:00"))/86400000<=31;
  const SECTIONS=[
    { label:"New", filter:isNew },
    { label:"対戦", filter:g=>g.cats.includes("対戦") },
    { label:"スコアアタック", filter:g=>g.cats.includes("スコアアタック") },
  ];
  /* ---- 集計: あそばれた回数(hub_<id>)と いいね(hub_like_<id>)をSupabaseに記録・集計 ---- */
  const SB_URL="https://kvgmsyognvgxqxkhvltx.supabase.co";
  const SB_KEY="sb_publishable_cak3-W9Mmgahnwawreoa1Q_CVuhmkKL";
  const SB_HEAD={ "apikey":SB_KEY, "Authorization":"Bearer "+SB_KEY };
  function logClick(g){   // カードを開いた瞬間に「あそばれた回数」1票(ページ遷移してもkeepaliveで届く)
    try{
      fetch(SB_URL+"/rest/v1/scores", { method:"POST", keepalive:true,
        headers:{ ...SB_HEAD, "Content-Type":"application/json", "Prefer":"return=minimal" },
        body:JSON.stringify({ name:"__hub__", mode:"hub_"+g.id, score:1 }) });
    }catch(e){}
  }
  function sendLike(g, delta){   // いいねを delta(+1=いいね / -1=取り消し)票。合計(SUM)で数えるので取り消しは-1を足す
    return fetch(SB_URL+"/rest/v1/scores", { method:"POST",
      headers:{ ...SB_HEAD, "Content-Type":"application/json", "Prefer":"return=minimal" },
      body:JSON.stringify({ name:"__hub__", mode:"hub_like_"+g.id, score: delta }) })
      .then(r=>r.ok).catch(()=>false);
  }
  async function sumOf(mode){   // その mode のスコア合計(いいねは +1/-1 の合算)。公開キーは行削除できないので、取り消しは-1行で相殺
    try{
      const r=await fetch(SB_URL+"/rest/v1/scores?name=eq.__hub__&mode=eq."+mode+"&select=score",
        { headers:SB_HEAD });
      if(!r.ok) return 0;
      const a=await r.json();
      const s=Array.isArray(a) ? a.reduce((t,x)=>t+(x.score|0),0) : 0;
      return Math.max(0,s);
    }catch(e){ return 0; }
  }
  async function countOf(mode){   // その mode の行数(=票数)を返す
    try{
      const r=await fetch(SB_URL+"/rest/v1/scores?name=eq.__hub__&mode=eq."+mode+"&select=id",
        { method:"HEAD", headers:{ ...SB_HEAD, "Prefer":"count=exact" } });
      const cr=r.headers.get("content-range");
      return cr ? (parseInt(cr.split("/")[1],10)||0) : 0;
    }catch(e){ return 0; }
  }
  async function loadCounts(){
    await Promise.all(GAMES.map(async g=>{
      const [c,l]=await Promise.all([ countOf("hub_"+g.id), sumOf("hub_like_"+g.id) ]);
      g.clicks=c; g.likes=l;
    }));
    render();   // 集計が届いたら並びと数字を更新
  }
  /* いいね済みか(このブラウザの記録)。もう一度押すと取り消せる(トグル) */
  function likedKey(id){ return "gmk.liked."+id; }
  function hasLiked(id){ try{ return localStorage.getItem(likedKey(id))==="1"; }catch(e){ return false; } }
  function setLiked(id,v){ try{ if(v) localStorage.setItem(likedKey(id),"1"); else localStorage.removeItem(likedKey(id)); }catch(e){} }
  /* ---- 並び替え ---- */
  const byRelease=(a,b)=>new Date(b.release)-new Date(a.release);          // 新しいものが左
  const byPop=(a,b)=>((b.likes||0)-(a.likes||0))||byRelease(a,b);          // 人気順=いいねが多い順
  const byPlay=(a,b)=>((b.clicks||0)-(a.clicks||0))||byRelease(a,b);       // あそばれた回数が多い順
  const byFav=(a,b)=>((hasLiked(b.id)?1:0)-(hasLiked(a.id)?1:0))||byRelease(a,b);   // お気に入り=自分がいいねした作品を上に
  /* あそばれた回数の表記: 9,999までは実数 / 1万以上は「万」(1.2万→12万→123万) / 1億以上は「億」 */
  function fmtPlays(n){
    if(n>=100000000){ const m=n/100000000; return (m>=10 ? Math.round(m) : Math.round(m*10)/10)+"億"; }
    if(n>=10000){ const m=n/10000; const s=(m>=10 ? Math.round(m) : Math.round(m*10)/10); return s>=10000 ? "1億" : s+"万"; }
    return n.toLocaleString();
  }
  const wrap=document.getElementById("sections");
  const sel=document.getElementById("sortSel");
  const HEART='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21C6.5 16.7 3 13.4 3 9.3 3 6.6 5.1 4.6 7.7 4.6c1.6 0 3.2.8 4.3 2.2 1.1-1.4 2.7-2.2 4.3-2.2C18.9 4.6 21 6.6 21 9.3c0 4.1-3.5 7.4-9 11.7z"/></svg>';
  function card(g){
    const el=document.getElementById(g.tpl).content.firstElementChild.cloneNode(true);
    // プレイ人数バッジはタイトル横ではなくサムネ右下へ移動(背景半透明)
    const players=el.querySelector(".c-players"), thumb=el.querySelector(".c-thumb");
    if(players && thumb) thumb.appendChild(players);
    // 説明文の「※〜」は本文と改行して分け、小さくグレーの注記にする
    const desc=el.querySelector(".c-desc");
    if(desc){
      const raw=desc.textContent.replace(/\s+/g," ").trim(), i=raw.indexOf("※");
      if(i>0){
        desc.textContent=raw.slice(0,i).trim();
        const note=document.createElement("span"); note.className="c-note"; note.textContent=raw.slice(i).trim();
        desc.appendChild(note);
      }
    }
    if(g.soon){   // 準備中: グレーアウト+COMING SOON。遊べない・集計もしない
      el.classList.add("coming");
      el.removeAttribute("href");                          // クリックで遷移させない
      el.addEventListener("click", e=>e.preventDefault());
      if(players) players.remove();                        // プレイ人数は隠す
      if(thumb){ const b=document.createElement("span"); b.className="coming-badge"; b.textContent="COMING SOON"; thumb.appendChild(b); }
      const play=el.querySelector(".c-play"); if(play) play.textContent="準備中";
      return el;
    }
    if(g.id) el.addEventListener("click", ()=>logClick(g));
    const foot=el.querySelector(".c-foot");
    const cnt=el.querySelector(".c-count");   // あそばれた回数(集計が届いてから表示)
    if(cnt && g.clicks!=null){
      cnt.innerHTML='<svg viewBox="0 0 24 24" role="img" aria-label="あそばれた回数"><path d="M21.58 16.09l-1.09-7.66C20.21 6.46 18.52 5 16.53 5H7.47C5.48 5 3.79 6.46 3.51 8.43l-1.09 7.66C2.2 17.63 3.39 19 4.94 19c.68 0 1.32-.27 1.8-.75L9 16h6l2.25 2.25c.48.48 1.13.75 1.8.75 1.56 0 2.75-1.37 2.53-2.91zM11 11H9v2H8v-2H6v-1h2V8h1v2h2v1zm4-1c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2 3c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg><b>'+fmtPlays(g.clicks)+'</b>';
    }
    if(g.id && foot && cnt){   // いいねボタン(あそぶボタンの右・回数の左)。カードのリンク遷移とは切り離す
      const right=document.createElement("div"); right.className="c-foot-right";
      const like=document.createElement("button"); like.type="button"; like.className="c-like";
      const liked=hasLiked(g.id);
      if(liked) like.classList.add("liked");
      like.setAttribute("aria-label","いいね");
      like.innerHTML=HEART+'<b>'+(g.likes!=null?fmtPlays(g.likes):"…")+'</b>';
      like.addEventListener("click",(e)=>{
        e.preventDefault(); e.stopPropagation();   // ゲームへ遷移させない・あそばれた回数にも数えない
        if(g.likes==null) return;   // 集計未着なら無視
        const nowLiked=!hasLiked(g.id);   // トグル: 押すたびに いいね ⇄ 取り消し
        setLiked(g.id, nowLiked);
        g.likes=Math.max(0,(g.likes||0)+(nowLiked?1:-1));
        like.classList.toggle("liked", nowLiked);
        if(nowLiked){ like.classList.remove("pop"); void like.offsetWidth; like.classList.add("pop"); }   // いいね時だけハートがぽんっ
        like.querySelector("b").textContent=fmtPlays(g.likes);
        sendLike(g, nowLiked?1:-1);   // サーバーへ +1/-1(失敗しても見た目優先)
      });
      foot.appendChild(right); right.appendChild(cnt); right.appendChild(like);   // 右グループ: あそばれた回数(左)+いいね(右)
    }
    if(isNew(g)){ const b=document.createElement("span"); b.className="new-badge"; b.textContent="NEW"; el.appendChild(b); }
    return el;
  }
  function grid(list){ const d=document.createElement("div"); d.className="games"; list.forEach(g=>d.appendChild(card(g))); return d; }
  function head(t){ const h=document.createElement("h2"); h.className="sec-h"; h.textContent=t; return h; }
  function render(){
    const sort=sel.value;
    wrap.innerHTML="";
    const soonLast=(cmp)=>(a,b)=>((a.soon?1:0)-(b.soon?1:0))||cmp(a,b);   // 準備中(バミリ等)は各並びの末尾へ回す
    if(sort==="cat"){   // カテゴリ順: セクション分け(各セクション内は新しい順)
      SECTIONS.forEach(sec=>{
        const list=GAMES.filter(sec.filter).sort(soonLast(byRelease));
        if(!list.length) return;
        wrap.appendChild(head(sec.label)); wrap.appendChild(grid(list));
      });
      wrap.appendChild(head("Coming Soon")); wrap.appendChild(grid([{tpl:"tpl-soon"}]));
    } else {            // リリース順/人気順/あそばれた回数順/お気に入り: カテゴリを分けず一覧で
      const cmp = sort==="pop" ? byPop : sort==="play" ? byPlay : sort==="fav" ? byFav : byRelease;
      const list=[...GAMES].sort(soonLast(cmp));
      const d=grid(list); d.appendChild(card({tpl:"tpl-soon"}));
      wrap.appendChild(d);
    }
  }
  sel.addEventListener("change", render);
  render();
  loadCounts();
})();
</script>
