  /* ---------- CPU ---------- */
  function cpuMove(){
    if(over) return;
    const mv=pickMove();
    tryPlace(mv[0], mv[1]);
  }
  function emptyNear(dist){
    const out=[];
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      if(board[r][c]!==EMPTY) continue;
      let near=false;
      for(let dr=-dist;dr<=dist&&!near;dr++) for(let dc=-dist;dc<=dist;dc++){
        const rr=r+dr, cc=c+dc;
        if(rr>=0&&rr<N&&cc>=0&&cc<N&&board[rr][cc]!==EMPTY){ near=true; break; }
      }
      if(near) out.push([r,c]);
    }
    return out;
  }
  // (r,c)にpを置いたと仮定した各方向の 連の長さ+両端の空き
  function lineScore(r,c,p){
    let total=0;
    for(const [dr,dc] of DIRS){
      let cnt=1, open=0;
      let rr=r+dr, cc=c+dc;
      while(rr>=0&&rr<N&&cc>=0&&cc<N&&board[rr][cc]===p){ cnt++; rr+=dr; cc+=dc; }
      if(rr>=0&&rr<N&&cc>=0&&cc<N&&board[rr][cc]===EMPTY) open++;
      rr=r-dr; cc=c-dc;
      while(rr>=0&&rr<N&&cc>=0&&cc<N&&board[rr][cc]===p){ cnt++; rr-=dr; cc-=dc; }
      if(rr>=0&&rr<N&&cc>=0&&cc<N&&board[rr][cc]===EMPTY) open++;
      total+=patScore(cnt,open);
    }
    return total;
  }
  function patScore(cnt,open){   // ならべる数(winLen)からの残り距離で評価
    if(cnt>=winLen) return 10000000;
    if(open===0) return 0;
    const d=winLen-cnt;
    if(d===1) return open===2 ? 1000000 : 120000;
    if(d===2) return open===2 ? 60000 : 3500;
    if(d===3) return open===2 ? 900 : 150;
    return open===2 ? 45 : 12;
  }
  function pickMove(){
    if(placed===0) return [6,6];
    const cpu=(human===BLACK)?WHITE:BLACK;
    const cand=emptyNear(2);
    if(!cand.length){ return [6,6]; }
    // 入門: たまにしか脅威を見ない。基本は既存の石の近くにランダム
    if(cpuLv===0){
      let block=null, bs=0;
      for(const [r,c] of cand){
        const s=Math.max(lineScore(r,c,cpu), lineScore(r,c,human));
        if(s>bs){ bs=s; block=[r,c]; }
      }
      if(bs>=10000000 && Math.random()<0.55) return block;   // 王手級だけ半々で対応
      return cand[Math.floor(Math.random()*cand.length)];
    }
    // 上級: 専用エンジンに委譲(窓方式評価 + VCF/VCT必勝探索 + 反復深化。詳細はmakeExpertAI)
    if(cpuLv===2) return expertMove(cpu, placed);
    // 中級: 評価関数(攻め+守り)
    const defW=0.78;
    const scored=cand.map(([r,c])=>{
      const s=lineScore(r,c,cpu)+defW*lineScore(r,c,human)
        + (12-(Math.abs(r-6)+Math.abs(c-6)))*2   // 中央寄り好み
        + Math.random()*10;
      return {r,c,s};
    }).sort((a,b)=>b.s-a.s);
    if(cpuLv===1 && Math.random()<0.3 && scored.length>2 && scored[0].s<10000000){
      return [scored[1].r, scored[1].c];   // 中級: 3割で最善を逃す
    }
    return [scored[0].r, scored[0].c];
  }
  /* ---------- 上級専用エンジン ----------
     窓方式の差分評価(飛び三・飛び四も正しく数える) + VCF/VCT(四と開三を連打する必勝手順の探索)
     + 強制手延長つき反復深化アルファベータ(最大10手読み・時間制)。
     毎手番、盤面から状態を作り直すので、もくもく消滅・一手戻る・オンラインにも常に追従する */
  function makeExpertAI(st){   // st={board,N,winLen,prob,budgetMs}
    const now=(typeof performance!=="undefined"&&performance.now)?()=>performance.now():()=>Date.now();

    /* 窓(winLenマスの直線)の事前列挙: winLenが変わったら作り直す */
    let W=null;
    function buildWindows(){
      const n=st.N, L=st.winLen;
      const list=[], cellWins=Array.from({length:n*n},()=>[]);
      for(const [dr,dc] of DIRS){
        for(let r=0;r<n;r++) for(let c=0;c<n;c++){
          const er=r+dr*(L-1), ec=c+dc*(L-1);
          if(er<0||er>=n||ec<0||ec>=n) continue;
          const cells=new Int16Array(L);
          for(let k=0;k<L;k++) cells[k]=(r+dr*k)*n+(c+dc*k);
          const wi=list.length; list.push(cells);
          for(const ci of cells) cellWins[ci].push(wi);
        }
      }
      W={list, cellWins, len:L, n};
    }

    let cnt0,cnt1;        // 窓ごとの石数(色0/色1)
    let tot0,tot1;        // 窓スコア合計
    let four0,four1;      // 「あと1で勝ち」窓の本数
    let cellArr;          // 盤(1次元) 0=空,1,2
    let nearCnt;          // 2マス以内に石がある度合い(候補生成用)
    let SCW;              // 窓スコア表(石数→点)
    const WINV=100000000;

    function rebuild(){
      if(!W || W.len!==st.winLen || W.n!==st.N) buildWindows();
      const n=st.N, L=st.winLen, M=W.list.length;
      cnt0=new Int16Array(M); cnt1=new Int16Array(M);
      tot0=0; tot1=0; four0=0; four1=0;
      cellArr=new Int8Array(n*n); nearCnt=new Int16Array(n*n);
      SCW=new Float64Array(L+1);
      for(let i=1;i<L;i++) SCW[i]=Math.pow(9,i);
      SCW[L]=WINV;
      for(let r=0;r<n;r++) for(let c=0;c<n;c++){
        const v=st.board[r][c];
        if(v!==EMPTY) place(r*n+c, v-1);
      }
    }
    function place(ci,col){
      cellArr[ci]=col+1;
      const cw=W.cellWins[ci], L=W.len;
      for(let k=0;k<cw.length;k++){
        const wi=cw[k];
        const a=(col===0)?cnt0[wi]:cnt1[wi], b=(col===0)?cnt1[wi]:cnt0[wi];
        if(b===0){ if(col===0) tot0-=SCW[a]; else tot1-=SCW[a]; if(a===L-1){ if(col===0)four0--; else four1--; } }
        if(a===0&&b>0){ if(col===0) tot1-=SCW[b]; else tot0-=SCW[b]; if(b===L-1){ if(col===0)four1--; else four0--; } }
        if(col===0) cnt0[wi]=a+1; else cnt1[wi]=a+1;
        if(b===0){ if(col===0) tot0+=SCW[a+1]; else tot1+=SCW[a+1]; if(a+1===L-1){ if(col===0)four0++; else four1++; } }
      }
      const n=W.n, r=(ci/n)|0, c=ci%n;
      for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
        const rr=r+dr, cc=c+dc;
        if(rr>=0&&rr<n&&cc>=0&&cc<n) nearCnt[rr*n+cc]++;
      }
    }
    function unplace(ci,col){
      cellArr[ci]=0;
      const cw=W.cellWins[ci], L=W.len;
      for(let k=0;k<cw.length;k++){
        const wi=cw[k];
        const a=((col===0)?cnt0[wi]:cnt1[wi])-1, b=(col===0)?cnt1[wi]:cnt0[wi];
        if(b===0){ if(col===0) tot0-=SCW[a+1]; else tot1-=SCW[a+1]; if(a+1===L-1){ if(col===0)four0--; else four1--; } }
        if(col===0) cnt0[wi]=a; else cnt1[wi]=a;
        if(b===0){ if(col===0) tot0+=SCW[a]; else tot1+=SCW[a]; if(a===L-1){ if(col===0)four0++; else four1++; } }
        if(a===0&&b>0){ if(col===0) tot1+=SCW[b]; else tot0+=SCW[b]; if(b===L-1){ if(col===0)four1++; else four0++; } }
      }
      const n=W.n, r=(ci/n)|0, c=ci%n;
      for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
        const rr=r+dr, cc=c+dc;
        if(rr>=0&&rr<n&&cc>=0&&cc<n) nearCnt[rr*n+cc]--;
      }
    }
    /* colの「次の一手で勝てるマス」(重複なし)。fourカウンタが0なら即座に空を返す */
    function winCellsOf(col){
      if((col===0?four0:four1)===0) return [];
      const L=W.len, cn=(col===0)?cnt0:cnt1, co=(col===0)?cnt1:cnt0;
      const out=[], seen=new Set();
      for(let wi=0;wi<W.list.length;wi++){
        if(cn[wi]===L-1&&co[wi]===0){
          const cells=W.list[wi];
          for(let k=0;k<L;k++){ const ci=cells[k]; if(cellArr[ci]===0){ if(!seen.has(ci)){ seen.add(ci); out.push(ci); } break; } }
        }
      }
      return out;
    }
    /* そのマスに置いた時の攻め得点(自分窓の伸び) + 相手窓を割る価値 */
    function moveGain(ci,col){
      const cw=W.cellWins[ci], cn=(col===0)?cnt0:cnt1, co=(col===0)?cnt1:cnt0;
      let g=0;
      for(let k=0;k<cw.length;k++){
        const wi=cw[k], a=cn[wi], b=co[wi];
        if(b===0) g+=SCW[a+1]-SCW[a];
        else if(a===0) g+=SCW[b]*0.9;
      }
      return g;
    }
    function topK(col,k,defW){
      const n=W.n, other=1-col, out=[];
      for(let ci=0;ci<n*n;ci++){
        if(cellArr[ci]===0&&nearCnt[ci]>0) out.push({ci, s:moveGain(ci,col)+defW*moveGain(ci,other)});
      }
      out.sort((a,b)=>b.s-a.s);
      return out.slice(0,k);
    }
    /* colが一手で「四(勝ち直前)」を作れる窓を持つか */
    function canMakeFour(col){
      const cn=(col===0)?cnt0:cnt1, co=(col===0)?cnt1:cnt0, L=W.len;
      for(let wi=0;wi<W.list.length;wi++){ if(cn[wi]===L-2 && co[wi]===0) return true; }
      return false;
    }

    /* VCF/VCT: 四(と開三)を連打して勝ちに到達する手順の探索。勝ちへの最初の一手 or -1 */
    let vcNodes=0, vcDeadline=0;
    function forcedWin(me, depth, allowThree){
      if(depth<=0) return -1;
      if(vcNodes++>60000 || now()>vcDeadline) return -1;
      const opp=1-me, L=W.len;
      // 強制力のある手だけ試す: 四(または三)が作れる窓に絡むマス
      const cw=(me===0)?cnt0:cnt1, co=(me===0)?cnt1:cnt0;
      const marks=new Set();
      const needThree=allowThree?3:2;
      for(let wi=0;wi<W.list.length;wi++){
        if(co[wi]!==0) continue;
        if(cw[wi]>=L-needThree && cw[wi]>=1){
          const cells=W.list[wi];
          for(let k=0;k<L;k++){ const ci=cells[k]; if(cellArr[ci]===0) marks.add(ci); }
        }
      }
      if(!marks.size) return -1;
      const cand=[...marks].map(ci=>({ci, s:moveGain(ci,me)})).sort((a,b)=>b.s-a.s);
      for(const {ci} of cand){
        place(ci,me);
        const myW=winCellsOf(me);
        if(myW.length){
          const oppW=winCellsOf(opp);
          if(oppW.length===0){
            if(myW.length>=2){ unplace(ci,me); return ci; }   // 両四: 止めきれない
            const b=myW[0];
            place(b,opp);
            let ok=false;
            if(winCellsOf(opp).length===0){                    // 止めが相手の四を完成させたら失敗
              ok=forcedWin(me, depth-2, allowThree)>=0;
            }
            unplace(b,opp);
            if(ok){ unplace(ci,me); return ci; }
          }
        }else if(allowThree && depth>=4 && winCellsOf(opp).length===0 && !canMakeFour(opp)){
          // 開三は相手に1手の自由を与えるため、相手が四を作って走れる局面では強制と見なさない(安全側)
          // この手の後「置けば両四(勝ち確定)になるマス」があるか
          const dbl=[];
          const cwn=(me===0)?cnt0:cnt1, con=(me===0)?cnt1:cnt0;
          const eSet=new Set();
          for(const wi of W.cellWins[ci]){
            if(con[wi]===0&&cwn[wi]===L-2){
              const cells=W.list[wi];
              for(let k=0;k<L;k++){ const e=cells[k]; if(cellArr[e]===0) eSet.add(e); }
            }
          }
          for(const e of eSet){
            place(e,me);
            if(winCellsOf(me).length>=2) dbl.push(e);
            unplace(e,me);
          }
          if(dbl.length){
            // 相手の受け: 両四点そのもの + 三の窓の空きマス。全部の受けを破れたら勝ち
            const D=new Set(dbl);
            for(const wi of W.cellWins[ci]){
              if(con[wi]===0&&cwn[wi]===L-2){
                const cells=W.list[wi];
                for(let k=0;k<L;k++){ const e=cells[k]; if(cellArr[e]===0) D.add(e); }
              }
            }
            let allFail=true;
            for(const d of D){
              place(d,opp);
              let defended=true;
              if(winCellsOf(opp).length===0){
                defended=forcedWin(me, depth-2, allowThree)<0;
              }               // 受けが相手の四になるなら受け成功扱い(安全側)
              unplace(d,opp);
              if(defended){ allFail=false; break; }
            }
            if(allFail){ unplace(ci,me); return ci; }
          }
        }
        unplace(ci,me);
      }
      return -1;
    }

    /* 静かな局面の反復深化アルファベータ */
    let abDeadline=0, abNodes=0;
    const TIMEOUT={};
    function evalSide(col,defE){
      let v=(col===0)?(tot0-defE*tot1):(tot1-defE*tot0);
      const opF=(col===0)?four1:four0;
      // 相手に四が残る局面: 両四級はほぼ負け / 単発は止めに1手取られるテンポ損
      if(opF) v-=(opF>=2 ? WINV*0.45 : SCW[W.len-1]*2.2);
      return v;
    }
    function ab(col, depth, alpha, beta, ply, defW, defE, K){
      abNodes++;
      if((abNodes&511)===0 && now()>abDeadline) throw TIMEOUT;
      const opp=1-col;
      if(winCellsOf(col).length) return WINV-ply;            // 自分がすぐ勝てる
      if(depth<=0) return evalSide(col,defE);
      const oppW=winCellsOf(opp);
      let cand, forced=false;
      if(oppW.length>=2) return -(WINV-ply-1);               // 両四などは受からない
      if(oppW.length===1){ cand=[{ci:oppW[0]}]; forced=true; }   // 止めるしかない
      else cand=topK(col, K[depth]||4, defW);
      const childDepth=(forced&&ply<24)?depth:depth-1;       // 強制手は深さを消費しない(四追いの応酬を読み切る)
      let best=-Infinity;
      for(const m of cand){
        place(m.ci,col);
        let v;
        try{ v=-ab(opp, childDepth, -beta, -alpha, ply+1, defW, defE, K); }
        finally{ unplace(m.ci,col); }
        if(v>best) best=v;
        if(best>alpha) alpha=best;
        if(alpha>=beta) break;
      }
      return (best===-Infinity)?evalSide(col,defE):best;
    }

    /* 一手決定 */
    return function(cpuColor, placed){
      const n=st.N;
      if(placed===0) return [(n>>1),(n>>1)];
      rebuild();
      const me=cpuColor-1, opp=1-me, L=st.winLen;
      const budget=st.budgetMs||1100;
      const t0=now();
      const toRC=ci=>[(ci/n)|0, ci%n];
      // 1) 即勝ち
      const wins=winCellsOf(me);
      if(wins.length) return toRC(wins[0]);
      // 2) 相手の即勝ちを止める(複数あっても最も得な1つを塞ぐ)
      const oppWins=winCellsOf(opp);
      if(oppWins.length){
        let best=oppWins[0], bs=-1;
        for(const ci of oppWins){ const s=moveGain(ci,me); if(s>bs){ bs=s; best=ci; } }
        return toRC(best);
      }
      const defW=0.95+st.prob*0.008;   // もくもく確率が高いほど守り重視(従来思想を継承)
      const defE=1.0+st.prob*0.004;
      if(L>=4){
        // 3) 四追い(VCF)
        vcNodes=0; vcDeadline=t0+budget*0.35;
        const vcf=forcedWin(me, 24, false);
        if(vcf>=0) return toRC(vcf);
        // 4) 三四連続攻撃(VCT)。もくもく世界では長手順が崩れるので浅く
        vcNodes=0; vcDeadline=t0+budget*0.6;
        const vctDepth=(st.prob===0)?18:(st.prob<30?13:8);
        const vct=forcedWin(me, vctDepth, true);
        if(vct>=0) return toRC(vct);
        // 5) 相手に四追いが見えているなら、受け候補を必ず読みに混ぜる
        vcNodes=0; vcDeadline=t0+budget*0.7;
        var oppVCF=forcedWin(opp, 16, false);
      }
      // 6) 反復深化アルファベータ(残り時間いっぱい・最大10手読み)
      const K=[0, 5, 5, 6, 6, 7, 8, 8, 9, 10, 12, 12, 12, 12, 12];
      abDeadline=t0+budget; abNodes=0;
      let rootCand=topK(me, 18, defW);
      if(typeof oppVCF!=="undefined" && oppVCF>=0 && !rootCand.some(m=>m.ci===oppVCF)){
        rootCand.push({ci:oppVCF, s:0});
      }
      let bestMove=rootCand.length?rootCand[0].ci:-1;
      try{
        for(let depth=4; depth<=14; depth+=2){
          let alpha=-Infinity, bestV=-Infinity, bestThis=-1;
          for(const m of rootCand){
            place(m.ci,me);
            let v;
            try{ v=-ab(opp, depth-1, -Infinity, -alpha, 1, defW, defE, K); }
            finally{ unplace(m.ci,me); }
            m.iterScore=v;
            if(v>bestV){ bestV=v; bestThis=m.ci; }
            if(v>alpha) alpha=v;
          }
          if(bestThis>=0) bestMove=bestThis;
          rootCand.sort((a,b)=>(b.iterScore||0)-(a.iterScore||0));   // 次の深さは前回の並び順で
          if(bestV>=WINV-64) break;                                  // 勝ち筋確定なら十分
        }
      }catch(e){ if(e!==TIMEOUT) throw e; }
      if(bestMove<0){ // 保険: 空きマスならどこでも
        for(let ci=0;ci<n*n;ci++) if(cellArr[ci]===0){ bestMove=ci; break; }
      }
      return toRC(bestMove);
    };
  }
  const expertMove=makeExpertAI({ get board(){return board}, N, get winLen(){return winLen}, get prob(){return prob}, budgetMs:2400 });

  /* ---------- タイトル/UI ---------- */
  // あそびかた選択: 選んだ方の設定ブロックだけ出現(ルール設定も選んだ側へ移動)
  const cpuSetup=document.getElementById("cpuSetup"), friendSetup=document.getElementById("friendSetup"), localSetup=document.getElementById("localSetup");
  const ruleBox=document.getElementById("ruleBox"), ruleNote=document.getElementById("ruleNote");
  document.querySelectorAll("#modeRow .fuda").forEach(b=>{
    b.addEventListener("click",()=>{ ensureAudio(); playSelect();
      document.querySelectorAll("#modeRow .fuda").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel");
      const mode=b.dataset.mode;
      if(mode==="robot"){ cpuSetup.insertBefore(ruleBox, document.getElementById("startBtn")); ruleNote.textContent=""; }
      else if(mode==="local"){ localSetup.insertBefore(ruleBox, document.getElementById("startLocalBtn")); ruleNote.textContent=""; }
      else { friendSetup.insertBefore(ruleBox, friendSetup.firstElementChild); ruleNote.textContent="※部屋を作った側のルールで遊びます"; }
      cpuSetup.classList.toggle("on", mode==="robot");
      localSetup.classList.toggle("on", mode==="local");
      friendSetup.classList.toggle("on", mode==="friend");
    });
  });
  // ルール設定: −/＋で もくもく確率(0〜99%)・ならべる数(2〜7)。長押しで連続変更
  const probValEl=document.getElementById("probVal"), winValEl=document.getElementById("winVal");
  function renderRules(){ probValEl.textContent=mokuProb+"%"; winValEl.textContent=winLen; }
  document.querySelectorAll(".rc-btn").forEach(b=>{
    let holdTmr=0, holdIv=0;
    const step=()=>{
      const d=+b.dataset.d;
      let changed=false;
      if(b.dataset.t==="p"){
        const ni=Math.max(0, Math.min(PROB_STEPS.length-1, probIdx+d));
        if(ni!==probIdx){ probIdx=ni; mokuProb=PROB_STEPS[probIdx]; changed=true; }
      } else {
        const nw=Math.max(2, Math.min(10, winLen+d));
        if(nw!==winLen){ winLen=nw; changed=true; }
      }
      if(changed){ playTick(); renderRules(); }
    };
    const stop=()=>{ clearTimeout(holdTmr); clearInterval(holdIv); holdTmr=0; holdIv=0; };
    b.addEventListener("pointerdown",(e)=>{ e.preventDefault(); ensureAudio(); step();
      holdTmr=setTimeout(()=>{ holdIv=setInterval(step, 90); }, 420); });
    ["pointerup","pointerleave","pointercancel"].forEach(ev=> b.addEventListener(ev, stop));
  });
  // もくもくのゆくえ トグル(初期ON=盤の中へ移動)
  function renderStay(){ document.querySelectorAll("#stayToggle .mg-btn").forEach(x=>x.classList.toggle("sel", (x.dataset.stay==="1")===mokuStay)); }
  document.querySelectorAll("#stayToggle .mg-btn").forEach(b=>{
    b.addEventListener("click",()=>{ ensureAudio(); playSelect(); mokuStay=(b.dataset.stay==="1"); renderStay(); });
  });
  document.getElementById("ruleReset").addEventListener("click",()=>{
    ensureAudio(); playSelect();
    probIdx=PROB_STEPS.indexOf(20); mokuProb=20; winLen=5; mokuStay=true; renderRules(); renderStay();
  });
  renderRules(); renderStay();

  // 効果音のON/OFF — 全画面共通・保存される
  const seBtn=document.getElementById("seBtn");
  function renderSnd(){ seBtn.classList.toggle("off", !seOn); }
  seBtn.addEventListener("click",()=>{ ensureAudio();
    seOn=!seOn; try{ localStorage.setItem("gmk.se", seOn?"1":"0"); }catch(e){}
    renderSnd();
    if(seBus) seBus.gain.setTargetAtTime(seOn?1:0, actx.currentTime, 0.02);
    if(seOn) playSelect();
  });
  renderSnd();
  document.querySelectorAll("#lvRow .fuda").forEach(b=>{
    b.addEventListener("click",()=>{ ensureAudio(); playSelect();
      document.querySelectorAll("#lvRow .fuda").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel"); cpuLv=+b.dataset.lv;
    });
  });
  let orderRandom=false;
  document.querySelectorAll("#orderRow .fuda").forEach(b=>{
    b.addEventListener("click",()=>{ ensureAudio(); playSelect();
      document.querySelectorAll("#orderRow .fuda").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel");
      if(b.dataset.first==="r"){ orderRandom=true; }
      else { orderRandom=false; human=(+b.dataset.first)?BLACK:WHITE; }
    });
  });
  document.getElementById("startBtn").addEventListener("click",()=>{ ensureAudio(); online=false; local=false; leaveChannel();
    if(orderRandom) human=(Math.random()<0.5)?BLACK:WHITE;   // おまかせ: 対局開始時に先後を抽選
    playStart(); startGame(); });
  document.getElementById("startLocalBtn").addEventListener("click",()=>{ ensureAudio(); online=false; local=true; leaveChannel(); playStart(); startGame(); });
  document.getElementById("againBtn").addEventListener("click",()=>{
    ensureAudio();
    if(peerGone){ goTitle(); return; }   // あいては退出済み → タイトルへ戻って部屋を作り直してもらう
    if(online && ch){   // オンライン: 双方が「もう一局」を押したら再戦(先手後手は引き直し)
      if(myRematch) return;
      myRematch=true;
      ch.send({ type:"broadcast", event:"rematch", payload:{} });
      if(peerRematch){ if(isHost) hostRestart(); else rSub.textContent="はじまる…"; }
      else { playSelect(); rSub.textContent="あいての「もう一局」を待っておる…"; }
      return;
    }
    playStart(); startGame();
  });
  document.getElementById("rHomeBtn").addEventListener("click",()=>{ ensureAudio(); goTitle(); });
  // 結果ダイアログ: 枠の外タップで盤面を眺める⇔再表示
  resultOverlay.addEventListener("click",(e)=>{
    if(e.target!==resultOverlay) return;   // カード内のタップは無視
    ensureAudio(); playSelect();
    resultOverlay.classList.toggle("peek");
  });
  // 投了: 確認ダイアログを挟む
  const confirmOverlay=document.getElementById("confirmOverlay");
  function doResign(){
    if(over) return;
    if(online && ch) ch.send({ type:"broadcast", event:"resign", payload:{} });
    over=true; setGiveupVisible(false);
    rTitle.textContent="投了…"; rTitle.className="r-title";
    rSub.textContent="また挑むがよい"; playLose(); if(online) bumpRoomStats("lose"); else renderRoomStats(); resultOverlay.classList.add("on");
  }
  document.getElementById("giveupBtn").addEventListener("click",()=>{
    if(over) return; ensureAudio(); playSelect();
    confirmOverlay.classList.add("on");
  });
  document.getElementById("cfYes").addEventListener("click",()=>{ ensureAudio(); confirmOverlay.classList.remove("on"); doResign(); });
  document.getElementById("cfNo").addEventListener("click",()=>{ ensureAudio(); playSelect(); confirmOverlay.classList.remove("on"); });
  confirmOverlay.addEventListener("click",(e)=>{ if(e.target===confirmOverlay){ ensureAudio(); playSelect(); confirmOverlay.classList.remove("on"); } });

  /* ---------- ルール変更(結果画面から・部屋を抜けずに) ---------- */
  const ruleOverlay=document.getElementById("ruleOverlay"), ruleSlot=document.getElementById("ruleSlot");
  let ruleBoxHome=null;   // ルール設定の元の場所(閉じたら戻す)
  document.getElementById("ruleChgBtn").addEventListener("click",()=>{
    ensureAudio(); playSelect();
    ruleBoxHome={ parent:ruleBox.parentNode, next:ruleBox.nextSibling };
    ruleSlot.appendChild(ruleBox); ruleBox.classList.add("on");
    ruleOverlay.classList.add("on");
  });
  function closeRuleDlg(){
    if(!ruleOverlay.classList.contains("on")) return;
    ruleOverlay.classList.remove("on"); ruleBox.classList.remove("on");
    if(ruleBoxHome && ruleBoxHome.parent) ruleBoxHome.parent.insertBefore(ruleBox, ruleBoxHome.next);
    if(online && ch && isHost) ch.send({ type:"broadcast", event:"rules", payload:rulePayload() });   // 相手にも通知(届かなくても再戦時のrestartで再同期)
    showToast("次の一局から新しいルールで打つ");
  }
  document.getElementById("ruleOk").addEventListener("click",()=>{ ensureAudio(); playSelect(); closeRuleDlg(); });
  ruleOverlay.addEventListener("click",(e)=>{ if(e.target===ruleOverlay){ ensureAudio(); playSelect(); closeRuleDlg(); } });

  /* 対局中の一時メッセージ */
  const toastEl=document.getElementById("toast");
  let toastTmr=0;
  function showToast(msg, ms){
    toastEl.textContent=msg; toastEl.classList.add("on");
    clearTimeout(toastTmr); toastTmr=setTimeout(()=>toastEl.classList.remove("on"), ms||2400);
  }

  /* あそびかた説明: 現在のルール設定を反映して表示 */
  const helpOverlay=document.getElementById("helpOverlay"), helpBody=document.getElementById("helpBody");
  function openHelp(){
    ensureAudio(); playSelect();
    const nb=KAN[winLen]||winLen;
    let html="<div class=\"h-sec\">基本ルール</div>"
      +"<p>碁石を交互に置き<br>たて・よこ・ななめに<b>"+nb+"つ</b>揃えたら勝ち</p>";
    html+="<div class=\"h-sec hl\">もくもく</div>";
    if(mokuProb>0){
      if(mokuStay) html+="<p>置いた碁石は<b>"+mokuProb+"%</b>の確率で「もくもく」し<br>煙とともに盤の別の場所へワープする。運を味方につけよ</p>";
      else         html+="<p>置いた碁石は<b>"+mokuProb+"%</b>の確率で煙となって消え<br>手番が相手に移る。運を味方につけよ</p>";
    }else{
      html+="<p>今回はもくもく無し。碁石は動かない、正真正銘の実力勝負。</p>";
    }
    html+="<div class=\"h-sec\">一手戻る</div>"
      +"<p>自分の直前の一手をやり直せる<br>（オンラインは相手が許した時だけ）</p>";
    helpBody.innerHTML=html;
    helpOverlay.classList.add("on");
  }
  document.getElementById("helpBtn").addEventListener("click", openHelp);
  document.getElementById("helpClose").addEventListener("click",()=>{ ensureAudio(); playSelect(); helpOverlay.classList.remove("on"); });
  helpOverlay.addEventListener("click",(e)=>{ if(e.target===helpOverlay){ playSelect(); helpOverlay.classList.remove("on"); } });

  /* 待った(オンラインの一手戻る)の許可ダイアログ */
  const undoOverlay=document.getElementById("undoOverlay");
  document.getElementById("undoYes").addEventListener("click",()=>{
    ensureAudio(); playSelect(); undoOverlay.classList.remove("on");
    if(!online||over||!hist.length) return;
    if(ch) ch.send({ type:"broadcast", event:"undoyes", payload:{} });
    const foe=(human===BLACK)?WHITE:BLACK;   // 申し込んだのは相手(自分のfoe)
    undoToPlayer(foe);
    showToast("「待った」を許した");
  });
  document.getElementById("undoNo").addEventListener("click",()=>{
    ensureAudio(); playSelect(); undoOverlay.classList.remove("on");
    if(ch) ch.send({ type:"broadcast", event:"undono", payload:{} });
  });
  /* ===== スタンプ(オンライン中に気持ちを送る) ===== */
  const STAMP_SVGS=[
    '😭',
    '😍',
    '🤣'
  ];
  function spawnStamp(i, who){
    if(stampMuted) return;
    i=Math.max(0, Math.min(2, i|0));
    const el=document.createElement("div"); el.className="stamp-fly";
    const hx=0.06+Math.random()*0.88;                        // 横位置: 画面全幅(両端も含む)
    el.style.left="calc("+(hx*100).toFixed(1)+"% - 48px)";   // 要素の中心をhxに合わせる(幅96px)
    const central=1-Math.abs(hx-0.5)*2;                      // 0(両端)〜1(中央)
    el.style.setProperty("--rise", "-"+(24+(1-central)*16).toFixed(0)+"vh");   // 中央は低め(盤の下側に少しかぶる程度)・両端は高め(従来通り)
    el.style.setProperty("--dx", (Math.random()*24-12).toFixed(0)+"px");
    const nm=who||"自分";
    el.innerHTML='<span class="s-emoji">'+STAMP_SVGS[i]+'</span><span class="s-name">'+nm+'</span>';
    if(seOn) playStamp(i);   // スタンプ別の効果音
    // ダイアログ表示中(結果・投了確認)は前面に出して見えるようにする
    const overlayOpen=document.getElementById("resultOverlay").classList.contains("on")||document.getElementById("confirmOverlay").classList.contains("on");
    if(overlayOpen){ el.classList.add("over-dialog"); document.body.appendChild(el); }
    else{ (document.getElementById("gameScene")||document.body).appendChild(el); }   // 碁笥/駒と同じ重なり文脈に入れる(盤より前・碁石入れより後ろ)
    setTimeout(()=>el.remove(), 2350);
  }
  function sendStamp(i){
    spawnStamp(i, "自分");
    if(online && ch){ try{ ch.send({ type:"broadcast", event:"stamp", payload:{ i } }); }catch(e){} }   // 相手にも届ける(ロストしても実害なし)
  }
  let stampMuted=false; try{ stampMuted=localStorage.getItem("gmk.smute")==="1"; }catch(e){}
  (function(){ const mb=document.getElementById("stampMute"); if(!mb) return;
    const rndr=()=>mb.classList.toggle("muted", stampMuted); rndr();
    mb.addEventListener("click",()=>{ stampMuted=!stampMuted; try{ localStorage.setItem("gmk.smute", stampMuted?"1":"0"); }catch(e){} rndr(); });
  })();
  document.querySelectorAll("#stampBar .stamp-btn").forEach(b=>{
    const i=+b.dataset.i; b.innerHTML=STAMP_SVGS[i];
    b.addEventListener("click",()=>{ ensureAudio(); sendStamp(i); });
  });

  function goTitle(){
    { const sb=document.getElementById("stampBar"); if(sb) sb.classList.remove("on"); }   // タイトルに戻ったらスタンプバーを隠す
    over=true; stopVictory();
    if(online && ch){ try{ ch.send({ type:"broadcast", event:"bye", payload:{} }); }catch(e){} }   // あいてに「退出したよ」を明示的に伝える
    document.getElementById("confirmOverlay").classList.remove("on");
    resultOverlay.classList.remove("on","peek");
    gameScene.classList.remove("on"); titleScene.classList.add("on");
    leaveChannel();
    roomStatus("");   // 合言葉表示をリセット
  }
  window.addEventListener("pointerdown", ensureAudio, {passive:true});
})();
</script>
